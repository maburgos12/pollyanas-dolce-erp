    if(r.status===403||r.status===401||r.redirected||contentType.includes('text/html')){

      return null;

}

function HorasExtraTab({area,setArea,mes,anio,showStatus}){

  const [previewHoraExtra,setPreviewHoraExtra]=React.useState(null);

    api(`/api/bonos-produccion/horas-extra/?${qs.toString()}`)
      .then(d=>{setEmpleados(d.empleados||[]);setHorasExtra(d.horas_extra||[]);setLoading(false);})
      .catch(err=>{showStatus(err.message,'err');setLoading(false);});

    if(item.estado==='cancelado')return'Eliminada';

function CapturaTab({bonosArea,area,setArea,selectedBono,setSelectedBono,registros,guardarDia,mes,anio}){
