<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bonos de Ventas — Pollyana's Dolce</title>
<link rel="manifest" href="/bonos-ventas/manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="/static/bonos_ventas/icons/apple-touch-icon-180.png?v=20260521">
<link rel="icon" type="image/png" sizes="192x192" href="/static/bonos_ventas/icons/icon-192.png?v=20260521">
<meta name="theme-color" content="#8B2252">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bonos Ventas">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
:root{
  --wine:#8B2252;--wine-light:rgba(139,34,82,.08);--wine-mid:rgba(139,34,82,.15);
  --gold:#C9A84C;--gold-light:rgba(201,168,76,.12);
  --ink:#1C1520;--sub:#6B5F70;--faint:#B8ADBE;
  --line:#EDE6F0;--bg:#F9F5F8;--card:#FFFFFF;
  --ok:#166534;--ok-bg:#DCFCE7;--bad:#991B1B;--bad-bg:#FEE2E2;
  --warn:#92400E;--warn-bg:#FEF3C7;
  --r:10px;--r-sm:6px;--sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:Nunito,sans-serif;font-size:14px;line-height:1.5}
/* HEADER */
.hdr{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hdr-brand{display:flex;align-items:center;gap:10px;flex:1;min-width:200px}
.hdr-icon{width:36px;height:36px;border-radius:50%;background:var(--wine);display:flex;align-items:center;justify-content:center;flex:none}
.hdr-icon svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr-title{font-family:"Playfair Display",serif;font-size:20px;color:var(--wine);line-height:1.1}
.hdr-sub{font-size:11px;color:var(--sub);margin-top:1px}
.hdr-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hdr-controls input[type=number]{width:60px;padding:6px 8px;border:1px solid var(--line);border-radius:var(--r-sm);font:inherit;font-size:13px;color:var(--ink);background:var(--bg);text-align:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-sm);font:inherit;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:opacity .15s,background .15s}
.btn-wine{background:var(--wine);color:#fff}.btn-wine:hover{opacity:.88}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}.btn-ghost:hover{background:var(--line)}
.btn-logout{color:var(--bad);border-color:rgba(153,27,27,.24);text-decoration:none;background:#fff}
.btn-logout:hover{background:var(--bad-bg);border-color:rgba(153,27,27,.38)}
.btn-gold{background:var(--gold);color:#1C1520}.btn-gold:hover{opacity:.88}
.btn-sm{padding:5px 10px;font-size:12px}
/* STATUS BAR */
.status-bar{background:var(--wine);color:#fff;font-size:12px;font-weight:700;padding:6px 20px;display:flex;align-items:center;gap:8px}
.status-bar.ok{background:#166534}.status-bar.err{background:#991B1B}
/* TABS */
.tabs-wrap{background:var(--card);border-bottom:1px solid var(--line);padding:0 20px;display:flex;gap:0;overflow-x:auto}
.tab-btn{padding:12px 16px;font:inherit;font-size:13px;font-weight:700;color:var(--sub);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab-btn:hover{color:var(--wine)}
.tab-btn.on{color:var(--wine);border-bottom-color:var(--wine)}
/* MAIN */
main{padding:20px;max-width:1100px;margin:0 auto}
/* PERIODO BAR */
.periodo-bar{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;box-shadow:var(--sh)}
.periodo-label{font-size:12px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.periodo-id{font-size:13px;font-weight:800;color:var(--wine);background:var(--wine-light);padding:3px 10px;border-radius:999px}
/* CARDS MÉTRICAS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.metric-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.metric-card .lbl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric-card .val{font-size:22px;font-weight:800;color:var(--ink);line-height:1}
.metric-card .val.wine{color:var(--wine)}
.metric-card .val.gold{color:var(--gold)}
/* CHIPS */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:6px 14px;border-radius:999px;border:1px solid var(--line);font:inherit;font-size:13px;font-weight:700;cursor:pointer;background:var(--card);color:var(--sub);transition:all .15s}
.chip:hover{border-color:var(--wine);color:var(--wine)}
.chip.on{background:var(--wine);color:#fff;border-color:var(--wine)}
/* CARD */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:16px}
.card-hdr{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-hdr-title{font-size:13px;font-weight:800;color:var(--ink);text-transform:uppercase;letter-spacing:.05em}
.card-body{padding:16px 18px}
/* TABLA */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--sub);border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:800}
.badge.ok{background:var(--ok-bg);color:var(--ok)}
.badge.bad{background:var(--bad-bg);color:var(--bad)}
.badge.warn{background:var(--warn-bg);color:var(--warn)}
.badge.suc{background:var(--wine-light);color:var(--wine)}
.badge.pending{background:var(--warn-bg);color:var(--warn)}
.badge.info{background:var(--wine-light);color:var(--wine)}
/* AVATAR */
.av{width:32px;height:32px;border-radius:50%;background:var(--wine);color:#fff;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex:none}
/* PERSONA ROW */
.persona-row{display:flex;align-items:center;gap:10px}
.persona-name{font-weight:700;font-size:13px}
.persona-sub{font-size:11px;color:var(--sub)}
/* GRID DÍAS */
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.day-cell{aspect-ratio:1;border-radius:6px;border:1px solid var(--line);background:var(--bg);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--faint);transition:all .12s;position:relative}
.day-cell:hover{border-color:var(--wine);color:var(--wine)}
.day-cell.worked{background:var(--wine);border-color:var(--wine);color:#fff}
.day-cell.dom{background:#FFF7ED;color:#9A3412;border-color:#FED7AA}
.day-cell.dom.worked{background:var(--wine);border-color:var(--wine);color:#fff}
.day-cell.saving{opacity:.65;cursor:progress}
.day-cell .dn{font-size:13px;font-weight:800}
.day-cell .ds{font-size:9px;margin-top:1px}
/* CONCEPTOS */
.concepto-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.concepto-row:last-child{border-bottom:none}
.toggle-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--line);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;transition:all .12s}
.toggle-btn.on{background:var(--wine);border-color:var(--wine)}
.toggle-btn svg{width:13px;height:13px;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none}
.concepto-lbl{flex:1;font-size:13px;font-weight:600;color:var(--ink)}
/* VENTAS CAT */
.cat-row{display:grid;grid-template-columns:1fr 90px 90px 80px 80px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.cat-row:last-child{border-bottom:none}
.cat-row input[type=number]{width:100%;padding:5px 8px;border:1px solid var(--line);border-radius:var(--r-sm);font:inherit;font-size:13px;text-align:right}
.cat-row input.activo{border-color:var(--ok)}
/* AJUSTE INPUT */
.aj-input{width:90px;padding:5px 8px;border:1px solid var(--line);border-radius:var(--r-sm);font:inherit;font-size:13px;text-align:right}
/* NOTAS */
.nota-input{width:100%;padding:5px 8px;border:1px solid var(--line);border-radius:var(--r-sm);font:inherit;font-size:12px;resize:none}
/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--sub);margin-bottom:10px}
/* DIVIDER */
.div{height:1px;background:var(--line);margin:14px 0}
/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--faint);font-size:13px;font-weight:700}
/* TOTAL ROW */
.total-row td{font-weight:800;background:var(--bg);border-top:2px solid var(--line)}
/* RESUMEN CARD */
.res-sucursal{font-weight:800;color:var(--wine);font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:12px 18px 4px;border-top:2px solid var(--wine-light)}
.res-sucursal:first-child{border-top:none}
/* SELECTOR PERSONA */
.persona-selector{display:flex;align-items:center;gap:8px;padding:10px;border:1px solid var(--line);border-radius:var(--r-sm);cursor:pointer;transition:all .12s;margin-bottom:6px}
.persona-selector:hover{border-color:var(--wine);background:var(--wine-light)}
.persona-selector.on{border-color:var(--wine);background:var(--wine-light)}
.employee-picker{display:grid;gap:10px}
.employee-search-wrap{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 10px}
.employee-search{flex:1;min-width:0;border:none;background:transparent;font:inherit;font-size:14px;font-weight:700;color:var(--ink);outline:none}
.employee-search::placeholder{color:var(--faint);font-weight:700}
.employee-count{font-size:11px;font-weight:800;color:var(--wine);background:var(--wine-light);border-radius:999px;padding:3px 8px;white-space:nowrap}
.employee-list{display:grid;gap:6px;max-height:330px;overflow-y:auto;padding-right:2px}
.employee-row{width:100%;display:flex;align-items:center;gap:10px;text-align:left;padding:10px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--card);font:inherit;cursor:pointer;color:var(--ink);transition:background .12s,border-color .12s,box-shadow .12s}
.employee-row:hover{border-color:var(--wine);background:var(--wine-light)}
.employee-row.on{border-color:var(--wine);background:var(--wine-light);box-shadow:inset 3px 0 0 var(--wine)}
.employee-row-main{flex:1;min-width:0}
.employee-row .persona-name{white-space:normal}
.employee-row-right{font-size:12px;font-weight:800;color:var(--wine);white-space:nowrap}
.employee-empty{padding:18px;text-align:center;border:1px dashed var(--line);border-radius:var(--r-sm);color:var(--faint);font-size:13px;font-weight:700}
.perm-layout{display:grid;grid-template-columns:minmax(290px,420px) 1fr;gap:16px;align-items:start}
.form-grid{display:grid;gap:12px}
.field{display:grid;gap:5px}
.field label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--sub)}
.form-control{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--bg);color:var(--ink);font:inherit;font-size:13px}
.form-control:focus{outline:none;border-color:var(--wine);background:#fff}
.segmented{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.segment{border:1px solid var(--line);border-radius:var(--r-sm);background:var(--card);color:var(--sub);font:inherit;font-size:12px;font-weight:800;padding:8px;cursor:pointer}
.segment.on{background:var(--wine);border-color:var(--wine);color:#fff}
.permission-list{display:grid;gap:10px}
.permission-item{border:1px solid var(--line);border-radius:var(--r);background:var(--card);padding:12px;display:grid;gap:8px}
.permission-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.permission-title{font-size:13px;font-weight:800;color:var(--ink)}
.permission-meta{font-size:11px;color:var(--sub);font-weight:700}
.permission-reason{font-size:13px;color:var(--ink);background:var(--bg);border-radius:var(--r-sm);padding:8px}
.permission-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.preview-note{font-size:12px;font-weight:700;color:var(--sub);background:var(--gold-light);border:1px solid rgba(201,168,76,.28);border-radius:var(--r-sm);padding:9px 10px}
.print-success{display:grid;gap:8px;margin-top:10px;padding:10px;border:1px solid rgba(22,101,52,.22);background:var(--ok-bg);border-radius:var(--r-sm)}
.print-success-title{font-size:12px;font-weight:900;color:var(--ok)}
.print-success-text{font-size:12px;font-weight:700;color:var(--sub)}
.print-success-actions{display:flex;gap:8px;flex-wrap:wrap}
.print-modal{position:fixed;inset:0;z-index:80;background:rgba(28,21,32,.55);display:flex;align-items:flex-start;justify-content:center;padding:18px;overflow:auto}
.print-dialog{background:var(--card);border-radius:var(--r);box-shadow:0 20px 50px rgba(28,21,32,.22);width:min(940px,100%);overflow:hidden}
.print-dialog-hdr{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.print-dialog-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.print-actions{display:flex;gap:8px;flex-wrap:wrap}
.print-preview{background:#ece7ee;padding:16px;overflow:auto}
.print-page{width:216mm;min-height:279mm;background:#fff;color:#17121a;margin:0 auto;padding:15mm 16mm;box-shadow:0 8px 26px rgba(28,21,32,.18);font-family:Arial,sans-serif;font-size:12px;line-height:1.35}
.print-head{display:flex;justify-content:space-between;gap:16px;border-bottom:2px solid #8B2252;padding-bottom:10px;margin-bottom:14px}
.print-brand{font-family:"Playfair Display",serif;color:#8B2252;font-size:22px;font-weight:700}
.print-doc-title{text-align:right;font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.print-folio{text-align:right;font-size:12px;font-weight:700;color:#6B5F70;margin-top:4px}
.print-section{border:1px solid #E6DCEB;border-radius:6px;margin-top:10px;overflow:hidden}
.print-section-title{background:#F7F1F5;color:#8B2252;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:7px 9px;border-bottom:1px solid #E6DCEB}
.print-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.print-field{padding:8px 9px;border-right:1px solid #E6DCEB;border-bottom:1px solid #E6DCEB;min-height:42px}
.print-field:nth-child(2n){border-right:none}
.print-label{font-size:9px;color:#6B5F70;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.print-value{font-size:12px;font-weight:700;color:#17121a;white-space:pre-wrap}
.print-reason{padding:10px 9px;min-height:74px;white-space:pre-wrap}
.signature-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:24px}
.signature-line{border-top:1px solid #17121a;text-align:center;padding-top:6px;font-size:10px;font-weight:700;min-height:34px}
.print-foot{margin-top:14px;font-size:10px;color:#6B5F70}
/* RESPONSIVE */
@media(max-width:700px){
  .hdr{padding:10px 14px}
  main{padding:14px}
  .metrics{grid-template-columns:1fr 1fr}
  .cat-row{grid-template-columns:1fr 70px 70px 60px 60px;font-size:12px}
  .perm-layout{grid-template-columns:1fr}
}
@media(max-width:760px){.print-page{transform:scale(.56);transform-origin:top left;margin:0}.print-preview{max-height:70vh}.print-dialog{width:100%}}
@media print{
  @page{size:letter;margin:0}
  html,body{width:216mm!important;height:279mm!important;margin:0!important;padding:0!important;background:#fff!important;overflow:hidden!important}
  body > :not(.print-modal){display:none!important}
  .print-modal{position:static!important;inset:auto!important;z-index:auto!important;background:#fff!important;display:block!important;width:216mm!important;height:279mm!important;margin:0!important;padding:0!important;overflow:visible!important}
  .print-dialog,.print-preview{display:block!important;width:216mm!important;height:279mm!important;margin:0!important;padding:0!important;border:0!important;box-shadow:none!important;background:#fff!important;overflow:hidden!important}
  .print-dialog-hdr{display:none!important}
  .print-page{display:block!important;position:static!important;transform:none!important;width:216mm!important;height:279mm!important;min-height:0!important;max-height:279mm!important;margin:0!important;box-shadow:none!important;padding:15mm 16mm!important;overflow:hidden!important;break-after:avoid!important;page-break-after:avoid!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const h = React.createElement;
const TODAY = new Date();
const MESES = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const CATS_LABELS = {GRANDE:'Grande',MEDIANO:'Mediano',CHICO:'Chico',MINI:'Mini',VELAS_ACCESORIOS:'Velas/Accesorios',VASOS:'Vasos'};
const CATS = Object.keys(CATS_LABELS);

function api(path, opts={}) {
  const csrfMatch = document.cookie.match(/(?:^|; )csrftoken=([^;]+)/);
  const headers = {'Content-Type':'application/json', 'X-CSRFToken': csrfMatch ? decodeURIComponent(csrfMatch[1]) : '', ...(opts.headers||{})};
  return fetch(path, {...opts, headers, credentials:'same-origin'}).then(async r => {
    if (r.status === 403 || r.status === 401) {
      window.location.href = '/login/?next=' + encodeURIComponent(window.location.pathname);
      return null;
    }
    const t = await r.text();
    const d = t ? JSON.parse(t) : null;
    if (!r.ok) throw new Error(d?.detail || d?.error || `Error ${r.status}`);
    return d;
  });
}
function money(v){ return Number(v||0).toLocaleString('es-MX',{style:'currency',currency:'MXN'}); }
function initials(n){ return (n||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function esDom(d,m,a){ return new Date(a,m-1,d).getDay()===0; }
function diasEnMes(m,a){ return new Date(a,m,0).getDate(); }
function normalizeText(v){ return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim(); }
function localDate(v){
  const d = new Date(v);
  const m = String(d.getMonth() + 1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${d.getFullYear()}-${m}-${dd}`;
}
function localTime(v){
  const d = new Date(v);
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${hh}:${mm}`;
}

// SVG icons inline
const IconCheck = () => h('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round',style:{width:13,height:13}},h('polyline',{points:'20 6 9 17 4 12'}));
const IconStore = () => h('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'#fff',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round',style:{width:18,height:18}},h('path',{d:'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z'}),h('polyline',{points:'9 22 9 12 15 12 15 22'}));

function Badge({ok, label}){
  if(label) return h('span',{className:`badge ${ok?'ok':'bad'}`}, ok?'✓ Pasa':'✗ No pasa');
  return h('span',{className:`badge ${ok?'ok':'bad'}`}, ok?'Pasa':'No pasa');
}
function EmployeeSearchList({items,selected,onSelect,placeholder,emptyText,metaText,rightText}){
  const [query,setQuery]=React.useState('');
  const q=normalizeText(query);
  const filtered=q?items.filter(b=>normalizeText([b.empleado_nombre,b.sucursal_nombre,b.area,b.puesto].join(' ')).includes(q)):items;
  return h('div',{className:'employee-picker'},
    h('div',{className:'employee-search-wrap'},

function permisoDate(p){
  const ini=new Date(p.fecha_inicio);
  return ini.toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});
}
function permisoTime(p){
  if(p.tipo==='permiso_dia')return 'Todo el dia';
  const ini=new Date(p.fecha_inicio);
  const fin=p.fecha_fin?new Date(p.fecha_fin):null;
  const horaIni=ini.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  const horaFin=fin?fin.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}):'';
  return `${horaIni} - ${horaFin}`;
}
function PrintField({label,value}){

function App(){
  const [tab, setTab] = React.useState('config');
  const [mes, setMes] = React.useState(TODAY.getMonth()+1);
  const [anio, setAnio] = React.useState(TODAY.getFullYear());
  const [periodo, setPeriodo] = React.useState(null);
  const [bonos, setBonos] = React.useState([]);
  const [ventas, setVentas] = React.useState([]);
  const [filtroSuc, setFiltroSuc] = React.useState('');
  const [status, setStatus] = React.useState('');
  const [statusType, setStatusType] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  React.useEffect(()=>{ cargar(); },[mes,anio]);

  const sucursales = React.useMemo(()=>{
    const m = new Map();
    bonos.forEach(b=>{ if(b.sucursal && b.sucursal_nombre) m.set(String(b.sucursal), b.sucursal_nombre); });
    return Array.from(m.entries()).sort((a,b)=>a[1].localeCompare(b[1]));
  },[bonos]);

  function cargar(){
    setLoading(true);
    Promise.all([
      api(`/api/bonos-ventas/periodos/?mes=${mes}&anio=${anio}`),
      api(`/api/bonos-ventas/bonos/resumen/?mes=${mes}&anio=${anio}`).catch(()=>({bonos:[]})),
      api(`/api/bonos-ventas/ventas-categoria/?periodo_mes=${mes}&periodo_anio=${anio}`).catch(()=>({results:[]})),
    ]).then(([periodos,resumen,ventasR])=>{
      const p = periodos.results ? periodos.results[0] : (Array.isArray(periodos)?periodos[0]:null);
      setPeriodo(p||null);
      setBonos(resumen.bonos||[]);
      setVentas(ventasR.results||ventasR||[]);
      setLoading(false);
      setStatus('');
    }).catch(err=>{ setStatus(err.message); setStatusType('err'); setLoading(false); });
  }

  function crearPeriodo(){
    api('/api/bonos-ventas/periodos/',{method:'POST',body:JSON.stringify({mes:+mes,anio:+anio,dias_laborables:23})})
      .then(()=>{ showStatus('Período creado','ok'); cargar(); })
      .catch(err=>showStatus(err.message,'err'));
  }
  function inicializar(){
    if(!periodo) return;
    api(`/api/bonos-ventas/periodos/${periodo.id}/inicializar-bonos/`,{method:'POST',body:'{}'})
      .then(r=>{ showStatus(`${r.creados} empleados inicializados`+(r.sin_sucursal?.length?` · ${r.sin_sucursal.length} sin sucursal asignada`:''),'ok'); cargar(); })
      .catch(err=>showStatus(err.message,'err'));
  }
  function syncPos(){
    if(!periodo) return;
    api('/api/bonos-ventas/ventas-categoria/sync-pos-bridge/',{method:'POST',body:JSON.stringify({periodo:periodo.id})})
      .then(()=>{ showStatus('Sincronización completada','ok'); cargar(); })
      .catch(err=>showStatus(err.message,'err'));
  }
  function showStatus(msg,type='ok'){ setStatus(msg); setStatusType(type); setTimeout(()=>setStatus(''),4000); }

  const bonosFiltrados = filtroSuc ? bonos.filter(b=>String(b.sucursal)===filtroSuc) : bonos;
  const totalPagar = bonosFiltrados.reduce((s,b)=>s+Number(b.total_a_pagar||0),0);
  const showBonusContext = tab !== 'permisos';

  return h('div',null,
    // HEADER
    h('header',{className:'hdr'},
      h('div',{className:'hdr-brand'},
        h('div',{className:'hdr-icon'}, h(IconStore)),
        h('div',null,
          h('div',{className:'hdr-title'},"Bonos de Ventas"),
          h('div',{className:'hdr-sub'},"Pollyana's Dolce · "+MESES[mes]+' '+anio)
        )
      ),
      h('div',{className:'hdr-controls'},
        h('input',{type:'number',min:1,max:12,value:mes,onChange:e=>setMes(+e.target.value),title:'Mes'}),
        h('input',{type:'number',value:anio,onChange:e=>setAnio(+e.target.value),style:{width:70},title:'Año'}),
        h('button',{className:'btn btn-wine',onClick:cargar}, loading?'Cargando…':'Actualizar'),
        h('a',{className:'btn btn-ghost btn-logout',href:'/logout/',title:'Cerrar sesión del ERP'},'Cerrar sesión')
      )
    ),

    // STATUS
    status && h('div',{className:`status-bar ${statusType}`}, status),

    // TABS
    h('div',{className:'tabs-wrap'},
      [['config','Configuración'],['captura','Captura diaria'],['permisos','Permisos'],['ventas','Ventas por categoría'],['resumen','Resumen mensual'],['ajustes','Ajustes']].map(([id,lbl])=>
        h('button',{key:id,className:`tab-btn ${tab===id?'on':''}`,onClick:()=>setTab(id)},lbl)
      )
    ),

    h('main',null,
      // PERIODO BAR
      showBonusContext && h('div',{className:'periodo-bar'},
        h('span',{className:'periodo-label'},'Período:'),
        periodo
          ? h('span',{className:'periodo-id'},`ID ${periodo.id} · ${periodo.dias_laborables} días lab.`)
          : h('span',{style:{color:'var(--faint)',fontSize:13}},'Sin período para este mes'),
        !periodo && h('button',{className:'btn btn-wine btn-sm',onClick:crearPeriodo},'Crear período'),
        periodo && h('button',{className:'btn btn-ghost btn-sm',onClick:inicializar},'Inicializar empleados'),
        periodo && h('div',{style:{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}},
          h('span',{style:{fontSize:12,color:'var(--sub)',fontWeight:700}},'Sucursal:'),
          h('select',{value:filtroSuc,onChange:e=>setFiltroSuc(e.target.value),style:{padding:'5px 10px',border:'1px solid var(--line)',borderRadius:6,font:'inherit',fontSize:13}},
            h('option',{value:''},'Todas'),
            sucursales.map(([id,nom])=>h('option',{key:id,value:id},nom))
          )
        )
      ),

      // MÉTRICAS GLOBALES
      showBonusContext && tab!=='ventas' && h('div',{className:'metrics'},
        h('div',{className:'metric-card'},h('div',{className:'lbl'},'Total a pagar'),h('div',{className:'val gold'},money(totalPagar))),
        h('div',{className:'metric-card'},h('div',{className:'lbl'},'Empleadas'),h('div',{className:'val'},bonosFiltrados.length)),
        h('div',{className:'metric-card'},h('div',{className:'lbl'},'Pasan asistencia'),h('div',{className:'val wine'},bonosFiltrados.filter(b=>b.pasa_asistencia).length)),
        h('div',{className:'metric-card'},h('div',{className:'lbl'},'Con bono ventas'),h('div',{className:'val gold'},bonosFiltrados.filter(b=>b.pasa_bono_ventas).length))
      ),

      tab==='config' && h(ConfigTab,{bonos:bonosFiltrados,sucursales,filtroSuc,setFiltroSuc}),
      tab==='captura' && h(CapturaTab,{bonos:bonosFiltrados,mes,anio,showStatus}),
      tab==='permisos' && h(PermisosTab,{bonos,sucursales,filtroSuc,setFiltroSuc,mes,anio,showStatus}),
      tab==='ventas' && h(VentasTab,{ventas,periodo,syncPos,cargar,showStatus}),
      tab==='resumen' && h(ResumenTab,{bonos:bonosFiltrados,sucursales}),
      tab==='ajustes' && h(AjustesTab,{bonos:bonosFiltrados,cargar,showStatus})
    )
  );
}

// ── CAPTURA TAB ───────────────────────────────────────────────────────────────
function CapturaTab({bonos,mes,anio,showStatus}){
  const [selSuc, setSelSuc] = React.useState('');
  const [selBono, setSelBono] = React.useState(null);
  const [registros, setRegistros] = React.useState([]);
  const [selDia, setSelDia] = React.useState(null);
  const [savingDia, setSavingDia] = React.useState(null);
  const [loadingReg, setLoadingReg] = React.useState(false);

  const sucursales = React.useMemo(()=>{
    const m = new Map();
    bonos.forEach(b=>{ if(b.sucursal&&b.sucursal_nombre) m.set(String(b.sucursal),b.sucursal_nombre); });
    return Array.from(m.entries()).sort((a,b)=>a[1].localeCompare(b[1]));
  },[bonos]);

  React.useEffect(()=>{
    if(!selSuc && sucursales.length) setSelSuc(sucursales[0][0]);
  },[sucursales]);

  const bonosSuc = selSuc ? bonos.filter(b=>String(b.sucursal)===selSuc) : [];
  const bonosSucIds = bonosSuc.map(b=>b.id).join(',');

  React.useEffect(()=>{
    if(selBono) cargarReg(selBono.id);
    else { setRegistros([]); setSelDia(null); }
  },[selBono?.id]);
  React.useEffect(()=>{
    if(selBono&&!bonosSuc.some(b=>b.id===selBono.id)) setSelBono(null);
  },[bonosSucIds,selBono?.id]);

  function cargarReg(id){
    setLoadingReg(true);
    api(`/api/bonos-ventas/registros-diarios/?bono=${id}`)
      .then(r=>{ setRegistros(r.results||r); setLoadingReg(false); })
      .catch(()=>setLoadingReg(false));
  }

  function togDia(dia){
    if(!selBono) return;
    if(savingDia) return;
    const r = registros.find(x=>+x.dia===dia);
    const nextWorked=!(r&&r.tiene_asistencia);
    setSavingDia(dia);
    if(r){
      api(`/api/bonos-ventas/registros-diarios/${r.id}/`,{method:'PATCH',body:JSON.stringify({tiene_asistencia:nextWorked,tiene_uniforme:nextWorked,tiene_puntualidad:nextWorked})})
        .then(()=>{ cargarReg(selBono.id); setSelDia(nextWorked?dia:null); }).catch(err=>showStatus(err.message,'err')).finally(()=>setSavingDia(null));
    } else {
      api('/api/bonos-ventas/registros-diarios/',{method:'POST',body:JSON.stringify({
        bono:selBono.id,dia,tiene_uniforme:true,tiene_puntualidad:true,tiene_asistencia:true,puntos_de_vista:''
      })}).then(()=>{ cargarReg(selBono.id); setSelDia(dia); }).catch(err=>showStatus(err.message,'err')).finally(()=>setSavingDia(null));
    }
  }

  function togConcepto(dia,campo){
    const r = registros.find(x=>+x.dia===dia);
    if(!r) return;
    api(`/api/bonos-ventas/registros-diarios/${r.id}/`,{method:'PATCH',body:JSON.stringify({[campo]:!r[campo]})})
      .then(()=>cargarReg(selBono.id)).catch(err=>showStatus(err.message,'err'));
  }

  function guardarNota(dia,val){
    const r = registros.find(x=>+x.dia===dia);
    if(!r) return;
    api(`/api/bonos-ventas/registros-diarios/${r.id}/`,{method:'PATCH',body:JSON.stringify({puntos_de_vista:val})}).catch(()=>{});
  }

  const total = diasEnMes(mes,anio);
  const regActivos = registros.filter(r=>r.tiene_asistencia);
  const diaActual = selDia && registros.find(x=>+x.dia===selDia);

  return h('div',null,
    // Sucursales
    h('div',{className:'chips'},
      sucursales.map(([id,nom])=>h('button',{key:id,className:`chip ${selSuc===id?'on':''}`,onClick:()=>{setSelSuc(id);setSelBono(null);}},nom))
    ),

    // Empleadas de la sucursal
    h('div',{className:'card'},
      h('div',{className:'card-hdr'},h('div',{className:'card-hdr-title'},sucursales.find(([id])=>id===selSuc)?.[1]||'Sucursal')),
      h('div',{className:'card-body'},
        bonosSuc.length===0
          ? h('div',{className:'empty'},'Sin empleadas en esta sucursal')
          : h(EmployeeSearchList,{items:bonosSuc,selected:selBono,onSelect:setSelBono,placeholder:'Teclea nombre o apellido...',rightText:b=>money(b.total_a_pagar)})
      )
    ),

    // Captura de la empleada seleccionada
    selBono && h('div',{className:'card'},
      h('div',{className:'card-hdr'},
        h('div',{style:{display:'flex',alignItems:'center',gap:10}},
          h('div',{className:'av'},initials(selBono.empleado_nombre)),
          h('div',null,
            h('div',{className:'persona-name'},selBono.empleado_nombre),
            h('div',{className:'persona-sub'},`${regActivos.length} días trabajados este mes`)
          )
        ),
        h('div',{style:{display:'flex',gap:6}},
          h(Badge,{ok:selBono.pasa_asistencia}),
          h(Badge,{ok:selBono.pasa_uniforme}),
          h(Badge,{ok:selBono.pasa_puntualidad})
        )
      ),
      h('div',{className:'card-body'},
        h('div',{className:'sec-title'},'Clic en el día para registrar asistencia'),
        h('div',{className:'days-grid'},
          Array.from({length:total},(_,i)=>i+1).map(d=>{
            const dom = esDom(d,mes,anio);
            const r = registros.find(x=>+x.dia===d);
            const worked = r?.tiene_asistencia;
            return h('div',{key:d,
              className:`day-cell ${dom?'dom':''} ${worked?'worked':''} ${savingDia===d?'saving':''}`,
              onClick:()=>togDia(d)
            },
              h('span',{className:'dn'},d),
              h('span',{className:'ds'},worked?'✓':dom?'D':'')
            );
          })
        ),

        // Conceptos del día seleccionado
        regActivos.length>0 && h('div',null,
          h('div',{className:'div'}),
          h('div',{className:'sec-title'},'Detalle por día'),
          h('div',{className:'chips'},
            regActivos.map(r=>h('button',{key:r.dia,
              className:`chip ${selDia===+r.dia?'on':''}`,
              style:{padding:'4px 10px',fontSize:12},
              onClick:()=>setSelDia(+r.dia)
            },r.dia))
          ),
          diaActual && h('div',null,
            ['tiene_uniforme','tiene_puntualidad'].map(campo=>{
              const labels={tiene_uniforme:'Uniforme',tiene_puntualidad:'Puntualidad'};
              return h('div',{key:campo,className:'concepto-row'},
                h('div',{className:`toggle-btn ${diaActual[campo]?'on':''}`,onClick:()=>togConcepto(selDia,campo)},
                  diaActual[campo] && h(IconCheck)
                ),
                h('span',{className:'concepto-lbl'},labels[campo]),
                h(Badge,{ok:diaActual[campo]})
              );
            }),
            h('div',{className:'concepto-row'},
              h('span',{className:'concepto-lbl'},'Puntos de vista / observaciones'),
              h('textarea',{className:'nota-input',rows:2,defaultValue:diaActual.puntos_de_vista||'',
                onBlur:e=>guardarNota(selDia,e.target.value),placeholder:'Opcional…'})
            )
          )
        )
      )
    )
  );
}

// ── PERMISOS TAB PREVIEW ─────────────────────────────────────────────────────
function PermisosTab({bonos,sucursales,filtroSuc,setFiltroSuc,mes,anio,showStatus}){
  const [empleados,setEmpleados]=React.useState([]);
  const [permisos,setPermisos]=React.useState([]);
  const [selected,setSelected]=React.useState(null);
  const [tipo,setTipo]=React.useState('permiso_hora');
  const [goce,setGoce]=React.useState(true);
  const [fecha,setFecha]=React.useState(new Date().toISOString().slice(0,10));
  const [desde,setDesde]=React.useState('13:00');
  const [hasta,setHasta]=React.useState('15:00');
  const [motivo,setMotivo]=React.useState('');
  const [loading,setLoading]=React.useState(false);
  const [previewPermiso,setPreviewPermiso]=React.useState(null);
  const [lastPermiso,setLastPermiso]=React.useState(null);
  const [editPermiso,setEditPermiso]=React.useState(null);
  const equipo = empleados;
  React.useEffect(()=>{ cargarPermisos(); },[mes,anio,filtroSuc]);
  React.useEffect(()=>{ if(!selected&&equipo.length)setSelected(equipo[0]); },[equipo.map(e=>e.id).join(','),selected?.id]);
  function cargarPermisos(){
    setLoading(true);
    const qs = new URLSearchParams({mes:String(mes),anio:String(anio)});
    if(filtroSuc) qs.set('sucursal',filtroSuc);
    api(`/api/bonos-ventas/permisos/?${qs.toString()}`)
      .then(d=>{ setEmpleados(d.empleados||[]); setPermisos(d.permisos||[]); setLoading(false); })
      .catch(err=>{ showStatus(err.message,'err'); setLoading(false); });
  }
  const pendientes = permisos.filter(p=>p.estado_jefe==='pendiente'&&p.estado==='solicitado').length;
  const preaut = permisos.filter(p=>p.estado_jefe==='preautorizado').length;
  const sinGoce = permisos.filter(p=>!p.goce_sueldo).length;
  function estadoLabel(p){
    if(p.estado==='aprobado') return 'Aprobado';
    if(p.estado_jefe==='preautorizado') return 'Autorizado jefe';
    if(p.estado_jefe==='rechazado') return 'Rechazado jefe';
    return 'Solicitado';
  }
  function badgeClass(p){
    if(p.estado==='aprobado') return 'info';
    if(p.estado_jefe==='preautorizado') return 'ok';
    if(p.estado_jefe==='rechazado'||p.estado==='rechazado') return 'bad';
    return 'pending';
  }
  function submitPermiso(){
    if(!selected){ showStatus('Selecciona una empleada.','err'); return; }
    if(!motivo.trim()){ showStatus('Captura el motivo del permiso.','err'); return; }
    if(tipo==='permiso_hora'&&(!desde||!hasta)){ showStatus('Captura hora desde y hasta para permiso parcial.','err'); return; }
    api('/api/bonos-ventas/permisos/',{method:'POST',body:JSON.stringify({
      empleado:selected.id,
      tipo,
      fecha_inicio:tipo==='permiso_dia'?`${fecha}T00:00:00`:`${fecha}T${desde}:00`,
      fecha_fin:tipo==='permiso_dia'?null:`${fecha}T${hasta}:00`,
      goce_sueldo:goce,
      motivo,
    })}).then(p=>{ showStatus(`Permiso ${p.folio} creado`,'ok'); setMotivo(''); setLastPermiso(p); setPreviewPermiso(p); cargarPermisos(); }).catch(err=>showStatus(err.message,'err'));
  }
  function imprimirPermiso(p){
    setPreviewPermiso(p);
    setTimeout(()=>window.print(),160);
  }
  function abrirEdicion(p){
    setEditPermiso({
      id:p.id,
      tipo:p.tipo,
      fecha:localDate(p.fecha_inicio),
      desde:p.tipo==='permiso_hora'?localTime(p.fecha_inicio):'13:00',
      hasta:p.tipo==='permiso_hora'?(p.fecha_fin?localTime(p.fecha_fin):'15:00'):'15:00',
      motivo:p.motivo,
      goce:!!p.goce_sueldo,
    });
  }
  function cerrarEdicion(){
    setEditPermiso(null);
  }
  function onEditarCampo(name,value){
    setEditPermiso(prev=>prev?{...prev,[name]:value}:prev);
  }
  function guardarEdicion(){
    if(!editPermiso){
      return;
    }
    if(!editPermiso.motivo.trim()){
      showStatus('Captura el motivo del permiso para guardar cambios.','err');
      return;
    }
    if(editPermiso.tipo==='permiso_hora'&&(!editPermiso.desde||!editPermiso.hasta)){
      showStatus('Captura hora desde y hasta para guardar cambios.','err');
      return;
    }
    const payload={
      tipo:editPermiso.tipo,
      motivo:editPermiso.motivo,
      goce_sueldo:editPermiso.goce,
      fecha_inicio:editPermiso.tipo==='permiso_dia'
        ?`${editPermiso.fecha}T00:00:00`
        :`${editPermiso.fecha}T${editPermiso.desde}:00`,
      fecha_fin:editPermiso.tipo==='permiso_dia'?null:`${editPermiso.fecha}T${editPermiso.hasta}:00`,
    };
    api(`/api/bonos-ventas/permisos/${editPermiso.id}/editar/`,{method:'POST',body:JSON.stringify(payload)})
      .then(()=>{
        showStatus('Permiso actualizado','ok');
        cerrarEdicion();
        cargarPermisos();
      })
      .catch(err=>showStatus(err.message,'err'));
  }
  function accion(p,kind){
    api(`/api/bonos-ventas/permisos/${p.id}/${kind}/`,{method:'POST',body:'{}'})
      .then(()=>{ showStatus(kind==='preautorizar'?'Permiso autorizado':'Permiso rechazado','ok'); cargarPermisos(); })
      .catch(err=>showStatus(err.message,'err'));
  }
  function contextoPermiso(p){
    return p.sucursal_nombre||'Ventas';
  }
  function fmtFecha(p){
    const ini = new Date(p.fecha_inicio);
    const fin = p.fecha_fin ? new Date(p.fecha_fin) : null;
    const fechaTxt = ini.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'});
    const horaIni = ini.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    const horaFin = fin ? fin.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}) : '';
    return `${fechaTxt} · ${p.tipo==='permiso_dia'?'Todo el dia':`${horaIni} - ${horaFin}`}`;
  }
  return h('div',null,
    h('div',{className:'periodo-bar'},
      h('span',{className:'periodo-label'},'Sucursal:'),
      h('select',{value:filtroSuc,onChange:e=>setFiltroSuc(e.target.value),style:{padding:'6px 10px',border:'1px solid var(--line)',borderRadius:6,font:'inherit',fontSize:13,background:'var(--card)'}},
        h('option',{value:''},'Todas'),
        sucursales.map(([id,nom])=>h('option',{key:id,value:id},nom))
      )
    ),
    h('div',{className:'metrics'},
      h('div',{className:'metric-card'},h('div',{className:'lbl'},'Pendientes jefe'),h('div',{className:'val wine'},pendientes)),
      h('div',{className:'metric-card'},h('div',{className:'lbl'},'Autorizados'),h('div',{className:'val'},preaut)),
      h('div',{className:'metric-card'},h('div',{className:'lbl'},'Sin goce'),h('div',{className:'val gold'},sinGoce))
    ),
    h('div',{className:'perm-layout'},
      h('div',{className:'card'},
        h('div',{className:'card-hdr'},h('div',{className:'card-hdr-title'},'Nueva solicitud')),
        h('div',{className:'card-body'},
          h('div',{className:'preview-note'},'El jefe directo autoriza desde Bonos. Capital Humano solo conserva el respaldo operativo.'),
          lastPermiso&&h('div',{className:'print-success'},
            h('div',{className:'print-success-title'},`Permiso ${lastPermiso.folio} registrado`),
            h('div',{className:'print-success-text'},'Ya puedes imprimirlo o guardarlo como PDF en hoja tamaño carta.'),
            h('div',{className:'print-success-actions'},
              h('button',{className:'btn btn-ghost btn-sm',type:'button',onClick:()=>setPreviewPermiso(lastPermiso)},'Vista carta'),
              h('button',{className:'btn btn-wine btn-sm',type:'button',onClick:()=>imprimirPermiso(lastPermiso)},'Imprimir / guardar PDF')
            )
          ),
          h('div',{style:{height:12}}),
          h(EmployeeSearchList,{items:equipo,selected,onSelect:setSelected,placeholder:'Buscar empleada del equipo...',metaText:b=>b.sucursal_nombre||'Ventas'}),
          h('div',{className:'div'}),
          h('div',{className:'form-grid'},
            h('div',{className:'field'},h('label',null,'Tipo de permiso'),h('div',{className:'segmented'},
              [['permiso_hora','Tiempo parcial'],['permiso_dia','Dia completo']].map(([v,lbl])=>h('button',{key:v,type:'button',className:`segment ${tipo===v?'on':''}`,onClick:()=>setTipo(v)},lbl))
            )),
            h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
              h('div',{className:'field'},h('label',null,'Fecha'),h('input',{className:'form-control',type:'date',value:fecha,onChange:e=>setFecha(e.target.value)})),
              h('div',{className:'field'},h('label',null,'Sucursal'),h('input',{className:'form-control',value:selected?.sucursal_nombre||'',readOnly:true}))
            ),
            tipo==='permiso_hora'?h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
              h('div',{className:'field'},h('label',null,'Desde'),h('input',{className:'form-control',type:'time',value:desde,onChange:e=>setDesde(e.target.value)})),
              h('div',{className:'field'},h('label',null,'Hasta'),h('input',{className:'form-control',type:'time',value:hasta,onChange:e=>setHasta(e.target.value)}))
            ):h('div',{className:'preview-note'},'Dia completo: no necesitas capturar horario de entrada y salida.'),
            h('div',{className:'field'},h('label',null,'Goce de sueldo'),h('div',{className:'segmented'},
              [[true,'Con goce'],[false,'Sin goce']].map(([v,lbl])=>h('button',{key:lbl,type:'button',className:`segment ${goce===v?'on':''}`,onClick:()=>setGoce(v)},lbl))
            )),
            h('div',{className:'field'},h('label',null,'Motivo'),h('textarea',{className:'form-control',rows:3,value:motivo,onChange:e=>setMotivo(e.target.value),placeholder:'Motivo del permiso...'})),
            h('button',{className:'btn btn-wine',onClick:submitPermiso},'Enviar a autorizacion')
          )
        )
      ),
      h('div',{className:'card'},
        h('div',{className:'card-hdr'},h('div',{className:'card-hdr-title'},'Permisos de mi equipo'),h('span',{className:'badge suc'},'Ventas')),
        h('div',{className:'card-body'},
          loading?h('div',{className:'empty'},'Cargando permisos...'):
          permisos.length?h('div',{className:'permission-list'},
            permisos.map(p=>h('div',{key:p.id,className:'permission-item'},
              h('div',{className:'permission-top'},
                h('div',null,h('div',{className:'permission-title'},p.empleado_nombre),h('div',{className:'permission-meta'},`${p.sucursal_nombre||'Ventas'} · ${fmtFecha(p)}`)),
                h('span',{className:`badge ${badgeClass(p)}`},estadoLabel(p))
              ),
              h('div',{className:'permission-meta'},`${p.tipo_label} · ${p.goce_label} · ${p.folio}`),
              h('div',{className:'permission-reason'},p.motivo),
              h('div',{className:'permission-actions'},
                h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setPreviewPermiso(p)},'Vista carta'),
                h('button',{className:'btn btn-ghost btn-sm',onClick:()=>imprimirPermiso(p)},'Imprimir / PDF'),
                p.puede_editar&&h('button',{className:'btn btn-ghost btn-sm',onClick:()=>abrirEdicion(p)},'Editar'),
                p.puede_preautorizar&&p.estado_jefe==='pendiente'&&p.estado==='solicitado'&&h('button',{className:'btn btn-ghost btn-sm',onClick:()=>accion(p,'rechazar')},'Rechazar'),
                p.puede_preautorizar&&p.estado_jefe==='pendiente'&&p.estado==='solicitado'&&h('button',{className:'btn btn-wine btn-sm',onClick:()=>accion(p,'preautorizar')},'Autorizar')
              ),
              editPermiso&&editPermiso.id===p.id&&h('div',{className:'permission-item',style:{background:'var(--bg)',marginTop:8,padding:12}},
                h('div',{className:'form-grid'},
                  h('div',{className:'field'},h('label',null,'Tipo de permiso'),
                    h('div',{className:'segmented'},
                      [['permiso_hora','Tiempo parcial'],['permiso_dia','Dia completo']].map(([v,lbl])=>h('button',{key:v,type:'button',className:`segment ${editPermiso.tipo===v?'on':''}`,onClick:()=>onEditarCampo('tipo',v)},lbl))
                    )
                  ),
                  h('div',{className:'field'},h('label',null,'Fecha'),h('input',{className:'form-control',type:'date',value:editPermiso.fecha,onChange:e=>onEditarCampo('fecha',e.target.value)})),
                  editPermiso.tipo==='permiso_hora' ? h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
                    h('div',{className:'field'},h('label',null,'Desde'),h('input',{className:'form-control',type:'time',value:editPermiso.desde,onChange:e=>onEditarCampo('desde',e.target.value)})),
                    h('div',{className:'field'},h('label',null,'Hasta'),h('input',{className:'form-control',type:'time',value:editPermiso.hasta,onChange:e=>onEditarCampo('hasta',e.target.value)}))
                  ) : h('div',{className:'preview-note'},'Dia completo: no requiere horarios.'),
                  h('div',{className:'field'},h('label',null,'Goce de sueldo'),
                    h('div',{className:'segmented'},
                      [[true,'Con goce'],[false,'Sin goce']].map(([v,lbl])=>h('button',{key:lbl,type:'button',className:`segment ${editPermiso.goce===v?'on':''}`,onClick:()=>onEditarCampo('goce',v)},lbl))
                    )
                  ),
                  h('div',{className:'field'},h('label',null,'Motivo'),h('textarea',{className:'form-control',rows:3,value:editPermiso.motivo,onChange:e=>onEditarCampo('motivo',e.target.value),placeholder:'Motivo del permiso...'})),
                  h('div',{className:'permission-actions'},
                    h('button',{className:'btn btn-ghost btn-sm',onClick:cerrarEdicion},'Cancelar'),
                    h('button',{className:'btn btn-wine btn-sm',onClick:guardarEdicion},'Guardar')
                  )
                )
              )
            ))
          ):h('div',{className:'empty'},'Sin permisos registrados para este equipo.')
        )
      ),
      previewPermiso&&h(PermisoPrintModal,{permiso:previewPermiso,onClose:()=>setPreviewPermiso(null),contextLabel:contextoPermiso(previewPermiso)})
    )
  );
}

// ── VENTAS POR CATEGORÍA TAB ──────────────────────────────────────────────────
function VentasTab({ventas,periodo,syncPos,cargar,showStatus}){
  const [selSuc, setSelSuc] = React.useState('');

  const sucursales = React.useMemo(()=>{
    const m = new Map();
    ventas.forEach(v=>{ if(v.sucursal&&v.sucursal_nombre) m.set(String(v.sucursal),v.sucursal_nombre); });
    return Array.from(m.entries()).sort((a,b)=>a[1].localeCompare(b[1]));
  },[ventas]);

  React.useEffect(()=>{
    if(!selSuc && sucursales.length) setSelSuc(sucursales[0][0]);
  },[sucursales]);

  const ventasSuc = selSuc ? ventas.filter(v=>String(v.sucursal)===selSuc) : ventas;
  const bonoCat = ventasSuc.reduce((s,v)=>s+Number(v.monto_bono_categoria||0),0);

  function actualizarVenta(id,campo,val){
    api(`/api/bonos-ventas/ventas-categoria/${id}/`,{method:'PATCH',body:JSON.stringify({[campo]:val})})
      .then(()=>cargar()).catch(err=>showStatus(err.message,'err'));
  }

  return h('div',null,
    h('div',{style:{display:'flex',gap:10,alignItems:'center',marginBottom:14,flexWrap:'wrap'}},
      h('div',{className:'chips',style:{flex:1,marginBottom:0}},
        sucursales.map(([id,nom])=>h('button',{key:id,className:`chip ${selSuc===id?'on':''}`,onClick:()=>setSelSuc(id)},nom))
      ),
      periodo && h('button',{className:'btn btn-wine btn-sm',onClick:syncPos},'↻ Sincronizar desde POS')
    ),

    selSuc && h('div',{className:'card'},
      h('div',{className:'card-hdr'},
        h('div',{className:'card-hdr-title'},sucursales.find(([id])=>id===selSuc)?.[1]||'Sucursal'),
        h('div',{style:{fontSize:13,fontWeight:800,color:'var(--gold)'}},`Bono total: ${money(bonoCat)}`)
      ),
      h('div',{className:'card-body'},
        !ventasSuc.length
          ? h('div',{className:'empty'},'Sin datos. Usa "Sincronizar desde POS" o carga manualmente.')
          : h('div',null,
              // Headers
              h('div',{className:'cat-row',style:{fontWeight:800,fontSize:11,textTransform:'uppercase',letterSpacing:'.05em',color:'var(--sub)'}},
                h('span',null,'Categoría'),h('span',null,'Año ant.'),h('span',null,'Este mes'),h('span',null,'%'),h('span',null,'Bono')
              ),
              CATS.map(cat=>{
                const v = ventasSuc.find(x=>x.categoria===cat);
                if(!v) return h('div',{key:cat,className:'cat-row'},
                  h('span',null,CATS_LABELS[cat]),
                  h('span',{style:{color:'var(--faint)'}},'—'),h('span',{style:{color:'var(--faint)'}},'—'),
                  h('span',{style:{color:'var(--faint)'}},'—'),h('span',{style:{color:'var(--faint)'}},'—')
                );
                const pct = Number(v.pct_crecimiento||0).toFixed(1);
                const activo = v.activo_bono;
                return h('div',{key:cat,className:'cat-row'},
                  h('span',{style:{fontWeight:700}},CATS_LABELS[cat]),
                  h('input',{type:'number',defaultValue:v.cantidad_anterior,min:0,
                    onBlur:e=>actualizarVenta(v.id,'cantidad_anterior',e.target.value)}),
                  h('input',{type:'number',defaultValue:v.cantidad_actual,min:0,
                    className:activo?'activo':'',
                    onBlur:e=>actualizarVenta(v.id,'cantidad_actual',e.target.value)}),
                  h('span',null,h('span',{className:`badge ${activo?'ok':'bad'}`},`${pct}%`)),
                  h('span',{style:{fontWeight:800,color:activo?'var(--ok)':'var(--faint)'}},money(v.monto_bono_categoria))
                );
              })
            )
      )
    )
  );
}

// ── RESUMEN TAB ───────────────────────────────────────────────────────────────
function ResumenTab({bonos,sucursales}){
  if(!bonos.length) return h('div',{className:'empty'},'Sin datos para este período.');
  const totalGlobal = bonos.reduce((s,b)=>s+Number(b.total_a_pagar||0),0);

  // Agrupar por sucursal
  const grupos = new Map();
  bonos.forEach(b=>{
    const k = String(b.sucursal);
    if(!grupos.has(k)) grupos.set(k,{nombre:b.sucursal_nombre,bonos:[]});
    grupos.get(k).bonos.push(b);
  });

  return h('div',null,
    // Total global
    h('div',{className:'metrics',style:{marginBottom:20}},
      h('div',{className:'metric-card'},h('div',{className:'lbl'},'Total global'),h('div',{className:'val gold'},money(totalGlobal))),
      h('div',{className:'metric-card'},h('div',{className:'lbl'},'Sucursales'),h('div',{className:'val'},grupos.size)),
      h('div',{className:'metric-card'},h('div',{className:'lbl'},'Empleadas'),h('div',{className:'val'},bonos.length)),
      h('div',{className:'metric-card'},h('div',{className:'lbl'},'Pasan todo'),h('div',{className:'val wine'},bonos.filter(b=>b.pasa_asistencia&&b.pasa_uniforme&&b.pasa_puntualidad).length))
    ),

    Array.from(grupos.entries()).map(([sucId,{nombre,bonos:bs}])=>{
      const totalSuc = bs.reduce((s,b)=>s+Number(b.total_a_pagar||0),0);
      return h('div',{key:sucId,className:'card',style:{marginBottom:14}},
        h('div',{className:'card-hdr'},
          h('div',{className:'card-hdr-title'},nombre||`Sucursal ${sucId}`),
          h('div',{style:{fontWeight:800,color:'var(--gold)',fontSize:14}},money(totalSuc))
        ),
        h('div',{className:'tbl-wrap'},
          h('table',null,
            h('thead',null,h('tr',null,
              h('th',null,'Empleada'),
              h('th',null,'Días'),
              h('th',null,'Uniforme'),
              h('th',null,'Asistencia'),
              h('th',null,'Puntualidad'),
              h('th',null,'Sub 1'),
              h('th',null,'Bono ventas'),
              h('th',null,'Ajustes'),
              h('th',null,'Total')
            )),
            h('tbody',null,
              bs.map(b=>{
                const aj = Number(b.ajuste_positivo||0)+Number(b.bono_extra||0)-Number(b.ajuste_negativo||0);
                return h('tr',{key:b.id},
                  h('td',null,h('div',{className:'persona-row'},h('div',{className:'av'},initials(b.empleado_nombre)),h('div',{className:'persona-name'},b.empleado_nombre))),
                  h('td',null,b.dias_trabajados||0),
                  h('td',null,h(Badge,{ok:b.pasa_uniforme})),
                  h('td',null,h(Badge,{ok:b.pasa_asistencia})),
                  h('td',null,h(Badge,{ok:b.pasa_puntualidad})),
                  h('td',null,money(b.sub1)),
                  h('td',{style:{color:'var(--ok)',fontWeight:700}},money(b.bono_ventas)),
                  h('td',{style:{color:aj>=0?'var(--ok)':'var(--bad)',fontWeight:700}},money(aj)),
                  h('td',{style:{fontWeight:800,color:'var(--wine)'}},money(b.total_a_pagar))
                );
              })
            )
          )
        )
      );
    })
  );
}

// ── AJUSTES TAB ───────────────────────────────────────────────────────────────
function AjustesTab({bonos,cargar,showStatus}){
  const [selSuc, setSelSuc] = React.useState('');
  const sucursales = React.useMemo(()=>{
    const m = new Map();
    bonos.forEach(b=>{ if(b.sucursal&&b.sucursal_nombre) m.set(String(b.sucursal),b.sucursal_nombre); });
    return Array.from(m.entries()).sort((a,b)=>a[1].localeCompare(b[1]));
  },[bonos]);
  React.useEffect(()=>{ if(!selSuc&&sucursales.length) setSelSuc(sucursales[0][0]); },[sucursales]);
  const bonosSuc = selSuc ? bonos.filter(b=>String(b.sucursal)===selSuc) : bonos;

  function patch(id,campo,val){
    api(`/api/bonos-ventas/bonos/${id}/`,{method:'PATCH',body:JSON.stringify({[campo]:val})})
      .then(()=>{ showStatus('Guardado','ok'); cargar(); }).catch(err=>showStatus(err.message,'err'));
  }

  return h('div',null,
    h('div',{className:'chips'},
      sucursales.map(([id,nom])=>h('button',{key:id,className:`chip ${selSuc===id?'on':''}`,onClick:()=>setSelSuc(id)},nom))
    ),
    bonosSuc.map(b=>h('div',{key:b.id,className:'card',style:{marginBottom:10}},
      h('div',{className:'card-hdr'},
        h('div',{style:{display:'flex',alignItems:'center',gap:10}},
          h('div',{className:'av'},initials(b.empleado_nombre)),
          h('div',null,h('div',{className:'persona-name'},b.empleado_nombre),h('div',{className:'persona-sub'},b.sucursal_nombre))
        ),
        h('div',{style:{fontWeight:800,color:'var(--wine)',fontSize:15}},money(b.total_a_pagar))
      ),
      h('div',{className:'card-body'},
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}},
          h('label',{style:{display:'grid',gap:4,fontSize:12,fontWeight:700,color:'var(--sub)'}},
            'Ajuste positivo (+)',
            h('input',{className:'aj-input',type:'number',defaultValue:b.ajuste_positivo||0,min:0,
              onBlur:e=>patch(b.id,'ajuste_positivo',e.target.value)})
          ),
          h('label',{style:{display:'grid',gap:4,fontSize:12,fontWeight:700,color:'var(--sub)'}},
            'Ajuste negativo (−)',
            h('input',{className:'aj-input',type:'number',defaultValue:b.ajuste_negativo||0,min:0,
              onBlur:e=>patch(b.id,'ajuste_negativo',e.target.value)})
          ),
          h('label',{style:{display:'grid',gap:4,fontSize:12,fontWeight:700,color:'var(--sub)'}},
            'Bono extra',
            h('input',{className:'aj-input',type:'number',defaultValue:b.bono_extra||0,min:0,
              onBlur:e=>patch(b.id,'bono_extra',e.target.value)})
          )
        )
      )
    ))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
