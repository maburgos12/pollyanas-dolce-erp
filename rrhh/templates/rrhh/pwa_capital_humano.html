{% load static %}
<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f4ef">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Capital Humano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/template_modules/rrhh-templates-rrhh-pwa-capital-humano.css?v=20260623-prestamos-v1">
  </head>
  <body>
    <main id="app"></main>
    <footer class="footer hidden" id="footer">
      <nav class="nav">
        <button data-section="inicio" class="active">Inicio</button>
        <button data-section="permisos">Permisos</button>
        <button data-section="vacaciones">Vacaciones</button>
        <button data-section="horas">Horas Extra</button>
        <button data-section="prestamos">Préstamos</button>
      </nav>
    </footer>

    <script>
      const API = "/rrhh/api";
      const AUTH_API = "/api/logistica";
      const initialSection = "{{ initial_section|default:'inicio'|escapejs }}";
      const state = {
        section: normalizeSection(initialSection),
        token: localStorage.getItem("pd_logistica_access") || "",
        refreshToken: localStorage.getItem("pd_logistica_refresh") || "",
        perfil: null,
        permisos: [],
        vacaciones: [],
        horas: [],
        prestamos: [],
        message: "",
        error: ""
      };

      const app = document.getElementById("app");
      const footer = document.getElementById("footer");

      function normalizeSection(section) {
        return section === "horas-extra" ? "horas" : (section || "inicio");
      }

      function esc(value) {
        return String(value ?? "").replace(/[&<>"']/g, char => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[char]));
      }

      function headers(extra = {}) {
        const base = {...extra};
        if (state.token) base.Authorization = `Bearer ${state.token}`;
        return base;
      }

      function clearAuthState() {
        state.token = "";
        state.refreshToken = "";
        state.perfil = null;
        localStorage.removeItem("pd_logistica_access");
        localStorage.removeItem("pd_logistica_refresh");
      }

      function tokenExpired(token) {
        try {
          const payload = JSON.parse(atob(token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/")));
          return !payload.exp || Date.now() >= payload.exp * 1000;
        } catch {
          return true;
        }
      }

      async function apiFetch(url, options = {}) {
        const res = await fetch(url, {...options, headers: headers(options.headers || {})});
        if (res.status === 401 && state.refreshToken && !options._retry) {
          const refreshed = await fetch(`${AUTH_API}/auth/token/refresh/`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({refresh: state.refreshToken})
          });
          if (refreshed.ok) {
            const data = await refreshed.json();
            state.token = data.access;
            localStorage.setItem("pd_logistica_access", data.access);
            return apiFetch(url, {...options, _retry: true});
          }
          clearAuthState();
          return refreshed;
        }
        if (res.status === 401) {
          clearAuthState();
        }
        return res;
      }

      async function login(event) {
        event.preventDefault();
        state.error = "";
        const form = new FormData(event.currentTarget);
        const res = await fetch(`${AUTH_API}/auth/token/`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({username: form.get("username"), password: form.get("password")})
        });
        if (!res.ok) {
          state.error = "Usuario o contraseña inválidos.";
          render();
          return;
        }
        const data = await res.json();
        state.token = data.access;
        state.refreshToken = data.refresh;
        localStorage.setItem("pd_logistica_access", data.access);
        localStorage.setItem("pd_logistica_refresh", data.refresh);
        await loadData();
      }

      function logout() {
        clearAuthState();
        render();
      }

      async function cargarPerfilEmpleado() {
        const res = await apiFetch(`${API}/mi-perfil/`);
        state.perfil = res.ok ? await res.json() : {};
      }

      async function cargarHistorialReciente() {
        const [permisosRes, vacacionesRes, horasRes, prestamosRes] = await Promise.all([
          apiFetch(`${API}/permisos/?mis=true&limit=3`),
          apiFetch(`${API}/vacaciones/?mis=true&limit=3`),
          apiFetch(`${API}/horas-extra/?mis=true&limit=3`),
          apiFetch(`${API}/prestamos/?mis=true&limit=3`)
        ]);
        state.permisos = permisosRes.ok ? await permisosRes.json() : [];
        state.vacaciones = vacacionesRes.ok ? await vacacionesRes.json() : [];
        state.horas = horasRes.ok ? await horasRes.json() : [];
        state.prestamos = prestamosRes.ok ? await prestamosRes.json() : [];
      }

      async function loadData() {
        if (!state.token) {
          render();
          return;
        }
        if (tokenExpired(state.token)) {
          clearAuthState();
          render();
          return;
        }
        await cargarPerfilEmpleado();
        if (!state.token) {
          render();
          return;
        }
        await cargarHistorialReciente();
        render();
      }

      function perfilValue(field) {
        return esc(state.perfil?.[field] || "");
      }

      function today() {
        return new Date().toISOString().slice(0, 10);
      }

      function mostrarExito(message) {
        state.message = message;
        state.error = "";
        render();
      }

      function mostrarError(message) {
        state.error = message;
        state.message = "";
        render();
      }

      function limpiarFormPermiso() {
        const form = document.getElementById("form_permiso");
        if (form) form.reset();
      }

      function limpiarFormHE() {
        const form = document.getElementById("form_horas_extra");
        if (form) form.reset();
      }

      function limpiarFormVacaciones() {
        const form = document.getElementById("form_vacaciones");
        if (form) form.reset();
      }

      function limpiarFormPrestamo() {
        const form = document.getElementById("form_prestamo");
        if (form) form.reset();
      }

      async function enviarPermiso(event) {
        event.preventDefault();
        const tipo = document.querySelector('input[name="tipo_permiso"]:checked')?.value;
        const goce = document.querySelector('input[name="goce_sueldo"]:checked')?.value === "true";
        const payload = {
          tipo: tipo,
          fecha_inicio: document.getElementById("p_desde").value,
          fecha_fin: document.getElementById("p_hasta").value || null,
          motivo: document.getElementById("p_motivo").value,
          goce_sueldo: goce
        };
        const res = await apiFetch(`${API}/permisos/`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          await cargarHistorialReciente();
          limpiarFormPermiso();
          state.message = `Solicitud enviada - Folio: ${data.folio || "sin folio"}`;
          state.error = "";
          render();
        } else {
          mostrarError(`Error al enviar permiso: ${JSON.stringify(data)}`);
        }
      }

      async function enviarHorasExtra(event) {
        event.preventDefault();
        const fecha = document.getElementById("he_fecha").value;
        const desde = document.getElementById("he_desde").value;
        const hasta = document.getElementById("he_hasta").value;
        const payload = {
          fecha: fecha,
          horas: parseFloat(document.getElementById("he_horas").value),
          notas: document.getElementById("he_descripcion").value,
          entrada_extra: desde ? `${fecha}T${desde}` : null,
          salida_extra: hasta ? `${fecha}T${hasta}` : null
        };
        const res = await apiFetch(`${API}/horas-extra/`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          await cargarHistorialReciente();
          limpiarFormHE();
          state.message = `Horas extra registradas (${payload.horas}h) - pendiente de autorización del jefe directo`;
          state.error = "";
          render();
        } else {
          mostrarError(`Error: ${JSON.stringify(data)}`);
        }
      }

      async function enviarVacaciones(event) {
        event.preventDefault();
        const empleado = document.getElementById("v_empleado_id")?.value;
        const payload = {
          fecha_inicio: document.getElementById("v_inicio").value,
          fecha_fin: document.getElementById("v_fin").value,
          motivo: document.getElementById("v_motivo").value
        };
        if (empleado) payload.empleado = empleado;
        const res = await apiFetch(`${API}/vacaciones/`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          await cargarHistorialReciente();
          limpiarFormVacaciones();
          state.message = `Vacaciones solicitadas - Folio: ${data.folio || "sin folio"}`;
          state.error = "";
          render();
        } else {
          mostrarError(`Error al solicitar vacaciones: ${JSON.stringify(data)}`);
        }
      }

      async function enviarPrestamo(event) {
        event.preventDefault();
        const payload = {
          concepto: document.getElementById("pr_concepto").value,
          metodo_pago: document.getElementById("pr_metodo").value,
          fecha_deposito: document.getElementById("pr_deposito").value || null,
          importe: document.getElementById("pr_importe").value,
          num_quincenas: document.getElementById("pr_quincenas").value
        };
        const res = await apiFetch(`${API}/prestamos/`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          await cargarHistorialReciente();
          limpiarFormPrestamo();
          state.message = `Préstamo solicitado - Folio: ${data.folio || "sin folio"}`;
          state.error = "";
          render();
        } else {
          mostrarError(`Error al solicitar préstamo: ${JSON.stringify(data)}`);
        }
      }

      async function autorizarPrestamo(id) {
        const res = await apiFetch(`${API}/prestamos/${id}/autorizar-jefe/`, {method: "POST"});
        const data = await res.json();
        if (res.ok) {
          await cargarHistorialReciente();
          state.message = `Préstamo autorizado - Folio: ${data.folio || "sin folio"}`;
          state.error = "";
          render();
        } else {
          mostrarError(`Error al autorizar préstamo: ${JSON.stringify(data)}`);
        }
      }

      function shell(content) {
        const nombre = state.perfil?.nombre || "Capital Humano";
        return `
          <div class="topbar">
            <div>
              <div class="mini">Pollyana's Dolce</div>
              <div class="muted">Hola, ${esc(nombre)}</div>
            </div>
            <button class="secondary" onclick="logout()">Salir</button>
          </div>
          ${content}
        `;
      }

      function renderLogin() {
        footer.classList.add("hidden");
        app.innerHTML = `
          <section class="panel">
            <h1 class="brand">Capital Humano</h1>
            <p class="gold">Pollyana's Dolce</p>
            <form onsubmit="login(event)">
              <div class="login-field"><label for="login_username">Usuario</label><input id="login_username" name="username" autocomplete="username" required></div>
              <div class="login-field"><label for="login_password">Contraseña</label><input id="login_password" name="password" type="password" autocomplete="current-password" required></div>
              <button class="primary" type="submit">Entrar</button>
              ${state.error ? `<div class="error">${esc(state.error)}</div>` : ""}
            </form>
          </section>
        `;
      }

      function renderInicio() {
        const nombre = state.perfil?.nombre || "Bienvenido";
        const items = [
          ...state.permisos.map(p => ({
            tipo: "Permiso",
            desc: p.tipo,
            estado: p.estado,
            folio: p.folio,
            fecha: p.fecha_inicio
          })),
          ...state.vacaciones.map(v => ({
            tipo: "Vacaciones",
            desc: `${v.dias_laborables} días`,
            estado: v.estado,
            folio: v.folio,
            fecha: v.fecha_inicio
          })),
          ...state.horas.map(h => ({
            tipo: "Horas extra",
            desc: `${h.horas}h`,
            estado: h.estado,
            folio: `HE-${h.id}`,
            fecha: h.fecha
          })),
          ...state.prestamos.map(p => ({
            tipo: "Préstamo",
            desc: `$${p.importe} · ${p.num_quincenas} quincenas`,
            estado: p.estado,
            folio: p.folio,
            fecha: p.fecha_solicitud
          }))
        ].sort((a, b) => new Date(b.fecha) - new Date(a.fecha)).slice(0, 4);
        const historial = items.length
          ? items.map(i => `
              <div class="historial-item">
                <div class="historial-top">
                  <div>
                    <div class="historial-tipo">${esc(i.tipo)}</div>
                    <div class="historial-desc">${esc(i.desc)}</div>
                    <div class="historial-folio">${esc(i.folio)}</div>
                  </div>
                  <span class="badge-estado badge-${esc(i.estado)}">${esc(i.estado)}</span>
                </div>
              </div>
            `).join("")
          : '<p class="empty-msg">Sin solicitudes recientes</p>';
        app.innerHTML = shell(`
          <div class="welcome-name">${esc(nombre)}</div>
          <div class="welcome-sub">Capital Humano · Pollyana's Dolce</div>
          <div class="quick-actions">
            <button class="quick-btn" onclick="setSection('permisos')">
              <span class="quick-icon">P</span>
              <span>Solicitar permiso</span>
            </button>
            <button class="quick-btn" onclick="setSection('vacaciones')">
              <span class="quick-icon">V</span>
              <span>Solicitar vacaciones</span>
            </button>
            <button class="quick-btn" onclick="setSection('horas')">
              <span class="quick-icon">HE</span>
              <span>Registrar horas extra</span>
            </button>
            <button class="quick-btn" onclick="setSection('prestamos')">
              <span class="quick-icon">$</span>
              <span>Solicitar préstamo</span>
            </button>
          </div>
          <div class="section-label">MIS SOLICITUDES RECIENTES</div>
          <div id="historial_reciente" class="historial-list">${historial}</div>
        `);
      }

      function renderPermisos() {
        const items = state.permisos.map(p => `
          <article class="card">
            <div class="row"><strong>${esc(p.folio)}</strong><span class="badge">${esc(p.estado)}</span></div>
            <div class="muted">${esc(p.tipo)} · ${new Date(p.fecha_inicio).toLocaleString("es-MX")}</div>
            <div class="muted">${p.goce_sueldo ? "Con goce de sueldo" : "Sin goce de sueldo"}</div>
            <div>${esc(p.motivo)}</div>
          </article>
        `).join("") || `<div class="muted">Sin permisos registrados.</div>`;
        app.innerHTML = shell(`
          <section class="panel">
            <form id="form_permiso" onsubmit="enviarPermiso(event)">
              <div class="talon-header">TALÓN DE PERMISOS</div>
              <div class="field-row">
                <label for="p_fecha">FECHA</label>
                <input type="date" id="p_fecha" name="fecha" value="${today()}" required>
              </div>
              <div class="field-row">
                <label for="p_nombre">NOMBRE DE EMPLEADO</label>
                <input type="text" id="p_nombre" name="nombre" value="${perfilValue("nombre")}" readonly class="readonly-field">
              </div>
              <div class="field-row">
                <label for="p_puesto">PUESTO</label>
                <input type="text" id="p_puesto" name="puesto" value="${perfilValue("puesto")}" readonly class="readonly-field">
              </div>
              <div class="field-row">
                <label for="p_area">ÁREA</label>
                <input type="text" id="p_area" name="area" value="${perfilValue("area")}" readonly class="readonly-field">
              </div>
              <div class="field-row">
                <label>TIPO DE PERMISO</label>
                <div class="radio-group">
                  <label class="radio-option">
                    <input type="radio" name="tipo_permiso" value="permiso_hora" required>
                    <span>TIEMPO PARCIAL</span>
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="tipo_permiso" value="permiso_dia">
                    <span>DÍA COMPLETO</span>
                  </label>
                </div>
              </div>
              <div class="field-row-double">
                <div>
                  <label for="p_desde">DESDE</label>
                  <input type="datetime-local" id="p_desde" name="fecha_inicio" required>
                </div>
                <div>
                  <label for="p_hasta">HASTA</label>
                  <input type="datetime-local" id="p_hasta" name="fecha_fin">
                </div>
              </div>
              <div class="field-row">
                <label>AUTORIZADO</label>
                <div class="radio-group">
                  <label class="radio-option">
                    <input type="radio" name="goce_sueldo" value="false" required>
                    <span>SIN GOCE DE SUELDO</span>
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="goce_sueldo" value="true" checked>
                    <span>CON GOCE DE SUELDO</span>
                  </label>
                </div>
              </div>
              <div class="field-row">
                <label for="p_motivo">MOTIVO DE PERMISO</label>
                <textarea id="p_motivo" name="motivo" rows="3" required placeholder="Describe el motivo..."></textarea>
              </div>
              <button class="btn-submit" type="submit">ENVIAR SOLICITUD</button>
              ${state.message ? `<div id="p_folio_result" class="folio-badge">${esc(state.message)}</div>` : ""}
              ${state.error ? `<div class="error">${esc(state.error)}</div>` : ""}
            </form>
          </section>
          <div class="list">${items}</div>
        `);
      }

      function renderHoras() {
        const items = state.horas.map(h => `
          <article class="card">
            <div class="row"><strong>${esc(h.horas)} h</strong><span class="badge">${esc(h.estado)}</span></div>
            <div class="muted">${esc(h.fecha)} · ${esc(h.monto_calculado || "Sin monto")}</div>
            ${h.notas ? `<div>${esc(h.notas)}</div>` : ""}
          </article>
        `).join("") || `<div class="muted">Sin horas extra registradas.</div>`;
        app.innerHTML = shell(`
          <section class="panel">
            <form id="form_horas_extra" onsubmit="enviarHorasExtra(event)">
              <div class="talon-header">SOLICITUD DE HORAS EXTRAS</div>
              <div class="field-row">
                <label for="he_fecha">FECHA</label>
                <input type="date" id="he_fecha" name="fecha" value="${today()}" required>
              </div>
              <div class="field-row">
                <label for="he_nombre">NOMBRE DE EMPLEADO</label>
                <input type="text" id="he_nombre" name="nombre" value="${perfilValue("nombre")}" readonly class="readonly-field">
              </div>
              <div class="field-row">
                <label for="he_puesto">PUESTO</label>
                <input type="text" id="he_puesto" name="puesto" value="${perfilValue("puesto")}" readonly class="readonly-field">
              </div>
              <div class="field-row">
                <label for="he_area">ÁREA</label>
                <input type="text" id="he_area" name="area" value="${perfilValue("area")}" readonly class="readonly-field">
              </div>
              <div class="field-row">
                <label for="he_horas">CANTIDAD DE HORAS SOLICITADAS</label>
                <input type="number" id="he_horas" name="horas" min="0.25" max="12" step="0.25" required placeholder="Ej: 1.5">
              </div>
              <div class="field-row-double">
                <div>
                  <label for="he_desde">DESDE</label>
                  <input type="time" id="he_desde" name="entrada_extra" required>
                </div>
                <div>
                  <label for="he_hasta">HASTA</label>
                  <input type="time" id="he_hasta" name="salida_extra" required>
                </div>
              </div>
              <div class="field-row">
                <label for="he_descripcion">DESCRIPCIÓN DETALLADA SOBRE LA RAZÓN DE<br>SOLICITUD DE HORAS EXTRAS</label>
                <textarea id="he_descripcion" name="notas" rows="4" required placeholder="Describe detalladamente la razón..."></textarea>
              </div>
              <button class="btn-submit" type="submit">REGISTRAR HORAS EXTRA</button>
              ${state.message ? `<div class="folio-badge">${esc(state.message)}</div>` : ""}
              ${state.error ? `<div class="error">${esc(state.error)}</div>` : ""}
            </form>
          </section>
          <div class="list">${items}</div>
        `);
      }

      function renderVacaciones() {
        const items = state.vacaciones.map(v => `
          <article class="card">
            <div class="row"><strong>${esc(v.folio)}</strong><span class="badge">${esc(v.estado)}</span></div>
            <div class="muted">${esc(v.fecha_inicio)} a ${esc(v.fecha_fin)} · ${esc(v.dias_laborables)} días</div>
            ${v.jefe_directo_nombre ? `<div class="muted">Jefe: ${esc(v.jefe_directo_nombre)}</div>` : ""}
            ${v.motivo ? `<div>${esc(v.motivo)}</div>` : ""}
          </article>
        `).join("") || `<div class="muted">Sin vacaciones registradas.</div>`;
        app.innerHTML = shell(`
          <section class="panel">
            <form id="form_vacaciones" onsubmit="enviarVacaciones(event)">
              <div class="talon-header">SOLICITUD DE VACACIONES</div>
              <div class="field-row">
                <label for="v_nombre">NOMBRE DE EMPLEADO</label>
                <input type="text" id="v_nombre" name="nombre" value="${perfilValue("nombre")}" readonly class="readonly-field">
              </div>
              <div class="field-row">
                <label for="v_puesto">PUESTO</label>
                <input type="text" id="v_puesto" name="puesto" value="${perfilValue("puesto")}" readonly class="readonly-field">
              </div>
              <div class="field-row-double">
                <div>
                  <label for="v_inicio">INICIO</label>
                  <input type="date" id="v_inicio" name="fecha_inicio" value="${today()}" required>
                </div>
                <div>
                  <label for="v_fin">FIN</label>
                  <input type="date" id="v_fin" name="fecha_fin" required>
                </div>
              </div>
              <div class="field-row">
                <label for="v_motivo">MOTIVO / NOTAS</label>
                <textarea id="v_motivo" name="motivo" rows="4" placeholder="Comentarios de cobertura o fechas solicitadas"></textarea>
              </div>
              <button class="btn-submit" type="submit">ENVIAR VACACIONES</button>
              ${state.message ? `<div class="folio-badge">${esc(state.message)}</div>` : ""}
              ${state.error ? `<div class="error">${esc(state.error)}</div>` : ""}
            </form>
          </section>
          <div class="list">${items}</div>
        `);
      }

      function renderPrestamos() {
        const items = state.prestamos.map(p => `
          <article class="card">
            <div class="row"><strong>${esc(p.folio)}</strong><span class="badge">${esc(p.estado_display || p.estado)}</span></div>
            <div class="muted">$${esc(p.importe)} · ${esc(p.num_quincenas)} quincenas · descuento $${esc(p.descuento_quincenal)}</div>
            ${p.jefe_directo_nombre ? `<div class="muted">Autoriza: ${esc(p.jefe_directo_nombre)}</div>` : ""}
            <div>${esc(p.concepto)}</div>
            ${p.puede_autorizar_jefe ? `<button class="btn-submit" type="button" onclick="autorizarPrestamo(${Number(p.id)})">AUTORIZAR PRÉSTAMO</button>` : ""}
          </article>
        `).join("") || `<div class="muted">Sin préstamos registrados.</div>`;
        app.innerHTML = shell(`
          <section class="panel">
            <form id="form_prestamo" onsubmit="enviarPrestamo(event)">
              <div class="talon-header">SOLICITUD DE PRÉSTAMO</div>
              <div class="field-row">
                <label for="pr_nombre">NOMBRE DE EMPLEADO</label>
                <input type="text" id="pr_nombre" name="nombre" value="${perfilValue("nombre")}" readonly class="readonly-field">
              </div>
              <div class="field-row-double">
                <div>
                  <label for="pr_importe">IMPORTE SOLICITADO</label>
                  <input type="number" id="pr_importe" name="importe" min="1" step="0.01" inputmode="decimal" required placeholder="Ej: 1500.00">
                </div>
                <div>
                  <label for="pr_quincenas">QUINCENAS</label>
                  <input type="number" id="pr_quincenas" name="num_quincenas" min="1" max="24" step="1" required placeholder="Ej: 4">
                </div>
              </div>
              <div class="field-row-double">
                <div>
                  <label for="pr_metodo">MÉTODO DE PAGO</label>
                  <select id="pr_metodo" name="metodo_pago" required>
                    <option value="transferencia">Transferencia</option>
                    <option value="cheque">Cheque</option>
                    <option value="efectivo">Efectivo</option>
                  </select>
                </div>
                <div>
                  <label for="pr_deposito">FECHA DE DEPÓSITO</label>
                  <input type="date" id="pr_deposito" name="fecha_deposito">
                </div>
              </div>
              <div class="field-row">
                <label for="pr_concepto">CONCEPTO / MOTIVO</label>
                <textarea id="pr_concepto" name="concepto" rows="4" required placeholder="Describe para qué solicitas el préstamo"></textarea>
              </div>
              <button class="btn-submit" type="submit">ENVIAR PRÉSTAMO</button>
              ${state.message ? `<div class="folio-badge">${esc(state.message)}</div>` : ""}
              ${state.error ? `<div class="error">${esc(state.error)}</div>` : ""}
            </form>
          </section>
          <div class="list">${items}</div>
        `);
      }

      function setSection(section) {
        state.section = normalizeSection(section);
        state.message = "";
        state.error = "";
        document.querySelectorAll(".nav button").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.section === state.section);
        });
        render();
      }

      function render() {
        if (!state.token) {
          renderLogin();
          return;
        }
        footer.classList.remove("hidden");
        document.querySelectorAll(".nav button").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.section === state.section);
        });
        if (state.section === "permisos") renderPermisos();
        else if (state.section === "vacaciones") renderVacaciones();
        else if (state.section === "horas") renderHoras();
        else if (state.section === "prestamos") renderPrestamos();
        else renderInicio();
      }

      document.querySelectorAll(".nav button").forEach(btn => {
        btn.addEventListener("click", () => setSection(btn.dataset.section));
      });
      loadData();
    </script>
  </body>
</html>
