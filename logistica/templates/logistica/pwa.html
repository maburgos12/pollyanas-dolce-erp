{% load static %}
<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#8B2252">
    <title>Pollyana's Logística</title>
    <link rel="manifest" href="{% static 'logistica/pwa/manifest.json' %}">
    <link rel="icon" href="{% static 'logistica/pwa/icon-192.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #0f0f14;
        --surface: #1a1a24;
        --border: #2a2a38;
        --wine: #8B2252;
        --gold: #C9A84C;
        --text: #e8e0d5;
        --text-muted: #888888;
        --danger: #e64f64;
        --warning: #e6b84f;
        --success: #51b56f;
        --info: #4f8ee6;
      }

      * { box-sizing: border-box; }

      html, body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Nunito", sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      }

      button, input, textarea, select {
        font: inherit;
      }

      button {
        min-height: 48px;
        border: 0;
        cursor: pointer;
      }

      #app {
        width: 100%;
        max-width: 430px;
        min-height: 100vh;
        padding: 18px 16px 74px;
        opacity: 1;
        transition: opacity 0.2s ease;
      }

      #app.is-changing { opacity: 0; }

      .brand-title {
        margin: 0;
        color: var(--text);
        font-family: "Playfair Display", serif;
        font-size: 38px;
        line-height: 1;
        letter-spacing: 0;
      }

      .brand-subtitle {
        margin: 8px 0 0;
        color: var(--gold);
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .login-wrap {
        display: flex;
        min-height: calc(100vh - 92px);
        flex-direction: column;
        justify-content: center;
      }

      .panel, .card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
      }

      .panel {
        margin-top: 30px;
        padding: 18px;
      }

      .field {
        display: grid;
        gap: 7px;
        margin-bottom: 14px;
      }

      label {
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 800;
      }

      input, textarea, select {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #111118;
        color: var(--text);
        outline: none;
        padding: 12px 13px;
      }

      textarea {
        min-height: 112px;
        resize: vertical;
      }

      input:focus, textarea:focus {
        border-color: var(--gold);
      }

      .primary-btn {
        width: 100%;
        border-radius: 10px;
        background: var(--wine);
        color: white;
        font-weight: 800;
        padding: 14px;
      }

      .secondary-btn {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: transparent;
        color: var(--text);
        font-weight: 800;
        padding: 12px 14px;
      }

      .error {
        margin: 10px 0 0;
        color: var(--danger);
        font-weight: 800;
      }

      .success {
        margin: 10px 0 0;
        color: var(--success);
        font-weight: 800;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .mini-brand {
        font-family: "Playfair Display", serif;
        font-size: 22px;
      }

      .hello {
        margin: 3px 0 0;
        color: var(--text-muted);
        font-size: 14px;
        font-weight: 700;
      }

      .logout {
        min-height: 40px;
        border-radius: 999px;
        background: #261521;
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
        padding: 8px 12px;
      }

      .unit-line {
        margin: 0 0 20px;
        color: var(--gold);
        font-weight: 800;
      }

      .dash-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .dash-btn {
        position: relative;
        min-height: 86px;
        border: 2px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        font-size: 16px;
        font-weight: 800;
        padding: 14px 10px;
      }

      .dash-btn:hover, .dash-btn:focus {
        border-color: var(--wine);
      }

      .badge {
        display: inline-flex;
        min-width: 24px;
        height: 24px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: var(--danger);
        color: white;
        font-size: 12px;
        font-weight: 900;
      }

      .badge.turno {
        margin-top: 6px;
        min-width: 0;
        height: auto;
        background: #676771;
        padding: 4px 8px;
      }

      .badge.turno.abierto {
        background: var(--warning);
        color: #17120a;
      }

      .dash-btn .badge {
        position: absolute;
        top: 8px;
        right: 8px;
      }

      .footer {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        max-width: 430px;
        margin: 0 auto;
        border-top: 1px solid var(--border);
        background: rgba(15, 15, 20, 0.94);
        color: var(--text-muted);
        text-align: center;
        font-size: 12px;
        padding: 13px 16px calc(13px + env(safe-area-inset-bottom));
      }

      .screen-title {
        margin: 0 0 14px;
        font-family: "Playfair Display", serif;
        font-size: 28px;
        line-height: 1.08;
      }

      .progress {
        display: flex;
        gap: 9px;
        margin: 0 0 18px;
      }

      .dot {
        width: 34px;
        height: 7px;
        border-radius: 999px;
        background: var(--border);
      }

      .dot.active {
        background: var(--gold);
      }

      .card-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .option-card {
        min-height: 82px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        font-weight: 800;
        padding: 12px;
      }

      .option-card.selected {
        border-color: var(--wine);
        background: #2a1423;
      }

      .severity-row {
        display: grid;
        gap: 10px;
        margin-bottom: 14px;
      }

      .severity-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        text-align: left;
        font-weight: 800;
        padding: 13px;
      }

      .severity-card.selected {
        border-color: var(--gold);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 16px;
      }

      .report-card {
        margin-bottom: 10px;
        padding: 14px;
      }

      .report-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
      }

      .report-title {
        margin: 0;
        font-size: 16px;
        font-weight: 900;
      }

      .muted {
        color: var(--text-muted);
        font-size: 13px;
      }

      .status {
        border-radius: 999px;
        color: white;
        font-size: 12px;
        font-weight: 900;
        padding: 5px 9px;
        white-space: nowrap;
      }

      .status.abierto { background: var(--danger); }
      .status.en_proceso { background: var(--warning); color: #17120a; }
      .status.programado { background: var(--info); }
      .status.cerrado { background: #676771; }

      .detail {
        display: none;
        margin-top: 13px;
        border-top: 1px solid var(--border);
        padding-top: 13px;
      }

      .report-card.expanded .detail {
        display: block;
      }

      .kv {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 8px;
        margin: 7px 0;
        font-size: 14px;
      }

      .kv b { color: var(--gold); }

      .empty {
        border: 1px dashed var(--border);
        border-radius: 12px;
        color: var(--text-muted);
        padding: 22px;
        text-align: center;
      }

      .confirm {
        margin-top: 28px;
        text-align: center;
      }

      .confirm-mark {
        font-size: 54px;
        margin-bottom: 8px;
      }

      .section-toggle {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        text-align: left;
        font-weight: 900;
        margin: 10px 0;
        padding: 12px 14px;
      }

      .check-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border-bottom: 1px solid var(--border);
        padding: 10px 0;
      }

      .check-row:last-child { border-bottom: 0; }

      .chip {
        min-width: 72px;
        border-radius: 999px;
        color: white;
        font-size: 12px;
        font-weight: 900;
        padding: 7px 10px;
      }

      .chip.ok { background: var(--success); }
      .chip.fail { background: var(--danger); }

      .thumb {
        width: 100%;
        max-height: 180px;
        object-fit: cover;
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const API = "/api/logistica";
      const app = document.getElementById("app");
      const state = {
        token: localStorage.getItem("pd_logistica_access") || "",
        refreshToken: localStorage.getItem("pd_logistica_refresh") || "",
        perfil: null,
        pantallaActual: "login",
        reportes: [],
        bitacoras: [],
        bitacoraSalida: null,
        unidades: [],
        inspeccionDraft: null,
        reporteDraft: {
          step: 1,
          tipo: "",
          tipoLabel: "",
          severidad: "",
          descripcion: "",
          foto: null,
          kilometraje: "",
          latitud: "",
          longitud: "",
          geoStatus: "idle",
          geoLabel: ""
        }
      };

      const tipos = [
        { icon: "🔧", label: "Falla mecánica", value: "falla" },
        { icon: "🔄", label: "Mantenimiento", value: "mantenimiento" },
        { icon: "💥", label: "Accidente", value: "accidente" },
        { icon: "🔵", label: "Llanta", value: "llanta" },
        { icon: "⛽", label: "Combustible", value: "otro" },
        { icon: "📋", label: "Otro", value: "otro" }
      ];

      const severidades = [
        { icon: "🟢", label: "Informativo", value: "informativo", color: "var(--success)" },
        { icon: "🟡", label: "Urgente", value: "urgente", color: "var(--warning)" },
        { icon: "🔴", label: "Crítico", value: "critico", color: "var(--danger)" }
      ];

      const nivelesGas = [
        { icon: "🪫", label: "Vacío", value: "vacio" },
        { icon: "⛽", label: "1/4", value: "1/4" },
        { icon: "⛽", label: "1/2", value: "1/2" },
        { icon: "⛽", label: "3/4", value: "3/4" },
        { icon: "🔋", label: "Lleno", value: "lleno" }
      ];

      const inspeccionSecciones = [
        {
          key: "exterior",
          title: "🔧 Accesorios Exterior",
          items: [
            ["ext_llanta_refaccion", "Llanta de refacción"],
            ["ext_gato", "Gato"],
            ["ext_llave_rueda", "Llave de rueda"],
            ["ext_rines", "Rines"],
            ["ext_aire_neumaticos", "Aire neumáticos"],
            ["ext_claxon", "Claxon"],
            ["ext_limpiaparabrisas", "Limpiaparabrisas"],
            ["ext_luces", "Luces"],
            ["ext_direccionales", "Direccionales"],
            ["ext_control_llave", "Control/llave"],
            ["ext_antena", "Antena"],
            ["ext_tapon_gas", "Tapón de gas"]
          ]
        },
        {
          key: "interior",
          title: "🚗 Accesorios Interior",
          items: [
            ["int_espejos", "Espejos"],
            ["int_encendedor", "Encendedor"],
            ["int_luz_interior", "Luz interior"],
            ["int_ac", "A/C"],
            ["int_radio", "Radio"],
            ["int_botones_radio", "Botones radio"],
            ["int_rejillas_ac", "Rejillas A/C"],
            ["int_tapetes", "Tapetes"],
            ["int_cinturones", "Cinturones"],
            ["int_tarjeta_circulacion", "Tarjeta circulación"]
          ]
        },
        {
          key: "niveles",
          title: "🔋 Niveles",
          items: [
            ["niv_aceite", "Aceite"],
            ["niv_frenos", "Frenos"],
            ["niv_bateria", "Batería"],
            ["niv_agua_limpiadores", "Agua limpiadores"],
            ["niv_agua_radiador", "Agua radiador"]
          ]
        },
        {
          key: "estetica",
          title: "✨ Estética Interior",
          items: [
            ["est_asientos_delanteros", "Asientos delanteros"],
            ["est_asientos_traseros", "Asientos traseros"],
            ["est_cajuela", "Cajuela"],
            ["est_tablero", "Tablero"],
            ["est_panel_puertas", "Panel puertas"],
            ["est_visera", "Visera"]
          ]
        }
      ];

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function formatDate(value) {
        if (!value) return "-";
        return new Intl.DateTimeFormat("es-MX", { dateStyle: "medium", timeStyle: "short" }).format(new Date(value));
      }

      function todayIso() {
        return new Date().toISOString().slice(0, 10);
      }

      function normalizePerfil(raw) {
        const repartidor = raw?.repartidor || {};
        const unidad = raw?.unidad || repartidor?.unidad_asignada || {};
        return {
          nombre: raw?.nombre || raw?.user?.nombre || repartidor?.nombre || "Repartidor",
          unidad,
          ultimosServicios: raw?.ultimos_servicios || []
        };
      }

      async function apiFetch(path, options = {}) {
        const headers = options.headers || {};
        if (state.token) headers.Authorization = `Bearer ${state.token}`;
        const response = await fetch(`${API}${path}`, { ...options, headers });
        if (response.status === 401) {
          logout(false);
          throw new Error("Sesión expirada");
        }
        return response;
      }

      function setTokens(data) {
        state.token = data.access;
        state.refreshToken = data.refresh;
        localStorage.setItem("pd_logistica_access", data.access);
        localStorage.setItem("pd_logistica_refresh", data.refresh);
      }

      function logout(render = true) {
        state.token = "";
        state.refreshToken = "";
        state.perfil = null;
        localStorage.removeItem("pd_logistica_access");
        localStorage.removeItem("pd_logistica_refresh");
        if (render) showScreen("login");
      }

      function shell(content) {
        const nombre = escapeHtml(state.perfil?.nombre || "");
        return `
          <div class="topbar">
            <div>
              <div class="mini-brand">Pollyana's</div>
              <p class="hello">Hola, ${nombre}</p>
            </div>
            <button class="logout" onclick="logout()">Salir</button>
          </div>
          ${content}
          <div class="footer">Pollyana's Dolce © 2025</div>
        `;
      }

      function render(html) {
        app.classList.add("is-changing");
        window.setTimeout(() => {
          app.innerHTML = html;
          app.classList.remove("is-changing");
        }, 120);
      }

      async function showScreen(nombre) {
        state.pantallaActual = nombre;
        if (nombre === "login") return renderLogin();
        if (!state.perfil) await loadPerfil();
        if (nombre === "dashboard") return renderDashboard();
        if (nombre === "nuevo_reporte") return renderNuevoReporte();
        if (nombre === "mis_reportes") return renderMisReportes();
        if (nombre === "mi_unidad") return renderMiUnidad();
        if (nombre === "bitacora") return renderBitacora();
        if (nombre === "bitacora_salida") return renderBitacoraSalida();
        if (nombre === "inspeccion_vehiculo") return renderInspeccionVehiculo();
      }

      function renderLogin(error = "") {
        render(`
          <main class="login-wrap">
            <section>
              <h1 class="brand-title">Pollyana's</h1>
              <p class="brand-subtitle">Logística</p>
            </section>
            <form class="panel" onsubmit="login(event)">
              <div class="field">
                <label for="username">Usuario</label>
                <input id="username" name="username" autocomplete="username" required>
              </div>
              <div class="field">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
              </div>
              <button class="primary-btn" type="submit">Entrar</button>
              ${error ? `<p class="error">${escapeHtml(error)}</p>` : ""}
            </form>
          </main>
        `);
      }

      async function login(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const response = await fetch(`${API}/auth/token/`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: form.get("username"), password: form.get("password") })
        });
        if (!response.ok) return renderLogin("Usuario o contraseña incorrectos");
        setTokens(await response.json());
        await showScreen("dashboard");
      }

      async function loadPerfil() {
        const response = await apiFetch("/mi-perfil/");
        state.perfil = normalizePerfil(await response.json());
      }

      async function loadReportes() {
        const response = await apiFetch("/reportes/mis/");
        state.reportes = response.ok ? await response.json() : [];
        return state.reportes;
      }

      async function loadUnidades() {
        const response = await apiFetch("/unidades/");
        state.unidades = response.ok ? await response.json() : [];
        return state.unidades;
      }

      async function loadTurnoActivo() {
        const response = await apiFetch("/bitacora-salida/activa/");
        state.bitacoraSalida = response.ok ? await response.json() : null;
        return state.bitacoraSalida;
      }

      async function renderDashboard() {
        await loadReportes();
        let turnoActivo = null;
        try {
          turnoActivo = await loadTurnoActivo();
        } catch (error) {
          turnoActivo = null;
        }
        const abiertos = state.reportes.filter((r) => r.estatus !== "cerrado").length;
        const unidad = state.perfil?.unidad || {};
        const turnoBadge = turnoActivo?.id
          ? `<span class="badge turno abierto">ABIERTO</span>`
          : `<span class="badge turno">Sin turno</span>`;
        render(shell(`
          <p class="unit-line">Unidad: ${escapeHtml(unidad.codigo || "Sin unidad asignada")}</p>
          <div class="dash-grid">
            <button class="dash-btn" onclick="startNuevoReporte()">🚨<br>Nuevo Reporte</button>
            <button class="dash-btn" onclick="showScreen('mis_reportes')">📂<br>Mis Reportes ${abiertos ? `<span class="badge">${abiertos}</span>` : ""}</button>
            <button class="dash-btn" onclick="showScreen('mi_unidad')">🛵<br>Mi Unidad</button>
            <button class="dash-btn" onclick="showScreen('bitacora')">📝<br>Bitácora</button>
            <button class="dash-btn" onclick="showScreen('inspeccion_vehiculo')">📋<br>Inspección</button>
            <button class="dash-btn" onclick="showScreen('bitacora_salida')">🚗<br>Bitácora<br>${turnoBadge}</button>
          </div>
        `));
      }

      function startNuevoReporte() {
        state.reporteDraft = {
          step: 1,
          tipo: "",
          tipoLabel: "",
          severidad: "",
          descripcion: "",
          foto: null,
          kilometraje: "",
          latitud: "",
          longitud: "",
          geoStatus: "idle",
          geoLabel: "",
        };
        showScreen("nuevo_reporte");
      }

      function progressDots(step) {
        return `<div class="progress">${[1, 2, 3].map((n) => `<span class="dot ${step === n ? "active" : ""}"></span>`).join("")}</div>`;
      }

      function renderNuevoReporte(error = "") {
        const draft = state.reporteDraft;
        let body = "";
        if (draft.step === 1) {
          body = `
            <h1 class="screen-title">Nuevo reporte</h1>
            ${progressDots(1)}
            <div class="card-grid">
              ${tipos.map((tipo) => `
                <button class="option-card ${draft.tipoLabel === tipo.label ? "selected" : ""}" onclick="selectTipo('${tipo.value}', '${tipo.label}')">
                  <span>${tipo.icon}</span><br>${tipo.label}
                </button>
              `).join("")}
            </div>
            <div class="actions">
              <button class="secondary-btn" onclick="showScreen('dashboard')">Cancelar</button>
              <button class="primary-btn" onclick="nextReporteStep()" ${draft.tipo ? "" : "disabled"}>Siguiente</button>
            </div>
          `;
        } else if (draft.step === 2) {
          if (draft.geoStatus === "idle") {
            setTimeout(capturarUbicacionReporte, 0);
          }
          const geoMessage = draft.geoStatus === "loading"
            ? `<p class="muted">📍 Obteniendo ubicación...</p>`
            : draft.geoStatus === "ready"
              ? `<p class="success">📍 Ubicación registrada</p>`
              : draft.geoStatus === "error"
                ? `<p class="error">Se requiere ubicación para continuar</p>`
                : "";
          body = `
            <h1 class="screen-title">Detalles</h1>
            ${progressDots(2)}
            <div class="severity-row">
              ${severidades.map((sev) => `
                <button class="severity-card ${draft.severidad === sev.value ? "selected" : ""}" style="border-left:5px solid ${sev.color}" onclick="selectSeveridad('${sev.value}')">
                  ${sev.icon} ${sev.label}
                </button>
              `).join("")}
            </div>
            <div class="field">
              <label for="descripcion">Descripción</label>
              <textarea id="descripcion" required oninput="state.reporteDraft.descripcion = this.value">${escapeHtml(draft.descripcion)}</textarea>
            </div>
            <div class="field">
              <label for="foto">Foto</label>
              <input id="foto" type="file" accept="image/*" capture="environment" onchange="state.reporteDraft.foto = this.files[0] || null">
            </div>
            <div class="field">
              <label for="kilometraje">Kilometraje</label>
              <input id="kilometraje" type="number" min="0" value="${escapeHtml(draft.kilometraje)}" oninput="state.reporteDraft.kilometraje = this.value">
            </div>
            ${geoMessage}
            ${error ? `<p class="error">${escapeHtml(error)}</p>` : ""}
            <div class="actions">
              <button class="secondary-btn" onclick="prevReporteStep()">Atrás</button>
              <button class="primary-btn" onclick="nextReporteStep()" ${draft.geoStatus === "ready" ? "" : "disabled"}>Siguiente</button>
            </div>
          `;
        } else {
          body = `
            <h1 class="screen-title">Confirmar</h1>
            ${progressDots(3)}
            <section class="card report-card">
              <div class="kv"><b>Tipo</b><span>${escapeHtml(draft.tipoLabel)}</span></div>
              <div class="kv"><b>Severidad</b><span>${escapeHtml(draft.severidad)}</span></div>
              <div class="kv"><b>Kilometraje</b><span>${escapeHtml(draft.kilometraje || "-")}</span></div>
              <div class="kv"><b>Ubicación</b><span>${draft.latitud ? "📍 Ubicación registrada" : "-"}</span></div>
              <div class="kv"><b>Descripción</b><span>${escapeHtml(draft.descripcion)}</span></div>
            </section>
            ${error ? `<p class="error">${escapeHtml(error)}</p>` : ""}
            <div class="actions">
              <button class="secondary-btn" onclick="prevReporteStep()">Atrás</button>
              <button class="primary-btn" onclick="enviarReporte()" ${draft.latitud ? "" : "disabled"}>Enviar reporte</button>
            </div>
          `;
        }
        render(shell(body));
      }

      function selectTipo(value, label) {
        state.reporteDraft.tipo = value;
        state.reporteDraft.tipoLabel = label;
        renderNuevoReporte();
      }

      function selectSeveridad(value) {
        state.reporteDraft.severidad = value;
        renderNuevoReporte();
      }

      function nextReporteStep() {
        const draft = state.reporteDraft;
        if (draft.step === 1 && !draft.tipo) return;
        if (draft.step === 2 && (!draft.severidad || !draft.descripcion.trim())) {
          return renderNuevoReporte("Selecciona severidad y escribe una descripción.");
        }
        if (draft.step === 2 && !draft.latitud) {
          return renderNuevoReporte("Se requiere ubicación para continuar");
        }
        draft.step = Math.min(3, draft.step + 1);
        renderNuevoReporte();
      }

      function prevReporteStep() {
        state.reporteDraft.step = Math.max(1, state.reporteDraft.step - 1);
        renderNuevoReporte();
      }

      function capturarUbicacionReporte() {
        if (!navigator.geolocation) {
          state.reporteDraft.geoStatus = "error";
          state.reporteDraft.geoLabel = "Se requiere ubicación para continuar";
          return renderNuevoReporte();
        }
        state.reporteDraft.geoStatus = "loading";
        renderNuevoReporte();
        navigator.geolocation.getCurrentPosition((position) => {
          state.reporteDraft.latitud = position.coords.latitude.toFixed(6);
          state.reporteDraft.longitud = position.coords.longitude.toFixed(6);
          state.reporteDraft.geoStatus = "ready";
          state.reporteDraft.geoLabel = "📍 Ubicación registrada";
          renderNuevoReporte();
        }, () => {
          state.reporteDraft.latitud = "";
          state.reporteDraft.longitud = "";
          state.reporteDraft.geoStatus = "error";
          state.reporteDraft.geoLabel = "Se requiere ubicación para continuar";
          renderNuevoReporte();
        }, { enableHighAccuracy: true, timeout: 8000 });
      }

      async function enviarReporte() {
        const draft = state.reporteDraft;
        const form = new FormData();
        form.append("tipo", draft.tipo);
        form.append("severidad", draft.severidad);
        form.append("descripcion", draft.descripcion);
        if (draft.foto) form.append("foto", draft.foto);
        if (draft.kilometraje) form.append("kilometraje", draft.kilometraje);
        if (draft.latitud) form.append("latitud", draft.latitud);
        if (draft.longitud) form.append("longitud", draft.longitud);
        const response = await apiFetch("/reportes/", { method: "POST", body: form });
        if (!response.ok) return renderNuevoReporte("No se pudo enviar el reporte. Revisa los datos.");
        render(shell(`
          <section class="confirm">
            <div class="confirm-mark">✅</div>
            <h1 class="screen-title">Reporte enviado</h1>
            <p class="muted">Compras recibió el ticket y dará seguimiento.</p>
            <button class="primary-btn" onclick="showScreen('dashboard')">Volver al inicio</button>
          </section>
        `));
      }

      async function renderMisReportes() {
        await loadReportes();
        const cards = state.reportes.length ? state.reportes.map((r) => {
          const desc = (r.descripcion || "").length > 80 ? `${r.descripcion.slice(0, 80)}...` : r.descripcion;
          return `
            <article class="card report-card" onclick="this.classList.toggle('expanded')">
              <div class="report-head">
                <div>
                  <p class="report-title">${escapeHtml(r.unidad_codigo)} · ${escapeHtml(r.tipo_display || r.tipo)}</p>
                  <p class="muted">${formatDate(r.fecha_reporte)}</p>
                </div>
                <span class="status ${escapeHtml(r.estatus)}">${escapeHtml(r.estatus_display || r.estatus)}</span>
              </div>
              <p>${escapeHtml(desc)}</p>
              <div class="detail">
                <div class="kv"><b>Severidad</b><span>${escapeHtml(r.severidad_display || r.severidad)}</span></div>
                <div class="kv"><b>Kilometraje</b><span>${escapeHtml(r.kilometraje || "-")}</span></div>
                <div class="kv"><b>Proveedor</b><span>${escapeHtml(r.proveedor_servicio || "-")}</span></div>
                <div class="kv"><b>Notas</b><span>${escapeHtml(r.notas_compras || "-")}</span></div>
                <div class="kv"><b>Descripción</b><span>${escapeHtml(r.descripcion)}</span></div>
              </div>
            </article>
          `;
        }).join("") : `<div class="empty">Todavía no tienes reportes registrados.</div>`;
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Mis reportes</h1>
          ${cards}
        `));
      }

      function renderMiUnidad() {
        const unidad = state.perfil?.unidad || {};
        const servicios = (state.perfil?.ultimosServicios || []).filter((r) => r.estatus === "cerrado");
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Mi unidad</h1>
          <section class="card report-card">
            <div class="kv"><b>Código</b><span>${escapeHtml(unidad.codigo || "-")}</span></div>
            <div class="kv"><b>Descripción</b><span>${escapeHtml(unidad.descripcion || "-")}</span></div>
            <div class="kv"><b>Placa</b><span>${escapeHtml(unidad.placa || "-")}</span></div>
          </section>
          <h2 class="report-title" style="margin:18px 0 10px;">Historial de servicios</h2>
          ${servicios.length ? servicios.map((s) => `
            <section class="card report-card">
              <p class="report-title">${escapeHtml(s.tipo_display || s.tipo)}</p>
              <p class="muted">${formatDate(s.fecha_reporte)}</p>
              <div class="kv"><b>Costo</b><span>${s.costo_servicio ? `$${escapeHtml(s.costo_servicio)}` : "-"}</span></div>
            </section>
          `).join("") : `<div class="empty">Sin servicios cerrados recientes.</div>`}
        `));
      }

      async function loadBitacoras() {
        const response = await apiFetch("/bitacora/");
        state.bitacoras = response.ok ? await response.json() : [];
        return state.bitacoras;
      }

      async function renderBitacora(message = "") {
        await loadBitacoras();
        const hoy = todayIso();
        const actual = state.bitacoras.find((b) => b.fecha === hoy);
        const readOnly = actual && !state.editandoBitacora;
        const body = readOnly ? `
          <section class="card report-card">
            <div class="kv"><b>Fecha</b><span>${escapeHtml(actual.fecha)}</span></div>
            <div class="kv"><b>KM inicio</b><span>${escapeHtml(actual.km_inicio)}</span></div>
            <div class="kv"><b>KM fin</b><span>${escapeHtml(actual.km_fin || "-")}</span></div>
            <div class="kv"><b>Novedades</b><span>${escapeHtml(actual.novedades || "-")}</span></div>
          </section>
          <button class="primary-btn" onclick="state.editandoBitacora = true; renderBitacora()">Editar</button>
        ` : `
          <form onsubmit="guardarBitacora(event)">
            <div class="field">
              <label for="km_inicio">KM inicio</label>
              <input id="km_inicio" name="km_inicio" type="number" min="0" required value="${escapeHtml(actual?.km_inicio || "")}">
            </div>
            <div class="field">
              <label for="km_fin">KM fin</label>
              <input id="km_fin" name="km_fin" type="number" min="0" value="${escapeHtml(actual?.km_fin || "")}">
            </div>
            <div class="field">
              <label for="novedades">Novedades</label>
              <textarea id="novedades" name="novedades">${escapeHtml(actual?.novedades || "")}</textarea>
            </div>
            <button class="primary-btn" type="submit">Guardar</button>
          </form>
        `;
        render(shell(`
          <button class="secondary-btn" onclick="state.editandoBitacora = false; showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Bitácora</h1>
          ${message ? `<p class="success">${escapeHtml(message)}</p>` : ""}
          ${body}
        `));
      }

      async function guardarBitacora(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const payload = {
          km_inicio: Number(form.get("km_inicio")),
          km_fin: form.get("km_fin") ? Number(form.get("km_fin")) : null,
          novedades: form.get("novedades") || ""
        };
        const response = await apiFetch("/bitacora/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) return renderBitacora("No se pudo guardar. Revisa el kilometraje.");
        state.editandoBitacora = false;
        await renderBitacora("Bitácora guardada.");
      }

      function gasSelector(current, onSelect) {
        return `
          <div class="card-grid">
            ${nivelesGas.map((nivel) => `
              <button type="button" class="option-card ${current === nivel.value ? "selected" : ""}" onclick="${onSelect}('${nivel.value}')">
                <span>${nivel.icon}</span><br>${nivel.label}
              </button>
            `).join("")}
          </div>
        `;
      }

      function ensureBitacoraSalidaDraft() {
        if (!state.bitacoraSalidaDraft) {
          state.bitacoraSalidaDraft = {
            unidad: "",
            km_salida: "",
            nivel_gas_salida: "",
            foto_tablero_salida: null,
            fotoSalidaPreview: "",
            latitud_salida: "",
            longitud_salida: "",
            geoStatus: "idle",
            km_llegada: "",
            nivel_gas_llegada: "",
            foto_tablero_llegada: null,
            fotoLlegadaPreview: ""
          };
        }
        return state.bitacoraSalidaDraft;
      }

      function capturarUbicacionSalida() {
        const draft = ensureBitacoraSalidaDraft();
        if (!navigator.geolocation) {
          draft.geoStatus = "error";
          return renderBitacoraSalida();
        }
        draft.geoStatus = "loading";
        renderBitacoraSalida();
        navigator.geolocation.getCurrentPosition((position) => {
          draft.latitud_salida = position.coords.latitude.toFixed(6);
          draft.longitud_salida = position.coords.longitude.toFixed(6);
          draft.geoStatus = "ready";
          renderBitacoraSalida();
        }, () => {
          draft.latitud_salida = "";
          draft.longitud_salida = "";
          draft.geoStatus = "error";
          renderBitacoraSalida();
        }, { enableHighAccuracy: true, timeout: 8000 });
      }

      function setFotoBitacora(input, campo, previewCampo) {
        const draft = ensureBitacoraSalidaDraft();
        const file = input.files[0] || null;
        draft[campo] = file;
        draft[previewCampo] = file ? URL.createObjectURL(file) : "";
        renderBitacoraSalida();
      }

      async function renderBitacoraSalida(message = "") {
        let actual = null;
        try {
          actual = await loadTurnoActivo();
        } catch (error) {
          actual = null;
        }
        await loadUnidades();
        const draft = ensureBitacoraSalidaDraft();
        const tieneSalida = Boolean(actual?.id);
        let body = "";
        if (!tieneSalida) {
          if (draft.geoStatus === "idle") setTimeout(capturarUbicacionSalida, 0);
          const geo = draft.geoStatus === "loading"
            ? `<p class="muted">📍 Obteniendo ubicación...</p>`
            : draft.geoStatus === "ready"
              ? `<p class="success">📍 Ubicación registrada</p>`
              : draft.geoStatus === "error"
                ? `<p class="error">Se requiere ubicación para continuar</p>`
                : "";
          body = `
            <form onsubmit="guardarSalida(event)">
              <div class="field">
                <label for="unidad_salida">Unidad</label>
                <select id="unidad_salida" name="unidad" required onchange="state.bitacoraSalidaDraft.unidad = this.value">
                  <option value="">Selecciona unidad</option>
                  ${state.unidades.map((unidad) => `<option value="${unidad.id}" ${String(draft.unidad) === String(unidad.id) ? "selected" : ""}>${escapeHtml(unidad.codigo)} · ${escapeHtml(unidad.descripcion || "")}</option>`).join("")}
                </select>
              </div>
              <div class="field">
                <label for="km_salida">KM salida</label>
                <input id="km_salida" name="km_salida" type="number" min="0" required value="${escapeHtml(draft.km_salida)}" oninput="state.bitacoraSalidaDraft.km_salida = this.value">
              </div>
              <div class="field">
                <label>Nivel gas salida</label>
                ${gasSelector(draft.nivel_gas_salida, "selectGasSalida")}
              </div>
              <div class="field">
                <label for="foto_salida">Foto tablero</label>
                <input id="foto_salida" type="file" accept="image/*" capture="environment" required onchange="setFotoBitacora(this, 'foto_tablero_salida', 'fotoSalidaPreview')">
                ${draft.fotoSalidaPreview ? `<img class="thumb" src="${draft.fotoSalidaPreview}" alt="Vista previa tablero salida">` : ""}
              </div>
              ${geo}
              <button class="primary-btn" type="submit" ${draft.geoStatus === "ready" ? "" : "disabled"}>Iniciar turno</button>
            </form>
          `;
        } else {
          body = `
            <p class="unit-line">Turno activo · ${escapeHtml(actual.unidad_codigo)} · Folio: ${escapeHtml(actual.folio)}</p>
            <section class="card report-card">
              <div class="kv"><b>Salida</b><span>${formatDate(actual.hora_salida)}</span></div>
              <div class="kv"><b>KM salida</b><span>${escapeHtml(actual.km_salida)}</span></div>
              <div class="kv"><b>Gas salida</b><span>${escapeHtml(actual.nivel_gas_salida)}</span></div>
              ${actual.foto_tablero_salida ? `<img class="thumb" src="${escapeHtml(actual.foto_tablero_salida)}" alt="Tablero salida">` : ""}
            </section>
            <form onsubmit="guardarLlegada(event)">
              <div class="field">
                <label for="km_llegada">KM llegada</label>
                <input id="km_llegada" name="km_llegada" type="number" min="${escapeHtml(actual.km_salida)}" required value="${escapeHtml(draft.km_llegada)}" oninput="state.bitacoraSalidaDraft.km_llegada = this.value">
              </div>
              <div class="field">
                <label>Nivel gas llegada</label>
                ${gasSelector(draft.nivel_gas_llegada || "", "selectGasLlegada")}
              </div>
              <div class="field">
                <label for="litros_cargados">Litros cargados</label>
                <input id="litros_cargados" name="litros_cargados" type="number" min="0" step="0.01">
              </div>
              <div class="field">
                <label for="costo_combustible">Costo combustible</label>
                <input id="costo_combustible" name="costo_combustible" type="number" min="0" step="0.01">
              </div>
              <div class="field">
                <label for="foto_llegada">Foto tablero llegada</label>
                <input id="foto_llegada" type="file" accept="image/*" capture="environment" required onchange="setFotoBitacora(this, 'foto_tablero_llegada', 'fotoLlegadaPreview')">
                ${draft.fotoLlegadaPreview ? `<img class="thumb" src="${draft.fotoLlegadaPreview}" alt="Vista previa tablero llegada">` : ""}
              </div>
              <button class="primary-btn" type="submit" ${draft.nivel_gas_llegada ? "" : "disabled"}>Cerrar turno</button>
            </form>
          `;
        }
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Bitácora del día</h1>
          ${message ? `<p class="success">${escapeHtml(message)}</p>` : ""}
          ${body}
        `));
      }

      function selectGasSalida(value) {
        ensureBitacoraSalidaDraft().nivel_gas_salida = value;
        renderBitacoraSalida();
      }

      function selectGasLlegada(value) {
        ensureBitacoraSalidaDraft().nivel_gas_llegada = value;
        renderBitacoraSalida();
      }

      async function guardarSalida(event) {
        event.preventDefault();
        const draft = ensureBitacoraSalidaDraft();
        if (!draft.unidad || !draft.nivel_gas_salida || !draft.foto_tablero_salida || !draft.latitud_salida) {
          return renderBitacoraSalida("Completa unidad, gas, foto y ubicación.");
        }
        const payload = new FormData();
        payload.append("unidad", draft.unidad);
        payload.append("km_salida", draft.km_salida);
        payload.append("nivel_gas_salida", draft.nivel_gas_salida);
        payload.append("foto_tablero_salida", draft.foto_tablero_salida);
        payload.append("latitud_salida", draft.latitud_salida);
        payload.append("longitud_salida", draft.longitud_salida);
        const response = await apiFetch("/bitacora-salida/", {
          method: "POST",
          body: payload
        });
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          if (error.error === "turno_abierto") {
            state.bitacoraSalida = error.bitacora || state.bitacoraSalida;
            return renderBitacoraSalida(`⚠️ Tienes un turno abierto en ${error.bitacora?.unidad_codigo || "otra unidad"}.`);
          }
          return renderBitacoraSalida("No se pudo iniciar el turno.");
        }
        const creado = await response.json();
        state.bitacoraSalidaDraft = null;
        await renderBitacoraSalida(`✅ Turno iniciado · Folio: ${creado.folio}`);
      }

      async function guardarLlegada(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const draft = ensureBitacoraSalidaDraft();
        if (!draft.foto_tablero_llegada) return renderBitacoraSalida("La foto del tablero de llegada es obligatoria.");
        const payload = new FormData();
        payload.append("km_llegada", form.get("km_llegada"));
        payload.append("nivel_gas_llegada", draft.nivel_gas_llegada);
        if (form.get("litros_cargados")) payload.append("litros_cargados", form.get("litros_cargados"));
        if (form.get("costo_combustible")) payload.append("costo_combustible", form.get("costo_combustible"));
        payload.append("foto_tablero_llegada", draft.foto_tablero_llegada);
        const response = await apiFetch(`/bitacora-salida/${state.bitacoraSalida.id}/`, {
          method: "PATCH",
          body: payload
        });
        if (!response.ok) return renderBitacoraSalida("No se pudo registrar la llegada.");
        const cerrada = await response.json();
        state.bitacoraSalidaDraft = null;
        state.bitacoraSalida = null;
        await renderBitacoraSalida(`✅ Turno cerrado · ${formatDate(cerrada.hora_llegada)}`);
      }

      function ensureInspeccionDraft() {
        if (!state.inspeccionDraft) {
          const checks = {};
          inspeccionSecciones.forEach((section) => section.items.forEach(([field]) => { checks[field] = false; }));
          state.inspeccionDraft = {
            km_entrada: "",
            nivel_gas_entrada: "",
            tiene_golpes: false,
            descripcion_golpes: "",
            foto_golpes: null,
            observaciones: "",
            latitud: "",
            longitud: "",
            geoStatus: "idle",
            expanded: { exterior: true },
            checks
          };
        }
        return state.inspeccionDraft;
      }

      function capturarUbicacionInspeccion() {
        const draft = ensureInspeccionDraft();
        if (!navigator.geolocation) {
          draft.geoStatus = "error";
          return renderInspeccionVehiculo();
        }
        draft.geoStatus = "loading";
        renderInspeccionVehiculo();
        navigator.geolocation.getCurrentPosition((position) => {
          draft.latitud = position.coords.latitude.toFixed(6);
          draft.longitud = position.coords.longitude.toFixed(6);
          draft.geoStatus = "ready";
          renderInspeccionVehiculo();
        }, () => {
          draft.latitud = "";
          draft.longitud = "";
          draft.geoStatus = "error";
          renderInspeccionVehiculo();
        }, { enableHighAccuracy: true, timeout: 8000 });
      }

      function renderChecklistSection(section) {
        const draft = ensureInspeccionDraft();
        const open = Boolean(draft.expanded[section.key]);
        return `
          <button class="section-toggle" type="button" onclick="toggleInspeccionSection('${section.key}')">
            <span>${section.title}</span><span>${open ? "−" : "+"}</span>
          </button>
          ${open ? `
            <section class="card report-card">
              <button class="secondary-btn" type="button" onclick="marcarSeccionOk('${section.key}')">Marcar todos OK</button>
              ${section.items.map(([field, label]) => `
                <div class="check-row">
                  <span>${escapeHtml(label)}</span>
                  <button class="chip ${draft.checks[field] ? "ok" : "fail"}" type="button" onclick="toggleInspeccionItem('${field}')">
                    ${draft.checks[field] ? "OK" : "Falta"}
                  </button>
                </div>
              `).join("")}
            </section>
          ` : ""}
        `;
      }

      async function renderInspeccionVehiculo(message = "") {
        const draft = ensureInspeccionDraft();
        const unidad = state.perfil?.unidad || {};
        if (draft.geoStatus === "idle") setTimeout(capturarUbicacionInspeccion, 0);
        const geo = draft.geoStatus === "loading"
          ? `<p class="muted">📍 Obteniendo ubicación...</p>`
          : draft.geoStatus === "ready"
            ? `<p class="success">📍 Ubicación registrada</p>`
            : draft.geoStatus === "error"
              ? `<p class="error">Se requiere ubicación para continuar</p>`
              : "";
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Inspección de unidad</h1>
          <p class="unit-line">${escapeHtml(unidad.codigo || "-")} · ${escapeHtml(unidad.descripcion || "")}</p>
          ${message ? `<p class="success">${escapeHtml(message)}</p>` : ""}
          <form onsubmit="enviarInspeccion(event)">
            <section class="card report-card">
              <div class="field">
                <label for="km_entrada">KM entrada</label>
                <input id="km_entrada" type="number" min="0" required value="${escapeHtml(draft.km_entrada)}" oninput="state.inspeccionDraft.km_entrada = this.value">
              </div>
              <div class="field">
                <label>Nivel gas entrada</label>
                ${gasSelector(draft.nivel_gas_entrada, "selectGasInspeccion")}
              </div>
            </section>
            ${inspeccionSecciones.map(renderChecklistSection).join("")}
            <section class="card report-card">
              <div class="check-row">
                <span>¿Presenta golpes o hendiduras?</span>
                <button class="chip ${draft.tiene_golpes ? "fail" : "ok"}" type="button" onclick="toggleGolpes()">
                  ${draft.tiene_golpes ? "Sí" : "No"}
                </button>
              </div>
              ${draft.tiene_golpes ? `
                <div class="field">
                  <label for="descripcion_golpes">Descripción de golpes</label>
                  <textarea id="descripcion_golpes" oninput="state.inspeccionDraft.descripcion_golpes = this.value">${escapeHtml(draft.descripcion_golpes)}</textarea>
                </div>
                <div class="field">
                  <label for="foto_golpes">Foto</label>
                  <input id="foto_golpes" type="file" accept="image/*" capture="environment" onchange="state.inspeccionDraft.foto_golpes = this.files[0] || null">
                </div>
              ` : ""}
            </section>
            <div class="field">
              <label for="observaciones">Observaciones</label>
              <textarea id="observaciones" oninput="state.inspeccionDraft.observaciones = this.value">${escapeHtml(draft.observaciones)}</textarea>
            </div>
            ${geo}
            <button class="primary-btn" type="submit" ${draft.geoStatus === "ready" ? "" : "disabled"}>Enviar inspección</button>
          </form>
        `));
      }

      function selectGasInspeccion(value) {
        ensureInspeccionDraft().nivel_gas_entrada = value;
        renderInspeccionVehiculo();
      }

      function toggleInspeccionSection(key) {
        const draft = ensureInspeccionDraft();
        draft.expanded[key] = !draft.expanded[key];
        renderInspeccionVehiculo();
      }

      function toggleInspeccionItem(field) {
        const draft = ensureInspeccionDraft();
        draft.checks[field] = !draft.checks[field];
        renderInspeccionVehiculo();
      }

      function marcarSeccionOk(key) {
        const draft = ensureInspeccionDraft();
        const section = inspeccionSecciones.find((item) => item.key === key);
        section.items.forEach(([field]) => { draft.checks[field] = true; });
        renderInspeccionVehiculo();
      }

      function toggleGolpes() {
        const draft = ensureInspeccionDraft();
        draft.tiene_golpes = !draft.tiene_golpes;
        renderInspeccionVehiculo();
      }

      async function enviarInspeccion(event) {
        event.preventDefault();
        const draft = ensureInspeccionDraft();
        if (!draft.km_entrada || !draft.nivel_gas_entrada || !draft.latitud) {
          return renderInspeccionVehiculo("Completa KM, gas y ubicación.");
        }
        const form = new FormData();
        form.append("km_entrada", draft.km_entrada);
        form.append("nivel_gas_entrada", draft.nivel_gas_entrada);
        form.append("tiene_golpes", draft.tiene_golpes ? "true" : "false");
        form.append("descripcion_golpes", draft.descripcion_golpes);
        form.append("observaciones", draft.observaciones);
        form.append("latitud", draft.latitud);
        form.append("longitud", draft.longitud);
        if (draft.foto_golpes) form.append("foto_golpes", draft.foto_golpes);
        Object.entries(draft.checks).forEach(([field, value]) => form.append(field, value ? "true" : "false"));
        const faltantes = inspeccionSecciones.flatMap((section) => section.items.filter(([field]) => !draft.checks[field]).map(([, label]) => label));
        const response = await apiFetch("/inspeccion/", { method: "POST", body: form });
        if (!response.ok) return renderInspeccionVehiculo("No se pudo enviar la inspección.");
        state.inspeccionDraft = null;
        render(shell(`
          <section class="confirm">
            <div class="confirm-mark">✅</div>
            <h1 class="screen-title">Inspección enviada</h1>
            ${faltantes.length ? `<p class="muted">Faltantes: ${escapeHtml(faltantes.join(", "))}</p>` : `<p class="success">Todos los puntos marcados OK.</p>`}
            <button class="primary-btn" onclick="showScreen('dashboard')">Volver al inicio</button>
          </section>
        `));
      }

      async function boot() {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("{% static 'logistica/pwa/sw.js' %}").catch(() => {});
        }
        if (state.token) {
          try {
            await showScreen("dashboard");
          } catch (error) {
            logout(false);
            renderLogin();
          }
        } else {
          renderLogin();
        }
      }

      boot();
    </script>
  </body>
</html>
