          <section class="card report-card">
            <div class="kv"><b>Fecha</b><span>${escapeHtml(actual.fecha)}</span></div>
            <div class="kv"><b>KM inicio</b><span>${escapeHtml(actual.km_inicio)}</span></div>
            <div class="kv"><b>KM fin</b><span>${escapeHtml(actual.km_fin || "-")}</span></div>
            <div class="kv"><b>Novedades</b><span>${escapeHtml(actual.novedades || "-")}</span></div>
          </section>
          <button class="primary-btn" onclick="state.editandoBitacora = true; renderBitacora()">Editar</button>
        ` : `
          <form onsubmit="guardarBitacora(event)">
            <div class="field">
              <label for="km_inicio">KM inicio</label>
              <input id="km_inicio" name="km_inicio" type="number" min="0" required value="${escapeHtml(actual?.km_inicio || "")}">
            </div>
            <div class="field">
              <label for="km_fin">KM fin</label>
              <input id="km_fin" name="km_fin" type="number" min="0" value="${escapeHtml(actual?.km_fin || "")}">
            </div>
            <div class="field">
              <label for="novedades">Novedades</label>
              <textarea id="novedades" name="novedades">${escapeHtml(actual?.novedades || "")}</textarea>
            </div>
            <button class="primary-btn" type="submit">Guardar</button>
          </form>
        `;
        render(shell(`
          <button class="secondary-btn" onclick="state.editandoBitacora = false; showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Bitácora</h1>
          ${message ? `<p class="success">${escapeHtml(message)}</p>` : ""}
          ${body}
        `));
      }

      async function guardarBitacora(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const payload = {
          km_inicio: Number(form.get("km_inicio")),
          km_fin: form.get("km_fin") ? Number(form.get("km_fin")) : null,
          novedades: form.get("novedades") || ""
        };
        const response = await apiFetch("/bitacora/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) return renderBitacora("No se pudo guardar. Revisa el kilometraje.");
        state.editandoBitacora = false;
        await renderBitacora("Bitácora guardada.");
      }

      function ensureLavadoDraft() {
        if (!state.lavadoDraft) {
          state.lavadoDraft = {
            unidad: "",
            lavado_exterior: false,
            lavado_interior: false,
            lavado_caja_refrigerada: false,
            costo: "",
            notas: "",
            foto_evidencia: null,
            fotoLavadoPreview: "",
            fotoLavadoError: "",
            latitud: "",
            longitud: "",
            geoStatus: "idle",
            geoLabel: "",
            estado: null,
            estadoLoading: false,
            confirmandoDuplicado: false,
            guardando: false
          };
        }
        return state.lavadoDraft;
      }

      function capturarUbicacionLavado() {
        requestLocation(ensureLavadoDraft(), renderLavadoUnidad, "latitud", "longitud");
      }

      function setFotoLavado(input) {
        setLivePhoto(input, ensureLavadoDraft(), "foto_evidencia", "fotoLavadoPreview", renderLavadoUnidad, "fotoLavadoError");
      }

      function toggleParteLavado(field) {
        const draft = ensureLavadoDraft();
        draft[field] = !draft[field];
        renderLavadoUnidad();
      }

      async function seleccionarUnidadLavado(value) {
        const draft = ensureLavadoDraft();
        draft.unidad = value;
        draft.estado = null;
        draft.confirmandoDuplicado = false;
        if (!value) return renderLavadoUnidad();
        draft.estadoLoading = true;
        renderLavadoUnidad();
        const response = await apiFetch(`/lavados/estado/?unidad_id=${encodeURIComponent(value)}`);
        draft.estadoLoading = false;
        draft.estado = response.ok ? await response.json() : null;
        renderLavadoUnidad();
      }

      function puedeGuardarLavado() {
        const draft = ensureLavadoDraft();
        const tieneParte = draft.lavado_exterior || draft.lavado_interior || draft.lavado_caja_refrigerada;
        return Boolean(draft.unidad && tieneParte && draft.foto_evidencia && isGeoReady(draft) && !draft.guardando);
      }

      function partesLavadoSeleccionadas(draft) {
        return partesLavado.filter((parte) => draft[parte.field]).map((parte) => parte.label);
      }

      function renderEstadoLavado(draft) {
        if (draft.estadoLoading) return `<p class="unit-line">Consultando último lavado...</p>`;
        const estado = draft.estado;
        if (!estado) return "";
        const ultimo = estado.ultimo_lavado;
        const dias = estado.dias_sin_lavar;
        const tone = estado.lavado_hoy ? "ok" : Number(dias) > 15 ? "warning" : "ok";
        const texto = ultimo
          ? `Último lavado: ${escapeHtml(ultimo.fecha || "-")} · ${dias} día${Number(dias) === 1 ? "" : "s"}`
          : "Sin lavados registrados para esta unidad.";
        return `
          <div class="daily-banner ${tone === "warning" ? "warning" : ""}">
            <span style="font-size:22px;">${estado.lavado_hoy ? "✅" : "🚿"}</span>
            <div>
              <strong>${escapeHtml(estado.unidad_codigo || "")}</strong><br>
              ${texto}
              ${estado.lavado_hoy ? "<br>Esta unidad ya tiene lavado registrado hoy. Si fue otro tipo de lavado, puedes registrarlo de nuevo." : ""}
            </div>
          </div>
        `;
      }

      async function renderLavadoUnidad(message = "") {
        const draft = ensureLavadoDraft();
        if (!state.unidades.length) await loadUnidades();
        const ubicacionLista = isGeoReady(draft);
        const isError = message && !message.startsWith("✅");
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Lavado de unidad</h1>
          <p class="unit-line">Selecciona las partes que se lavaron. Puedes marcar más de una.</p>
          ${message ? `<p class="${isError ? "error" : "success"}">${escapeHtml(message)}</p>` : ""}
          <div class="${ubicacionLista ? "" : "gps-locked"}">
            <section class="card report-card">
              <div class="field">
                <label for="unidad_lavado">Unidad</label>
                <select id="unidad_lavado" required onchange="seleccionarUnidadLavado(this.value)">
                  <option value="">Selecciona unidad</option>
                  ${state.unidades.map((unidad) => `<option value="${unidad.id}" ${String(draft.unidad) === String(unidad.id) ? "selected" : ""}>${escapeHtml(unidad.codigo)} · ${escapeHtml(unidad.descripcion || "")}</option>`).join("")}
                </select>
              </div>
              ${renderEstadoLavado(draft)}
              <div class="field">
                <label>Partes lavadas</label>
                <div class="card-grid">
                  ${partesLavado.map((parte) => `
                    <button type="button" class="option-card ${draft[parte.field] ? "selected" : ""}" onclick="toggleParteLavado('${parte.field}')">
                      <span>${parte.icon}</span><br>${parte.label}
                    </button>
                  `).join("")}
                </div>
                <p class="muted">${partesLavadoSeleccionadas(draft).length ? `Seleccionado: ${escapeHtml(partesLavadoSeleccionadas(draft).join(", "))}` : "Marca al menos una parte."}</p>
              </div>
              <div class="field">
                <label for="costo_lavado">Importe del lavado</label>
                <input id="costo_lavado" type="number" min="0" step="0.01" placeholder="Ej. 150.00" value="${escapeHtml(draft.costo)}" oninput="state.lavadoDraft.costo = this.value">
              </div>
              <div class="field">
                <label for="foto_lavado">Foto de evidencia</label>
                ${fotoInput("foto_lavado", Boolean(draft.foto_evidencia), "setFotoLavado(this)")}
                ${draft.fotoLavadoPreview ? `
                  <img class="thumb" src="${draft.fotoLavadoPreview}" alt="Vista previa lavado">
                  <div class="photo-actions">
                    <label class="retake" for="foto_lavado">↻ Volver a tomar</label>
                    <button class="keep" type="button" onclick="renderLavadoUnidad()">Usar esta foto</button>
                  </div>
                ` : ""}
                ${draft.fotoLavadoError ? `<p class="error">${escapeHtml(draft.fotoLavadoError)}</p>` : ""}
              </div>
              <div class="field">
                <label for="notas_lavado">Notas</label>
                <textarea id="notas_lavado" rows="3" placeholder="Opcional" oninput="state.lavadoDraft.notas = this.value">${escapeHtml(draft.notas)}</textarea>
              </div>
              <p class="gps-registered">📍 Ubicación registrada</p>
              ${draft.estado?.lavado_hoy && !draft.confirmandoDuplicado ? `
                <button class="secondary-btn" type="button" onclick="state.lavadoDraft.confirmandoDuplicado = true; renderLavadoUnidad()">Registrar otro lavado de hoy</button>
              ` : `
                <button class="primary-btn" type="button" onclick="guardarLavadoUnidad()" ${puedeGuardarLavado() ? "" : "disabled"}>${draft.guardando ? "Guardando..." : "Guardar lavado"}</button>
              `}
            </section>
          </div>
          ${geoOverlay(draft, "capturarUbicacionLavado")}
        `));
      }

      async function guardarLavadoUnidad() {
        const draft = ensureLavadoDraft();
        if (!puedeGuardarLavado()) return renderLavadoUnidad("Completa unidad, tipo, foto y ubicación.");
        draft.guardando = true;
        renderLavadoUnidad();
        const payload = new FormData();
        payload.append("unidad", draft.unidad);
        payload.append("lavado_exterior", draft.lavado_exterior ? "true" : "false");
        payload.append("lavado_interior", draft.lavado_interior ? "true" : "false");
        payload.append("lavado_caja_refrigerada", draft.lavado_caja_refrigerada ? "true" : "false");
        if (draft.costo) payload.append("costo", draft.costo);
        payload.append("foto_evidencia", draft.foto_evidencia);
        payload.append("latitud", draft.latitud);
        payload.append("longitud", draft.longitud);
        payload.append("notas", draft.notas || "");
        const response = await apiFetch("/lavados/", { method: "POST", body: payload });
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          draft.guardando = false;
          return renderLavadoUnidad(apiErrorMessage(error, "No se pudo registrar el lavado."));
        }
        const lavado = await response.json();
        state.lavadoDraft = null;
        render(shell(`
          <section class="confirm">
            <div class="check">✅</div>
            <h1 class="screen-title">Lavado registrado</h1>
            <p class="unit-line">${escapeHtml(lavado.unidad_codigo || "")} · ${escapeHtml(lavado.partes_lavadas_display || "")}</p>
            <button class="primary-btn" onclick="showScreen('dashboard')">Volver al inicio</button>
          </section>
        `));
      }

      function gasSelector(current, onSelect) {
        return `
          <select class="gas-native-select" onchange="${onSelect}(this.value)" aria-label="Selecciona nivel de gasolina">
            <option value="">Selecciona nivel de gasolina</option>
            ${nivelesGas.map((nivel) => `
              <option value="${nivel.value}" ${current === nivel.value ? "selected" : ""}>${nivel.label}</option>
            `).join("")}
          </select>
          <div class="card-grid">
            ${nivelesGas.map((nivel) => `
              <button type="button" class="option-card ${current === nivel.value ? "selected" : ""}" onclick="${onSelect}('${nivel.value}')" aria-pressed="${current === nivel.value ? "true" : "false"}">
                <span>${nivel.icon}</span><br>${current === nivel.value ? "✓ " : ""}${nivel.label}
              </button>
            `).join("")}
          </div>
        `;
      }

      function ensureBitacoraSalidaDraft() {
        if (!state.bitacoraSalidaDraft) {
          const inspeccionDiariaChecks = {};
          inspeccionDiariaSecciones.forEach((section) => section.items.forEach(([field]) => { inspeccionDiariaChecks[field] = null; }));
          state.bitacoraSalidaDraft = {
            unidad: "",
            km_salida: "",
            nivel_gas_salida: "",
            foto_tablero_salida: null,
            fotoSalidaPreview: "",
            fotoSalidaError: "",
            latitud_salida: "",
            longitud_salida: "",
            geoStatus: "idle",
            km_llegada: "",
            nivel_gas_llegada: "",
            foto_tablero_llegada: null,
            fotoLlegadaPreview: "",
            fotoLlegadaError: "",
            registrando_combustible: false,
            carga_litros: "",
            carga_importe_total: "",
            carga_nivel_gas_despues: "",
            carga_foto_ticket: null,
            cargaFotoTicketPreview: "",
            cargaFotoTicketError: "",
            carga_latitud: "",
            carga_longitud: "",
            carga_geoStatus: "idle",
            carga_geoLabel: "",
            carga_guardando: false,
            inspeccionDiariaCheck: null,
            inspeccionDiariaLoading: false,
            inspeccionDiariaCompletada: false,
            inspeccionDiariaAviso: "",
            inspeccionDiariaObservaciones: "",
            inspeccionDiariaExpanded: { fluidos: true },
            inspeccionDiariaHighlight: "",
            inspeccionDiariaChecks
          };
        }
        return state.bitacoraSalidaDraft;
      }

      function capturarUbicacionSalida() {
        const draft = ensureBitacoraSalidaDraft();
        requestLocation(draft, renderBitacoraSalida, "latitud_salida", "longitud_salida");
      }

      function setFotoBitacora(input, campo, previewCampo) {
        const draft = ensureBitacoraSalidaDraft();
        const errores = {
          foto_tablero_llegada: "fotoLlegadaError",
          carga_foto_ticket: "cargaFotoTicketError"
        };
        const errorCampo = errores[campo] || "fotoSalidaError";
        setLivePhoto(input, draft, campo, previewCampo, renderBitacoraSalida, errorCampo);
      }

      function setFotoCargaCombustible(input) {
        const draft = ensureBitacoraSalidaDraft();
        setLivePhoto(input, draft, "carga_foto_ticket", "cargaFotoTicketPreview", renderBitacoraSalida, "cargaFotoTicketError");
      }

      async function seleccionarUnidadSalida(value) {
        const draft = ensureBitacoraSalidaDraft();
        draft.unidad = value;
        draft.inspeccionDiariaCheck = null;
        draft.inspeccionDiariaCompletada = false;
        draft.inspeccionDiariaAviso = "";
        draft.inspeccionDiariaObservaciones = "";
        draft.inspeccionDiariaHighlight = "";
        Object.keys(draft.inspeccionDiariaChecks).forEach((field) => { draft.inspeccionDiariaChecks[field] = null; });
        if (!value) return renderBitacoraSalida();
        draft.inspeccionDiariaLoading = true;
        renderBitacoraSalida();
        const response = await apiFetch(`/inspeccion-diaria/check/?unidad_id=${encodeURIComponent(value)}`);
        draft.inspeccionDiariaLoading = false;
        draft.inspeccionDiariaCheck = response.ok ? await response.json() : { ya_inspeccionada: false };
        renderBitacoraSalida();
      }

      function toggleInspeccionDiariaSection(key) {
        const draft = ensureBitacoraSalidaDraft();
        draft.inspeccionDiariaExpanded[key] = !draft.inspeccionDiariaExpanded[key];
        renderBitacoraSalida();
      }

      function setInspeccionDiariaItem(field, value) {
        const draft = ensureBitacoraSalidaDraft();
        draft.inspeccionDiariaChecks[field] = value;
        const highlighted = inspeccionDiariaSecciones.find((section) => section.key === draft.inspeccionDiariaHighlight);
        if (highlighted && highlighted.items.every(([itemField]) => draft.inspeccionDiariaChecks[itemField] !== null)) {
          draft.inspeccionDiariaHighlight = "";
        }
        renderBitacoraSalida();
      }

      function marcarInspeccionDiariaSeccionOk(key) {
        const draft = ensureBitacoraSalidaDraft();
        const section = inspeccionDiariaSecciones.find((item) => item.key === key);
        section.items.forEach(([field]) => { draft.inspeccionDiariaChecks[field] = true; });
        if (draft.inspeccionDiariaHighlight === key) draft.inspeccionDiariaHighlight = "";
        renderBitacoraSalida();
      }

      function inspeccionDiariaCompleta(draft) {
        return Object.values(draft.inspeccionDiariaChecks).every((value) => value !== null);
      }

      function inspeccionDiariaPendientes(draft) {
        return Object.values(draft.inspeccionDiariaChecks).filter((value) => value === null).length;
      }

      function primeraSeccionInspeccionDiariaPendiente(draft) {
        return inspeccionDiariaSecciones.find((section) =>
          section.items.some(([field]) => draft.inspeccionDiariaChecks[field] === null)
        );
      }

      function inspeccionDiariaTieneFallas(draft) {
        return Object.values(draft.inspeccionDiariaChecks).some((value) => value === false);
      }

      function marcarInspeccionDiariaTodosOk() {
        const draft = ensureBitacoraSalidaDraft();
        Object.keys(draft.inspeccionDiariaChecks).forEach((field) => { draft.inspeccionDiariaChecks[field] = true; });
        draft.inspeccionDiariaHighlight = "";
        renderBitacoraSalida();
      }

      function renderInspeccionDiariaSection(section) {
        const draft = ensureBitacoraSalidaDraft();
        const open = Boolean(draft.inspeccionDiariaExpanded[section.key]);
        return `
          <button id="inspeccion-diaria-toggle-${section.key}" class="section-toggle ${draft.inspeccionDiariaHighlight === section.key ? "daily-section-highlight" : ""}" type="button" onclick="toggleInspeccionDiariaSection('${section.key}')">
            <span>${section.title}</span><span>${open ? "Ocultar" : "Ver"}</span>
          </button>
          ${open ? `
            <section class="daily-section-card ${draft.inspeccionDiariaHighlight === section.key ? "daily-section-highlight" : ""}">
              <button class="daily-mark-all" type="button" onclick="marcarInspeccionDiariaSeccionOk('${section.key}')">✓ Marcar sección OK</button>
              ${section.items.map(([field, label]) => {
                const value = draft.inspeccionDiariaChecks[field];
                const tone = value === true ? "ok" : value === false ? "fail" : "pending";
                return `
                  <div class="check-row ${tone}">
                    <span>${escapeHtml(label)}</span>
                    <div style="display:flex; gap:8px;">
                      <button class="chip ${value === true ? "ok" : "pending"}" type="button" onclick="setInspeccionDiariaItem('${field}', true)">${value === true ? "✓ " : ""}OK</button>
                      <button class="chip ${value === false ? "fail" : "pending"}" type="button" onclick="setInspeccionDiariaItem('${field}', false)">${value === false ? "✗ " : ""}FALLA</button>
                    </div>
                  </div>
                `;
              }).join("")}
            </section>
          ` : ""}
        `;
      }

      async function continuarInspeccionDiaria() {
        const draft = ensureBitacoraSalidaDraft();
        if (!inspeccionDiariaCompleta(draft)) {
          const section = primeraSeccionInspeccionDiariaPendiente(draft);
          if (section) {
            draft.inspeccionDiariaExpanded[section.key] = true;
            draft.inspeccionDiariaHighlight = section.key;
          }
          await renderBitacoraSalida("Completa todos los puntos para continuar. Revisa la sección resaltada.");
          if (section) {
            setTimeout(() => {
              document.getElementById(`inspeccion-diaria-toggle-${section.key}`)?.scrollIntoView({
                behavior: "smooth",
                block: "center"
              });
            }, 80);
          }
          return;
        }
        const tieneFallas = inspeccionDiariaTieneFallas(draft);
        if (tieneFallas && !draft.inspeccionDiariaObservaciones.trim()) {
          return renderBitacoraSalida("Describe las fallas encontradas para continuar.");
        }
        const payload = new FormData();
        payload.append("unidad", draft.unidad);
        payload.append("observaciones", draft.inspeccionDiariaObservaciones);
        payload.append("latitud", draft.latitud_salida);
        payload.append("longitud", draft.longitud_salida);
        Object.entries(draft.inspeccionDiariaChecks).forEach(([field, value]) => payload.append(field, value ? "true" : "false"));
        const response = await apiFetch("/inspeccion-diaria/", { method: "POST", body: payload });
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          if (error.error === "ya_existe") {
            draft.inspeccionDiariaCheck = { ya_inspeccionada: true, repartidor_nombre: "otro usuario", hora: "hoy" };
            draft.inspeccionDiariaCompletada = true;
            return renderBitacoraSalida("✅ La unidad ya tenía inspección registrada hoy.");
          }
          return renderBitacoraSalida(apiErrorMessage(error, "No se pudo guardar la inspección diaria."));
        }
        const data = await response.json();
        draft.inspeccionDiariaCompletada = true;
        draft.inspeccionDiariaAviso = data.tiene_fallas && data.reporte_generado_id
          ? `⚠️ Se generó un reporte automático por las fallas encontradas. Folio: ${data.reporte_generado_id}`
          : "✅ Inspección diaria registrada. Puedes iniciar turno.";
        renderBitacoraSalida();
      }

      function abrirRegistroCombustible() {
        const draft = ensureBitacoraSalidaDraft();
        draft.registrando_combustible = true;
        if (draft.carga_geoStatus !== "ready") capturarUbicacionCargaCombustible();
        renderBitacoraSalida();
      }

      function cerrarRegistroCombustible() {
        const draft = ensureBitacoraSalidaDraft();
        draft.registrando_combustible = false;
        renderBitacoraSalida();
      }

      function capturarUbicacionCargaCombustible() {
        const draft = ensureBitacoraSalidaDraft();
        if (!navigator.geolocation) {
          draft.carga_geoStatus = "unavailable";
          draft.carga_geoLabel = "GPS no disponible";
          renderBitacoraSalida();
          return;
        }
        draft.carga_geoStatus = "loading";
        draft.carga_geoLabel = "Obteniendo ubicación...";
        renderBitacoraSalida();
        navigator.geolocation.getCurrentPosition((position) => {
          draft.carga_latitud = position.coords.latitude.toFixed(6);
          draft.carga_longitud = position.coords.longitude.toFixed(6);
          draft.carga_geoStatus = "ready";
          draft.carga_geoLabel = "📍 Ubicación registrada";
          renderBitacoraSalida();
        }, (error) => {
          draft.carga_latitud = "";
          draft.carga_longitud = "";
          draft.carga_geoStatus = error.code === 1 ? "denied" : "unavailable";
          draft.carga_geoLabel = "Se requiere ubicación para guardar la carga.";
          renderBitacoraSalida();
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
      }

      function puedeGuardarCargaCombustible() {
        const draft = ensureBitacoraSalidaDraft();
        return Boolean(
          draft.carga_litros &&
          draft.carga_importe_total &&
          draft.carga_foto_ticket &&
          draft.carga_geoStatus === "ready" &&
          !draft.carga_guardando
        );
      }

      function importeCombustibleParecePrecioPorLitro(litros, importeTotal) {
        const litrosNum = Number(litros || 0);
        const importeNum = Number(importeTotal || 0);
        return litrosNum >= 5 && importeNum > 0 && importeNum / litrosNum < 10;
      }

      function resetCargaCombustibleForm() {
        const draft = ensureBitacoraSalidaDraft();
        draft.registrando_combustible = false;
        draft.carga_litros = "";
        draft.carga_importe_total = "";
        draft.carga_nivel_gas_despues = "";
        draft.carga_foto_ticket = null;
        draft.cargaFotoTicketPreview = "";
        draft.cargaFotoTicketError = "";
        draft.carga_latitud = "";
        draft.carga_longitud = "";
        draft.carga_geoStatus = "idle";
        draft.carga_geoLabel = "";
        draft.carga_guardando = false;
      }

      function renderCargasCombustibleRuta(actual) {
        const cargas = actual?.cargas_combustible || [];
        if (!cargas.length) return "";
        return `
          <section class="route-fuel-card">
            <h2>Gasolina registrada en ruta</h2>
            ${cargas.map((carga) => `
              <div class="route-fuel-item">
                <div>
                  ${escapeHtml(carga.litros || "0")} L · Total $${escapeHtml(carga.importe_total || "0")}
                  <br><span>${formatDate(carga.fecha_registro)}</span>
                </div>
                ${carga.foto_ticket ? `<a href="${escapeHtml(carga.foto_ticket)}" target="_blank" rel="noopener">Ticket</a>` : `<span>Sin ticket</span>`}
              </div>
            `).join("")}
          </section>
        `;
      }

      function gasLevelRank(value) {
        const rank = { vacio: 0, "1/4": 1, "1/2": 2, "3/4": 3, lleno: 4 };
        return Object.prototype.hasOwnProperty.call(rank, value) ? rank[value] : null;
      }

      function tieneCargasCombustibleRuta(actual) {
        return Boolean((actual?.cargas_combustible || []).length);
      }

      function requiereCargaCombustibleAntesDeCerrar(actual, draft) {
        if (!actual || !draft?.nivel_gas_llegada || tieneCargasCombustibleRuta(actual)) return false;
        const salida = gasLevelRank(actual.nivel_gas_salida);
        const llegada = gasLevelRank(draft.nivel_gas_llegada);
        return salida !== null && llegada !== null && llegada > salida;
      }

      function renderCombustibleRutaSheet(draft) {
        return `
          <div class="fuel-sheet-overlay" role="dialog" aria-modal="true" aria-labelledby="fuel-route-title">
            <section class="fuel-sheet">
              <div class="fuel-sheet-head">
                <div>
                  <div class="fuel-label">Carga en ruta</div>
                  <h2 id="fuel-route-title">Registrar gasolina</h2>
                </div>
                <button class="fuel-close" type="button" onclick="cerrarRegistroCombustible()" aria-label="Cerrar">×</button>
              </div>
              <div class="field">
                <label for="carga_litros">Litros cargados</label>
                <input id="carga_litros" type="number" min="0" step="0.01" required value="${escapeHtml(draft.carga_litros)}" oninput="state.bitacoraSalidaDraft.carga_litros = this.value; document.getElementById('guardar_carga_combustible_btn')?.toggleAttribute('disabled', !puedeGuardarCargaCombustible());">
              </div>
              <div class="field">
                <label for="carga_importe_total">Importe total del ticket</label>
                <input id="carga_importe_total" type="number" min="0" step="0.01" required placeholder="Ej. 800.00, no 27.90 por litro" value="${escapeHtml(draft.carga_importe_total)}" oninput="state.bitacoraSalidaDraft.carga_importe_total = this.value; document.getElementById('guardar_carga_combustible_btn')?.toggleAttribute('disabled', !puedeGuardarCargaCombustible());">
              </div>
              <div class="field">
                <label>Nivel de gas después de cargar</label>
                ${gasSelector(draft.carga_nivel_gas_despues || "", "selectGasCargaDespues")}
              </div>
              <div class="field">
                <label for="foto_carga_combustible">Foto del ticket</label>
                ${fotoInput("foto_carga_combustible", Boolean(draft.carga_foto_ticket), "setFotoCargaCombustible(this)")}
                ${draft.cargaFotoTicketPreview ? `
                  <img class="thumb" src="${draft.cargaFotoTicketPreview}" alt="Vista previa ticket combustible">
                  <div class="photo-actions">
                    <label class="retake" for="foto_carga_combustible">↻ Volver a tomar</label>
                    <button class="keep" type="button" onclick="renderBitacoraSalida()">Usar esta foto</button>
                  </div>
                ` : ""}
                ${draft.cargaFotoTicketError ? `<p class="error">${escapeHtml(draft.cargaFotoTicketError)}</p>` : ""}
              </div>
              <p class="${draft.carga_geoStatus === "ready" ? "gps-registered" : "error"}">${escapeHtml(draft.carga_geoLabel || "📍 Ubicación requerida")}</p>
              ${draft.carga_geoStatus !== "ready" ? `<button class="secondary-btn" type="button" onclick="capturarUbicacionCargaCombustible()">Activar ubicación</button>` : ""}
              <div class="fuel-save-row">
                <button id="guardar_carga_combustible_btn" class="primary-btn" type="button" onclick="guardarCargaCombustible()" ${puedeGuardarCargaCombustible() ? "" : "disabled"}>${draft.carga_guardando ? "Guardando..." : "Guardar carga"}</button>
              </div>
            </section>
          </div>
        `;
      }

      async function guardarCargaCombustible() {
        const draft = ensureBitacoraSalidaDraft();
        if (!puedeGuardarCargaCombustible()) {
          return renderBitacoraSalida("Captura litros, importe total, ticket y ubicación para guardar la carga.");
        }
        if (importeCombustibleParecePrecioPorLitro(draft.carga_litros, draft.carga_importe_total)) {
          return renderBitacoraSalida("El importe parece precio por litro. Captura el importe total del ticket.");
        }
        draft.carga_guardando = true;
        renderBitacoraSalida();
        const payload = new FormData();
        payload.append("litros", draft.carga_litros);
        payload.append("importe_total", draft.carga_importe_total);
        payload.append("nivel_gas_despues", draft.carga_nivel_gas_despues || "");
        payload.append("foto_ticket", draft.carga_foto_ticket);
        payload.append("latitud", draft.carga_latitud);
        payload.append("longitud", draft.carga_longitud);
        const response = await apiFetch("/combustible/", { method: "POST", body: payload });
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          draft.carga_guardando = false;
          return renderBitacoraSalida(apiErrorMessage(error, "No se pudo guardar la carga de combustible."));
        }
        const carga = await response.json();
        if (state.bitacoraSalida) {
          state.bitacoraSalida.cargas_combustible = state.bitacoraSalida.cargas_combustible || [];
          state.bitacoraSalida.cargas_combustible.unshift(carga);
        }
        resetCargaCombustibleForm();
        await renderBitacoraSalida("✅ Carga de combustible guardada.");
      }

      function puedeCerrarTurno() {
        const draft = ensureBitacoraSalidaDraft();
        const actual = state.bitacoraSalida;
        const baseLista = draft.nivel_gas_llegada && draft.foto_tablero_llegada;
        if (!baseLista) return false;
        if (requiereCargaCombustibleAntesDeCerrar(actual, draft)) return false;
        return true;
      }

      async function renderBitacoraSalida(message = "") {
        let actual = null;
        try {
          actual = await loadTurnoActivo();
        } catch (error) {
          actual = null;
        }
        await loadUnidades();
        const draft = ensureBitacoraSalidaDraft();
        const tieneSalida = Boolean(actual?.id);
        let body = "";
        if (!tieneSalida) {
          const ubicacionLista = isGeoReady(draft);
          const licencia = licenciaMeta();
          const licenciaBloquea = licencia.bloquea;
          const yaInspeccionada = Boolean(draft.inspeccionDiariaCheck?.ya_inspeccionada);
          const puedeCapturarSalida = !licenciaBloquea && Boolean(draft.unidad) && (yaInspeccionada || draft.inspeccionDiariaCompletada);
          const mostrarChecklist = !licenciaBloquea && Boolean(draft.unidad) && !draft.inspeccionDiariaLoading && !yaInspeccionada && !draft.inspeccionDiariaCompletada;
          const tieneFallasDiarias = inspeccionDiariaTieneFallas(draft);
          const pendientesDiarios = inspeccionDiariaPendientes(draft);
          const totalPuntosDiarios = Object.keys(draft.inspeccionDiariaChecks).length;
          const marcadosDiarios = totalPuntosDiarios - pendientesDiarios;
          body = `
            <div class="${ubicacionLista || licenciaBloquea ? "" : "gps-locked"}">
              ${licenciaBanner()}
              ${licenciaBloquea ? `
                <button class="secondary-btn" type="button" onclick="showScreen('dashboard')">Volver al panel principal</button>
              ` : `
                <div class="field">
                  <label for="unidad_salida">Unidad</label>
                  <select id="unidad_salida" name="unidad" required onchange="seleccionarUnidadSalida(this.value)">
                    <option value="">Selecciona unidad</option>
                    ${state.unidades.map((unidad) => `<option value="${unidad.id}" ${String(draft.unidad) === String(unidad.id) ? "selected" : ""}>${escapeHtml(unidad.codigo)} · ${escapeHtml(unidad.descripcion || "")}</option>`).join("")}
                  </select>
                </div>
                ${draft.inspeccionDiariaLoading ? `<p class="unit-line">Revisando inspección diaria...</p>` : ""}
                ${yaInspeccionada ? `
                  <div class="daily-banner">
                    <span style="font-size:22px;">✅</span> Unidad ya inspeccionada hoy por <strong>${escapeHtml(draft.inspeccionDiariaCheck.repartidor_nombre || "")}</strong> a las <time>${escapeHtml(draft.inspeccionDiariaCheck.hora || "")}</time>. Puedes proceder directamente al inicio de turno.
                  </div>
                ` : ""}
                ${draft.inspeccionDiariaAviso ? `<div class="daily-banner warning">${escapeHtml(draft.inspeccionDiariaAviso)}</div>` : ""}
                ${mostrarChecklist ? `
                  <section class="card report-card daily-checklist-card">
                    <h2 style="color:var(--gold); margin-top:0;">Checklist pre-turno</h2>
                    <p class="daily-counter ${pendientesDiarios ? "" : "complete"}">${marcadosDiarios} de ${totalPuntosDiarios} puntos marcados</p>
                    <p class="muted">Marca cada punto como OK o FALLA antes de capturar kilometraje y tablero.</p>
                    <button class="daily-mark-all" type="button" onclick="marcarInspeccionDiariaTodosOk()">✅ Marcar todos los puntos como OK</button>
                  </section>
                  ${inspeccionDiariaSecciones.map(renderInspeccionDiariaSection).join("")}
                  ${tieneFallasDiarias ? `
                    <div class="field daily-fail-field">
                      <label for="inspeccion_diaria_observaciones">⚠️ Describe las fallas encontradas</label>
                      <textarea id="inspeccion_diaria_observaciones" required placeholder="Anota qué falla viste y si la unidad puede salir o debe detenerse." oninput="state.bitacoraSalidaDraft.inspeccionDiariaObservaciones = this.value">${escapeHtml(draft.inspeccionDiariaObservaciones)}</textarea>
                    </div>
                  ` : ""}
                  <button class="primary-btn daily-continue" type="button" onclick="continuarInspeccionDiaria()">Continuar</button>
                ` : ""}
                ${puedeCapturarSalida ? `
                  <div class="form-salida">
                    <div class="field">
                      <label for="km_salida">KM salida</label>
                      <input id="km_salida" name="km_salida" type="number" min="0" required value="${escapeHtml(draft.km_salida)}" oninput="state.bitacoraSalidaDraft.km_salida = this.value">
                    </div>
                    <div class="field">
                      <label>Nivel gas salida</label>
                      ${gasSelector(draft.nivel_gas_salida, "selectGasSalida")}
                    </div>
                    <div class="field">
                      <label for="foto_salida">Foto tablero</label>
                      ${fotoInput("foto_salida", Boolean(draft.foto_tablero_salida), "setFotoBitacora(this, 'foto_tablero_salida', 'fotoSalidaPreview')")}
                      ${draft.fotoSalidaPreview ? `<img class="thumb" src="${draft.fotoSalidaPreview}" alt="Vista previa tablero salida">` : ""}
                      ${draft.fotoSalidaError ? `<p class="error">${escapeHtml(draft.fotoSalidaError)}</p>` : ""}
                    </div>
                    <p class="gps-registered">📍 Ubicación registrada</p>
                    <button class="primary-btn" type="button" onclick="guardarSalida()" ${ubicacionLista && draft.km_salida && draft.nivel_gas_salida && draft.foto_tablero_salida ? "" : "disabled"}>Iniciar turno</button>
                  </div>
                ` : ""}
              `}
            </div>
            ${licenciaBloquea ? "" : geoOverlay(draft, "capturarUbicacionSalida")}
          `;
        } else {
          const cargasRuta = actual.cargas_combustible || [];
          const requiereCargaAntesDeCerrar = requiereCargaCombustibleAntesDeCerrar(actual, draft);
          body = `
            <p class="unit-line">Turno activo · ${escapeHtml(actual.unidad_codigo)} · Folio: ${escapeHtml(actual.folio)}</p>
            <section class="card report-card">
              <div class="kv"><b>Salida</b><span>${formatDate(actual.hora_salida)}</span></div>
              <div class="kv"><b>KM salida</b><span>${escapeHtml(actual.km_salida)}</span></div>
              <div class="kv"><b>Gas salida</b><span>${escapeHtml(actual.nivel_gas_salida)}</span></div>
              ${actual.foto_tablero_salida ? `<img class="thumb" src="${escapeHtml(actual.foto_tablero_salida)}" alt="Tablero salida">` : ""}
            </section>
            ${renderCargasCombustibleRuta(actual)}
            <button class="fuel-route-btn" type="button" onclick="abrirRegistroCombustible()">⛽ ${cargasRuta.length ? "Registrar otra carga de gasolina" : "Registrar gasolina"}</button>
            ${draft.registrando_combustible ? renderCombustibleRutaSheet(draft) : ""}
            <form onsubmit="guardarLlegada(event)" novalidate>
              <div class="field">
                <label for="km_llegada">KM llegada</label>
                <input id="km_llegada" name="km_llegada" type="number" min="${escapeHtml(actual.km_salida)}" required value="${escapeHtml(draft.km_llegada)}" oninput="state.bitacoraSalidaDraft.km_llegada = this.value">
              </div>
              <div class="field">
                <label>Nivel gas llegada</label>
                ${gasSelector(draft.nivel_gas_llegada || "", "selectGasLlegada")}
              </div>
              ${cargasRuta.length ? `
                <div class="daily-banner">
                  <span style="font-size:22px;">✅</span> Ya hay ${cargasRuta.length} carga${cargasRuta.length === 1 ? "" : "s"} de gasolina registrada${cargasRuta.length === 1 ? "" : "s"} en este turno. Si cargaste otra vez, usa el botón “Registrar otra carga de gasolina”.
                </div>
              ` : `
                <div class="daily-banner warning">
                  Si cargaste gasolina durante el recorrido, regístrala antes de cerrar el turno con el botón “Registrar gasolina”.
                </div>
              `}
              ${requiereCargaAntesDeCerrar ? `
                <div class="daily-banner warning">
                  El nivel de gasolina de llegada es mayor al de salida. Registra la carga de gasolina antes de cerrar el turno.
                </div>
              ` : ""}
              <div class="field">
                <label for="foto_llegada">Foto tablero llegada</label>
                ${fotoInput("foto_llegada", Boolean(draft.foto_tablero_llegada), "setFotoBitacora(this, 'foto_tablero_llegada', 'fotoLlegadaPreview')")}
                ${draft.fotoLlegadaPreview ? `<img class="thumb" src="${draft.fotoLlegadaPreview}" alt="Vista previa tablero llegada">` : ""}
                ${draft.fotoLlegadaError ? `<p class="error">${escapeHtml(draft.fotoLlegadaError)}</p>` : ""}
              </div>
              <button class="primary-btn" type="submit" ${puedeCerrarTurno() ? "" : "disabled"}>Cerrar turno</button>
            </form>
          `;
        }
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Bitácora del día</h1>
          ${message ? `<p class="${message.startsWith("✅") ? "success" : "error"}">${escapeHtml(message)}</p>` : ""}
          ${body}
        `));
      }

      function selectGasSalida(value) {
        ensureBitacoraSalidaDraft().nivel_gas_salida = value;
        renderBitacoraSalida();
      }

      function selectGasLlegada(value) {
        ensureBitacoraSalidaDraft().nivel_gas_llegada = value;
        renderBitacoraSalida();
      }

      function selectGasCargaDespues(value) {
        ensureBitacoraSalidaDraft().carga_nivel_gas_despues = value;
        renderBitacoraSalida();
      }

      async function guardarSalida(event) {
        if (event) event.preventDefault();
        const draft = ensureBitacoraSalidaDraft();
        if (!draft.unidad || !draft.nivel_gas_salida || !draft.foto_tablero_salida || !draft.latitud_salida) {
          return renderBitacoraSalida("Completa unidad, gas, foto y ubicación.");
        }
        const payload = new FormData();
        payload.append("unidad", draft.unidad);
        payload.append("km_salida", draft.km_salida);
        payload.append("nivel_gas_salida", draft.nivel_gas_salida);
        payload.append("foto_tablero_salida", draft.foto_tablero_salida);
        payload.append("latitud_salida", draft.latitud_salida);
        payload.append("longitud_salida", draft.longitud_salida);
        const response = await apiFetch("/bitacora-salida/", {
          method: "POST",
          body: payload
        });
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          if (error.error === "turno_abierto") {
            state.bitacoraSalida = error.bitacora || state.bitacoraSalida;
            return renderBitacoraSalida(`⚠️ Tienes un turno abierto en ${error.bitacora?.unidad_codigo || "otra unidad"}.`);
          }
          if (error.error === "unidad_ruta_distinta") {
            return renderBitacoraSalida(error.mensaje || "Tienes una ruta activa en otra unidad. Inicia turno con la unidad asignada.");
          }
          return renderBitacoraSalida(apiErrorMessage(error, "No se pudo iniciar el turno."));
        }
        const creado = await response.json();
        state.bitacoraSalidaDraft = null;
        state.bitacoraSalida = creado;
        const rutaData = await loadRutaActiva().catch(() => null);
        if (rutaData?.ruta?.id && String(rutaData.ruta.unidad_operativa) === String(creado.unidad)) {
          await showScreen("ruta_activa");
          return;
        }
        await renderBitacoraSalida(`✅ Turno iniciado · Folio: ${creado.folio}`);
      }

      async function guardarLlegada(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const draft = ensureBitacoraSalidaDraft();
        const kmLlegada = Number(form.get("km_llegada"));
        const kmSalida = Number(state.bitacoraSalida?.km_salida || 0);
        if (!draft.nivel_gas_llegada) return renderBitacoraSalida("Selecciona el nivel de gas de llegada.");
        if (!kmLlegada) return renderBitacoraSalida("Captura el kilometraje de llegada.");
        if (kmSalida && kmLlegada < kmSalida) {
          return renderBitacoraSalida(`El KM de llegada no puede ser menor al KM de salida (${kmSalida}).`);
        }
        if (!draft.foto_tablero_llegada) return renderBitacoraSalida("La foto del tablero de llegada es obligatoria.");
        if (requiereCargaCombustibleAntesDeCerrar(state.bitacoraSalida, draft)) {
          return renderBitacoraSalida("El nivel de gasolina subió. Registra la carga de gasolina antes de cerrar el turno.");
        }
        const payload = new FormData();
        payload.append("km_llegada", form.get("km_llegada"));
        payload.append("nivel_gas_llegada", draft.nivel_gas_llegada);
        payload.append("foto_tablero_llegada", draft.foto_tablero_llegada);
        const response = await apiFetch(`/bitacora-salida/${state.bitacoraSalida.id}/`, {
          method: "PATCH",
          body: payload
        });
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          return renderBitacoraSalida(apiErrorMessage(error, "No se pudo registrar la llegada."));
        }
        const cerrada = await response.json();
        state.bitacoraSalidaDraft = null;
        state.bitacoraSalida = null;
        await renderBitacoraSalida(`✅ Turno cerrado · ${formatDate(cerrada.hora_llegada)}`);
      }

      function ensureInspeccionDraft() {
        if (!state.inspeccionDraft) {
          const checks = {};
          inspeccionSecciones.forEach((section) => section.items.forEach(([field]) => { checks[field] = false; }));
          state.inspeccionDraft = {
            unidad: "",
            km_entrada: "",
            nivel_gas_entrada: "",
            tiene_golpes: false,
            descripcion_golpes: "",
            foto_golpes: null,
            fotoGolpesPreview: "",
            fotoGolpesError: "",
            observaciones: "",
            latitud: "",
            longitud: "",
            geoStatus: "idle",
            expanded: { exterior: true },
            checks,
            inspeccionDiariaCheck: null,
            inspeccionDiariaLoading: false,
            verFormularioCompleto: false
          };
        }
        return state.inspeccionDraft;
      }

      function capturarUbicacionInspeccion() {
        const draft = ensureInspeccionDraft();
        requestLocation(draft, renderInspeccionVehiculo, "latitud", "longitud");
      }

      async function seleccionarUnidadInspeccion(value) {
        const draft = ensureInspeccionDraft();
        draft.unidad = value;
        draft.inspeccionDiariaCheck = null;
        draft.verFormularioCompleto = false;
        if (!value) return renderInspeccionVehiculo();
        draft.inspeccionDiariaLoading = true;
        renderInspeccionVehiculo();
        const response = await apiFetch(`/inspeccion-diaria/check/?unidad_id=${encodeURIComponent(value)}`);
        draft.inspeccionDiariaLoading = false;
        draft.inspeccionDiariaCheck = response.ok ? await response.json() : null;
        renderInspeccionVehiculo();
      }

      function renderChecklistSection(section) {
        const draft = ensureInspeccionDraft();
        const open = Boolean(draft.expanded[section.key]);
        return `
          <button class="section-toggle" type="button" onclick="toggleInspeccionSection('${section.key}')">
            <span>${section.title}</span><span>${open ? "−" : "+"}</span>
          </button>
          ${open ? `
            <section class="card report-card">
              <button class="secondary-btn" type="button" onclick="marcarSeccionOk('${section.key}')">Marcar todos OK</button>
              ${section.items.map(([field, label]) => `
                <div class="check-row">
                  <span>${escapeHtml(label)}</span>
                  <button class="chip ${draft.checks[field] ? "ok" : "fail"}" type="button" onclick="toggleInspeccionItem('${field}')">
                    ${draft.checks[field] ? "OK" : "Falta"}
                  </button>
                </div>
              `).join("")}
            </section>
          ` : ""}
        `;
      }

      async function renderInspeccionVehiculo(message = "") {
        const draft = ensureInspeccionDraft();
        if (!state.unidades.length) await loadUnidades();
        const ubicacionLista = isGeoReady(draft);
        const fotoGolpesLista = !draft.tiene_golpes || Boolean(draft.foto_golpes);
        const avisoDiario = draft.inspeccionDiariaCheck?.ya_inspeccionada && !draft.verFormularioCompleto;
        const isError = message && !message.startsWith("✅");
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Inspección de unidad</h1>
          <p class="unit-line">Selecciona la unidad que vas a inspeccionar.</p>
          ${message ? `<p class="${isError ? "error" : "success"}">${escapeHtml(message)}</p>` : ""}
          <div class="${ubicacionLista || avisoDiario ? "" : "gps-locked"}">
            <form onsubmit="enviarInspeccion(event)" novalidate>
              <section class="card report-card">
                <div class="field">
                  <label for="unidad_inspeccion">Unidad que vas a usar</label>
                  <select id="unidad_inspeccion" required onchange="seleccionarUnidadInspeccion(this.value)">
                    <option value="">Selecciona unidad</option>
                    ${state.unidades.map((unidad) => `<option value="${unidad.id}" ${String(draft.unidad) === String(unidad.id) ? "selected" : ""}>${escapeHtml(unidad.codigo)} · ${escapeHtml(unidad.descripcion || "")}</option>`).join("")}
                  </select>
                </div>
                ${draft.inspeccionDiariaLoading ? `<p class="unit-line">Revisando inspección diaria...</p>` : ""}
                ${avisoDiario ? `
                  <div class="daily-banner warning">
                    ℹ️ Esta unidad ya fue revisada por ${escapeHtml(draft.inspeccionDiariaCheck.repartidor_nombre || "")} el ${escapeHtml(draft.inspeccionDiariaCheck.fecha || "hoy")} a las ${escapeHtml(draft.inspeccionDiariaCheck.hora || "")}. Si detectaste algo nuevo puedes registrar un reporte independiente.
                  </div>
                  <div class="confirm-actions">
                    <button class="primary-btn" type="button" onclick="startNuevoReporte()">Registrar reporte</button>
                    <button class="secondary-btn" type="button" onclick="state.inspeccionDraft.verFormularioCompleto = true; renderInspeccionVehiculo()">Ver de todas formas</button>
                  </div>
                ` : ""}
                ${!avisoDiario ? `
                <div class="field">
                  <label for="km_entrada">KM entrada</label>
                  <input id="km_entrada" type="number" min="0" required value="${escapeHtml(draft.km_entrada)}" oninput="state.inspeccionDraft.km_entrada = this.value">
                </div>
                <div class="field">
                  <label>Nivel gas entrada</label>
                  ${gasSelector(draft.nivel_gas_entrada, "selectGasInspeccion")}
                </div>
                ` : ""}
              </section>
              ${!avisoDiario ? `
              ${inspeccionSecciones.map(renderChecklistSection).join("")}
              <section class="card report-card">
                <div class="check-row">
                  <span>¿Presenta golpes o hendiduras?</span>
                  <button class="chip ${draft.tiene_golpes ? "fail" : "ok"}" type="button" onclick="toggleGolpes()">
                    ${draft.tiene_golpes ? "Sí" : "No"}
                  </button>
                </div>
                ${draft.tiene_golpes ? `
                  <div class="field">
                    <label for="descripcion_golpes">Descripción de golpes</label>
                    <textarea id="descripcion_golpes" oninput="state.inspeccionDraft.descripcion_golpes = this.value">${escapeHtml(draft.descripcion_golpes)}</textarea>
                  </div>
                  <div class="field">
                    <label for="foto_golpes">Foto</label>
                    ${fotoInput("foto_golpes", Boolean(draft.foto_golpes), "setFotoGolpes(this)")}
                    ${draft.fotoGolpesPreview ? `<img class="thumb" src="${draft.fotoGolpesPreview}" alt="Vista previa golpes">` : ""}
                    ${draft.fotoGolpesError ? `<p class="error">${escapeHtml(draft.fotoGolpesError)}</p>` : ""}
                  </div>
                ` : ""}
              </section>
              <div class="field">
                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" oninput="state.inspeccionDraft.observaciones = this.value">${escapeHtml(draft.observaciones)}</textarea>
              </div>
              <p class="gps-registered">📍 Ubicación registrada</p>
              <button class="primary-btn" type="submit" ${ubicacionLista && fotoGolpesLista ? "" : "disabled"}>Enviar inspección</button>
              ` : ""}
            </form>
          </div>
          ${avisoDiario ? "" : geoOverlay(draft, "capturarUbicacionInspeccion")}
        `));
      }

      function setFotoGolpes(input) {
        const draft = ensureInspeccionDraft();
        setLivePhoto(input, draft, "foto_golpes", "fotoGolpesPreview", renderInspeccionVehiculo, "fotoGolpesError");
      }

      function selectGasInspeccion(value) {
        ensureInspeccionDraft().nivel_gas_entrada = value;
        renderInspeccionVehiculo();
      }

      function toggleInspeccionSection(key) {
        const draft = ensureInspeccionDraft();
        draft.expanded[key] = !draft.expanded[key];
        renderInspeccionVehiculo();
      }

      function toggleInspeccionItem(field) {
        const draft = ensureInspeccionDraft();
        draft.checks[field] = !draft.checks[field];
        renderInspeccionVehiculo();
      }

      function marcarSeccionOk(key) {
        const draft = ensureInspeccionDraft();
        const section = inspeccionSecciones.find((item) => item.key === key);
        section.items.forEach(([field]) => { draft.checks[field] = true; });
        renderInspeccionVehiculo();
      }

      function toggleGolpes() {
        const draft = ensureInspeccionDraft();
        draft.tiene_golpes = !draft.tiene_golpes;
        if (!draft.tiene_golpes) {
          draft.foto_golpes = null;
          draft.fotoGolpesPreview = "";
          draft.fotoGolpesError = "";
        }
        renderInspeccionVehiculo();
      }

      async function enviarInspeccion(event) {
        event.preventDefault();
        const draft = ensureInspeccionDraft();
        if (!draft.unidad || !draft.km_entrada || !draft.nivel_gas_entrada || !isGeoReady(draft)) {
          return renderInspeccionVehiculo("Completa unidad, KM, gas y ubicación.");
        }
        if (draft.tiene_golpes && !draft.foto_golpes) return renderInspeccionVehiculo("La foto de golpes debe tomarse en este momento.");
        const form = new FormData();
        form.append("unidad", draft.unidad);
        form.append("km_entrada", draft.km_entrada);
        form.append("nivel_gas_entrada", draft.nivel_gas_entrada);
        form.append("tiene_golpes", draft.tiene_golpes ? "true" : "false");
        form.append("descripcion_golpes", draft.descripcion_golpes);
        form.append("observaciones", draft.observaciones);
        form.append("latitud", draft.latitud);
        form.append("longitud", draft.longitud);
        if (draft.foto_golpes) form.append("foto_golpes", draft.foto_golpes);
        Object.entries(draft.checks).forEach(([field, value]) => form.append(field, value ? "true" : "false"));
        const faltantes = inspeccionSecciones.flatMap((section) => section.items.filter(([field]) => !draft.checks[field]).map(([, label]) => label));
        let response;
        try {
          response = await apiFetch("/inspeccion/", { method: "POST", body: form });
        } catch (error) {
          return renderInspeccionVehiculo("Tu sesión expiró. Vuelve a iniciar sesión y envía la inspección de nuevo.");
        }
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          return renderInspeccionVehiculo(apiErrorMessage(error, "No se pudo enviar la inspección."));
        }
        state.inspeccionDraft = null;
        render(shell(`
          <section class="confirm">
            <div class="confirm-mark">✅</div>
            <h1 class="screen-title">Inspección enviada</h1>
            ${faltantes.length ? `<p class="muted">Faltantes: ${escapeHtml(faltantes.join(", "))}</p>` : `<p class="success">Todos los puntos marcados OK.</p>`}
            <p class="unit-line">¿Hay otra revisión de unidad?</p>
            <div class="confirm-actions">
              <button class="primary-btn" onclick="showScreen('inspeccion_vehiculo')">Capturar otra inspección</button>
              <button class="secondary-btn" onclick="showScreen('dashboard')">Volver al panel principal</button>
            </div>
          </section>
        `));
      }

      async function boot() {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("{% static 'logistica/pwa/sw.js' %}?v=route-control-v17").catch(() => {});
        }
        window.addEventListener("online", () => {
          flushRutaTrackingQueue().then(() => {
            if (state.pantallaActual === "ruta_activa") renderRutaActiva();
          });
        });
        document.addEventListener("visibilitychange", () => {
          if (document.hidden) stopRutaAutoTracking();
          if (!document.hidden && state.pantallaActual === "ruta_activa") renderRutaActiva();
        });
        window.addEventListener("pagehide", () => stopRutaAutoTracking());

        try {
          if (await useDjangoSessionToken()) {
            await flushRutaTrackingQueue();
            await abrirPantallaInicial();
            return;
          }
        } catch (error) {
          logout(false);
        }

        if (state.token) {
          try {
            await flushRutaTrackingQueue();
            await abrirPantallaInicial();
            return;
          } catch (error) {
            logout(false);
          }
        }

        renderLogin();
      }

      boot();
    </script>
  </body>
</html>
