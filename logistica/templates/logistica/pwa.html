{% load static %}
<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#8B2252">
    <title>Pollyana's Logística</title>
    <link rel="manifest" href="{% static 'logistica/pwa/manifest.json' %}">
    <link rel="icon" href="{% static 'logistica/pwa/icon-192.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #0f0f14;
        --surface: #1a1a24;
        --border: #2a2a38;
        --wine: #8B2252;
        --gold: #C9A84C;
        --text: #e8e0d5;
        --text-muted: #888888;
        --danger: #e64f64;
        --warning: #e6b84f;
        --success: #51b56f;
        --info: #4f8ee6;
      }

      * { box-sizing: border-box; }

      html, body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Nunito", sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      }

      button, input, textarea, select {
        font: inherit;
      }

      button {
        min-height: 48px;
        border: 0;
        cursor: pointer;
      }

      #app {
        width: 100%;
        max-width: 430px;
        min-height: 100vh;
        padding: 18px 16px 74px;
        opacity: 1;
        transition: opacity 0.2s ease;
      }

      #app.is-changing { opacity: 0; }

      .brand-title {
        margin: 0;
        color: var(--text);
        font-family: "Playfair Display", serif;
        font-size: 38px;
        line-height: 1;
        letter-spacing: 0;
      }

      .brand-subtitle {
        margin: 8px 0 0;
        color: var(--gold);
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .login-wrap {
        display: flex;
        min-height: calc(100vh - 92px);
        flex-direction: column;
        justify-content: center;
      }

      .panel, .card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
      }

      .panel {
        margin-top: 30px;
        padding: 18px;
      }

      .field {
        display: grid;
        gap: 7px;
        margin-bottom: 14px;
      }

      label {
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 800;
      }

      input, textarea, select {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #111118;
        color: var(--text);
        outline: none;
        padding: 12px 13px;
      }

      textarea {
        min-height: 112px;
        resize: vertical;
      }

      input:focus, textarea:focus {
        border-color: var(--gold);
      }

      .primary-btn {
        width: 100%;
        border-radius: 10px;
        background: var(--wine);
        color: white;
        font-weight: 800;
        padding: 14px;
      }

      .secondary-btn {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: transparent;
        color: var(--text);
        font-weight: 800;
        padding: 12px 14px;
      }

      .error {
        margin: 10px 0 0;
        color: var(--danger);
        font-weight: 800;
      }

      .success {
        margin: 10px 0 0;
        color: var(--success);
        font-weight: 800;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .mini-brand {
        font-family: "Playfair Display", serif;
        font-size: 22px;
      }

      .hello {
        margin: 3px 0 0;
        color: var(--text-muted);
        font-size: 14px;
        font-weight: 700;
      }

      .logout {
        min-height: 40px;
        border-radius: 999px;
        background: #261521;
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
        padding: 8px 12px;
      }

      .unit-line {
        margin: 0 0 20px;
        color: var(--gold);
        font-weight: 800;
      }

      .dashboard-help {
        display: inline-flex;
        min-height: 34px;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: transparent;
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 800;
        margin: -8px 0 16px;
        padding: 7px 11px;
      }

      .dashboard-help:hover, .dashboard-help:focus {
        border-color: var(--gold);
        color: var(--gold);
      }

      .dash-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .dash-btn {
        position: relative;
        min-height: 86px;
        border: 2px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        font-size: 16px;
        font-weight: 800;
        padding: 14px 10px;
      }

      .dash-btn:hover, .dash-btn:focus {
        border-color: var(--wine);
      }

      .badge {
        display: inline-flex;
        min-width: 24px;
        height: 24px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: var(--danger);
        color: white;
        font-size: 12px;
        font-weight: 900;
      }

      .badge.turno {
        margin-top: 6px;
        min-width: 0;
        height: auto;
        background: #676771;
        padding: 4px 8px;
      }

      .badge.turno.abierto {
        background: var(--warning);
        color: #17120a;
      }

      .dash-btn .badge {
        position: absolute;
        top: 8px;
        right: 8px;
      }

      .footer {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        max-width: 430px;
        margin: 0 auto;
        border-top: 1px solid var(--border);
        background: rgba(15, 15, 20, 0.94);
        color: var(--text-muted);
        text-align: center;
        font-size: 12px;
        padding: 13px 16px calc(13px + env(safe-area-inset-bottom));
        pointer-events: none;
      }

      .screen-title {
        margin: 0 0 14px;
        font-family: "Playfair Display", serif;
        font-size: 28px;
        line-height: 1.08;
      }

      .progress {
        display: flex;
        gap: 9px;
        margin: 0 0 18px;
      }

      .dot {
        width: 34px;
        height: 7px;
        border-radius: 999px;
        background: var(--border);
      }

      .dot.active {
        background: var(--gold);
      }

      .card-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .option-card {
        min-height: 82px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        font-weight: 800;
        padding: 12px;
      }

      .option-card.selected {
        border-color: var(--wine);
        background: #2a1423;
      }

      .severity-row {
        display: grid;
        gap: 10px;
        margin-bottom: 14px;
      }

      .severity-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        text-align: left;
        font-weight: 800;
        padding: 13px;
      }

      .severity-card.selected {
        border-color: var(--gold);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 16px;
      }

      .report-card {
        margin-bottom: 10px;
        padding: 14px;
      }

      .report-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
      }

      .report-title {
        margin: 0;
        font-size: 16px;
        font-weight: 900;
      }

      .muted {
        color: var(--text-muted);
        font-size: 13px;
      }

      .status {
        border-radius: 999px;
        color: white;
        font-size: 12px;
        font-weight: 900;
        padding: 5px 9px;
        white-space: nowrap;
      }

      .status.abierto { background: var(--danger); }
      .status.en_proceso { background: var(--warning); color: #17120a; }
      .status.programado { background: var(--info); }
      .status.cerrado { background: #676771; }

      .detail {
        display: none;
        margin-top: 13px;
        border-top: 1px solid var(--border);
        padding-top: 13px;
      }

      .report-card.expanded .detail {
        display: block;
      }

      .kv {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 8px;
        margin: 7px 0;
        font-size: 14px;
      }

      .kv b { color: var(--gold); }

      .empty {
        border: 1px dashed var(--border);
        border-radius: 12px;
        color: var(--text-muted);
        padding: 22px;
        text-align: center;
      }

      .help-list {
        display: grid;
        gap: 12px;
      }

      .help-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        padding: 14px;
      }

      .help-card h2 {
        color: var(--gold);
        font-size: 18px;
        margin: 0 0 8px;
      }

      .help-card ul, .help-card ol {
        margin: 0;
        padding-left: 19px;
      }

      .help-card li {
        margin: 7px 0;
      }

      .confirm {
        margin-top: 28px;
        text-align: center;
      }

      .confirm-actions {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .confirm-actions .primary-btn,
      .confirm-actions .secondary-btn {
        width: 100%;
        min-height: 58px;
        justify-content: center;
        text-align: center;
      }

      .confirm-mark {
        font-size: 54px;
        margin-bottom: 8px;
      }

      .section-toggle {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid var(--border);
        border-left: 3px solid var(--gold);
        border-radius: 16px;
        background: #1e1e2e;
        color: var(--gold);
        text-align: left;
        font-weight: 900;
        margin: 12px 0 0;
        padding: 14px 16px;
        transition: border-color 0.15s ease, background 0.15s ease;
      }

      .check-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #1a1a24;
        color: var(--text);
        font-size: 13px;
        padding: 14px 16px;
        margin: 8px 0;
      }

      .check-row:last-child { border-bottom: 0; }

      .chip {
        min-width: 72px;
        min-height: 44px;
        border: 1px solid #2a2a38;
        border-radius: 10px;
        background: #22222e;
        color: #888;
        font-size: 12px;
        font-weight: 900;
        padding: 9px 11px;
        transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      }

      .chip.ok { background: #1a3a1a; border-color: #33aa55; color: #55cc77; }
      .chip.fail { background: #3a1a1a; border-color: #aa3333; color: #cc5555; }
      .chip.pending { background: #22222e; border-color: #2a2a38; color: #888; }
      .check-row.ok { border-color: rgba(51, 170, 85, 0.65); }
      .check-row.fail { border-color: rgba(170, 51, 51, 0.72); }
      .check-row.pending { border-color: var(--border); }
      .daily-banner {
        border: 1px solid #33aa55;
        border-radius: 14px;
        background: #1a3a1a;
        color: #55cc77;
        padding: 16px;
        margin: 12px 0;
        font-weight: 900;
      }
      .daily-banner strong { color: var(--text); }
      .daily-banner time { color: var(--gold); }
      .daily-banner.warning {
        border-color: rgba(201, 168, 76, 0.7);
        background: #1e1a10;
        color: var(--gold);
      }
      .daily-counter {
        display: inline-flex;
        justify-content: center;
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 50px;
        background: #1a1a24;
        color: var(--gold);
        font-weight: 900;
        margin: 8px 0 12px;
        padding: 10px 14px;
      }
      .daily-counter.complete { color: #55cc77; }
      .daily-checklist-card {
        border-radius: 16px;
        background: var(--surface);
      }
      .daily-section-card {
        border-radius: 16px;
        background: var(--surface);
        padding: 12px;
        margin: 0 0 12px;
      }
      .daily-mark-all {
        width: 100%;
        border: 1px solid #33aa55;
        border-radius: 10px;
        background: transparent;
        color: #55cc77;
        font-weight: 900;
        padding: 12px;
      }
      .daily-mark-all:active { background: #1a3a1a; }
      .daily-fail-field label {
        color: var(--gold);
        font-weight: 900;
      }
      .daily-fail-field textarea {
        border: 1px solid #C9A84C44;
        border-radius: 12px;
        background: #1e1a10;
        color: var(--text);
        padding: 14px;
      }
      .daily-fail-field textarea::placeholder { color: #888; }
      .daily-continue {
        width: 100%;
        margin-top: 24px;
        border-radius: 14px;
        background: var(--wine);
        box-shadow: 0 4px 20px #8B225240;
        color: white;
        font-family: "Nunito", sans-serif;
        font-size: 16px;
        font-weight: 700;
        padding: 16px;
      }
      .daily-continue:disabled {
        cursor: not-allowed;
        opacity: 0.4;
      }
      .daily-section-highlight {
        border-color: #C8506A !important;
        box-shadow: 0 0 0 2px rgba(200, 80, 106, 0.35);
      }

      .license-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #22222e;
        color: #aaa;
        font-size: 12px;
        font-weight: 900;
        margin-top: 6px;
        padding: 8px 11px;
      }
      .license-pill::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #aaa;
      }
      .license-pill.ok {
        border-color: #33aa55;
        background: #16351f;
        color: #55cc77;
      }
      .license-pill.ok::before {
        background: #55cc77;
        box-shadow: 0 0 12px #55cc77;
      }
      .license-pill.warning {
        border-color: #C9A84C;
        background: #3a3014;
        color: var(--gold);
      }
      .license-pill.warning::before {
        background: #C9A84C;
        box-shadow: 0 0 12px #C9A84C;
      }
      .license-pill.blocked {
        border-color: #C8506A;
        background: #3a1a1a;
        color: #ff6b7a;
      }
      .license-pill.blocked::before {
        background: #ff6b7a;
        box-shadow: 0 0 12px #ff6b7a;
      }
      .license-banner {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        margin: 12px 0 16px;
        padding: 14px;
        font-weight: 900;
      }
      .license-banner.ok { border-color: #33aa55; color: #55cc77; background: #16351f; }
      .license-banner.warning { border-color: #C9A84C; color: var(--gold); background: #3a3014; }
      .license-banner.blocked { border-color: #C8506A; color: #ff6b7a; background: #3a1a1a; }

      .thumb {
        width: 100%;
        max-height: 180px;
        object-fit: cover;
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-top: 8px;
      }

      .gps-locked {
        pointer-events: none;
        user-select: none;
      }

      .gps-overlay {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(15, 15, 20, 0.82);
        padding: 18px;
        opacity: 1;
        transition: opacity 0.2s ease;
      }

      .gps-card {
        width: min(100%, 390px);
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        padding: 22px;
        text-align: center;
      }

      .gps-icon {
        font-size: 42px;
        margin-bottom: 8px;
      }

      .gps-title {
        margin: 0 0 10px;
        font-family: "Playfair Display", serif;
        font-size: 26px;
        line-height: 1.1;
      }

      .gps-message {
        margin: 0 0 16px;
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.45;
        white-space: pre-line;
      }

      .gps-registered {
        margin: 8px 0 12px;
        color: var(--success);
        font-size: 13px;
        font-weight: 800;
      }

      .file-picker {
        display: grid;
        gap: 8px;
      }

      .file-input {
        width: 1px;
        height: 1px;
        opacity: 0;
        overflow: hidden;
        position: absolute;
        pointer-events: none;
      }

      .file-trigger {
        display: flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #111118;
        color: var(--text);
        font-weight: 900;
        padding: 12px 13px;
      }

      .file-trigger.loaded {
        border-color: var(--success);
        color: var(--success);
      }
      .weekly-summary,
      .duplicate-report-card {
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 14px;
        padding: 14px;
        margin: 12px 0;
      }
      .weekly-summary.verde {
        border-color: var(--success);
      }
      .weekly-summary.amarillo {
        border-color: var(--gold);
      }
      .weekly-summary.rojo {
        border-color: var(--danger);
      }
      .weekly-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin: 12px 0;
      }
      .weekly-metric {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        color: var(--text);
      }
      .weekly-metric strong {
        display: block;
        color: var(--gold);
        font-size: 20px;
      }
      .duplicate-report-card {
        border-color: #C9A84C66;
      }
      .duplicate-report-card h3 {
        margin: 0 0 6px;
        color: var(--gold);
        font-size: 16px;
      }
      .duplicate-report-card .meta {
        color: var(--text-muted);
        font-size: 12px;
        margin: 0 0 8px;
      }
      .fuel-modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(5, 5, 8, .76);
        backdrop-filter: blur(6px);
      }
      .fuel-modal {
        position: relative;
        width: min(100%, 398px);
        border: 1px solid rgba(201, 168, 76, .45);
        border-radius: 22px;
        background: var(--surface);
        box-shadow: 0 22px 70px rgba(0, 0, 0, .55);
        padding: 22px;
      }
      .fuel-modal.pending {
        border-color: rgba(230, 79, 100, .72);
      }
      .fuel-close {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #111119;
        color: var(--text);
        font-size: 22px;
        font-weight: 900;
      }
      .fuel-icon {
        width: 58px;
        height: 58px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        margin-bottom: 16px;
        background: rgba(201, 168, 76, .12);
        border: 1px solid rgba(201, 168, 76, .42);
        font-size: 30px;
      }
      .fuel-modal.pending .fuel-icon {
        background: rgba(230, 79, 100, .12);
        border-color: rgba(230, 79, 100, .5);
      }
      .fuel-label {
        color: var(--gold);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: .04em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .fuel-modal h2 {
        margin: 0 42px 10px 0;
        font-family: "Playfair Display", serif;
        font-size: 28px;
        line-height: 1.06;
        color: var(--text);
      }
      .fuel-modal p {
        margin: 0 0 14px;
        color: #bdb4aa;
        line-height: 1.42;
        font-weight: 700;
      }
      .fuel-notice {
        margin: 16px 0;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: #111119;
        color: var(--text);
        padding: 14px;
        font-weight: 800;
      }
      .fuel-notice strong {
        color: var(--gold);
      }
      .fuel-modal.pending .fuel-notice strong {
        color: var(--danger);
      }
      .fuel-list {
        margin: 10px 0 0;
        padding-left: 18px;
        color: var(--text);
        font-size: 13px;
        line-height: 1.5;
      }
      .route-fuel-card {
        border: 1px solid rgba(201, 168, 76, .35);
        border-radius: 14px;
        background: #16161f;
        margin: 14px 0;
        padding: 14px;
      }
      .route-fuel-card h2 {
        margin: 0 0 10px;
        color: var(--gold);
        font-size: 16px;
      }
      .route-fuel-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-top: 1px solid var(--border);
        padding: 10px 0 0;
        margin-top: 10px;
        color: var(--text);
        font-weight: 800;
      }
      .route-fuel-item span {
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 700;
      }
      .fuel-route-btn {

      const PHOTO_CAPTURE_SESSION_MS = 10 * 60 * 1000;
      const app = document.getElementById("app");
      const state = {

      const inspeccionSecciones = [

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function formatDate(value) {
        if (!value) return "-";
        return new Intl.DateTimeFormat("es-MX", { dateStyle: "medium", timeStyle: "short" }).format(new Date(value));
      }

      function todayIso() {
        return new Date().toISOString().slice(0, 10);
      }

      function localDateKey(date = new Date()) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function isGeoReady(draft) {
        return draft.geoStatus === "ready" && Boolean(draft.latitud || draft.latitud_salida);
      }

      function geoOverlay(draft, actionName) {
        if (isGeoReady(draft)) return "";
        const denied = draft.geoStatus === "denied";
        const loading = draft.geoStatus === "loading";
        const unavailable = draft.geoStatus === "unavailable";
        const message = denied
          ? "Bloqueaste el acceso a tu ubicación. Para continuar:\n1. Toca el ícono 🔒 en la barra de tu navegador\n2. Activa el permiso de Ubicación\n3. Recarga la página"
          : unavailable
            ? "No pudimos obtener tu ubicación. Verifica que el GPS de tu teléfono esté activado y vuelve a intentar."
            : "Esta acción requiere tu ubicación para continuar.\nPresiona \"Permitir\" cuando el navegador lo solicite.";
        const buttonLabel = denied || unavailable ? "Reintentar" : "Activar ubicación";
        return `
          <div class="gps-overlay" role="dialog" aria-modal="true" aria-labelledby="gps-title">
            <section class="gps-card">
              <div class="gps-icon">📍</div>
              <h2 class="gps-title" id="gps-title">Ubicación requerida</h2>
              <p class="gps-message">${escapeHtml(message)}</p>
              <button class="primary-btn" type="button" onclick="${actionName}()" ${loading ? "disabled" : ""}>
                ${loading ? "Obteniendo ubicación..." : buttonLabel}
              </button>
            </section>
          </div>
        `;
      }

      function requestLocation(draft, renderFn, latField, lngField) {
        if (!navigator.geolocation) {
          draft.geoStatus = "unavailable";
          draft.geoLabel = "GPS no disponible";
          renderFn();
          return;
        }
        draft.geoStatus = "loading";
        draft.geoLabel = "Obteniendo ubicación...";
        renderFn();
        navigator.geolocation.getCurrentPosition((position) => {
          draft[latField] = position.coords.latitude.toFixed(6);
          draft[lngField] = position.coords.longitude.toFixed(6);
          draft.geoStatus = "ready";
          draft.geoLabel = "📍 Ubicación registrada";
          renderFn();
        }, (error) => {
          draft[latField] = "";
          draft[lngField] = "";
          draft.geoStatus = error.code === 1 ? "denied" : "unavailable";
          draft.geoLabel = "Se requiere ubicación para continuar";
          renderFn();
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
      }

      function marcarInicioCapturaFoto(input) {
        input.dataset.captureStartedAt = String(Date.now());
      }

      function isRecentCameraPhoto(input, file) {
        const now = Date.now();
        const modified = Number(file.lastModified || 0);
        const captureStartedAt = Number(input.dataset.captureStartedAt || 0);
        const modifiedLooksValid = modified > 0 && modified <= now + 60000;
        const modifiedIsFresh = modifiedLooksValid && now - modified <= PHOTO_MAX_AGE_MS;
        const selectedDuringCameraSession = captureStartedAt > 0 && now - captureStartedAt <= PHOTO_CAPTURE_SESSION_MS;
        return modifiedIsFresh || selectedDuringCameraSession;
      }

      function setLivePhoto(input, draft, fileField, previewField, renderFn, errorField = "fotoError") {
        const file = input.files[0] || null;
        if (!file) {
          draft[fileField] = null;
          if (previewField) draft[previewField] = "";
          draft[errorField] = "";
          renderFn();
          return;
        }
        if (!isRecentCameraPhoto(input, file)) {
          draft[fileField] = null;
          if (previewField) draft[previewField] = "";
          draft[errorField] = "La foto debe tomarse en este momento. No se permiten imágenes de la galería.";
          input.value = "";
          renderFn();
          return;
        }
        draft[fileField] = file;
        if (previewField) draft[previewField] = URL.createObjectURL(file);
        draft[errorField] = "";
        renderFn();
      }

      function apiErrorMessage(error, fallback) {
        if (!error) return fallback;
        if (error.mensaje) return error.mensaje;
        if (error.detail) return error.detail;
        if (Array.isArray(error.non_field_errors) && error.non_field_errors.length) {
          return error.non_field_errors[0];
        }
        const detalles = error.detalles || error;
        if (Array.isArray(detalles.non_field_errors) && detalles.non_field_errors.length) {
          return detalles.non_field_errors[0];
        }
        const firstKey = Object.keys(detalles || {})[0];
        if (!firstKey) return fallback;
        const value = detalles[firstKey];
        if (Array.isArray(value)) return `${firstKey}: ${value[0]}`;
        if (typeof value === "string") return `${firstKey}: ${value}`;
        return fallback;
      }

      function fotoInput(id, loaded, onChange) {
        return `
          <div class="file-picker">
            <input id="${id}" class="file-input" type="file" accept="image/*" capture="environment" onclick="marcarInicioCapturaFoto(this)" onpointerdown="marcarInicioCapturaFoto(this)" onchange="${onChange}">
            <label class="file-trigger ${loaded ? "loaded" : ""}" for="${id}">${loaded ? "✅ Imagen cargada" : "Tomar foto"}</label>
          </div>
        `;
      }

      function normalizePerfil(raw) {
        const repartidor = raw?.repartidor || {};
        const unidad = raw?.unidad || repartidor?.unidad_asignada || {};
        const username = raw?.user?.username || repartidor?.username || "";
        const nombreCompleto = raw?.nombre || raw?.user?.nombre || repartidor?.nombre || "";
        const nombreLimpio = String(nombreCompleto || "").trim();
        const primerNombre = nombreLimpio && nombreLimpio !== username
          ? nombreLimpio.split(/\s+/)[0]
          : (username || "repartidor");
        return {
          nombre: nombreLimpio || username || "repartidor",
          primerNombre,
          repartidor,
          unidad,
          ultimosServicios: raw?.ultimos_servicios || []
        };
      }

      function licenciaMeta() {
        const repartidor = state.perfil?.repartidor || {};
        const estado = repartidor.licencia_estado || "sin_datos";
        const dias = repartidor.licencia_dias_para_vencer;
        const expiracion = repartidor.licencia_expiracion || "";
        if (estado === "vigente") {
          return { estado, tone: "ok", label: "Licencia vigente", mensaje: expiracion ? `Licencia vigente hasta ${expiracion}.` : "Licencia vigente.", bloquea: false };
        }
        if (estado === "por_vencer") {
          const label = Number.isFinite(Number(dias)) ? `Vence en ${dias} días` : "Licencia por vencer";
          return { estado, tone: "warning", label, mensaje: `Tu licencia vence en ${dias} día${Number(dias) === 1 ? "" : "s"}. Entrega la renovación a administración.`, bloquea: false };
        }
        if (estado === "vencida") {
          return { estado, tone: "blocked", label: "Licencia vencida", mensaje: "Tu licencia está vencida. Puedes usar la app para reportes, pero no puedes abrir turno.", bloquea: true };
        }
        return { estado: "sin_datos", tone: "blocked", label: "Licencia no registrada", mensaje: "Tu licencia no está registrada. Puedes usar la app para reportes, pero no puedes abrir turno.", bloquea: true };
      }

      function licenciaPill() {
        const licencia = licenciaMeta();
        return `<div class="license-pill ${licencia.tone}" title="${escapeHtml(licencia.mensaje)}">${escapeHtml(licencia.label)}</div>`;
      }

      function licenciaBanner() {
        const licencia = licenciaMeta();
        return `<div class="license-banner ${licencia.tone}">${escapeHtml(licencia.mensaje)}</div>`;
      }

      async function apiFetch(path, options = {}) {
        const headers = { ...(options.headers || {}) };
        if (state.token) headers.Authorization = `Bearer ${state.token}`;
        const response = await fetch(`${API}${path}`, { ...options, headers });
        if (response.status === 401) {
          if (state.refreshToken && !options._retry) {
            const refreshed = await fetch(`${API}/auth/token/refresh/`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ refresh: state.refreshToken })
            });
            if (refreshed.ok) {
              const data = await refreshed.json();
              state.token = data.access;
              localStorage.setItem("pd_logistica_access", data.access);
              return apiFetch(path, { ...options, _retry: true });
            }
          }
          logout(false);
          throw new Error("Sesión expirada");
        }
        return response;
      }

      function setTokens(data) {
        state.token = data.access;
        state.refreshToken = data.refresh;
        localStorage.setItem("pd_logistica_access", data.access);
        localStorage.setItem("pd_logistica_refresh", data.refresh);
      }

      function logout(render = true) {
        state.token = "";
        state.refreshToken = "";
        state.perfil = null;
        localStorage.removeItem("pd_logistica_access");
        localStorage.removeItem("pd_logistica_refresh");
        if (render) showScreen("login");
      }

      function shell(content) {
        const nombre = escapeHtml(state.perfil?.primerNombre || state.perfil?.nombre || "");
        return `
          <div class="topbar">
            <div>
              <div class="mini-brand">Pollyana's</div>
              <p class="hello">Hola, ${nombre}</p>
              ${licenciaPill()}
            </div>
            <button class="logout" onclick="logout()">Salir</button>
          </div>
          ${content}
          <div class="footer">Pollyana's Dolce © 2025</div>
        `;
      }

      function render(html) {
        app.classList.add("is-changing");
        window.setTimeout(() => {
          app.innerHTML = html;
          app.classList.remove("is-changing");
        }, 120);
      }

      async function showScreen(nombre) {
        state.pantallaActual = nombre;
        if (nombre === "login") return renderLogin();
        if (!state.perfil) await loadPerfil();
        if (nombre === "dashboard") return renderDashboard();
        if (nombre === "nuevo_reporte") return renderNuevoReporte();
        if (nombre === "mis_reportes") return renderMisReportes();
        if (nombre === "mi_unidad") return renderMiUnidad();
        if (nombre === "bitacora") return renderBitacora();
        if (nombre === "bitacora_salida") return renderBitacoraSalida();
        if (nombre === "inspeccion_vehiculo") return renderInspeccionVehiculo();
        if (nombre === "ayuda") return renderAyuda();
      }

      function renderLogin(error = "") {
        render(`
          <main class="login-wrap">
            <section>
              <h1 class="brand-title">Pollyana's</h1>
              <p class="brand-subtitle">Logística</p>
            </section>
            <form class="panel" onsubmit="login(event)">
              <div class="field">
                <label for="username">Usuario</label>
                <input id="username" name="username" autocomplete="username" required>
              </div>
              <div class="field">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
              </div>
              <button class="primary-btn" type="submit">Entrar</button>
              ${error ? `<p class="error">${escapeHtml(error)}</p>` : ""}
            </form>
          </main>
        `);
      }

      async function login(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const response = await fetch(`${API}/auth/token/`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: form.get("username"), password: form.get("password") })
        });
        if (!response.ok) return renderLogin("Usuario o contraseña incorrectos");
        setTokens(await response.json());
        await showScreen("dashboard");
      }

      async function loadPerfil() {
        const response = await apiFetch("/mi-perfil/");
        state.perfil = normalizePerfil(await response.json());
      }

      async function loadReportes() {
        const response = await apiFetch("/reportes/mis/");
        state.reportes = response.ok ? await response.json() : [];
        return state.reportes;
      }

      async function loadUnidades() {
        const response = await apiFetch("/unidades/");
        state.unidades = response.ok ? await response.json() : [];
        return state.unidades;
      }

      async function loadTurnoActivo() {
        const response = await apiFetch("/bitacora-salida/activa/");
        state.bitacoraSalida = response.ok ? await response.json() : null;
        return state.bitacoraSalida;
      }

      async function loadResumenSemanal() {
        const today = new Date();
        if (today.getDay() !== 1) return null;
        const mondayKey = localDateKey(today);
        if (localStorage.getItem(`pd_resumen_semanal_visto_${mondayKey}`)) return null;
        const response = await apiFetch("/resumen-semanal/");
        state.resumenSemanal = response.ok ? await response.json() : null;
        return state.resumenSemanal;
      }

      function dismissResumenSemanal() {
        const mondayKey = localDateKey();
        localStorage.setItem(`pd_resumen_semanal_visto_${mondayKey}`, "true");
        state.resumenSemanal = null;
        renderDashboard();
      }

      async function loadCombustibleAlerta() {
        const response = await apiFetch("/combustible-alerta/");
        state.combustibleAlerta = response.ok ? await response.json() : null;
        return state.combustibleAlerta;
      }

      function combustiblePendienteKey(alerta) {
        const ids = (alerta?.pendientes || []).map((item) => item.id).join("-");
        return `pd_combustible_pendiente_cerrado_${ids || "sin_ids"}`;
      }

      function shouldShowCombustibleAlerta() {
        const alerta = state.combustibleAlerta;
        if (!alerta) return false;
        if (alerta.pendiente) {
          return !sessionStorage.getItem(combustiblePendienteKey(alerta));
        }
        return !localStorage.getItem(`pd_combustible_recordatorio_${localDateKey()}`);
      }

      function dismissCombustibleAlerta() {
        const alerta = state.combustibleAlerta;
        if (!alerta) return;
        if (alerta.pendiente) {
          sessionStorage.setItem(combustiblePendienteKey(alerta), "true");
        } else {
          localStorage.setItem(`pd_combustible_recordatorio_${localDateKey()}`, "true");
        }
        renderDashboard();
      }

      function combustibleAlertaModal() {
        const alerta = state.combustibleAlerta;
        if (!shouldShowCombustibleAlerta()) return "";
        const pendiente = Boolean(alerta?.pendiente);
        const pendientes = alerta?.pendientes || [];
        return `
          <section class="fuel-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="fuel-alert-title">
            <article class="fuel-modal ${pendiente ? "pending" : ""}">
              <button class="fuel-close" type="button" onclick="dismissCombustibleAlerta()" aria-label="Cerrar aviso">×</button>
              <div class="fuel-icon">⛽</div>
              <div class="fuel-label">${pendiente ? "Registro pendiente" : "Recordatorio"}</div>
              <h2 id="fuel-alert-title">${pendiente ? "No registraste carga de combustible" : "Ya puedes registrar gasolina durante el turno"}</h2>
              ${pendiente ? `
                <p>Detectamos turno${Number(alerta.pendientes_count || 0) === 1 ? "" : "s"} cerrado${Number(alerta.pendientes_count || 0) === 1 ? "" : "s"} donde la unidad salió con poca gasolina y terminó con más gasolina, pero no capturaste litros, importe ni ticket.</p>
                <div class="fuel-notice">
                  Envía a <strong>jefa Johana</strong> los datos pendientes de gasolina: litros, importe total y foto del ticket.
                  ${pendientes.length ? `
                    <ul class="fuel-list">
                      ${pendientes.map((item) => `<li>${escapeHtml(item.folio)} · ${escapeHtml(item.unidad_codigo)} · ${escapeHtml(item.nivel_gas_salida)} → ${escapeHtml(item.nivel_gas_llegada)}</li>`).join("")}
                    </ul>
                  ` : ""}
                </div>
              ` : `
                <p>Ahora puedes registrar la carga de gasolina en el momento, sin esperar al cierre: abre tu turno activo en Bitácora y toca “Registrar gasolina”.</p>

              `}
              <button class="primary-btn" type="button" onclick="dismissCombustibleAlerta()">Entendido</button>
            </article>
          </section>

      }

      function resumenSemanalCard() {
        const resumen = state.resumenSemanal;
        if (!resumen) return "";
        const m = resumen.metricas || {};
        return `
          <section class="weekly-summary ${escapeHtml(resumen.semaforo || "amarillo")}">
            <h2 style="margin:0;color:var(--gold);">Resumen de tu semana</h2>
            <p class="muted">${escapeHtml(resumen.periodo_inicio || "")} al ${escapeHtml(resumen.periodo_fin || "")}</p>
            <p>${escapeHtml(resumen.mensaje || "")}</p>
            <div class="weekly-grid">
              <div class="weekly-metric"><strong>${escapeHtml(m.turnos_cerrados ?? 0)}/${escapeHtml(m.turnos_total ?? 0)}</strong>Turnos cerrados</div>
              <div class="weekly-metric"><strong>${escapeHtml(m.inspecciones_diarias ?? 0)}</strong>Inspecciones diarias</div>
              <div class="weekly-metric"><strong>${escapeHtml(m.reportes_creados ?? 0)}</strong>Reportes nuevos</div>
              <div class="weekly-metric"><strong>${escapeHtml(m.reportes_reafirmados ?? 0)}</strong>Reportes reafirmados</div>
            </div>
            <button class="secondary-btn" type="button" onclick="dismissResumenSemanal()">Entendido</button>
          </section>
        `;
      }

      async function renderDashboard() {
        await loadReportes();
        await loadResumenSemanal();
        await loadCombustibleAlerta();
        let turnoActivo = null;
        try {
          turnoActivo = await loadTurnoActivo();
        } catch (error) {
          turnoActivo = null;
        }
        const abiertos = state.reportes.filter((r) => r.estatus !== "cerrado").length;
        const turnoBadge = turnoActivo?.id
          ? `<span class="badge turno abierto">ABIERTO</span>`
          : `<span class="badge turno">Sin turno</span>`;
        render(shell(`
          ${resumenSemanalCard()}
          ${combustibleAlertaModal()}
          <p class="unit-line">Selecciona la unidad al iniciar cada captura.</p>
          <button class="dashboard-help" onclick="showScreen('ayuda')" type="button">? Ayuda rapida</button>
          <div class="dash-grid">
            <button class="dash-btn" onclick="startNuevoReporte()">🚨<br>Nuevo Reporte</button>
            <button class="dash-btn" onclick="showScreen('mis_reportes')">📂<br>Mis Reportes ${abiertos ? `<span class="badge">${abiertos}</span>` : ""}</button>
            <button class="dash-btn" onclick="showScreen('inspeccion_vehiculo')">📋<br>Inspección</button>
            <button class="dash-btn" onclick="showScreen('bitacora_salida')">🚗<br>Bitácora<br>${turnoBadge}</button>
          </div>
        `));
      }

      function renderAyuda() {
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Ayuda rápida</h1>
          <p class="unit-line">Guía corta para capturar correctamente en la app.</p>
          <div class="help-list">
            <section class="help-card">
              <h2>Todos los días</h2>
              <ol>
                <li>Antes de usar una unidad, inicia turno en Bitácora.</li>
                <li>Selecciona la unidad real que vas a usar.</li>
                <li>Haz inspección si vas a revisar el estado de la unidad.</li>
                <li>Al terminar, vuelve a Bitácora y cierra el turno.</li>
              </ol>

            <section class="help-card">
