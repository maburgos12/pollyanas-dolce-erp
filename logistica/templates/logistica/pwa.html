{% load static %}
<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#8B2252">
    <title>Pollyana's Logística</title>
    <link rel="manifest" href="{% static 'logistica/pwa/manifest.json' %}">
    <link rel="icon" href="{% static 'logistica/pwa/icon-192.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/template_modules/logistica-templates-logistica-pwa.css?v=20260614-ui100-v1">
    <link rel="stylesheet" href="/static/css/pollyana_generated_utilities.css?v=20260614-ui100-v1">
    <style>
      :root {
        --bg: #0f0f14;
        --surface: #1a1a24;
        --border: #2a2a38;
        --wine: #8B2252;
        --gold: #C9A84C;
        --text: #e8e0d5;
        --text-muted: #888888;
        --danger: #e64f64;
        --warning: #e6b84f;
        --success: #51b56f;
        --info: #4f8ee6;
      }

      * { box-sizing: border-box; }

      html, body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Nunito", sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      }

      button, input, textarea, select {
        font: inherit;
      }

      button {
        min-height: 48px;
        border: 0;
        cursor: pointer;
      }

      #app {
        width: 100%;
        max-width: 430px;
        min-height: 100vh;
        padding: 18px 16px 74px;
        opacity: 1;
        transition: opacity 0.2s ease;
      }

      #app.is-changing { opacity: 0; }

      .brand-title {
        margin: 0;
        color: var(--text);
        font-family: "Playfair Display", serif;
        font-size: 38px;
        line-height: 1;
        letter-spacing: 0;
      }

      .login-logo {
        display: block;
        width: min(260px, 78vw);
        height: auto;
        max-height: 112px;
        object-fit: contain;
        object-position: left center;
      }

      .brand-subtitle {
        margin: 8px 0 0;
        color: var(--gold);
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .login-wrap {
        display: flex;
        min-height: calc(100vh - 92px);
        flex-direction: column;
        justify-content: center;
      }

      .panel, .card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
      }

      .panel {
        margin-top: 30px;
        padding: 18px;
      }

      .field {
        display: grid;
        gap: 7px;
        margin-bottom: 14px;
      }

      label {
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 800;
      }

      input, textarea, select {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #111118;
        color: var(--text);
        outline: none;
        padding: 12px 13px;
      }

      textarea {
        min-height: 112px;
        resize: vertical;
      }

      input:focus, textarea:focus {
        border-color: var(--gold);
      }

      select.gas-native-select {
        border-color: var(--gold);
        background: #15151e;
        color: var(--text);
        font-weight: 800;
      }

      .primary-btn {
        width: 100%;
        border-radius: 10px;
        background: var(--wine);
        color: white;
        font-weight: 800;
        padding: 14px;
      }

      .secondary-btn {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: transparent;
        color: var(--text);
        font-weight: 800;
        padding: 12px 14px;
      }

      .error {
        margin: 10px 0 0;
        color: var(--danger);
        font-weight: 800;
      }

      .success {
        margin: 10px 0 0;
        color: var(--success);
        font-weight: 800;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .mini-brand {
        font-family: "Playfair Display", serif;
        font-size: 22px;
      }

      .header-logo {
        display: block;
        width: min(154px, 46vw);
        height: auto;
        max-height: 58px;
        object-fit: contain;
        object-position: left center;
      }

      .hello {
        margin: 3px 0 0;
        color: var(--text-muted);
        font-size: 14px;
        font-weight: 700;
      }

      .logout {
        min-height: 40px;
        border-radius: 999px;
        background: #261521;
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
        padding: 8px 12px;
      }

      .unit-line {
        margin: 0 0 20px;
        color: var(--gold);
        font-weight: 800;
      }

      .dashboard-help {
        display: inline-flex;
        min-height: 34px;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: transparent;
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 800;
        margin: -8px 0 16px;
        padding: 7px 11px;
      }

      .dashboard-help:hover, .dashboard-help:focus {
        border-color: var(--gold);
        color: var(--gold);
      }

      .dash-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .dash-btn {
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr;
        justify-items: start;
        gap: 10px;
        min-height: 86px;
        border: 2px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        font-size: 16px;
        font-weight: 800;
        text-align: left;
        padding: 14px;
      }

      .dash-btn:hover, .dash-btn:focus {
        border-color: var(--wine);
      }

      .dash-btn > span:not(.badge):not(.app-glyph) {
        align-self: end;
        line-height: 1.05;
      }

      .app-glyph {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border: 1px solid rgba(201, 168, 76, .26);
        border-radius: 13px;
        background: #21151f;
        color: var(--gold);
      }

      .app-glyph svg {
        width: 26px;
        height: 26px;
        overflow: visible;
      }

      .app-glyph .soft {
        fill: rgba(201, 168, 76, .12);
      }

      .app-glyph .stroke,
      .app-glyph .gold-stroke {
        fill: none;
        stroke: currentColor;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .app-glyph .gold-fill {
        fill: currentColor;
      }

      .route-dashboard-card {
        border-color: var(--border);
        background: var(--surface);
      }

      .badge {
        display: inline-flex;
        min-width: 24px;
        height: 24px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: var(--danger);
        color: white;
        font-size: 12px;
        font-weight: 900;
      }

      .badge.turno {
        margin-top: 6px;
        min-width: 0;
        height: auto;
        background: #676771;
        padding: 4px 8px;
      }

      .badge.turno.abierto {
        background: var(--warning);
        color: #17120a;
      }

      .dash-btn .badge {
        position: absolute;
        top: 8px;
        right: 8px;
      }

      .footer {
        margin: 22px auto 0;
        border-top: 1px solid var(--border);
        background: transparent;
        color: var(--text-muted);
        text-align: center;
        font-size: 12px;
        padding: 13px 16px 0;
      }

      .screen-title {
        margin: 0 0 14px;
        font-family: "Playfair Display", serif;
        font-size: 28px;
        line-height: 1.08;
      }

      .progress {
        display: flex;
        gap: 9px;
        margin: 0 0 18px;
      }

      .dot {
        width: 34px;
        height: 7px;
        border-radius: 999px;
        background: var(--border);
      }

      .dot.active {
        background: var(--gold);
      }

      .card-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .option-card {
        min-height: 82px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        font-weight: 800;
        padding: 12px;
      }

      .option-card.selected {
        border-color: var(--wine);
        background: #2a1423;
        box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.22);
      }

      .severity-row {
        display: grid;
        gap: 10px;
        margin-bottom: 14px;
      }

      .severity-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        text-align: left;
        font-weight: 800;
        padding: 13px;
      }

      .severity-card.selected {
        border-color: var(--gold);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 16px;
      }

      .report-card {
        margin-bottom: 10px;
        padding: 14px;
      }

      .report-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
      }

      .report-title {
        margin: 0;
        font-size: 16px;
        font-weight: 900;
      }

      .muted {
        color: var(--text-muted);
        font-size: 13px;
      }

      .status {
        border-radius: 999px;
        color: white;
        font-size: 12px;
        font-weight: 900;
        padding: 5px 9px;
        white-space: nowrap;
      }

      .status.abierto { background: var(--danger); }
      .status.en_proceso { background: var(--warning); color: #17120a; }
      .status.programado { background: var(--info); }
      .status.cerrado { background: #676771; }

      .detail {
        display: none;
        margin-top: 13px;
        border-top: 1px solid var(--border);
        padding-top: 13px;
      }

      .report-card.expanded .detail {
        display: block;
      }

      .kv {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 8px;
        margin: 7px 0;
        font-size: 14px;
      }

      .kv b { color: var(--gold); }

      .empty {
        border: 1px dashed var(--border);
        border-radius: 12px;
        color: var(--text-muted);
        padding: 22px;
        text-align: center;
      }

      .help-list {
        display: grid;
        gap: 12px;
      }

      .help-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        padding: 14px;
      }

      .help-card h2 {
        color: var(--gold);
        font-size: 18px;
        margin: 0 0 8px;
      }

      .help-card ul, .help-card ol {
        margin: 0;
        padding-left: 19px;
      }

      .help-card li {
        margin: 7px 0;
      }

      .confirm {
        margin-top: 28px;
        text-align: center;
      }

      .confirm-actions {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .confirm-actions .primary-btn,
      .confirm-actions .secondary-btn {
        width: 100%;
        min-height: 58px;
        justify-content: center;
        text-align: center;
      }

      .confirm-mark {
        font-size: 54px;
        margin-bottom: 8px;
      }

      .section-toggle {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid var(--border);
        border-left: 3px solid var(--gold);
        border-radius: 16px;
        background: #1e1e2e;
        color: var(--gold);
        text-align: left;
        font-weight: 900;
        margin: 12px 0 0;
        padding: 14px 16px;
        transition: border-color 0.15s ease, background 0.15s ease;
      }

      .check-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #1a1a24;
        color: var(--text);
        font-size: 13px;
        padding: 14px 16px;
        margin: 8px 0;
      }

      .check-row:last-child { border-bottom: 0; }
      .check-row > span {
        flex: 1 1 180px;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .chip {
        min-width: 72px;
        min-height: 44px;
        border: 1px solid #2a2a38;
        border-radius: 10px;
        background: #22222e;
        color: #b6bac4;
        font-size: 12px;
        font-weight: 900;
        padding: 9px 11px;
        transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      }

      .chip.ok { background: #1a3a1a; border-color: #33aa55; color: #55cc77; }
      .chip.fail { background: #3a1a1a; border-color: #aa3333; color: #cc5555; }
      .chip.pending { background: #22222e; border-color: #3b3b4d; color: #c2c6d0; }
      .check-row.ok { border-color: rgba(51, 170, 85, 0.65); }
      .check-row.fail { border-color: rgba(170, 51, 51, 0.72); }
      .check-row.pending { border-color: var(--border); }
      .daily-banner {
        border: 1px solid #33aa55;
        border-radius: 14px;
        background: #1a3a1a;
        color: #55cc77;
        padding: 16px;
        margin: 12px 0;
        font-weight: 900;
      }
      .daily-banner strong { color: var(--text); }
      .daily-banner time { color: var(--gold); }
      .daily-banner.warning {
        border-color: rgba(201, 168, 76, 0.7);
        background: #1e1a10;
        color: var(--gold);
      }
      .daily-counter {
        display: inline-flex;
        justify-content: center;
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 50px;
        background: #1a1a24;
        color: var(--gold);
        font-weight: 900;
        margin: 8px 0 12px;
        padding: 10px 14px;
      }
      .daily-counter.complete { color: #55cc77; }
      .daily-checklist-card {
        border-radius: 16px;
        background: var(--surface);
      }
      .daily-section-card {
        border-radius: 16px;
        background: var(--surface);
        padding: 12px;
        margin: 0 0 12px;
      }
      .daily-mark-all {
        width: 100%;
        border: 1px solid #33aa55;
        border-radius: 10px;
        background: transparent;
        color: #55cc77;
        font-weight: 900;
        padding: 12px;
      }
      .daily-mark-all:active { background: #1a3a1a; }
      .daily-fail-field label {
        color: var(--gold);
        font-weight: 900;
      }
      .daily-fail-field textarea {
        border: 1px solid #C9A84C44;
        border-radius: 12px;
        background: #1e1a10;
        color: var(--text);
        padding: 14px;
      }
      .daily-fail-field textarea::placeholder { color: #888; }
      .daily-continue {
        width: 100%;
        margin-top: 24px;
        border-radius: 14px;
        background: var(--wine);
        box-shadow: 0 4px 20px #8B225240;
        color: white;
        font-family: "Nunito", sans-serif;
        font-size: 16px;
        font-weight: 700;
        padding: 16px;
      }
      .daily-continue:disabled {
        cursor: not-allowed;
        opacity: 0.4;
      }
      .daily-section-highlight {
        border-color: #C8506A !important;
        box-shadow: 0 0 0 2px rgba(200, 80, 106, 0.35);
      }

      .license-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        margin-top: 6px;
        padding: 8px 11px;
      }
      .license-pill::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #aaa;
      }
      .license-pill.ok {
        border-color: #8bd3a6;
        background: #effaf3;
        color: #21633b;
      }
      .license-pill.ok::before {
        background: #2f9d56;
        box-shadow: 0 0 12px rgba(47, 157, 86, 0.35);
      }
      .license-pill.warning {
        border-color: #ead28a;
        background: #fff8df;
        color: #8a6512;
      }
      .license-pill.warning::before {
        background: #C9A84C;
        box-shadow: 0 0 12px rgba(201, 168, 76, 0.35);
      }
      .license-pill.blocked {
        border-color: #f3a5b8;
        background: #fff1f5;
        color: #9f1d52;
      }
      .license-pill.blocked::before {
        background: #e84f73;
        box-shadow: 0 0 12px rgba(232, 79, 115, 0.35);
      }
      .license-banner {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        margin: 12px 0 16px;
        padding: 14px;
        font-weight: 900;
      }
      .license-banner.ok { border-color: #8bd3a6; color: #21633b; background: #effaf3; }
      .license-banner.warning { border-color: #ead28a; color: #8a6512; background: #fff8df; }
      .license-banner.blocked { border-color: #f3a5b8; color: #9f1d52; background: #fff1f5; }

      .thumb {
        width: 100%;
        max-height: 180px;
        object-fit: cover;
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-top: 8px;
      }

      .gps-locked {
        pointer-events: none;
        user-select: none;
      }

      .gps-overlay {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(15, 15, 20, 0.82);
        padding: 18px;
        opacity: 1;
        transition: opacity 0.2s ease;
      }

      .gps-card {
        width: min(100%, 390px);
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        padding: 22px;
        text-align: center;
      }

      .gps-icon {
        font-size: 42px;
        margin-bottom: 8px;
      }

      .gps-title {
        margin: 0 0 10px;
        font-family: "Playfair Display", serif;
        font-size: 26px;
        line-height: 1.1;
      }

      .gps-message {
        margin: 0 0 16px;
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.45;
        white-space: pre-line;
      }

      .gps-registered {
        margin: 8px 0 12px;
        color: var(--success);
        font-size: 13px;
        font-weight: 800;
      }

      .file-picker {
        display: grid;
        gap: 8px;
      }

      .file-input {
        width: 1px;
        height: 1px;
        opacity: 0;
        overflow: hidden;
        position: absolute;
        pointer-events: none;
      }

      .file-trigger {
        display: flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #111118;
        color: var(--text);
        font-weight: 900;
        padding: 12px 13px;
      }

      .file-trigger.loaded {
        border-color: var(--success);
        color: var(--success);
      }
      .weekly-summary,
      .duplicate-report-card {
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 14px;
        padding: 14px;
        margin: 12px 0;
      }
      .weekly-summary.verde {
        border-color: var(--success);
      }
      .weekly-summary.amarillo {
        border-color: var(--gold);
      }
      .weekly-summary.rojo {
        border-color: var(--danger);
      }
      .weekly-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin: 12px 0;
      }
      .weekly-metric {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        color: var(--text);
      }
      .weekly-metric strong {
        display: block;
        color: var(--gold);
        font-size: 20px;
      }
      .duplicate-report-card {
        border-color: #C9A84C66;
      }
      .duplicate-report-card h3 {
        margin: 0 0 6px;
        color: var(--gold);
        font-size: 16px;
      }
      .duplicate-report-card .meta {
        color: var(--text-muted);
        font-size: 12px;
        margin: 0 0 8px;
      }
      .fuel-modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(5, 5, 8, .76);
        backdrop-filter: blur(6px);
      }
      .fuel-modal {
        position: relative;
        width: min(100%, 398px);
        border: 1px solid rgba(201, 168, 76, .45);
        border-radius: 22px;
        background: var(--surface);
        box-shadow: 0 22px 70px rgba(0, 0, 0, .55);
        padding: 22px;
      }
      .fuel-modal.pending {
        border-color: rgba(230, 79, 100, .72);
      }
      .fuel-close {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #111119;
        color: var(--text);
        font-size: 22px;
        font-weight: 900;
      }
      .fuel-icon {
        width: 58px;
        height: 58px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        margin-bottom: 16px;
        background: rgba(201, 168, 76, .12);
        border: 1px solid rgba(201, 168, 76, .42);
        font-size: 30px;
      }
      .fuel-modal.pending .fuel-icon {

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function formatDate(value) {
        if (!value) return "-";
        return new Intl.DateTimeFormat("es-MX", { dateStyle: "medium", timeStyle: "short" }).format(new Date(value));
      }

      function todayIso() {
        return new Date().toISOString().slice(0, 10);
      }

      function localDateKey(date = new Date()) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function isGeoReady(draft) {
        return draft.geoStatus === "ready" && Boolean(draft.latitud || draft.latitud_salida);
      }

      function geoOverlay(draft, actionName) {
        if (isGeoReady(draft)) return "";
        const denied = draft.geoStatus === "denied";
        const loading = draft.geoStatus === "loading";
        const unavailable = draft.geoStatus === "unavailable";
        const message = denied
          ? "Bloqueaste el acceso a tu ubicación. Para continuar:\n1. Toca el ícono 🔒 en la barra de tu navegador\n2. Activa el permiso de Ubicación\n3. Recarga la página"
          : unavailable
            ? "No pudimos obtener tu ubicación. Verifica que el GPS de tu teléfono esté activado y vuelve a intentar."
            : "Esta acción requiere tu ubicación para continuar.\nPresiona \"Permitir\" cuando el navegador lo solicite.";
        const buttonLabel = denied || unavailable ? "Reintentar" : "Activar ubicación";
        return `
          <div class="gps-overlay" role="dialog" aria-modal="true" aria-labelledby="gps-title">
            <section class="gps-card">
              <div class="gps-icon">📍</div>
              <h2 class="gps-title" id="gps-title">Ubicación requerida</h2>
              <p class="gps-message">${escapeHtml(message)}</p>
              <button class="primary-btn" type="button" onclick="${actionName}()" ${loading ? "disabled" : ""}>
                ${loading ? "Obteniendo ubicación..." : buttonLabel}
              </button>
            </section>
          </div>
        `;
      }

      function requestLocation(draft, renderFn, latField, lngField) {
        if (!navigator.geolocation) {
          draft.geoStatus = "unavailable";
          draft.geoLabel = "GPS no disponible";
          renderFn();
          return;
        }
        draft.geoStatus = "loading";
        draft.geoLabel = "Obteniendo ubicación...";
        renderFn();
        navigator.geolocation.getCurrentPosition((position) => {
          draft[latField] = position.coords.latitude.toFixed(6);
          draft[lngField] = position.coords.longitude.toFixed(6);
          draft.precision_metros = Number.isFinite(position.coords.accuracy) ? Number(position.coords.accuracy.toFixed(2)) : null;
          draft.timestamp_dispositivo = new Date(position.timestamp || Date.now()).toISOString();
          draft.client_event_id = newClientEventId();
          draft.geoStatus = "ready";
          draft.geoLabel = "📍 Ubicación registrada";
          renderFn();
        }, (error) => {
          draft[latField] = "";
          draft[lngField] = "";
          draft.precision_metros = null;
          draft.geoStatus = error.code === 1 ? "denied" : "unavailable";
          draft.geoLabel = "Se requiere ubicación para continuar";
          renderFn();
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
      }

      function newClientEventId() {
        return window.crypto?.randomUUID ? window.crypto.randomUUID() : `gps-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function captureRoutePosition() {
        return new Promise((resolve, reject) => {
          if (!navigator.geolocation) {
            reject(new Error("GPS no disponible"));
            return;
          }
          navigator.geolocation.getCurrentPosition((position) => {
            resolve({
              latitud: position.coords.latitude.toFixed(6),
              longitud: position.coords.longitude.toFixed(6),
              precision_metros: Number.isFinite(position.coords.accuracy) ? Number(position.coords.accuracy.toFixed(2)) : null,
              timestamp_dispositivo: new Date(position.timestamp || Date.now()).toISOString(),
              client_event_id: newClientEventId()
            });
          }, reject, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
        });
      }

      function marcarInicioCapturaFoto(input) {
        input.dataset.captureStartedAt = String(Date.now());
      }

      function isRecentCameraPhoto(input, file) {
        const now = Date.now();
        const modified = Number(file.lastModified || 0);
        const captureStartedAt = Number(input.dataset.captureStartedAt || 0);
        const modifiedLooksValid = modified > 0 && modified <= now + 60000;
        const modifiedIsFresh = modifiedLooksValid && now - modified <= PHOTO_MAX_AGE_MS;
        const selectedDuringCameraSession = captureStartedAt > 0 && now - captureStartedAt <= PHOTO_CAPTURE_SESSION_MS;
        return modifiedIsFresh || selectedDuringCameraSession;
      }

      function setLivePhoto(input, draft, fileField, previewField, renderFn, errorField = "fotoError") {
        const file = input.files[0] || null;
        if (!file) {
          draft[fileField] = null;
          if (previewField) draft[previewField] = "";
          draft[errorField] = "";
          renderFn();
          return;
        }
        if (!isRecentCameraPhoto(input, file)) {
          draft[fileField] = null;
          if (previewField) draft[previewField] = "";
          draft[errorField] = "La foto debe tomarse en este momento. No se permiten imágenes de la galería.";
          input.value = "";
          renderFn();
          return;
        }
        draft[fileField] = file;
        if (previewField) draft[previewField] = URL.createObjectURL(file);
        draft[errorField] = "";
        renderFn();
      }

      function apiErrorMessage(error, fallback) {
        if (!error) return fallback;
        if (error.mensaje) return error.mensaje;
        if (error.detail) return error.detail;
        if (Array.isArray(error.non_field_errors) && error.non_field_errors.length) {
          return error.non_field_errors[0];
        }
        const detalles = error.detalles || error;
        if (Array.isArray(detalles.non_field_errors) && detalles.non_field_errors.length) {
          return detalles.non_field_errors[0];
        }
        const firstKey = Object.keys(detalles || {})[0];
        if (!firstKey) return fallback;
        const value = detalles[firstKey];
        if (Array.isArray(value)) return `${firstKey}: ${value[0]}`;
        if (typeof value === "string") return `${firstKey}: ${value}`;
        return fallback;
      }

      async function apiFetch(path, options = {}) {
        const headers = { ...(options.headers || {}) };
        if (state.token) headers.Authorization = `Bearer ${state.token}`;
        const response = await fetch(`${API}${path}`, { ...options, headers });
        if (response.status === 401) {
          if (state.refreshToken && !options._retry) {
            const refreshed = await fetch(`${API}/auth/token/refresh/`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ refresh: state.refreshToken })
            });
            if (refreshed.ok) {
              const data = await refreshed.json();
              state.token = data.access;
              sessionStorage.setItem(ACCESS_TOKEN_KEY, data.access);
              return apiFetch(path, { ...options, _retry: true });
            }
          }
          logout(false);
          throw new Error("Sesión expirada");
        }
        return response;
      }

      function loadRutaTrackingQueue() {
        try {
          const rows = JSON.parse(localStorage.getItem(TRACKING_QUEUE_KEY) || "[]");
          return normalizeRutaTrackingQueue(Array.isArray(rows) ? rows : []);
        } catch (error) {
          return [];
        }
      }

      function saveRutaTrackingQueue(rows) {
        const boundedRows = normalizeRutaTrackingQueue(rows).slice(-25);
        localStorage.setItem(TRACKING_QUEUE_KEY, JSON.stringify(boundedRows));
        state.trackingQueueCount = boundedRows.length;
        return boundedRows;
      }

      function normalizeRutaTrackingQueue(rows) {
        const now = Date.now();
        const currentUser = state.perfil?.username || "";
        const today = localDateKey();
        return rows.filter((row) => {
          const queuedAt = Date.parse(row.queued_at || "");
          if (!Number.isFinite(queuedAt) || now - queuedAt > TRACKING_QUEUE_TTL_MS) return false;
          if (row.date_key && row.date_key !== today) return false;
          if (currentUser && row.username && row.username !== currentUser) return false;
          return Boolean(row.ruta_id && row.payload);
        });
      }

      function purgeRutaTrackingQueue() {
        saveRutaTrackingQueue(loadRutaTrackingQueue());
      }

      function enqueueRutaTracking(item) {
        const rows = loadRutaTrackingQueue();
        if (item.payload?.client_event_id && rows.some((row) => row.payload?.client_event_id === item.payload.client_event_id)) {
          return rows;
        }
        rows.push({
          ...item,
          username: state.perfil?.username || "",
          date_key: localDateKey(),
          queued_at: new Date().toISOString(),
          attempts: Number(item.attempts || 0)
        });
        return saveRutaTrackingQueue(rows);
      }

      async function flushRutaTrackingQueue() {
        if (!state.token || !navigator.onLine) return loadRutaTrackingQueue().length;
        const pending = loadRutaTrackingQueue();
        if (!pending.length) {
          state.trackingQueueCount = 0;
          return 0;
        }
        const remaining = [];
        let failed = 0;
        for (const item of pending) {
          try {
            const response = await apiFetch(`/rutas/${item.ruta_id}/tracking/`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(item.payload)
            });
            if (!response.ok) {
              if ([400, 403, 404, 409].includes(response.status)) {
                failed += 1;
              } else {
                remaining.push({ ...item, attempts: Number(item.attempts || 0) + 1 });
              }
            }
          } catch (error) {
            remaining.push({ ...item, attempts: Number(item.attempts || 0) + 1 });
          }
        }
        state.routeTrackingFailedCount = failed;
        saveRutaTrackingQueue(remaining);
        return remaining.length;
      }

      function stopRutaAutoTracking() {
        if (state.routeAutoTrackingTimer) {
          window.clearInterval(state.routeAutoTrackingTimer);
        }
        state.routeAutoTrackingTimer = null;
        state.routeAutoTrackingRutaId = null;
        state.routeAutoTrackingBusy = false;
        state.routeAutoTrackingStatus = "idle";
      }

      async function enviarTrackingAutomaticoRuta(rutaId) {
        if (!rutaId || state.routeAutoTrackingBusy || state.pantallaActual !== "ruta_activa") return;
        state.routeAutoTrackingBusy = true;
        state.routeAutoTrackingStatus = "capturando";
        let payload = null;
        try {
          const positionPayload = await captureRoutePosition();
          payload = {
            ...positionPayload,
            tracking_origen: "automatico_pwa",
            fuera_de_ruta_confirmado: false,
            desvio_motivo: ""
          };
          const response = await apiFetch(`/rutas/${rutaId}/tracking/`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          if (response.ok) {
            state.routeAutoTrackingLastSentAt = new Date().toISOString();
            state.routeAutoTrackingStatus = "enviado";
          } else if ([400, 403, 404, 409].includes(response.status)) {
            state.routeAutoTrackingStatus = "rechazado_api";
            state.routeTrackingFailedCount += 1;
          } else {
            enqueueRutaTracking({ ruta_id: rutaId, payload });
            state.routeAutoTrackingStatus = "pendiente_offline";
          }
        } catch (error) {
          if (payload && error?.message !== "Sesión expirada") {
            enqueueRutaTracking({ ruta_id: rutaId, payload });
          }
          state.routeAutoTrackingStatus = error?.code === 1 ? "gps_denegado" : "pendiente_offline";
        } finally {
          state.routeAutoTrackingBusy = false;
          if (state.pantallaActual === "ruta_activa") {
            renderRutaActiva();
          }
        }
      }

      function ensureRutaAutoTracking(rutaId, enabled) {
        if (!enabled || !rutaId) {
          stopRutaAutoTracking();
          return;
        }
        if (state.routeAutoTrackingRutaId === rutaId && state.routeAutoTrackingTimer) return;
        stopRutaAutoTracking();
        state.routeAutoTrackingRutaId = rutaId;
        state.routeAutoTrackingStatus = "activo";
        enviarTrackingAutomaticoRuta(rutaId);
        state.routeAutoTrackingTimer = window.setInterval(() => enviarTrackingAutomaticoRuta(rutaId), ROUTE_AUTO_TRACKING_INTERVAL_MS);
      }

      function setTokens(data) {
        state.token = data.access;
        state.refreshToken = data.refresh || "";
        sessionStorage.setItem(ACCESS_TOKEN_KEY, data.access);

      async function useDjangoSessionToken() {

        });

      function logout(render = true) {
        state.token = "";
        state.refreshToken = "";
        state.perfil = null;
        sessionStorage.removeItem(ACCESS_TOKEN_KEY);
        localStorage.removeItem(ACCESS_TOKEN_KEY);
        localStorage.removeItem(REFRESH_TOKEN_KEY);
        localStorage.removeItem(TRACKING_QUEUE_KEY);

        event.preventDefault();

          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: form.get("username"), password: form.get("password") })
        });
        if (!response.ok) return renderLogin("Usuario o contraseña incorrectos");
        setTokens(await response.json());
        await abrirPantallaInicial();

        try {
          rutaActiva = await loadRutaActiva();
        } catch (error) {
          rutaActiva = null;
        }
        const abiertos = state.reportes.filter((r) => r.estatus !== "cerrado").length;
        const turnoBadge = turnoActivo?.id
          ? `<span class="badge turno abierto">ABIERTO</span>`
          : `<span class="badge turno">Sin turno</span>`;
        const rutaBadge = rutaActiva?.ruta?.id
          ? `<span class="badge turno abierto">ACTIVA</span>`
          : `<span class="badge turno">Sin ruta</span>`;
        render(shell(`
          ${resumenSemanalCard()}
          ${combustibleAlertaModal()}
          <p class="unit-line">Selecciona la unidad al iniciar cada captura.</p>
          <button class="dashboard-help" onclick="showScreen('ayuda')" type="button">? Ayuda rápida</button>
          <div class="dash-grid">
            <button class="dash-btn" onclick="startNuevoReporte()">${appGlyph("reporte")}<span>Nuevo Reporte</span></button>
            <button class="dash-btn" onclick="showScreen('mis_reportes')">${appGlyph("historial")}<span>Mis Reportes</span>${abiertos ? `<span class="badge">${abiertos}</span>` : ""}</button>
            <button class="dash-btn" onclick="showScreen('inspeccion_vehiculo')">${appGlyph("inspeccion")}<span>Inspección</span></button>
            <button class="dash-btn" onclick="showScreen('lavado')">${appGlyph("lavado")}<span>Lavado</span></button>
            <button class="dash-btn route-dashboard-card" onclick="showScreen('ruta_activa')">${appGlyph("ruta")}<span>Mi ruta</span>${rutaBadge}</button>
            <button class="dash-btn" onclick="showScreen('bitacora_salida')">${appGlyph("bitacora")}<span>Bitácora</span>${turnoBadge}</button>
          </div>
        `));
      }

      function ensureRutaTrackingDraft() {
        if (!state.rutaTrackingDraft) {
          state.rutaTrackingDraft = {
            latitud: "",
            longitud: "",
            precision_metros: null,
            fuera_de_ruta_confirmado: false,
            desvio_motivo: "",
            geoStatus: "idle",
            geoLabel: "",
            guardando: false
          };
        }
        return state.rutaTrackingDraft;
      }

      function capturarUbicacionRuta() {
        const draft = ensureRutaTrackingDraft();
        requestLocation(draft, renderRutaActiva, "latitud", "longitud");
      }

      function toggleDesvioRuta() {
        const draft = ensureRutaTrackingDraft();
        draft.fuera_de_ruta_confirmado = !draft.fuera_de_ruta_confirmado;
        renderRutaActiva();
      }

      function updateDesvioMotivo(value) {
        const draft = ensureRutaTrackingDraft();
        draft.desvio_motivo = value.slice(0, 160);
      }

      function routeProgressValue(ruta, paradas) {
        const total = paradas?.length || 0;
        if (total) {
          const visitadas = paradas.filter((parada) => parada.estado === "VISITADA").length;
          return Math.round((visitadas / total) * 100);
        }
        return Math.round(Number(ruta?.cumplimiento_porcentaje || 0));
      }

      function routeStopCounts(paradas) {
        const total = paradas?.length || 0;
        const visitadas = (paradas || []).filter((parada) => parada.estado === "VISITADA").length;
        return { total, visitadas, pendientes: Math.max(total - visitadas, 0) };
      }

      function renderRutaSignals({ turnoOk, unidadOk, ubicacionLista, pendientesOffline, draft, rutaData }) {
        const gpsTone = ubicacionLista ? "ok" : draft.geoStatus === "denied" || draft.geoStatus === "unavailable" ? "bad" : "warn";
        const gpsLabel = ubicacionLista ? "Lista para registrar" : draft.geoStatus === "loading" ? "Obteniendo señal" : "Pendiente";
        const turnoTone = turnoOk && unidadOk ? "ok" : "warn";
        const turnoLabel = turnoOk ? (unidadOk ? "Unidad correcta" : "Unidad distinta") : "Sin turno abierto";
        const queueTone = pendientesOffline ? "warn" : "ok";
        const queueLabel = pendientesOffline ? `${pendientesOffline} pendiente${pendientesOffline === 1 ? "" : "s"}` : "Sin pendientes";
        const autoStatus = state.routeAutoTrackingStatus || "idle";
        const autoTone = ["enviado", "activo", "capturando"].includes(autoStatus) ? "ok" : autoStatus === "idle" ? "warn" : "bad";
        const autoLabel = {
          idle: "Esperando ruta",
          activo: "Activo cada 90 s",
          capturando: "Capturando GPS",
          enviado: state.routeAutoTrackingLastSentAt ? `Último ${formatDate(state.routeAutoTrackingLastSentAt)}` : "Enviado",
          pendiente_offline: "Pendiente local",
          rechazado_api: "Rechazado por control",
          gps_denegado: "Permiso bloqueado"
        }[autoStatus] || autoStatus;
        const lastSignal = rutaData?.ultima_ubicacion?.timestamp_servidor ? formatDate(rutaData.ultima_ubicacion.timestamp_servidor) : "Sin señal previa";
        return `
          <div class="route-signal-grid" aria-label="Estado operativo de la ruta">
            <div class="route-signal ${autoTone}"><b>Auto-tracking</b><span>${escapeHtml(autoLabel)}</span></div>
            <div class="route-signal ${gpsTone}"><b>GPS</b><span>${escapeHtml(gpsLabel)}${draft.precision_metros ? ` · ${escapeHtml(draft.precision_metros)} m` : ""}</span></div>
            <div class="route-signal ${turnoTone}"><b>Turno</b><span>${escapeHtml(turnoLabel)}</span></div>
            <div class="route-signal ${queueTone}"><b>Sin conexión</b><span>${escapeHtml(queueLabel)}</span></div>
            <div class="route-signal"><b>Última señal</b><span>${escapeHtml(lastSignal)}</span></div>
            <div class="route-signal ${state.routeTrackingFailedCount ? "bad" : "ok"}"><b>Rechazos</b><span>${state.routeTrackingFailedCount ? `${state.routeTrackingFailedCount} por revisar` : "Sin rechazos"}</span></div>
          </div>
        `;
      }

      function entregaTone(estado) {
        if (estado === "ENTREGADA") return "ok";
        if (estado === "CON_DIFERENCIA" || estado === "NO_ENTREGADA") return "bad";
        return "warn";
      }

      function entregaLabel(parada) {
        const estado = parada?.entrega_estado || "PENDIENTE";
        const label = parada?.entrega_estado_display || {
          PENDIENTE: "Recepción Point pendiente",
          ENTREGADA: "Recibido en Point",
          CON_DIFERENCIA: "Point recibió con diferencia",
          NO_ENTREGADA: "Point sin recepción"
        }[estado] || estado;
        return parada?.entrega_confirmada_en ? `${label} · ${formatDate(parada.entrega_confirmada_en)}` : label;
      }

      function pointRecepcionTone(linea) {
        const estado = linea?.point_recepcion_estado || "PENDIENTE_POINT";
        if (estado === "RECIBIDO_OK") return "ok";
        if (estado === "RECIBIDO_DIFERENCIA" || estado === "RECIBIDO_CERO") return "bad";
        return "warn";
      }

      function pointRecepcionLabel(linea) {
        if (!linea?.point_is_received) return "Point pendiente";
        const cantidad = linea.point_received_quantity ?? "0";
        const unit = linea.unit || "";
        const fecha = linea.point_received_at ? ` · ${formatDate(linea.point_received_at)}` : "";
        return `Point recibió ${cantidad} ${unit}${fecha}`;
      }

      function renderParadasRuta(paradas) {
        if (!paradas?.length) return `<p class="unit-line">Esta ruta no tiene paradas configuradas.</p>`;
        return `<div class="route-stop-list">` + paradas.map((parada) => {
          const visited = parada.estado === "VISITADA";
          const entrega = parada.entrega_estado || "PENDIENTE";
          return `
            <section class="route-stop ${visited ? "visited" : ""}" tabindex="0">
              <span class="route-stop-number">${visited ? "OK" : escapeHtml(parada.orden)}</span>
              <div>
                <strong>${escapeHtml(parada.punto_nombre_snapshot || parada.punto?.nombre || "Punto")}</strong>
                <span class="route-stop-meta">${escapeHtml(parada.punto?.tipo_display || parada.punto?.tipo || "Punto")} · Geocerca ${escapeHtml(parada.radio_geocerca_metros || parada.punto?.radio_geocerca_metros || "-")} m</span>
                <span class="route-stop-meta">${escapeHtml(parada.estado_display || parada.estado || "")}${parada.hora_llegada_real ? ` · llegada ${formatDate(parada.hora_llegada_real)}` : ""}</span>
                <span class="route-stop-meta">${escapeHtml(parada.entrega_notas || "La ruta puede continuar; cierre final espera recepción Point.")}</span>
                <div class="route-status-row">
                  <span class="route-status-pill ${entregaTone(entrega)}">${escapeHtml(entregaLabel(parada))}</span>
                </div>
              </div>
            </section>
          `;
        }).join("") + `</div>`;
      }

      function renderEventosRuta(eventos) {
        if (!eventos?.length) return `<p class="muted">Sin eventos registrados en esta ruta.</p>`;
        return `<div class="route-event-list">` + eventos.slice(0, 5).map((evento) => `
          <section class="route-event ${escapeHtml(evento.severidad || "")}">
            <strong>${escapeHtml(evento.tipo_display || evento.tipo || "Evento")}</strong><br>
            ${escapeHtml(evento.descripcion || "")}
            <br><span class="muted">${formatDate(evento.creado_en)}</span>
          </section>
        `).join("") + `</div>`;
      }

      function cargaDraftFor(lineaId) {
        state.rutaCargaDraft[lineaId] = state.rutaCargaDraft[lineaId] || { cantidad: "", motivo: "", notas: "", guardando: false };
        return state.rutaCargaDraft[lineaId];
      }

      function updateCargaLinea(lineaId, field, value) {
        const draft = cargaDraftFor(lineaId);
        draft[field] = value;
      }

      function renderChecklistCarga(checklist) {
        if (!checklist) return "";
        const lineas = checklist.lineas || [];
        const total = Number(checklist.total_lineas || lineas.length || 0);
        const confirmadas = Number(checklist.lineas_confirmadas || 0);
        const pendientes = Number(checklist.lineas_pendientes || Math.max(total - confirmadas, 0));
        const pct = total ? Math.round((confirmadas / total) * 100) : 0;
        const statusText = checklist.estatus_display || checklist.estatus || "Pendiente";
        if (!total) {
          return `
            <section class="card route-card-pwa">
              <h2 style="margin:0;color:var(--gold);">Carga de ruta</h2>
              <p class="unit-line">Sin carga esperada sincronizada desde Point.</p>
              <p class="muted">Logística debe sincronizar las transferencias abiertas antes de confirmar salida.</p>
            </section>
          `;
        }
        return `
          <section class="card route-card-pwa">
            <div class="route-head">
              <div>
                <h2 style="margin:0;color:var(--gold);">Carga de ruta</h2>
                <p class="route-folio">${escapeHtml(statusText)} · ${confirmadas} de ${total} línea${total === 1 ? "" : "s"}</p>
              </div>
              <span class="route-chip">${pct}%</span>
            </div>
            <div class="route-progress-track" aria-label="Avance de carga ${pct}%">
              <div class="route-progress-fill" style="--route-progress:${pct}%;"></div>
            </div>
            ${pendientes ? `<div class="daily-banner warning">Faltan ${pendientes} producto${pendientes === 1 ? "" : "s"} por revisar antes de salida.</div>` : `<p class="success">Carga revisada.</p>`}
            <div class="route-stop-list">
              ${lineas.map((linea) => {
                const draft = cargaDraftFor(linea.id);
                const pendiente = linea.estatus === "PENDIENTE";
                const diferencia = ["PARCIAL", "FALTANTE", "SOBRANTE"].includes(linea.estatus);
                const cantidadValue = draft.cantidad || linea.cantidad_cargada || linea.cantidad_enviada_esperada || "0";
                return `
                  <section class="route-stop ${pendiente ? "" : "visited"}">
                    <span class="route-stop-number">${pendiente ? escapeHtml(linea.parada_orden || "") : "OK"}</span>
                    <div>
                      <strong>${escapeHtml(linea.item_name || "Producto")}</strong>
                      <span class="route-stop-meta">${escapeHtml(linea.parada_nombre || "Parada")} · esperado ${escapeHtml(linea.cantidad_enviada_esperada || "0")} ${escapeHtml(linea.unit || "")}</span>
                      <span class="route-stop-meta">${escapeHtml(linea.estatus_display || linea.estatus || "")}${diferencia ? ` · ${escapeHtml(linea.motivo_diferencia_display || linea.motivo_diferencia || "")}` : ""}</span>
                      <div class="route-status-row">
                        <span class="route-status-pill ${linea.cantidad_cargada !== null && linea.cantidad_cargada !== undefined ? "ok" : "warn"}">Cargado ${escapeHtml(linea.cantidad_cargada ?? "pendiente")} ${escapeHtml(linea.unit || "")}</span>
                        <span class="route-status-pill ${pointRecepcionTone(linea)}">${escapeHtml(pointRecepcionLabel(linea))}</span>
                      </div>
                      ${pendiente ? `
                        <div class="form-salida" style="margin-top:10px;">
                          <label for="carga_${linea.id}">Cantidad real</label>
                          <input id="carga_${linea.id}" type="number" min="0" step="0.001" value="${escapeHtml(cantidadValue)}" oninput="updateCargaLinea(${linea.id}, 'cantidad', this.value)">
                          <label for="motivo_${linea.id}">Motivo si hay diferencia</label>
                          <select id="motivo_${linea.id}" onchange="updateCargaLinea(${linea.id}, 'motivo', this.value)">
                            <option value="">Sin diferencia</option>
                            <option value="stock_limitado">Stock limitado</option>
                            <option value="sin_stock">No hay stock</option>
                            <option value="produccion_no_lista">Producción aún no está lista</option>
                            <option value="producto_danado">Producto dañado</option>
                            <option value="cambio_autorizado">Cambio autorizado</option>
                            <option value="otro">Otro</option>
                          </select>
                        </div>
                        <button class="secondary-btn" type="button" onclick="validarCargaLinea(${linea.id})" ${draft.guardando ? "disabled" : ""}>${draft.guardando ? "Guardando..." : "Guardar revisión"}</button>
                      ` : ""}
                    </div>
                  </section>
                `;
              }).join("")}
            </div>
          </section>
        `;
      }

      async function renderRutaActiva(message = "") {
        let rutaData = null;
        let turnoActivo = null;
        try {
          rutaData = await loadRutaActiva();
        } catch (error) {
          rutaData = null;
        }
        try {
          turnoActivo = await loadTurnoActivo();
        } catch (error) {
          turnoActivo = null;
        }
        const draft = ensureRutaTrackingDraft();
        if (!rutaData?.ruta?.id) {
          stopRutaAutoTracking();
          return render(shell(`
            <button class="secondary-btn" onclick="showScreen('dashboard')">← Volver</button>
            <h1 class="screen-title" style="margin-top:16px;">Mi ruta</h1>
            ${message ? `<p class="${message.startsWith("✅") ? "success" : "error"}">${escapeHtml(message)}</p>` : ""}
            <section class="card route-card-pwa">
              <div class="route-head">
                <div>
                  <h2>Sin ruta activa</h2>
                  <p class="muted">Cuando logística libere una ruta para ti, aparecerá aquí.</p>
                </div>
              </div>
              <button class="secondary-btn" onclick="showScreen('dashboard')">Volver al inicio</button>
            </section>
          `));
        }
        const ruta = rutaData.ruta;
        const rutaEnSeguimiento = ruta.estatus === "EN_RUTA";
        const ubicacionLista = isGeoReady(draft);
        const turnoOk = Boolean(turnoActivo?.id);
        const unidadOk = turnoOk && String(turnoActivo.unidad) === String(ruta.unidad_operativa);
        const pendientesOffline = loadRutaTrackingQueue().length;
        const paradas = rutaData.paradas || [];
        const counts = routeStopCounts(paradas);
        const progress = routeProgressValue(ruta, paradas);
        state.trackingQueueCount = pendientesOffline;
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Mi ruta</h1>
          ${message ? `<p class="${message.startsWith("✅") ? "success" : "error"}">${escapeHtml(message)}</p>` : ""}
          <section class="route-hero">
            <div class="route-head">
              <div>
                <h2>${escapeHtml(ruta.nombre || ruta.folio)}</h2>
                <p class="route-folio">${escapeHtml(ruta.folio)} · ${escapeHtml(ruta.estatus_display || ruta.estatus || "")}</p>
              </div>
              <span class="route-chip">${escapeHtml(progress)}%</span>
            </div>
            <div class="route-progress-card">
              <div class="route-progress-top">
                <span>${escapeHtml(counts.visitadas)} visitada${counts.visitadas === 1 ? "" : "s"} de ${escapeHtml(counts.total)}</span>
                <span>${escapeHtml(counts.pendientes)} pendiente${counts.pendientes === 1 ? "" : "s"}</span>
              </div>
              <div class="route-progress-track" aria-label="Avance de ruta ${escapeHtml(progress)}%">
                <div class="route-progress-fill" style="--route-progress:${escapeHtml(progress)}%;"></div>
              </div>
            </div>
            <p class="unit-line">${escapeHtml(ruta.unidad_operativa_codigo || "Unidad asignada")} · ${counts.total} parada${counts.total === 1 ? "" : "s"} programada${counts.total === 1 ? "" : "s"}</p>
            ${renderRutaSignals({ turnoOk, unidadOk, ubicacionLista, pendientesOffline, draft, rutaData })}
          </section>

          ${renderChecklistCarga(rutaData.checklist_carga)}

          <section class="card route-action-panel">
            ${rutaEnSeguimiento ? "" : `<div class="daily-banner warning">Ruta en planeación. Revisa la carga; el GPS se activa cuando logística libere la ruta.</div>`}
            ${turnoOk ? "" : `<div class="daily-banner warning">Inicia turno en Bitácora antes de registrar seguimiento.</div>`}
            ${turnoOk && !unidadOk ? `<div class="daily-banner warning">Tu turno activo no corresponde a la unidad asignada a esta ruta.</div>` : ""}
            ${pendientesOffline ? `<div class="daily-banner warning">${pendientesOffline} seguimiento${pendientesOffline === 1 ? "" : "s"} pendiente${pendientesOffline === 1 ? "" : "s"} por enviar. Se reintentará automáticamente al recuperar conexión.</div>` : ""}
            <div class="route-actions-main">
              <button class="primary-btn" type="button" onclick="capturarUbicacionRuta()" ${rutaEnSeguimiento && draft.geoStatus !== "loading" ? "" : "disabled"}>${ubicacionLista ? "Actualizar ubicación GPS" : "Capturar ubicación GPS"}</button>
              ${ubicacionLista ? `<button class="secondary-btn" type="button" onclick="toggleDesvioRuta()">${draft.fuera_de_ruta_confirmado ? "Cancelar desvío" : "Reportar desvío"}</button>` : ""}
              ${draft.fuera_de_ruta_confirmado ? `
                <div class="route-desvio-field">
                  <label for="desvio-motivo">Motivo breve obligatorio</label>
                  <input id="desvio-motivo" class="input-field" type="text" maxlength="160" placeholder="Ej. cierre de calle, instrucción de supervisor" value="${escapeHtml(draft.desvio_motivo)}" oninput="updateDesvioMotivo(this.value)">
                  <p class="muted">Se guardará como evidencia al registrar seguimiento.</p>
                </div>
              ` : ""}
              <button class="primary-btn" type="button" onclick="registrarTrackingRuta()" ${rutaEnSeguimiento && turnoOk && unidadOk && ubicacionLista && !draft.guardando ? "" : "disabled"}>${draft.guardando ? "Guardando..." : "Registrar seguimiento"}</button>
            </div>
          </section>
          <section class="card route-card-pwa">
            <h2 style="margin:0;color:var(--gold);">Paradas de reparto</h2>
            ${renderParadasRuta(paradas)}
          </section>
          <section class="card route-card-pwa">
            <h2 style="margin:0;color:var(--gold);">Eventos recientes</h2>
            ${renderEventosRuta(rutaData.eventos || [])}
          </section>
          ${draft.geoStatus === "idle" ? "" : geoOverlay(draft, "capturarUbicacionRuta")}
        `));
        ensureRutaAutoTracking(ruta.id, rutaEnSeguimiento && turnoOk && unidadOk);
      }

      async function validarCargaLinea(lineaId) {
        const rutaId = state.rutaActiva?.ruta?.id;
        if (!rutaId) return renderRutaActiva("No hay ruta para validar carga.");
        const draft = cargaDraftFor(lineaId);
        const cantidad = String(draft.cantidad || "").trim();
        if (!cantidad) return renderRutaActiva("Captura la cantidad real cargada.");
        draft.guardando = true;
        await renderRutaActiva();
        try {
          const response = await apiFetch(`/rutas/${rutaId}/carga-checklist/lineas/${lineaId}/validar/`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              cantidad_cargada: cantidad,
              motivo_diferencia: draft.motivo || "",
              notas: draft.notas || "",
              client_event_id: newClientEventId()
            })
          });
          if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            return renderRutaActiva(apiErrorMessage(error, "No se pudo validar la carga."));
          }
          delete state.rutaCargaDraft[lineaId];
          state.rutaActiva = null;
          return renderRutaActiva("✅ Carga revisada.");
        } catch (error) {
          return renderRutaActiva(error?.message === "Sesión expirada" ? "Tu sesión expiró. Vuelve a iniciar sesión." : "No se pudo guardar la carga. Reintenta con señal.");
        } finally {
          draft.guardando = false;
        }
      }

      async function registrarTrackingRuta() {
        const draft = ensureRutaTrackingDraft();
        const rutaId = state.rutaActiva?.ruta?.id;
        if (!rutaId) return renderRutaActiva("No hay ruta activa.");
        if (!isGeoReady(draft)) return renderRutaActiva("Captura ubicación antes de registrar seguimiento.");
        if (draft.fuera_de_ruta_confirmado && !String(draft.desvio_motivo || "").trim()) {
          return renderRutaActiva("Indica un motivo breve para registrar el desvío.");
        }
        const trackingPayload = {
          latitud: draft.latitud,
          longitud: draft.longitud,
          precision_metros: draft.precision_metros,
          timestamp_dispositivo: draft.timestamp_dispositivo || new Date().toISOString(),
          client_event_id: draft.client_event_id || newClientEventId(),
          tracking_origen: "manual_pwa",
          fuera_de_ruta_confirmado: draft.fuera_de_ruta_confirmado,
          desvio_motivo: draft.desvio_motivo
        };
        draft.guardando = true;
        await renderRutaActiva();
        let response;
        try {
          response = await apiFetch(`/rutas/${rutaId}/tracking/`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(trackingPayload)
          });
          if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            return renderRutaActiva(apiErrorMessage(error, "No se pudo registrar seguimiento."));
          }
        } catch (error) {
          if (error?.message === "Sesión expirada") {
            return renderRutaActiva("Tu sesión expiró. Vuelve a iniciar sesión para registrar seguimiento.");
          }
          enqueueRutaTracking({ ruta_id: rutaId, payload: trackingPayload });
          state.rutaTrackingDraft = null;
          return renderRutaActiva("Sin conexión: seguimiento guardado para reintento.");
        } finally {
          draft.guardando = false;
        }
        state.rutaTrackingDraft = null;
        await flushRutaTrackingQueue();
        await renderRutaActiva("✅ Seguimiento registrado.");
      }

      function renderAyuda() {
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Ayuda rápida</h1>
          <p class="unit-line">Guía corta para capturar correctamente en la app.</p>
          <div class="help-list">
            <section class="help-card">
              <h2>Todos los días</h2>
              <ol>
                <li>Antes de usar una unidad, inicia turno en Bitácora.</li>
                <li>Selecciona la unidad real que vas a usar.</li>
                <li>Haz inspección si vas a revisar el estado de la unidad.</li>
                <li>Al terminar, vuelve a Bitácora y cierra el turno.</li>
              </ol>
            </section>
            <section class="help-card">
              <h2>Bitácora</h2>
              <ul>
                <li>KM llegada debe ser igual o mayor al KM salida.</li>
                <li>Se requiere foto del tablero al iniciar y al cerrar.</li>
                <li>Si cargaste combustible, captura litros, costo y foto del ticket.</li>
                <li>Si queda "ABIERTO", falta cerrar el turno.</li>
              </ul>
            </section>
            <section class="help-card">
              <h2>Inspección</h2>
              <ul>
                <li>Marca OK solo si el accesorio está presente y funciona.</li>
                <li>Deja Falta si no está, está dañado o no funciona.</li>
                <li>Si hay golpes, describe dónde están y toma foto.</li>
              </ul>
            </section>
            <section class="help-card">
              <h2>Reportes</h2>
              <ul>
                <li>Usa Nuevo Reporte para fallas, llantas, accidentes, combustible u otros eventos.</li>
                <li>Describe el problema con claridad y agrega foto cuando aplique.</li>
                <li>Revisa el seguimiento en Mis Reportes.</li>
              </ul>
            </section>
            <section class="help-card">
              <h2>Ubicación y fotos</h2>
              <ul>
                <li>Permite ubicación cuando la app lo pida.</li>
                <li>Las fotos deben tomarse en el momento con la cámara.</li>
                <li>No uses fotos viejas de galería.</li>
              </ul>
            </section>
          </div>
        `));
      }

      function startNuevoReporte() {
        state.reporteDraft = {
          step: 1,
          unidad: "",
          tipo: "",
          tipoLabel: "",
          severidad: "",
          descripcion: "",
          foto: null,
          kilometraje: "",
          latitud: "",
          longitud: "",
          geoStatus: "idle",
          geoLabel: "",
          fotoError: "",
          reportesAbiertos: [],
          reportesAbiertosLoading: false,
        };
        showScreen("nuevo_reporte");
      }

      function progressDots(step) {
        return `<div class="progress">${[1, 2, 3].map((n) => `<span class="dot ${step === n ? "active" : ""}"></span>`).join("")}</div>`;
      }

      function getUnidadLabel(unidadId) {
        const unidad = state.unidades.find((item) => String(item.id) === String(unidadId));
        return unidad ? `${unidad.codigo} · ${unidad.descripcion || ""}` : "-";
      }

      async function cargarReportesAbiertosUnidad() {
        const draft = state.reporteDraft;
        if (!draft?.unidad) {
          draft.reportesAbiertos = [];
          draft.reportesAbiertosLoading = false;
          return [];
        }
        draft.reportesAbiertosLoading = true;
        const tipoParam = draft.tipo ? `&tipo=${encodeURIComponent(draft.tipo)}` : "";
        const response = await apiFetch(`/reportes/abiertos-unidad/?unidad_id=${encodeURIComponent(draft.unidad)}${tipoParam}`);
        draft.reportesAbiertosLoading = false;
        draft.reportesAbiertos = response.ok ? await response.json() : [];
        return draft.reportesAbiertos;
      }

      function reportesAbiertosUnidadHtml(draft) {
        if (!draft.unidad) return "";
        if (draft.reportesAbiertosLoading) return `<p class="unit-line">Revisando reportes abiertos de esta unidad...</p>`;
        if (!draft.reportesAbiertos?.length) {
          return `<p class="muted">No hay reportes abiertos ${draft.tipo ? "de este tipo " : ""}para esta unidad. Si es algo nuevo, continúa.</p>`;
        }
        return `
          <section class="card report-card">
            <h2 style="color:var(--gold);margin-top:0;">Reportes abiertos de esta unidad</h2>
            <p class="muted">Si tu problema ya está aquí, usa “Volver a reportar” para insistir sin crear un ticket duplicado.</p>
            ${draft.reportesAbiertos.map((reporte) => `
              <article class="duplicate-report-card">
                <h3>${escapeHtml(reporte.tipo_display || reporte.tipo)} · ${escapeHtml(reporte.estatus_display || reporte.estatus)}</h3>
                <p class="meta">ID ${escapeHtml(reporte.id)} · ${escapeHtml(reporte.repartidor_nombre || "")} · ${formatDate(reporte.fecha_reporte)}</p>
                <p>${escapeHtml((reporte.descripcion || "").slice(0, 140))}${(reporte.descripcion || "").length > 140 ? "..." : ""}</p>
                <p class="muted">Reafirmado ${escapeHtml(reporte.reafirmaciones_count || 0)} ${Number(reporte.reafirmaciones_count || 0) === 1 ? "vez" : "veces"}.</p>
                <button class="secondary-btn" type="button" onclick="reafirmarReporte(${Number(reporte.id)})">Volver a reportar</button>
              </article>
            `).join("")}
          </section>
        `;
      }

      async function seleccionarUnidadReporte(value) {
        state.reporteDraft.unidad = value;
        state.reporteDraft.reportesAbiertos = [];
        renderNuevoReporte();
        await cargarReportesAbiertosUnidad();
        renderNuevoReporte();
      }

      async function renderNuevoReporte(error = "") {
        const draft = state.reporteDraft;
        let body = "";
        if (draft.step === 1) {
          if (!state.unidades.length) await loadUnidades();
          body = `
            <h1 class="screen-title">Nuevo reporte</h1>
            ${progressDots(1)}
            <div class="field">
              <label for="unidad_reporte">Unidad que vas a usar</label>
              <select id="unidad_reporte" required onchange="seleccionarUnidadReporte(this.value)">
                <option value="">Selecciona unidad</option>
                ${state.unidades.map((unidad) => `<option value="${unidad.id}" ${String(draft.unidad) === String(unidad.id) ? "selected" : ""}>${escapeHtml(unidad.codigo)} · ${escapeHtml(unidad.descripcion || "")}</option>`).join("")}
              </select>
            </div>
            <div class="card-grid">
              ${tipos.map((tipo) => `
                <button class="option-card ${draft.tipoLabel === tipo.label ? "selected" : ""}" onclick="selectTipo('${tipo.value}', '${tipo.label}')">
                  <span>${tipo.icon}</span><br>${tipo.label}
                </button>
              `).join("")}
            </div>
            ${reportesAbiertosUnidadHtml(draft)}
            <div class="actions">
              <button class="secondary-btn" onclick="showScreen('dashboard')">Cancelar</button>
              <button class="primary-btn" onclick="nextReporteStep()" ${draft.unidad && draft.tipo ? "" : "disabled"}>Siguiente</button>
            </div>
          `;
        } else if (draft.step === 2) {
          const ubicacionLista = isGeoReady(draft);
          body = `
            <div class="${ubicacionLista ? "" : "gps-locked"}">
              <h1 class="screen-title">Detalles</h1>
              ${progressDots(2)}
              <div class="severity-row">
                ${severidades.map((sev) => `
                  <button class="severity-card ${draft.severidad === sev.value ? "selected" : ""}" style="border-left:5px solid ${sev.color}" onclick="selectSeveridad('${sev.value}')">
                    ${sev.icon} ${sev.label}
                  </button>
                `).join("")}
              </div>
              <div class="field">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" required oninput="state.reporteDraft.descripcion = this.value">${escapeHtml(draft.descripcion)}</textarea>
              </div>
              <div class="field">
                <label for="foto">Foto</label>
                ${fotoInput("foto", Boolean(draft.foto), "setFotoReporte(this)")}
                ${draft.fotoError ? `<p class="error">${escapeHtml(draft.fotoError)}</p>` : ""}
              </div>
              <div class="field">
                <label for="kilometraje">Kilometraje</label>
                <input id="kilometraje" type="number" min="0" value="${escapeHtml(draft.kilometraje)}" oninput="state.reporteDraft.kilometraje = this.value">
              </div>
              <p class="gps-registered">📍 Ubicación registrada</p>
              ${error ? `<p class="error">${escapeHtml(error)}</p>` : ""}
              <div class="actions">
                <button class="secondary-btn" onclick="prevReporteStep()">Atrás</button>
                <button class="primary-btn" onclick="nextReporteStep()" ${ubicacionLista && draft.foto ? "" : "disabled"}>Siguiente</button>
              </div>
            </div>
            ${geoOverlay(draft, "capturarUbicacionReporte")}
          `;
        } else {
          body = `
            <h1 class="screen-title">Confirmar</h1>
            ${progressDots(3)}
            <section class="card report-card">
              <div class="kv"><b>Tipo</b><span>${escapeHtml(draft.tipoLabel)}</span></div>
              <div class="kv"><b>Unidad</b><span>${escapeHtml(getUnidadLabel(draft.unidad))}</span></div>
              <div class="kv"><b>Severidad</b><span>${escapeHtml(draft.severidad)}</span></div>
              <div class="kv"><b>Kilometraje</b><span>${escapeHtml(draft.kilometraje || "-")}</span></div>
              <div class="kv"><b>Ubicación</b><span>${draft.latitud ? "📍 Ubicación registrada" : "-"}</span></div>
              <div class="kv"><b>Descripción</b><span>${escapeHtml(draft.descripcion)}</span></div>
            </section>
            ${error ? `<p class="error">${escapeHtml(error)}</p>` : ""}
            <div class="actions">
              <button class="secondary-btn" onclick="prevReporteStep()">Atrás</button>
              <button class="primary-btn" onclick="enviarReporte()" ${isGeoReady(draft) && draft.foto ? "" : "disabled"}>Enviar reporte</button>
            </div>
          `;
        }
        render(shell(body));
      }

      function selectTipo(value, label) {
        state.reporteDraft.tipo = value;
        state.reporteDraft.tipoLabel = label;
        renderNuevoReporte();
        if (state.reporteDraft.unidad) {
          cargarReportesAbiertosUnidad().then(() => renderNuevoReporte());
        }
      }

      function selectSeveridad(value) {
        state.reporteDraft.severidad = value;
        renderNuevoReporte();
      }

      function nextReporteStep() {
        const draft = state.reporteDraft;
        if (draft.step === 1 && !draft.tipo) return;
        if (draft.step === 1 && !draft.unidad) return;
        if (draft.step === 2 && (!draft.severidad || !draft.descripcion.trim())) {
          return renderNuevoReporte("Selecciona severidad y escribe una descripción.");
        }
        if (draft.step === 2 && !isGeoReady(draft)) {
          return renderNuevoReporte("Se requiere ubicación para continuar");
        }
        if (draft.step === 2 && !draft.foto) return renderNuevoReporte("La foto debe tomarse en este momento.");
        draft.step = Math.min(3, draft.step + 1);
        renderNuevoReporte();
      }

      function prevReporteStep() {
        state.reporteDraft.step = Math.max(1, state.reporteDraft.step - 1);
        renderNuevoReporte();
      }

      function capturarUbicacionReporte() {
        requestLocation(state.reporteDraft, renderNuevoReporte, "latitud", "longitud");
      }

      function setFotoReporte(input) {
        setLivePhoto(input, state.reporteDraft, "foto", null, renderNuevoReporte);
      }

      async function enviarReporte() {
        const draft = state.reporteDraft;
        if (!isGeoReady(draft) || !draft.foto) return renderNuevoReporte("Se requiere ubicación y foto tomada en este momento.");
        const form = new FormData();
        form.append("unidad", draft.unidad);
        form.append("tipo", draft.tipo);
        form.append("severidad", draft.severidad);
        form.append("descripcion", draft.descripcion);
        if (draft.foto) form.append("foto", draft.foto);
        if (draft.kilometraje) form.append("kilometraje", draft.kilometraje);
        if (draft.latitud) form.append("latitud", draft.latitud);
        if (draft.longitud) form.append("longitud", draft.longitud);
        const response = await apiFetch("/reportes/", { method: "POST", body: form });
        if (!response.ok) return renderNuevoReporte("No se pudo enviar el reporte. Revisa los datos.");
        const creado = await response.json();
        render(shell(`
          <section class="confirm">
            <div class="confirm-mark">✅</div>
            <h1 class="screen-title">Reporte enviado</h1>
            <p class="unit-line">✅ Reporte enviado · ID: ${escapeHtml(creado.id || "-")}</p>
            <p class="muted">Compras recibió el ticket y dará seguimiento.</p>
            <button class="primary-btn" onclick="showScreen('dashboard')">Volver al inicio</button>
          </section>
        `));
      }

      async function reafirmarReporte(reporteId) {
        const payload = new FormData();
        payload.append("comentario", "Reafirmado desde PWA por repartidor.");
        const response = await apiFetch(`/reportes/${reporteId}/reafirmar/`, {
          method: "POST",
          body: payload
        });
        if (!response.ok) return renderNuevoReporte("No se pudo reafirmar el reporte. Intenta de nuevo.");
        const data = await response.json();
        render(shell(`
          <section class="confirm">
            <div class="confirm-mark">✅</div>
            <h1 class="screen-title">Reporte reafirmado</h1>
            <p class="unit-line">${escapeHtml(data.mensaje || "Se avisó nuevamente sobre este ticket.")}</p>
            <p class="muted">No se creó un ticket duplicado. El responsable verá que este reporte sigue pendiente.</p>
            <button class="primary-btn" onclick="showScreen('dashboard')">Volver al inicio</button>
          </section>
        `));
      }

      async function renderMisReportes() {
        await loadReportes();
        const cards = state.reportes.length ? state.reportes.map((r) => {
          const desc = (r.descripcion || "").length > 80 ? `${r.descripcion.slice(0, 80)}...` : r.descripcion;
          return `
            <article class="card report-card" onclick="this.classList.toggle('expanded')">
              <div class="report-head">
                <div>
                  <p class="report-title">${escapeHtml(r.unidad_codigo)} · ${escapeHtml(r.tipo_display || r.tipo)}</p>
                  <p class="muted">${formatDate(r.fecha_reporte)}</p>
                </div>
                <span class="status ${escapeHtml(r.estatus)}">${escapeHtml(r.estatus_display || r.estatus)}</span>
              </div>
              <p>${escapeHtml(desc)}</p>
              <div class="detail">
                <div class="kv"><b>Severidad</b><span>${escapeHtml(r.severidad_display || r.severidad)}</span></div>
                <div class="kv"><b>Kilometraje</b><span>${escapeHtml(r.kilometraje || "-")}</span></div>
                <div class="kv"><b>Proveedor</b><span>${escapeHtml(r.proveedor_servicio || "-")}</span></div>
                <div class="kv"><b>Notas</b><span>${escapeHtml(r.notas_compras || "-")}</span></div>
                <div class="kv"><b>Descripción</b><span>${escapeHtml(r.descripcion)}</span></div>
              </div>
            </article>
          `;
        }).join("") : `<div class="empty">Todavía no tienes reportes registrados.</div>`;
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Mis reportes</h1>
          ${cards}
        `));
      }

      function renderMiUnidad() {
        const unidad = state.perfil?.unidad || {};
        const servicios = (state.perfil?.ultimosServicios || []).filter((r) => r.estatus === "cerrado");
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">← Volver</button>
          <h1 class="screen-title" style="margin-top:16px;">Mi unidad</h1>
          <section class="card report-card">
            <div class="kv"><b>Código</b><span>${escapeHtml(unidad.codigo || "-")}</span></div>
            <div class="kv"><b>Descripción</b><span>${escapeHtml(unidad.descripcion || "-")}</span></div>
            <div class="kv"><b>Placa</b><span>${escapeHtml(unidad.placa || "-")}</span></div>
          </section>
          <h2 class="report-title" style="margin:18px 0 10px;">Historial de servicios</h2>
          ${servicios.length ? servicios.map((s) => `
            <section class="card report-card">
              <p class="report-title">${escapeHtml(s.tipo_display || s.tipo)}</p>
              <p class="muted">${formatDate(s.fecha_reporte)}</p>
              <div class="kv"><b>Costo</b><span>${s.costo_servicio ? `$${escapeHtml(s.costo_servicio)}` : "-"}</span></div>
            </section>
          `).join("") : `<div class="empty">Sin servicios cerrados recientes.</div>`}
        `));
      }

      async function loadBitacoras() {
        const response = await apiFetch("/bitacora/");
        state.bitacoras = response.ok ? await response.json() : [];
        return state.bitacoras;
      }

      async function renderBitacora(message = "") {
        await loadBitacoras();
        const hoy = todayIso();
        const actual = state.bitacoras.find((b) => b.fecha === hoy);
        const readOnly = actual && !state.editandoBitacora;
        const body = readOnly ? `
