name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_erp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_erp
      SECRET_KEY: ci-secret-key-temporal
      APP_ENV: local
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      TIME_ZONE: America/Mazatlan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django checks
        run: python manage.py check

      - name: Verify migrations are committed
        run: python manage.py makemigrations --check --dry-run

      - name: Run focused cierre inventario tests
        run: |
          python manage.py test \
            pos_bridge.tests.test_product_month_closure_service \
            pos_bridge.tests.test_movement_sync_service.PointMovementSyncServiceTests \
            pos_bridge.tests.test_sales_sync_tasks.PointSalesSyncTaskRoutingTests.test_run_monthly_product_closure_targets_previous_month_by_default

      - name: Run legacy full test suite
        continue-on-error: true
        run: python manage.py test
