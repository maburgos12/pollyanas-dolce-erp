version: '3.8'
services:
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    volumes:
      - static_files:/app/staticfiles
    restart: always

volumes:
  static_files:
