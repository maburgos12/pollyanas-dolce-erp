{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pollyanas Dolce ERP</title>
    <link rel="icon" href="{% static 'favicon.ico' %}?v=20260525-logo-v1" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon-32x32.png' %}?v=20260525-logo-v1">
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'favicon-192x192.png' %}?v=20260525-logo-v1">
    <link rel="apple-touch-icon" href="{% static 'apple-touch-icon.png' %}?v=20260525-logo-v1">
    <link rel="manifest" href="{% static 'manifest.webmanifest' %}?v=20260622-erp-pwa-v1">
    <meta name="theme-color" content="#8B2252">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Pollyana ERP">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}?v=20260606-alert-close-v1">
    <link rel="stylesheet" href="{% static 'css/pollyana_ops_ui.css' %}?v=20260614-ui-fase-final-v1">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <img src="{% static 'core/dolce-logo-pin-transparent.png' %}" alt="Pollyana's Dolce">
                </div>
                <h1 class="login-title">Pollyana's Dolce</h1>
                <div class="login-subtitle">ERP Administrativo</div>
            </div>

            <form method="post">
                {% csrf_token %}
                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}

                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
            </form>
        </div>
    </div>
    <script>
    // ponytail: installability only; no offline login/data cache.
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/erp-sw.js?v=20260722-seguimiento-dg-compact-v21').catch(function () {});
    }
    </script>
</body>
</html>
