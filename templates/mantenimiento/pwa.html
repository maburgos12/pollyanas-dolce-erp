{% load static %}
<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#8B2252">
    <title>App Operativa</title>
    <link rel="manifest" href="{% static 'mantenimiento/manifest.json' %}?v=20260707-workflow-icon-v2">
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'operacion/app-icon-192.png' %}?v=20260707-workflow-icon-v2">
    <link rel="apple-touch-icon" href="{% static 'operacion/apple-touch-icon.png' %}?v=20260707-workflow-icon-v2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/template_modules/templates-mantenimiento-pwa.css?v=20260614-ui100-v1">
    <link rel="stylesheet" href="{% static 'operacion/app_theme.css' %}?v=20260702-home-icon-v1">
  </head>
  <body>
    <div id="app"></div>
    <script>
      const API = "/api/mantenimiento";
      const AUTH_API = "/api/logistica";
      const app = document.getElementById("app");
      const state = {
        token: localStorage.getItem("pd_mantenimiento_access") || "",
        refreshToken: localStorage.getItem("pd_mantenimiento_refresh") || "",
        perfil: null,
        pantalla: "login",
        activos: [],
        sucursales: [],
        proveedores: [],
        unidades: [],
        tiposServicio: [],
        ordenes: [],
        bandeja: [],
        bandejaFiltro: "todos",
        ordenActual: null,
        filtroOrdenes: "abiertas",
        busquedaEquipo: "",
        sucursalFiltro: "",
        equipoDraft: emptyEquipoDraft(),
        puntoDraft: emptyPuntoDraft(),
        vehiculoDraft: emptyVehiculoDraft(),
      };

      function emptyEquipoDraft() {
        return {
          step: 1,
          activo: null,
          activoLabel: "",
          ubicacionFiltro: "",
          busquedaTexto: "",
          tipo: "",
          descripcion: "",
          proveedor: "",
          costoReal: "",
          foto: null,
          fotoPreview: "",
        };
      }

      function emptyPuntoDraft() {
        return {
          sucursal: "",
          nombre: "",
          categoria: "Infraestructura",
          ubicacion: "",
          notas: "",
        };
      }

      function emptyVehiculoDraft() {
        return {
          step: 1,
          unidad: null,
          unidadLabel: "",
          modo: "",
          tipoServicio: null,
          tipoServicioLabel: "",
          descripcionFalla: "",
          descripcionReparacion: "",
          proveedor: "",
          costo: "",
          km: "",
          proximaFecha: "",
          proximosKm: "",
          foto: null,
          fotoPreview: "",
        };
      }

      function setTokens(data) {
        state.token = data.access;
        state.refreshToken = data.refresh;
        localStorage.setItem("pd_mantenimiento_access", data.access);
        localStorage.setItem("pd_mantenimiento_refresh", data.refresh);
      }

      async function useDjangoSessionToken() {
        const res = await fetch(`${API}/session-token/`, {
          headers: {"Accept": "application/json"}
        });
        if (!res.ok) return false;
        setTokens(await res.json());
        return true;
      }

      function logout(doRender = true) {
        state.token = "";
        state.refreshToken = "";
        state.perfil = null;
        localStorage.removeItem("pd_mantenimiento_access");
        localStorage.removeItem("pd_mantenimiento_refresh");
        if (doRender) window.location.href = "/logout/";
      }

      async function parseListResponse(res) {
        const data = await res.json();
        return data.results || data;
      }

      async function apiFetch(path, options = {}) {
        const headers = {...(options.headers || {})};
        if (state.token) headers.Authorization = `Bearer ${state.token}`;
        const res = await fetch(path.startsWith("http") ? path : `${API}${path}`, {...options, headers});
        if (res.status === 401 && state.refreshToken && !options._retry) {
          const refreshed = await fetch(`${AUTH_API}/auth/token/refresh/`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({refresh: state.refreshToken})
          });
          if (refreshed.ok) {
            const data = await refreshed.json();
            state.token = data.access;
            localStorage.setItem("pd_mantenimiento_access", data.access);
            return apiFetch(path, {...options, _retry: true});
          }
          logout(false);
          throw new Error("Sesion expirada");
        }
        return res;
      }

      function esc(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function render(html, autofocusId = "") {
        app.classList.add("is-changing");
        window.setTimeout(() => {
          app.innerHTML = html;
          app.classList.remove("is-changing");
          if (autofocusId) {
            const el = document.getElementById(autofocusId);
            if (el) { el.focus(); el.select && el.select(); }
          }
        }, 140);
      }

      function appGlyph(name) {
        const icons = {
          equipo: `<svg viewBox="0 0 32 32"><path class="gold-fill" d="M10 21l3 3 9-9-3-3z"/><path class="stroke" d="M10 21l3 3 9-9-3-3-9 9Z"/><path class="gold-stroke" d="M20 7c1.6-.5 3.5-.2 4.8 1.1l-3.2 3.2 2.1 2.1 3.2-3.2c.8 2.5-.4 5.4-2.9 6.6"/><path class="stroke" d="M8 24l-2 2"/></svg>`,
          vehiculo: `<svg viewBox="0 0 32 32"><path class="soft" d="M8 14h16v8H8z"/><path class="stroke" d="M11 23h.1M22 23h.1M11 14l2-5h7l3 5"/><path class="gold-stroke" d="M23 7l2 2-5 5-2-2 5-5Z"/></svg>`,
          historial: `<svg viewBox="0 0 32 32"><path class="soft" d="M10 7h12v18H10z"/><path class="gold-stroke" d="M13 12h6M13 16h6M13 20h4"/><path class="stroke" d="M8 10h2M8 15h2M8 20h2"/></svg>`,
          registrar: `<svg viewBox="0 0 32 32"><circle class="soft" cx="16" cy="16" r="10"/><path class="gold-stroke" d="M16 11v10M11 16h10"/></svg>`,
          bandeja: `<svg viewBox="0 0 32 32"><path class="soft" d="M8 20h16l-2-10H10z"/><path class="gold-stroke" d="M6 20h20M12 20l1-6h6l1 6"/><path class="stroke" d="M16 8v4M13 9l1.5 3M19 9l-1.5 3"/></svg>`
        };
        return `<span class="app-glyph" aria-hidden="true">${icons[name] || icons.equipo}</span>`;
      }

      function shell(content) {
        const nombre = esc(state.perfil?.nombre || "");
        return `
          <div class="topbar">
            <div>
              <div class="mini-brand">Pollyana's</div>
              <p class="hello">Hola, ${nombre}</p>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
              <button class="logout app-home-link" type="button" onclick="window.location.href='/app/'" aria-label="Menú principal" title="Menú principal">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.8 12 3l9 7.8"/><path d="M5.5 9.5V21h13V9.5"/><path d="M9.5 21v-6h5v6"/></svg>
              </button>
              <button class="logout" onclick="logout()">Salir</button>
            </div>
          </div>
          ${content}
          <div class="footer">Pollyana's Dolce · Mantenimiento</div>
        `;
      }

      function progressDots(step, total = 3) {
        return `<div class="progress">${Array.from({length: total}, (_, index) =>
          `<span class="dot ${index + 1 === step ? "active" : ""}"></span>`
        ).join("")}</div>`;
      }

      function providerOptions(selected = "") {
        const selectedValue = String(selected || "");
        return `<option value="">Sin proveedor asignado</option>${state.proveedores.map((proveedor) =>
          `<option value="${esc(proveedor.nombre)}" ${selectedValue === proveedor.nombre ? "selected" : ""}>${esc(proveedor.nombre)}</option>`
        ).join("")}`;
      }

      async function showScreen(name) {
        state.pantalla = name;
        if (name === "login") return renderLogin();
        if (!state.perfil) await loadPerfil();
        if (name === "dashboard") return renderDashboard();
        if (name === "pendientes") return renderPendientes();
        if (name === "buscar") return renderBuscarEquipo();
        if (name === "seguimiento") return renderPendientes(); // alias — misma bandeja
        if (name === "reportes") return renderHistorial();     // alias — historial
        if (name === "registrar") { startEquipo(); return; }
        if (name === "equipo") return renderEquipoDraft();
        if (name === "punto") return renderPuntoMantenible();
        if (name === "vehiculo") return renderVehiculoDraft();
        if (name === "historial") return renderHistorial();
      }

      function renderLogin(error = "") {
        render(`
          <main class="login-wrap">
            <section>
              <h1 class="brand-title">Pollyana's</h1>
              <p class="brand-subtitle">Mantenimiento</p>
            </section>
            <form class="panel" onsubmit="login(event)">
              <div class="field">
                <label for="username">Usuario</label>
                <input id="username" name="username" autocomplete="username" required>
              </div>
              <div class="field">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
              </div>
              <button class="primary-btn" type="submit">Entrar</button>
              ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            </form>
          </main>
        `);
      }

      async function login(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const res = await fetch(`${AUTH_API}/auth/token/`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({username: form.get("username"), password: form.get("password")})
        });
        if (!res.ok) return renderLogin("Usuario o contraseña incorrectos");
        setTokens(await res.json());
        await showScreen("dashboard");
      }

      async function loadPerfil() {
        const res = await apiFetch("/me/");
        if (res.ok) {
          state.perfil = await res.json();
          return;
        }
        throw new Error("No tienes permisos para usar Mantenimiento.");
      }

      async function loadOrdenes(force = false) {
        if (state.ordenes.length && !force) return state.ordenes;
        const res = await apiFetch("/ordenes/");
        state.ordenes = res.ok ? await parseListResponse(res) : [];
        return state.ordenes;
      }

      async function loadBandeja(force = false) {
        if (state.bandeja.length && !force) return state.bandeja;
        const res = await apiFetch("/bandeja/");
        if (res.ok) {
          const data = await res.json();
          state.bandeja = data.items || [];
        } else {
          state.bandeja = [];
        }
        return state.bandeja;
      }

      async function ensureProveedores() {
        if (state.proveedores.length) return state.proveedores;
        const res = await apiFetch("/proveedores/");
        state.proveedores = res.ok ? await parseListResponse(res) : [];
        return state.proveedores;
      }

      function itemAbierto(item) {
        const e = String(item.estatus || "").toLowerCase();
        return !["cerrada", "cancelada", "cerrado", "cancelado", "resuelto"].includes(e);
      }

      function ordenAbierta(orden) {
        return !["CERRADA", "CANCELADA"].includes(orden.estatus);
      }

      function metricasMantenimiento() {
        const items = state.bandeja || [];
        const abiertos = items.filter(itemAbierto);
        return {
          abiertas: abiertos.length,
          proceso: items.filter((i) => ["en_proceso", "EN_PROCESO"].includes(i.estatus)).length,
          criticas: abiertos.filter((i) => i.semaforo === "rojo").length,
          cerradas: items.filter((i) => ["cerrada", "cerrado", "CERRADA"].includes(i.estatus)).length,
        };
      }

      function bandejaItemCard(item) {
        const abierto = itemAbierto(item);
        const esLogistica = item.origen === "logistica";
        const semClass = item.semaforo === "rojo" ? "alta" : item.semaforo === "amarillo" ? "media" : "baja";
        const badge = esLogistica
          ? `<span class="status-chip origen-flota">Flota</span>`
          : `<span class="status-chip origen-sucursal">Sucursal</span>`;
        return `
          <article class="card report-card">
            <div class="card-head">
              <div>
                <p class="card-title">${esc(item.titulo || item.activo || "Sin título")}</p>
                <p class="muted">${esc(item.referencia || "")} · ${esc(item.ubicacion || item.area || "")}</p>
              </div>
              <div class="chip-stack">
                ${badge}
                <span class="status-chip ${semClass}">${esc(item.estatus_display || item.estatus)}</span>
              </div>
            </div>
            <p class="muted card-copy-muted">${esc(item.descripcion || "Sin descripción")}</p>
            ${item.dias_abierto > 0 ? `<p class="muted card-meta-line">${item.dias_abierto} días abierto</p>` : ""}
            <div class="card-actions">
              <button onclick="abrirBandejaItemPorUid('${esc(item.uid)}')">Ver y seguir</button>
              ${abierto && item.tipo === "orden" && item.estatus !== "EN_PROCESO" ? `<button onclick="actualizarOrdenRapida(${item.id}, 'EN_PROCESO')">Iniciar</button>` : ""}
            </div>
          </article>
        `;
      }

      function statusClass(orden) {
        if (orden.estatus === "CERRADA") return "cerrada";
        if (orden.estatus === "EN_PROCESO") return "proceso";
        return String(orden.prioridad || "").toLowerCase();
      }

      function ordenCard(orden, {compact = false} = {}) {
        return `
          <article class="card report-card">
            <div class="card-head">
              <div>
                <p class="card-title">${esc(orden.activo_nombre || "Activo sin nombre")}</p>
                <p class="muted">${esc(orden.activo_codigo || "")} · ${esc(orden.sucursal_nombre || "Sin sucursal")}</p>
              </div>
              <span class="status-chip ${statusClass(orden)}">${esc(orden.estatus_display || orden.estatus)}</span>
            </div>
            <p class="muted">${esc(orden.folio)} · ${esc(orden.tipo_display)} · ${esc(orden.prioridad_display)}</p>
            ${compact ? "" : `<p class="card-copy">${esc(orden.descripcion || "Sin descripción")}</p>`}
            <div class="card-actions">
              <button onclick="abrirOrden(${orden.id})">Ver seguimiento</button>
              ${orden.estatus !== "EN_PROCESO" && ordenAbierta(orden) ? `<button onclick="actualizarOrdenRapida(${orden.id}, 'EN_PROCESO')">Iniciar</button>` : ""}
              ${orden.estatus !== "CERRADA" ? `<button onclick="actualizarOrdenRapida(${orden.id}, 'CERRADA')">Cerrar</button>` : ""}
            </div>
          </article>
        `;
      }

      async function renderDashboard() {
        await loadBandeja(true);
        const m = metricasMantenimiento();
        const criticos = state.bandeja.filter((i) => itemAbierto(i) && i.semaforo === "rojo").length;
        render(shell(`
          <p class="screen-kicker">Bandeja de mantenimiento</p>
          <div class="summary-grid">
            <div class="summary-card"><strong>${m.abiertas}</strong><span>Abiertos</span></div>
            <div class="summary-card"><strong>${m.proceso}</strong><span>En proceso</span></div>
            <div class="summary-card"><strong>${criticos}</strong><span>Críticos</span></div>
            <div class="summary-card"><strong>${m.cerradas}</strong><span>Cerrados</span></div>
          </div>
          <div class="dash-grid">
            <button class="dash-btn" onclick="showScreen('pendientes')">${appGlyph("bandeja")}<span>Bandeja</span></button>
            <button class="dash-btn" onclick="showScreen('buscar')">${appGlyph("equipo")}<span>Buscar equipo</span></button>
            <button class="dash-btn" onclick="showScreen('registrar')">${appGlyph("registrar")}<span>Registrar mantenimiento de equipo</span></button>
            <button class="dash-btn" onclick="showScreen('historial')">${appGlyph("historial")}<span>Historial</span></button>
          </div>
        `));
      }

      async function renderPendientes() {
        await loadBandeja(true);
        const todos = state.bandeja.filter(itemAbierto);
        const filtro = state.bandejaFiltro;
        const visibles = filtro === "sucursales" ? todos.filter((i) => i.origen === "sucursales")
          : filtro === "logistica" ? todos.filter((i) => i.origen === "logistica")
          : filtro === "criticos" ? todos.filter((i) => i.semaforo === "rojo")
          : todos;
        const counts = {
          todos: todos.length,
          sucursales: todos.filter((i) => i.origen === "sucursales").length,
          logistica: todos.filter((i) => i.origen === "logistica").length,
          criticos: todos.filter((i) => i.semaforo === "rojo").length,
        };
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title screen-title-spaced">Pendientes</h1>
          <div class="toolbar">
            <button class="${filtro === "todos" ? "active" : ""}" onclick="state.bandejaFiltro='todos'; renderPendientes()">Todos (${counts.todos})</button>
            <button class="${filtro === "sucursales" ? "active" : ""}" onclick="state.bandejaFiltro='sucursales'; renderPendientes()">Sucursales (${counts.sucursales})</button>
            <button class="${filtro === "logistica" ? "active" : ""}" onclick="state.bandejaFiltro='logistica'; renderPendientes()">Flota (${counts.logistica})</button>
            <button class="${filtro === "criticos" ? "active" : ""}" onclick="state.bandejaFiltro='criticos'; renderPendientes()">Críticos (${counts.criticos})</button>
          </div>
          ${visibles.map(bandejaItemCard).join("") || `<div class="empty">Sin pendientes en esta categoría.</div>`}
        `));
      }

      function ubicacionesDesdeActivos() {
        const set = new Set();
        state.activos.forEach((activo) => {
          if (activo.ubicacion) set.add(activo.ubicacion.trim());
        });
        return Array.from(set).sort((a, b) => a.localeCompare(b, "es"));
      }

      let _searchTimer = null;
      function debounceBuscar(value) {
        state.busquedaEquipo = value;
        clearTimeout(_searchTimer);
        _searchTimer = setTimeout(() => renderBuscarEquipo(), 300);
      }

      async function renderBuscarEquipo() {
        await ensureActivos();
        const q = state.busquedaEquipo.toLowerCase().trim();
        const filtrados = state.activos.filter((activo) => {
          const matchesUbicacion = !state.sucursalFiltro || activo.ubicacion === state.sucursalFiltro;
          const text = `${activo.nombre} ${activo.codigo} ${activo.categoria || ""}`.toLowerCase();
          return matchesUbicacion && (!q || text.includes(q));
        });
        const LIMITE = 20;
        const visibles = q ? filtrados : filtrados.slice(0, LIMITE);
        const notaBuscar = !q && filtrados.length > LIMITE
          ? `<p class="muted search-note">Mostrando ${LIMITE} de ${filtrados.length}. Escribe para buscar.</p>`
          : "";
        const ubicaciones = ubicacionesDesdeActivos();
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title screen-title-spaced">Buscar equipo</h1>
          <div class="search-row">
            <input id="buscar-equipo-main" type="search" placeholder="Nombre, código o categoría" value="${esc(state.busquedaEquipo)}" oninput="debounceBuscar(this.value)">
            <select onchange="state.sucursalFiltro=this.value; renderBuscarEquipo()">
              <option value="">Todas las áreas</option>
              ${ubicaciones.map((u) => `<option value="${esc(u)}" ${state.sucursalFiltro === u ? "selected" : ""}>${esc(u)}</option>`).join("")}
            </select>
          </div>
          ${notaBuscar}
          ${visibles.map((activo) => `
            <article class="card report-card">
              <p class="card-title">${esc(activo.nombre)}</p>
              <p class="muted">${esc(activo.codigo)} · ${esc(activo.sucursal_nombre || "Sin sucursal")}</p>
              <p class="muted">${esc(activo.categoria || "Sin categoría")} · ${esc(activo.ubicacion || "Sin ubicación")}</p>
              <div class="card-actions">
                <button onclick="iniciarEquipoDesdeActivo(${activo.id})">Registrar mantenimiento</button>
                <button onclick="verOrdenesActivo(${activo.id})">Ver órdenes</button>
              </div>
            </article>
          `).join("") || `<div class="empty">Sin equipos con esos filtros.</div>`}
          <div class="full-action-row">
            <button class="secondary-btn full-width" onclick="startPuntoMantenible()">Registrar punto mantenible</button>
          </div>
        `, "buscar-equipo-main"));
      }

      async function renderSeguimiento() {
        await loadBandeja(true);
        const abiertos = state.bandeja.filter(itemAbierto);
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title screen-title-spaced">Seguimiento</h1>
          ${abiertos.map(bandejaItemCard).join("") || `<div class="empty">Sin trabajos activos.</div>`}
        `));
      }

      async function renderReportes() {
        await loadBandeja(true);
        await ensureActivos();
        const m = metricasMantenimiento();
        const recientes = state.bandeja.slice(0, 10);
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title screen-title-spaced">Reportes</h1>
          <div class="summary-grid">
            <div class="summary-card"><strong>${m.abiertas}</strong><span>Abiertas</span></div>
            <div class="summary-card"><strong>${m.criticas}</strong><span>Urgentes</span></div>
            <div class="summary-card"><strong>${m.cerradas}</strong><span>Cerradas</span></div>
            <div class="summary-card"><strong>${state.activos.length}</strong><span>Equipos</span></div>
          </div>
          <p class="section-kicker">Últimos movimientos</p>
          ${recientes.map(bandejaItemCard).join("") || `<div class="empty">Sin movimientos registrados.</div>`}
        `));
      }

      function startEquipo() {
        state.equipoDraft = emptyEquipoDraft();
        showScreen("equipo");
      }

      async function ensureActivos() {
        if (state.activos.length) return;
        const res = await apiFetch("/activos/");
        state.activos = res.ok ? await parseListResponse(res) : [];
      }

      async function ensureSucursales() {
        if (state.sucursales.length) return;
        const res = await apiFetch("/sucursales/");
        state.sucursales = res.ok ? await parseListResponse(res) : [];
      }

      function activoCard(activo) {
        const selected = state.equipoDraft.activo === activo.id ? "selected" : "";
        return `
          <button class="select-card ${selected}" onclick="seleccionarActivo(${activo.id})">
            <p class="card-label">${esc(activo.nombre)}</p>
            <p class="card-sub">${esc(activo.codigo)} · ${esc(activo.sucursal_nombre || activo.ubicacion || "Sin sucursal")}</p>

          await ensureActivos();
          const ubicaciones = ubicacionesDesdeActivos();
          const q = (d.busquedaTexto || "").toLowerCase().trim();
          const activosFiltrados = state.activos.filter((a) => {
            const matchUbicacion = !d.ubicacionFiltro || a.ubicacion === d.ubicacionFiltro;

              a.nombre.toLowerCase().includes(q) ||
              a.codigo.toLowerCase().includes(q) ||
              (a.categoria || "").toLowerCase().includes(q);
            return matchUbicacion && matchTexto;

          const LIMITE = 20;
          const visibles = q ? activosFiltrados : activosFiltrados.slice(0, LIMITE);

            ? `<p class="muted search-note-flat">Mostrando ${LIMITE} de ${activosFiltrados.length}. Escribe para buscar.</p>`

              <label for="desc-eq">Descripción / acción realizada</label>
              <textarea id="desc-eq" placeholder="Describe el trabajo realizado" oninput="state.equipoDraft.descripcion=this.value; syncEquipoReviewButton()">${esc(d.descripcion)}</textarea>
            </div>

              <label for="prov-eq">Proveedor</label>

      async function guardarPuntoMantenible() {
        const d = state.puntoDraft;
        if (!d.sucursal) return renderPuntoMantenible("Selecciona la sucursal.");
        if (!d.nombre.trim()) return renderPuntoMantenible("Escribe el nombre del punto mantenible.");
        const res = await apiFetch("/activos/rapido/", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            sucursal: d.sucursal,
            nombre: d.nombre.trim(),
            categoria: d.categoria,
            ubicacion: d.ubicacion.trim(),
            notas: d.notas.trim(),
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          return renderPuntoMantenible(Object.values(err).flat().join(" ") || "No se pudo registrar el punto mantenible.");
        }
        const activo = await res.json();
        state.activos = [activo, ...state.activos.filter((item) => item.id !== activo.id)];
        state.equipoDraft = emptyEquipoDraft();
        state.equipoDraft.activo = activo.id;
        state.equipoDraft.activoLabel = `${activo.nombre} (${activo.codigo})`;
        state.equipoDraft.descripcion = d.notas || "";
        state.equipoDraft.tipo = "CORRECTIVO";
        state.equipoDraft.step = 2;
        showScreen("equipo");
      }

        const activo = state.activos.find((item) => item.id === id);

        state.equipoDraft.activo = activo.id;
        state.equipoDraft.activoLabel = `${activo.nombre} (${activo.codigo})`;

      function filtrarActivos(q, ubicacionFiltro = "") {
        const lista = document.getElementById("lista-activos");
        if (!lista) return;
        const value = q.toLowerCase();
        const filtrados = state.activos.filter((activo) => {
          const matchUbicacion = !ubicacionFiltro || activo.ubicacion === ubicacionFiltro;
          const matchTexto = !value ||
            activo.nombre.toLowerCase().includes(value) ||
            activo.codigo.toLowerCase().includes(value) ||
            (activo.ubicacion || "").toLowerCase().includes(value);
          return matchUbicacion && matchTexto;
        });
        lista.innerHTML = filtrados.map(activoCard).join("") || `<div class="empty">Sin resultados.</div>`;
      }

      function filtrarActivosEstado() {
        const d = state.equipoDraft;
        const lista = document.getElementById("lista-activos");
        if (!lista) return;
        const q = (d.busquedaTexto || "").toLowerCase().trim();
        const LIMITE = 20;
        const filtrados = state.activos.filter((a) => {
          const matchUbicacion = !d.ubicacionFiltro || a.ubicacion === d.ubicacionFiltro;
          const matchTexto = !q ||
            a.nombre.toLowerCase().includes(q) ||
            a.codigo.toLowerCase().includes(q) ||
            (a.categoria || "").toLowerCase().includes(q);
          return matchUbicacion && matchTexto;
        });
        const visibles = q ? filtrados : filtrados.slice(0, LIMITE);
        lista.innerHTML = visibles.map(activoCard).join("") || `<div class="empty">Sin resultados.</div>`;
      }

      function setFotoEquipo(input) {
        const file = input.files[0];
        if (!file) return;
        state.equipoDraft.foto = file;
        state.equipoDraft.fotoPreview = URL.createObjectURL(file);
        renderEquipoDraft();
      }

      function puedeRevisarEquipo() {
        const d = state.equipoDraft;
        return Boolean(d.tipo && d.descripcion.trim());
      }

      function syncEquipoReviewButton() {
        const button = document.getElementById("btn-equipo-revisar");
        if (button) button.disabled = !puedeRevisarEquipo();
      }

      function nextEquipoStep() {
        const d = state.equipoDraft;
        if (d.step === 1 && !d.activo) return;
        if (d.step === 2 && !d.tipo) return renderEquipoDraft("Selecciona el tipo de mantenimiento.");
        if (d.step === 2 && !d.descripcion.trim()) return renderEquipoDraft("La descripción es obligatoria.");
        d.step = Math.min(3, d.step + 1);
        renderEquipoDraft();
      }

      function prevEquipoStep() {
        state.equipoDraft.step = Math.max(1, state.equipoDraft.step - 1);
        renderEquipoDraft();
      }

      async function enviarEquipo() {
        const d = state.equipoDraft;
        const fd = new FormData();
        fd.append("activo_ref", d.activo);
        fd.append("tipo", d.tipo);
        fd.append("descripcion", d.descripcion.trim());
        if (d.proveedor) fd.append("proveedor_servicio", d.proveedor.trim());
        if (d.costoReal) fd.append("costo_real", d.costoReal);
        if (d.foto) fd.append("foto", d.foto);
        const res = await apiFetch("/ordenes/", {method: "POST", body: fd});
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          return renderEquipoDraft(Object.values(err).flat().join(" ") || "Error al guardar.");
        }
        const data = await res.json();
        render(shell(`
          <section class="confirm">
            <div class="confirm-mark">OK</div>
            <h1 class="screen-title">Guardado</h1>
            <p class="muted">Orden ${esc(data.folio || data.id)} registrada correctamente.</p>
            <div class="confirm-actions">
              <button class="primary-btn" onclick="startEquipo()">Registrar otro equipo</button>
              <button class="secondary-btn" onclick="showScreen('dashboard')">Volver al inicio</button>
            </div>
          </section>
        `));
      }

      function startVehiculo() {
        state.vehiculoDraft = emptyVehiculoDraft();
        showScreen("vehiculo");
      }

      async function ensureVehiculoCatalogos() {
        if (!state.unidades.length) {
          const res = await apiFetch("/unidades/");
          state.unidades = res.ok ? await parseListResponse(res) : [];
        }
        if (!state.tiposServicio.length) {
          const res = await apiFetch("/tipos-servicio/");
          state.tiposServicio = res.ok ? await parseListResponse(res) : [];
        }
      }

      function unidadCard(unidad) {
        const selected = state.vehiculoDraft.unidad === unidad.id ? "selected" : "";
        return `
          <button class="select-card ${selected}" onclick="seleccionarUnidad(${unidad.id})">
            <p class="card-label">${esc(unidad.descripcion)}</p>
            <p class="card-sub">${esc(unidad.codigo)} · ${esc(unidad.placa || "Sin placa")} · ${esc(unidad.sucursal_nombre || "")}</p>
          </button>
        `;
      }

      async function renderVehiculoDraft(error = "") {
        const d = state.vehiculoDraft;
        let body = "";
        if (d.step === 1) {
          await ensureVehiculoCatalogos();
          const lista = state.unidades.map(unidadCard).join("") || `<div class="empty">No hay unidades registradas.</div>`;
          body = `
            <h1 class="screen-title">Seleccionar vehículo</h1>
            ${progressDots(1)}
            <div class="card-list">${lista}</div>
            <div class="actions">
              <button class="secondary-btn" onclick="showScreen('dashboard')">Cancelar</button>
              <button class="primary-btn" onclick="nextVehiculoStep()" ${d.unidad ? "" : "disabled"}>Siguiente</button>
            </div>
          `;
        } else if (d.step === 2) {
          await ensureProveedores();
          const tipoServicioSelect = d.modo === "servicio" ? `
            <div class="field">
              <label>Tipo de servicio</label>
              <select onchange="selectTipoServicio(this.value)">
                <option value="">Selecciona</option>
                ${state.tiposServicio.map((tipo) =>
                  `<option value="${tipo.id}" ${String(d.tipoServicio) === String(tipo.id) ? "selected" : ""}>${esc(tipo.nombre)}</option>`
                ).join("")}
              </select>
            </div>
            <div class="field">
              <label for="km-v">Kilometraje actual</label>
              <input id="km-v" type="number" min="0" placeholder="km" value="${esc(d.km)}" oninput="state.vehiculoDraft.km=this.value">
            </div>
            <div class="field">
              <label for="prox-fecha">Próxima fecha servicio</label>
              <input id="prox-fecha" type="date" value="${esc(d.proximaFecha)}" oninput="state.vehiculoDraft.proximaFecha=this.value">
            </div>
            <div class="field">
              <label for="prox-km">Próximos km para servicio</label>
              <input id="prox-km" type="number" min="0" placeholder="km" value="${esc(d.proximosKm)}" oninput="state.vehiculoDraft.proximosKm=this.value">
            </div>
          ` : d.modo === "reparacion" ? `
            <div class="field">
              <label for="falla-v">Descripción de la falla</label>
              <textarea id="falla-v" placeholder="Qué falló y cómo se detectó" oninput="state.vehiculoDraft.descripcionFalla=this.value; syncVehiculoReviewButton()">${esc(d.descripcionFalla)}</textarea>
            </div>
            <div class="field">
              <label for="rep-v">Descripción de la reparación</label>
              <textarea id="rep-v" placeholder="Qué se hizo para resolverlo" oninput="state.vehiculoDraft.descripcionReparacion=this.value">${esc(d.descripcionReparacion)}</textarea>
            </div>
          ` : "";
          body = `
            <h1 class="screen-title">Detalles</h1>
            ${progressDots(2)}
            <div class="field">
              <label>Vehículo</label>
              <p class="section-kicker section-kicker-tight">${esc(d.unidadLabel)}</p>
            </div>
            <div class="field">
              <label>Tipo de registro</label>
              <div class="tipo-grid">
                <button class="tipo-btn ${d.modo === "servicio" ? "selected" : ""}" onclick="state.vehiculoDraft.modo='servicio'; renderVehiculoDraft()">Servicio preventivo</button>
                <button class="tipo-btn ${d.modo === "reparacion" ? "selected" : ""}" onclick="state.vehiculoDraft.modo='reparacion'; renderVehiculoDraft()">Reparación correctiva</button>
              </div>
            </div>
            ${tipoServicioSelect}
            ${d.modo ? `
              <div class="field">
                <label for="prov-v">Proveedor / taller</label>
                <select id="prov-v" onchange="state.vehiculoDraft.proveedor=this.value">${providerOptions(d.proveedor)}</select>
              </div>
              <div class="field">
                <label for="costo-v">Costo (MXN)</label>
                <input id="costo-v" type="number" step="0.01" min="0" placeholder="0.00" value="${esc(d.costo)}" oninput="state.vehiculoDraft.costo=this.value">
              </div>
              <div class="field">
                <label>Foto opcional</label>
                <input id="foto-v" class="file-input" type="file" accept="image/*" capture="environment" onchange="setFotoVehiculo(this)">
                <label class="file-trigger ${d.foto ? "loaded" : ""}" for="foto-v">${d.foto ? "Foto cargada" : "Tomar foto / factura"}</label>
                ${d.fotoPreview ? `<img class="thumb" src="${d.fotoPreview}" alt="Vista previa">` : ""}
              </div>
            ` : ""}
            ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            <div class="actions">
              <button class="secondary-btn" onclick="prevVehiculoStep()">Atrás</button>
              <button id="btn-vehiculo-revisar" class="primary-btn" onclick="nextVehiculoStep()" ${puedeAvanzarVehiculo() ? "" : "disabled"}>Revisar</button>
            </div>
          `;
        } else {
          const esServicio = d.modo === "servicio";
          body = `
            <h1 class="screen-title">Confirmar</h1>
            ${progressDots(3)}
            <section class="card report-card">
              <div class="kv"><b>Vehículo</b><span>${esc(d.unidadLabel)}</span></div>
              <div class="kv"><b>Tipo</b><span>${esServicio ? "Servicio preventivo" : "Reparación correctiva"}</span></div>
              ${esServicio ? `<div class="kv"><b>Servicio</b><span>${esc(d.tipoServicioLabel)}</span></div>` : ""}
              ${!esServicio ? `<div class="kv"><b>Falla</b><span>${esc(d.descripcionFalla)}</span></div>` : ""}
              <div class="kv"><b>Proveedor</b><span>${esc(d.proveedor || "-")}</span></div>
              <div class="kv"><b>Costo</b><span>${d.costo ? "$" + Number(d.costo).toLocaleString("es-MX") : "-"}</span></div>
              ${d.km ? `<div class="kv"><b>Km</b><span>${esc(d.km)}</span></div>` : ""}
              <div class="kv"><b>Foto</b><span>${d.foto ? "Adjunta" : "Sin foto"}</span></div>
            </section>
            ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            <div class="actions">
              <button class="secondary-btn" onclick="prevVehiculoStep()">Atrás</button>
              <button class="primary-btn" onclick="enviarVehiculo()">Guardar</button>
            </div>
          `;
        }
        render(shell(body));
      }

      function seleccionarUnidad(id) {
        const unidad = state.unidades.find((item) => item.id === id);
        if (!unidad) return;
        state.vehiculoDraft.unidad = unidad.id;
        state.vehiculoDraft.unidadLabel = `${unidad.descripcion} (${unidad.codigo})`;
        renderVehiculoDraft();
      }

      function selectTipoServicio(value) {
        const tipo = state.tiposServicio.find((item) => String(item.id) === String(value));
        state.vehiculoDraft.tipoServicio = value || null;
        state.vehiculoDraft.tipoServicioLabel = tipo ? tipo.nombre : "";
        renderVehiculoDraft();
      }

      function setFotoVehiculo(input) {
        const file = input.files[0];
        if (!file) return;
        state.vehiculoDraft.foto = file;
        state.vehiculoDraft.fotoPreview = URL.createObjectURL(file);
        renderVehiculoDraft();
      }

      function puedeAvanzarVehiculo() {
        const d = state.vehiculoDraft;
        if (d.step === 1) return Boolean(d.unidad);
        if (!d.modo) return false;
        if (d.modo === "servicio") return Boolean(d.tipoServicio);
        if (d.modo === "reparacion") return Boolean(d.descripcionFalla.trim());
        return false;
      }

      function syncVehiculoReviewButton() {
        const button = document.getElementById("btn-vehiculo-revisar");
        if (button) button.disabled = !puedeAvanzarVehiculo();
      }

      function nextVehiculoStep() {
        if (!puedeAvanzarVehiculo()) {
          const msg = state.vehiculoDraft.modo === "servicio"
            ? "Selecciona el tipo de servicio."
            : "La descripción de la falla es obligatoria.";
          return renderVehiculoDraft(msg);
        }
        state.vehiculoDraft.step = Math.min(3, state.vehiculoDraft.step + 1);
        renderVehiculoDraft();
      }

      function prevVehiculoStep() {
        state.vehiculoDraft.step = Math.max(1, state.vehiculoDraft.step - 1);
        renderVehiculoDraft();
      }

      async function enviarVehiculo() {
        const d = state.vehiculoDraft;
        let res;
        if (d.modo === "servicio") {
          const fd = new FormData();
          fd.append("unidad", d.unidad);
          fd.append("tipo_servicio", d.tipoServicio);
          fd.append("fecha", new Date().toISOString().slice(0, 10));
          if (d.km) fd.append("km_servicio", d.km);
          if (d.proveedor) fd.append("proveedor", d.proveedor);
          if (d.costo) fd.append("costo", d.costo);
          if (d.proximaFecha) fd.append("proxima_fecha", d.proximaFecha);
          if (d.proximosKm) fd.append("proximos_km", d.proximosKm);
          if (d.foto) fd.append("archivo_factura", d.foto);
          res = await apiFetch("/servicios/", {method: "POST", body: fd});
        } else {
          const fd = new FormData();
          fd.append("unidad", d.unidad);
          fd.append("fecha_ingreso", new Date().toISOString().slice(0, 10));
          fd.append("descripcion_falla", d.descripcionFalla);
          if (d.descripcionReparacion) fd.append("descripcion_reparacion", d.descripcionReparacion);
          if (d.proveedor) fd.append("proveedor", d.proveedor);
          if (d.costo) fd.append("costo", d.costo);
          if (d.foto) fd.append("foto", d.foto);
          res = await apiFetch("/reparaciones/", {method: "POST", body: fd});
        }
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          return renderVehiculoDraft(Object.values(err).flat().join(" ") || "Error al guardar.");
        }
        render(shell(`
          <section class="confirm">
            <div class="confirm-mark">OK</div>
            <h1 class="screen-title">Guardado</h1>
            <p class="muted">${d.modo === "servicio" ? "Servicio" : "Reparación"} registrado correctamente.</p>
            <div class="confirm-actions">
              <button class="primary-btn" onclick="startVehiculo()">Registrar otro</button>
              <button class="secondary-btn" onclick="showScreen('dashboard')">Volver al inicio</button>
            </div>
          </section>
        `));
      }

      async function renderHistorial() {
        const [resOrdenes, resRep, resSvc] = await Promise.all([
          apiFetch("/ordenes/"),
          apiFetch("/reparaciones/"),
          apiFetch("/servicios/"),
        ]);
        const ordenes = resOrdenes.ok ? await parseListResponse(resOrdenes) : [];
        const reparaciones = resRep.ok ? await parseListResponse(resRep) : [];
        const servicios = resSvc.ok ? await parseListResponse(resSvc) : [];
        const cardOrdenes = ordenes.slice(0, 5).map((orden) => `
          <article class="card report-card">
            <p class="card-title">${esc(orden.activo_nombre)}</p>
            <p class="muted">${esc(orden.tipo_display)} · ${esc(orden.estatus_display)}</p>
            ${orden.costo_total ? `<p class="muted">$${Number(orden.costo_total).toLocaleString("es-MX")}</p>` : ""}
          </article>
        `).join("") || `<div class="empty">Sin órdenes recientes.</div>`;
        const vehiculos = [
          ...reparaciones.slice(0, 3).map((item) => ({...item, kind: "Reparación"})),
          ...servicios.slice(0, 3).map((item) => ({...item, kind: item.tipo_nombre || "Servicio"})),
        ];
        const cardVehiculos = vehiculos.map((item) => `
          <article class="card report-card">
            <p class="card-title">${esc(item.unidad_descripcion)}</p>
            <p class="muted">${esc(item.kind)}</p>
            ${item.costo ? `<p class="muted">$${Number(item.costo).toLocaleString("es-MX")}</p>` : ""}
          </article>
        `).join("") || `<div class="empty">Sin registros de flota recientes.</div>`;
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title screen-title-spaced">Historial reciente</h1>
          <p class="section-kicker section-kicker-tight">Equipos</p>
          ${cardOrdenes}
          <p class="section-kicker">Vehículos</p>
          ${cardVehiculos}
        `));
      }

      async function boot() {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("{% static 'mantenimiento/sw.js' %}?v=20260707-app-refresh-v1").catch(() => {});
        }

        try {
          if (await useDjangoSessionToken()) {
            await showScreen("dashboard");
            return;
          }
        } catch (error) {
          logout(false);
        }

        if (state.token) {
          try {
            await showScreen("dashboard");
            return;
          } catch (error) {
            logout(false);
          }
        }

        renderLogin();
      }

      boot();
    </script>
  </body>
</html>
