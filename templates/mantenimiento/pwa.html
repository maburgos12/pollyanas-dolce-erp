{% load static %}
<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#8B2252">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Pollyana's Operativa">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pollyana's Operativa</title>
    <link rel="manifest" href="{% static 'mantenimiento/manifest.json' %}?v=20260707-workflow-icon-v5">
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'operacion/app-icon-192.png' %}?v=20260707-workflow-icon-v5">
    <link rel="apple-touch-icon" href="{% static 'operacion/apple-touch-icon.png' %}?v=20260707-workflow-icon-v5">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/template_modules/templates-mantenimiento-pwa.css?v=20260707-mobile-operativo-v7">
    <link rel="stylesheet" href="{% static 'operacion/app_theme.css' %}?v=20260702-home-icon-v1">
    <style>
      .compact-item{display:grid;grid-template-columns:64px 1fr;gap:12px;align-items:start}.compact-item.no-thumb{grid-template-columns:1fr}.compact-thumb{width:64px;height:64px;object-fit:cover;border-radius:10px;background:#eee}.kpi-button{border:0;background:transparent;width:100%;font:inherit;color:inherit;cursor:pointer}.history-filters{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:16px 0}.history-filters label{font-size:.8rem;font-weight:700}.history-filters select{width:100%;margin-top:4px}.detail-list{display:grid;gap:8px;margin:16px 0}.detail-row{display:grid;grid-template-columns:minmax(100px,35%) 1fr;gap:10px}.timeline{list-style:none;padding:0}.timeline li{padding:0 0 16px 18px;border-left:2px solid #ddd;position:relative}.timeline li::before{content:"";position:absolute;left:-6px;top:3px;width:10px;height:10px;border-radius:50%;background:#8b2252}.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.gallery button{border:0;padding:0;background:none}.gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px}.image-viewer{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.94);display:grid;place-items:center;padding:56px 12px 12px}.image-viewer img{max-width:100%;max-height:100%;object-fit:contain}.viewer-close{position:absolute;right:8px;top:max(8px,env(safe-area-inset-top));width:44px;height:44px;border-radius:50%;border:0;font-size:28px}.error-state{padding:20px;text-align:center}.skeleton{min-height:100px;background:#eee;animation:pulse 1s ease-in-out infinite alternate}@keyframes pulse{to{opacity:.55}}
      @media (prefers-reduced-motion: reduce) { .image-viewer, .detail-list, .gallery, .skeleton { animation: none !important; transition: none !important; } }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const API = "/api/mantenimiento";
      const API_V2 = `${API}/v2`;
      const AUTH_API = "/api/logistica";
      const app = document.getElementById("app");
      const state = {
        token: localStorage.getItem("pd_mantenimiento_access") || "",
        refreshToken: localStorage.getItem("pd_mantenimiento_refresh") || "",
        perfil: null,
        pantalla: "login",
        activos: [],
        sucursales: [],
        proveedores: [],
        proveedorImportables: [],
        planes: [],
        planChoices: {tipos: [], estatus: []},
        cancelaciones: {puede_resolver: false, items: []},
        resumen: null,
        catalogos: null,
        unidades: [],
        tiposServicio: [],
        ordenes: [],
        bandeja: [],
        bandejaFiltro: "todos",
        counts: {abiertos: 0, en_proceso: 0, criticos: 0, cerrados: 0},
        history: {periodo: "30d", tipo: "todo", estado: "todo", sucursal: "", page: 1, results: [], hasNext: false},
        detailCache: new Map(),
        detailReturn: {screen: "pendientes", uid: null},
        requestGeneration: {inbox: 0, history: 0, detail: 0},
        historyLoading: false,
        evidenceObjectUrls: new Set(),
        evidenceBlobCache: new Map(),
        evidenceGeneration: 0,
        viewerReturnFocus: null,
        ordenActual: null,
        filtroOrdenes: "abiertas",
        busquedaOrdenes: "",
        proveedorNuevo: "",
        busquedaEquipo: "",
        sucursalFiltro: "",
        equipoDraft: emptyEquipoDraft(),
        puntoDraft: emptyPuntoDraft(),
        vehiculoDraft: emptyVehiculoDraft(),
      };

      function emptyEquipoDraft() {
        return {
          step: 1,
          activo: null,
          activoLabel: "",
          ubicacionFiltro: "",
          busquedaTexto: "",
          tipo: "",
          descripcion: "",
          proveedor: "",
          costoReal: "",
          foto: null,
          fotoPreview: "",
        };
      }

      function emptyPuntoDraft() {
        return {
          sucursal: "",
          nombre: "",
          categoria: "Infraestructura",
          ubicacion: "",
          notas: "",
        };
      }

      function emptyVehiculoDraft() {
        return {
          step: 1,
          unidad: null,
          unidadLabel: "",
          modo: "",
          tipoServicio: null,
          tipoServicioLabel: "",
          descripcionFalla: "",
          descripcionReparacion: "",
          proveedor: "",
          costo: "",
          km: "",
          proximaFecha: "",
          proximosKm: "",
          foto: null,
          fotoPreview: "",
        };
      }

      function setTokens(data) {
        state.token = data.access;
        state.refreshToken = data.refresh;
        localStorage.setItem("pd_mantenimiento_access", data.access);
        localStorage.setItem("pd_mantenimiento_refresh", data.refresh);
      }

      async function useDjangoSessionToken() {
        const res = await fetch(`${API}/session-token/`, {
          headers: {"Accept": "application/json"}
        });
        if (!res.ok) return false;
        setTokens(await res.json());
        return true;
      }

      function logout(doRender = true) {
        clearEvidenceCache();
        state.token = "";
        state.refreshToken = "";
        state.perfil = null;
        localStorage.removeItem("pd_mantenimiento_access");
        localStorage.removeItem("pd_mantenimiento_refresh");
        if (doRender) window.location.href = "/logout/";
      }

      async function parseListResponse(res) {
        const data = await res.json();
        return data.results || data;
      }

      async function apiFetch(path, options = {}) {
        const headers = {...(options.headers || {})};
        if (state.token) headers.Authorization = `Bearer ${state.token}`;
        const res = await fetch(path.startsWith("http") ? path : `${API}${path}`, {...options, headers});
        if (res.status === 401 && state.refreshToken && !options._retry) {
          const refreshed = await fetch(`${AUTH_API}/auth/token/refresh/`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({refresh: state.refreshToken})
          });
          if (refreshed.ok) {
            const data = await refreshed.json();
            state.token = data.access;
            localStorage.setItem("pd_mantenimiento_access", data.access);
            return apiFetch(path, {...options, _retry: true});
          }
          logout(false);
          throw new Error("Sesion expirada");
        }
        return res;
      }

      async function apiV2Fetch(path, options = {}) {
        return apiFetch(path.startsWith("http") || path.startsWith("/api/") ? path : `${API_V2}${path}`, options);
      }

      function esc(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      let pendingRenderTimer = null;
      let pendingRenderResolve = null;

      function render(html, autofocusId = "") {
        app.classList.add("is-changing");
        if (pendingRenderTimer !== null) window.clearTimeout(pendingRenderTimer);
        if (pendingRenderResolve) pendingRenderResolve(false);
        return new Promise(resolve => {
          pendingRenderResolve = resolve;
          pendingRenderTimer = window.setTimeout(() => {
            app.innerHTML = html;
            app.classList.remove("is-changing");
            if (autofocusId) {
              const el = document.getElementById(autofocusId);
              if (el) { el.focus(); el.select && el.select(); }
            }
            pendingRenderTimer = null;
            pendingRenderResolve = null;
            resolve(true);
          }, 140);
        });
      }

      function appGlyph(name) {
        const lu = (body) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${body}</svg>`;
        const icons = {
          bandeja: lu(`<polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path>`),
          agenda: lu(`<path d="M8 2v4"></path><path d="M16 2v4"></path><rect width="18" height="18" x="3" y="4" rx="2"></rect><path d="M3 10h18"></path><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M16 14h.01"></path><path d="M8 18h.01"></path><path d="M12 18h.01"></path><path d="M16 18h.01"></path>`),
          ordenes: lu(`<rect width="8" height="4" x="8" y="2" rx="1" ry="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><path d="M12 11h4"></path><path d="M12 16h4"></path><path d="M8 11h.01"></path><path d="M8 16h.01"></path>`),
          buscar: lu(`<circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path>`),
          equipo: lu(`<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>`),
          registrar: lu(`<path d="m16 16 2 2 4-4"></path><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14"></path><path d="m7.5 4.27 9 5.15"></path><polyline points="3.29 7 12 12 20.71 7"></polyline><line x1="12" x2="12" y1="22" y2="12"></line>`),
          vehiculo: lu(`<path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"></path><path d="M15 18H9"></path><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"></path><circle cx="17" cy="18" r="2"></circle><circle cx="7" cy="18" r="2"></circle>`),
          planes: lu(`<path d="M8 2v4"></path><path d="M16 2v4"></path><rect width="18" height="18" x="3" y="4" rx="2"></rect><path d="M3 10h18"></path><path d="m9 16 2 2 4-4"></path>`),
          proveedores: lu(`<path d="M12 12h.01"></path><path d="M16 6V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path><path d="M22 13a18.15 18.15 0 0 1-20 0"></path><rect width="20" height="14" x="2" y="6" rx="2"></rect>`),
          cancelaciones: lu(`<circle cx="12" cy="12" r="10"></circle><path d="m4.9 4.9 14.2 14.2"></path>`),
          historial: lu(`<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path>`)
        };
        return `<span class="app-glyph" aria-hidden="true">${icons[name] || icons.equipo}</span>`;
      }

      function shell(content) {
        const nombre = esc(state.perfil?.nombre || "");
        return `
          <div class="topbar">
            <div>
              <img class="mini-brand-logo" src="{% static 'logistica/pwa/pollyanas-logo-header.png' %}" alt="Pollyana's Dolce">
              <p class="hello">Hola, ${nombre}</p>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
              <button class="logout app-home-link" type="button" onclick="window.location.href='/app/'" aria-label="Menú principal" title="Menú principal">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.8 12 3l9 7.8"/><path d="M5.5 9.5V21h13V9.5"/><path d="M9.5 21v-6h5v6"/></svg>
              </button>
              <button class="logout" onclick="logout()">Salir</button>
            </div>
          </div>
          ${content}
          <div class="footer">Pollyana's Dolce · Mantenimiento</div>
        `;
      }

      function progressDots(step, total = 3) {
        return `<div class="progress">${Array.from({length: total}, (_, index) =>
          `<span class="dot ${index + 1 === step ? "active" : ""}"></span>`
        ).join("")}</div>`;
      }

      function providerOptions(selected = "") {
        const selectedValue = String(selected || "");
        return `<option value="">Sin proveedor asignado</option>${state.proveedores.filter((proveedor) => proveedor.activo !== false).map((proveedor) =>
          `<option value="${esc(proveedor.nombre)}" ${selectedValue === proveedor.nombre ? "selected" : ""}>${esc(proveedor.nombre)}</option>`
        ).join("")}`;
      }

      async function showScreen(name) {
        if (state.pantalla !== name) {
          revokeEvidenceUrls();
          state.requestGeneration.detail += 1;
          state.requestGeneration.history += 1;
          state.historyLoading = false;
        }
        state.pantalla = name;
        if (name === "login") return renderLogin();
        if (!state.perfil) await loadPerfil();
        if (name === "dashboard") return renderDashboard();
        if (name === "pendientes") return renderPendientes();
        if (name === "agenda") return renderAgenda();
        if (name === "ordenes") return renderOrdenes();
        if (name === "proveedores") return renderProveedores();
        if (name === "planes") return renderPlanes();
        if (name === "cancelaciones") return renderCancelaciones();
        if (name === "buscar") return renderBuscarEquipo();
        if (name === "seguimiento") return renderPendientes(); // alias — misma bandeja
        if (name === "reportes") return renderHistorial();     // alias — historial
        if (name === "registrar") { startEquipo(); return; }
        if (name === "equipo") return renderEquipoDraft();
        if (name === "punto") return renderPuntoMantenible();
        if (name === "vehiculo") return renderVehiculoDraft();
        if (name === "historial") return renderHistorial();
      }

      function renderLogin(error = "") {
        render(`
          <main class="login-wrap">
            <section>
              <h1 class="brand-title">Pollyana's</h1>
              <p class="brand-subtitle">Mantenimiento</p>
            </section>
            <form class="panel" onsubmit="login(event)">
              <div class="field">
                <label for="username">Usuario</label>
                <input id="username" name="username" autocomplete="username" required>
              </div>
              <div class="field">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
              </div>
              <button class="primary-btn" type="submit">Entrar</button>
              ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            </form>
          </main>
        `);
      }

      async function login(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const res = await fetch(`${AUTH_API}/auth/token/`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({username: form.get("username"), password: form.get("password")})
        });
        if (!res.ok) return renderLogin("Usuario o contraseña incorrectos");
        setTokens(await res.json());
        await showScreen("dashboard");
      }

      async function loadPerfil() {
        const res = await apiFetch("/me/");
        if (res.ok) {
          state.perfil = await res.json();
          return;
        }
        throw new Error("No tienes permisos para usar Mantenimiento.");
      }

      async function loadOrdenes(force = false) {
        if (state.ordenes.length && !force) return state.ordenes;
        const res = await apiFetch("/ordenes/");
        state.ordenes = res.ok ? await parseListResponse(res) : [];
        return state.ordenes;
      }

      async function loadBandeja(force = false) {
        if (state.bandeja.length && !force) return state.bandeja;
        const generation = ++state.requestGeneration.inbox;
        const res = await apiV2Fetch("/bandeja/?estado=todos&periodo=30d&page_size=100");
        if (generation !== state.requestGeneration.inbox) return state.bandeja;
        if (res.ok) {
          const data = await res.json();
          state.bandeja = data.results || [];
          state.counts = data.counts || state.counts;
        } else {
          state.bandeja = [];
        }
        return state.bandeja;
      }

      async function loadResumen(force = false) {
        if (state.resumen && !force) return state.resumen;
        const res = await apiFetch("/resumen/");
        state.resumen = res.ok ? await res.json() : null;
        return state.resumen;
      }

      async function ensureCatalogos() {
        if (state.catalogos) return state.catalogos;
        const res = await apiFetch("/catalogos/");
        state.catalogos = res.ok ? await res.json() : {};
        return state.catalogos;
      }

      async function ensureProveedores() {
        if (state.proveedores.length) return state.proveedores;
        const res = await apiFetch("/proveedores/");
        state.proveedores = res.ok ? await parseListResponse(res) : [];
        return state.proveedores;
      }

      async function loadPlanes(force = false) {
        if (state.planes.length && !force) return state.planes;
        const res = await apiFetch("/planes/");
        if (res.ok) {
          const data = await res.json();
          state.planes = data.items || [];
          state.planChoices = data.choices || {tipos: [], estatus: []};
        } else {
          state.planes = [];
        }
        return state.planes;
      }

      async function loadCancelaciones(force = false) {
        if (state.cancelaciones.items.length && !force) return state.cancelaciones;
        const res = await apiFetch("/cancelaciones/");
        state.cancelaciones = res.ok ? await res.json() : {puede_resolver: false, items: []};
        return state.cancelaciones;
      }

      async function loadProveedorImportables(force = false) {
        if (state.proveedorImportables.length && !force) return state.proveedorImportables;
        const res = await apiFetch("/proveedores/importables/");
        state.proveedorImportables = res.ok ? await res.json() : [];
        return state.proveedorImportables;
      }

      function itemAbierto(item) {
        const e = String(item.estado || item.estatus || "").toLowerCase();
        return !["cerrada", "cancelada", "cerrado", "cancelado", "resuelto"].includes(e);
      }

      function ordenAbierta(orden) {
        return !["CERRADA", "CANCELADA"].includes(orden.estatus);
      }

      function metricasMantenimiento() {
        return {
          abiertas: state.counts.abiertos || 0,
          proceso: state.counts.en_proceso || 0,
          criticas: state.counts.criticos || 0,
          cerradas: state.counts.cerrados || 0,
        };
      }

      function formatFechaCorta(value) {
        if (!value) return "Sin fecha";
        const [year, month, day] = String(value).split("-");
        if (!year || !month || !day) return value;
        return `${day}/${month}`;
      }

      function agendaLabel(item) {
        if (item.estado === "vencido") return `${Math.abs(item.dias)} d vencido`;
        if (item.estado === "urgente") return item.dias === 0 ? "Hoy" : `${item.dias} d`;
        return formatFechaCorta(item.fecha);
      }

      function agendaCard(item, compact = false) {
        const estado = item.estado || "programado";
        return `
          <article class="card report-card agenda-card ${estado}">
            <div class="card-head">
              <div>
                <p class="card-title">${esc(item.titulo)}</p>
                <p class="muted">${esc(item.activo || "")} · ${esc(item.codigo || "")}</p>
              </div>
              <span class="status-chip ${estado}">${esc(agendaLabel(item))}</span>
            </div>
            <p class="muted card-copy-muted">${esc(item.sucursal || "Sin sucursal")}${item.responsable ? " · " + esc(item.responsable) : ""}</p>
            ${compact || !item.instrucciones ? "" : `<p class="card-copy">${esc(item.instrucciones)}</p>`}
            <div class="card-actions">
              ${item.tipo === "plan" ? `<button onclick="ejecutarPlanAgenda(${item.id})">Marcar realizado</button>` : `<button onclick="startVehiculo()">Registrar flota</button>`}
            </div>
          </article>
        `;
      }

      function quickActions() {
        return `
          <div class="quick-actions" aria-label="Acciones de mantenimiento">
            <button class="quick-action primary" onclick="renderNuevaFalla()">+ Falla / imprevisto</button>
            <button class="quick-action" onclick="renderServicioPuntual('realizado')">+ Servicio sin orden</button>
            <button class="quick-action" onclick="renderServicioPuntual('pendiente')">+ Programar servicio</button>
            <button class="quick-action" onclick="renderNuevoReporteUnidad()">Nuevo reporte de unidad</button>
          </div>
        `;
      }

      function bandejaItemCard(item) {
        const abierto = itemAbierto(item);
        const esLogistica = item.origen === "logistica";
        const semClass = item.critico ? "alta" : item.estado === "en_proceso" ? "media" : "baja";
        const badge = esLogistica
          ? `<span class="status-chip origen-flota">Flota</span>`
          : `<span class="status-chip origen-sucursal">Sucursal</span>`;
        const thumbnailId = `inbox-thumb-${Math.random().toString(36).slice(2)}`;
        const thumbnailGeneration = state.evidenceGeneration;
        if (item.foto_inicial?.url) {
          window.setTimeout(() => loadProtectedThumbnail(thumbnailId, item.foto_inicial.url, `Foto inicial de ${item.titulo || "mantenimiento"}`, thumbnailGeneration), 0);
        }
        return `
          <article class="card report-card compact-item ${item.foto_inicial?.url ? "" : "no-thumb"}">
            ${item.foto_inicial?.url ? `<span id="${thumbnailId}" class="compact-thumb skeleton" aria-label="Cargando foto inicial"></span>` : ""}
            <div>
            <div class="card-head">
              <div>
                <p class="card-title">${esc(item.titulo || item.activo || "Sin título")}</p>
                <p class="muted">${esc(item.sucursal?.nombre || "Sin sucursal")} · ${esc(item.sujeto?.nombre || item.tipo || "")}</p>
              </div>
              <div class="chip-stack">
                ${badge}
                <span class="status-chip ${semClass}">${esc(item.estado || "Sin estado")}</span>
              </div>
            </div>
            <p class="muted card-copy-muted">${esc(item.descripcion || "Sin descripción")}</p>
            ${item.dias_abierto > 0 ? `<p class="muted card-meta-line">${item.dias_abierto} días abierto</p>` : ""}

              <button data-maintenance-uid="${esc(item.uid)}">Ver detalle</button>

            </div>
          </article>

      }

      function statusClass(orden) {
        if (orden.estatus === "CERRADA") return "cerrada";
        if (orden.estatus === "EN_PROCESO") return "proceso";
        return String(orden.prioridad || "").toLowerCase();
      }

      function ordenCard(orden, {compact = false} = {}) {
        return `
          <article class="card report-card">
            <div class="card-head">
              <div>
                <p class="card-title">${esc(orden.activo_nombre || "Activo sin nombre")}</p>
                <p class="muted">${esc(orden.activo_codigo || "")} · ${esc(orden.sucursal_nombre || "Sin sucursal")}</p>
              </div>
              <span class="status-chip ${statusClass(orden)}">${esc(orden.estatus_display || orden.estatus)}</span>
            </div>
            <p class="muted">${esc(orden.folio)} · ${esc(orden.tipo_display)} · ${esc(orden.prioridad_display)}</p>
            ${compact ? "" : `<p class="card-copy">${esc(orden.descripcion || "Sin descripción")}</p>`}
            <div class="card-actions">
              <button onclick="abrirOrden(${orden.id})">Ver seguimiento</button>
              ${orden.estatus !== "EN_PROCESO" && ordenAbierta(orden) ? `<button onclick="actualizarOrdenRapida(${orden.id}, 'EN_PROCESO')">Iniciar</button>` : ""}
              ${orden.estatus !== "CERRADA" ? `<button onclick="actualizarOrdenRapida(${orden.id}, 'CERRADA')">Cerrar</button>` : ""}
            </div>
          </article>
        `;

      async function renderDashboard() {
        await Promise.all([loadBandeja(true), loadResumen(true)]);

        const resumen = state.resumen || {};
        const agenda = resumen.agenda || [];
        const agendaCounts = resumen.agenda_counts || {};
        const proximo = agenda[0];
        const criticos = state.counts.criticos || 0;
        return render(shell(`
          <p class="screen-kicker">Bandeja de mantenimiento</p>
          <div class="summary-grid">
            <div class="summary-card"><strong>${m.abiertas}</strong><span>Abiertos</span></div>
            <div class="summary-card"><strong>${m.proceso}</strong><span>En proceso</span></div>
            <div class="summary-card"><strong>${criticos}</strong><span>Críticos</span></div>
            <div class="summary-card"><button class="kpi-button" onclick="openClosedHistory()"><strong>${m.cerradas}</strong><span>Cerrados</span></button></div>
          </div>
          <section class="ops-strip">
            <div><strong>${agendaCounts.vencidos || 0}</strong><span>Vencidos</span></div>
            <div><strong>${agendaCounts.urgentes || 0}</strong><span>7 días</span></div>
            <div><strong>${resumen.summary?.sin_asignar || 0}</strong><span>Sin asignar</span></div>
          </section>
          ${proximo ? `
            <p class="section-kicker section-kicker-tight">Próximo trabajo</p>

          ` : ""}
          ${quickActions()}
          <div class="dash-grid">
            <button class="dash-btn" onclick="showScreen('pendientes')">${appGlyph("bandeja")}<span>Bandeja</span></button>
            <button class="dash-btn" onclick="showScreen('agenda')">${appGlyph("agenda")}<span>Agenda</span></button>
            <button class="dash-btn" onclick="showScreen('ordenes')">${appGlyph("ordenes")}<span>Órdenes</span></button>
            <button class="dash-btn" onclick="showScreen('buscar')">${appGlyph("buscar")}<span>Buscar equipo</span></button>
            <button class="dash-btn" onclick="showScreen('registrar')">${appGlyph("registrar")}<span>Registrar mantenimiento de equipo</span></button>
            <button class="dash-btn" onclick="startVehiculo()">${appGlyph("vehiculo")}<span>Flota</span></button>
            <button class="dash-btn" onclick="showScreen('planes')">${appGlyph("planes")}<span>Planes</span></button>
            <button class="dash-btn" onclick="showScreen('proveedores')">${appGlyph("proveedores")}<span>Proveedores</span></button>
            <button class="dash-btn" onclick="showScreen('cancelaciones')">${appGlyph("cancelaciones")}<span>Cancelaciones</span></button>
            <button class="dash-btn" onclick="showScreen('historial')">${appGlyph("historial")}<span>Historial</span></button>
          </div>
        `));
      }

      async function renderAgenda() {
        await loadResumen(true);
        const resumen = state.resumen || {};
        const agenda = resumen.agenda || [];
        const counts = resumen.agenda_counts || {};
        const vencidos = agenda.filter((item) => item.estado === "vencido");
        const urgentes = agenda.filter((item) => item.estado === "urgente");
        const proximos = agenda.filter((item) => item.estado === "programado").slice(0, 15);
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title screen-title-spaced">Agenda móvil</h1>
          <section class="ops-strip ops-strip-spaced">
            <div><strong>${counts.vencidos || 0}</strong><span>Vencidos</span></div>
            <div><strong>${counts.urgentes || 0}</strong><span>Urgentes</span></div>
            <div><strong>${counts.programados || 0}</strong><span>Programados</span></div>
          </section>
          ${vencidos.length ? `<p class="section-kicker">Vencidos</p>${vencidos.map((item) => agendaCard(item)).join("")}` : ""}
          ${urgentes.length ? `<p class="section-kicker">Esta semana</p>${urgentes.map((item) => agendaCard(item)).join("")}` : ""}
          <p class="section-kicker">Próximos</p>
          ${proximos.map((item) => agendaCard(item)).join("") || `<div class="empty">Sin planes próximos registrados.</div>`}
        `));
      }

      async function ejecutarPlanAgenda(id) {
        const notas = window.prompt("Notas del trabajo realizado", "") || "";
        const res = await apiFetch(`/resumen/planes/${id}/ejecutar/`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({notas}),
        });
        if (res.ok) {
          state.resumen = null;
          state.bandeja = [];
          renderAgenda();
        }

      function planCard(plan) {
        const estado = plan.estado || "programado";
        return `
          <article class="card report-card agenda-card ${estado}">
            <div class="card-head">
              <div>
                <p class="card-title">${esc(plan.nombre)}</p>
                <p class="muted">${esc(plan.activo)} · ${esc(plan.codigo)}</p>
              </div>

            </div>
            <p class="muted card-copy-muted">${esc(plan.sucursal || "Sin sucursal")} · ${esc(plan.tipo_display || plan.tipo)}</p>
            <p class="muted card-copy-muted">Cada ${plan.frecuencia_dias} días${plan.responsable ? " · " + esc(plan.responsable) : ""}</p>

      async function renderPlanes() {
        await loadPlanes(true);
        const activos = state.planes.filter((plan) => plan.estatus === "ACTIVO");
        const pausados = state.planes.filter((plan) => plan.estatus !== "ACTIVO");
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title screen-title-spaced">Planes</h1>

            <button class="quick-action primary" onclick="renderPlanForm()">+ Nuevo plan</button>

      async function renderPlanForm(id = null, error = "") {
        await Promise.all([loadPlanes(), ensureActivos()]);
        const plan = id ? state.planes.find((item) => item.id === id) : {};
        const tipos = state.planChoices.tipos || [];
        const estatus = state.planChoices.estatus || [];
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('planes')">Volver</button>
          <h1 class="screen-title screen-title-spaced">${id ? "Editar plan" : "Nuevo plan"}</h1>

            <div class="field">
              <label for="plan-activo">Activo / equipo</label>
              <select id="plan-activo" ${id ? "disabled" : ""}>
                <option value="">Selecciona</option>
                ${state.activos.map((a) => `<option value="${a.id}" ${String(plan.activo_id || "") === String(a.id) ? "selected" : ""}>${esc(a.codigo)} · ${esc(a.nombre)}</option>`).join("")}
              </select>
            </div>
            <div class="field"><label for="plan-nombre">Nombre del plan</label><input id="plan-nombre" value="${esc(plan.nombre || "")}" placeholder="Ej. Limpieza profunda horno"></div>
            <div class="field">
              <label for="plan-tipo">Tipo</label>
              <select id="plan-tipo">${tipos.map((row) => `<option value="${row.value}" ${String(plan.tipo || "PREVENTIVO") === row.value ? "selected" : ""}>${esc(row.label)}</option>`).join("")}</select>
            </div>
            <div class="field">
              <label for="plan-estatus">Estatus</label>
              <select id="plan-estatus">${estatus.map((row) => `<option value="${row.value}" ${String(plan.estatus || "ACTIVO") === row.value ? "selected" : ""}>${esc(row.label)}</option>`).join("")}</select>
            </div>
            <div class="field-grid">
              <div class="field"><label for="plan-frecuencia">Frecuencia días</label><input id="plan-frecuencia" type="number" min="1" value="${esc(plan.frecuencia_dias || 30)}"></div>
              <div class="field"><label for="plan-tolerancia">Tolerancia días</label><input id="plan-tolerancia" type="number" min="0" value="${esc(plan.tolerancia_dias || 0)}"></div>
            </div>
            <div class="field-grid">
              <div class="field"><label for="plan-ultima">Última ejecución</label><input id="plan-ultima" type="date" value="${esc(plan.ultima_ejecucion || "")}"></div>
              <div class="field"><label for="plan-proxima">Próxima ejecución</label><input id="plan-proxima" type="date" value="${esc(plan.proxima_ejecucion || "")}"></div>
            </div>
            <div class="field"><label for="plan-responsable">Responsable</label><input id="plan-responsable" value="${esc(plan.responsable || "")}"></div>
            <div class="field"><label for="plan-instrucciones">Instrucciones</label><textarea id="plan-instrucciones">${esc(plan.instrucciones || "")}</textarea></div>
            ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            <button class="primary-btn" onclick="guardarPlanMovil(${id || "null"})">Guardar plan</button>
          </section>
        `));
      }

      async function guardarPlanMovil(id = null) {
        const payload = {
          activo_id: document.getElementById("plan-activo")?.value,
          nombre: document.getElementById("plan-nombre")?.value,
          tipo: document.getElementById("plan-tipo")?.value,
          estatus: document.getElementById("plan-estatus")?.value,
          frecuencia_dias: document.getElementById("plan-frecuencia")?.value,
          tolerancia_dias: document.getElementById("plan-tolerancia")?.value,
          ultima_ejecucion: document.getElementById("plan-ultima")?.value,
          proxima_ejecucion: document.getElementById("plan-proxima")?.value,
          responsable: document.getElementById("plan-responsable")?.value,
          instrucciones: document.getElementById("plan-instrucciones")?.value,
        };
        const res = await apiFetch(id ? `/planes/${id}/` : "/planes/", {
          method: id ? "PATCH" : "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload),
        });
        if (!res.ok) return renderPlanForm(id, "Revisa equipo, nombre y fechas del plan.");
        state.planes = [];
        state.resumen = null;
        showScreen("planes");
      }

      async function eliminarPlanMovil(id) {
        if (!window.confirm("Pausar este plan de mantenimiento?")) return;
        const res = await apiFetch(`/planes/${id}/`, {method: "DELETE"});
        if (res.ok) {
          state.planes = [];
          state.resumen = null;
          renderPlanes();
        }
      }

      async function renderCancelaciones() {
        await loadCancelaciones(true);
        const data = state.cancelaciones || {puede_resolver: false, items: []};
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title screen-title-spaced">Cancelaciones</h1>
          ${!data.puede_resolver ? `<div class="empty">Tu usuario puede dar seguimiento, pero no resolver cancelaciones.</div>` : ""}
          ${(data.items || []).map((item) => `
            <article class="card report-card">
              <div class="card-head">
                <div>
                  <p class="card-title">${esc(item.referencia)}</p>
                  <p class="muted">${esc(item.tipo_display)} · ${esc(item.creado_en)}</p>
                </div>
                <span class="status-chip urgente">Pendiente</span>
              </div>
              <p class="muted card-copy-muted">Solicita: ${esc(item.solicitado_por || "Sin usuario")}</p>
              <p class="card-copy">${esc(item.motivo)}</p>
              <div class="field">
                <label for="cancelacion-notas-${item.id}">Notas de resolución</label>
                <textarea id="cancelacion-notas-${item.id}" placeholder="Opcional"></textarea>
              </div>
              <div class="card-actions">
                <button onclick="resolverCancelacionMovil(${item.id}, 'rechazar')">Rechazar</button>
                <button onclick="resolverCancelacionMovil(${item.id}, 'aprobar')">Aprobar y eliminar</button>
              </div>
            </article>
          `).join("") || (data.puede_resolver ? `<div class="empty">Sin solicitudes pendientes.</div>` : "")}
        `));
      }

      async function resolverCancelacionMovil(id, accion) {
        const notas = document.getElementById(`cancelacion-notas-${id}`)?.value || "";
        const res = await apiFetch(`/cancelaciones/${id}/resolver/`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({accion, notas_resolucion: notas}),
        });
        if (res.ok) {
          state.cancelaciones = {puede_resolver: false, items: []};
          state.bandeja = [];
          renderCancelaciones();
        }
      }

      async function renderOrdenes() {
        const res = await apiFetch("/ordenes/");
        const ordenes = res.ok ? await parseListResponse(res) : [];
        const q = state.busquedaOrdenes.toLowerCase().trim();
        const visibles = ordenes.filter((orden) => {
          const abierta = ordenAbierta(orden);
          const matchEstado = state.filtroOrdenes === "todas" || (state.filtroOrdenes === "abiertas" ? abierta : !abierta);
          const texto = `${orden.folio} ${orden.activo_nombre} ${orden.activo_codigo} ${orden.sucursal_nombre} ${orden.responsable_usuario_nombre || orden.responsable}`.toLowerCase();
          return matchEstado && (!q || texto.includes(q));
        });
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title screen-title-spaced">Órdenes</h1>
          <div class="search-row">
            <label for="ordenes-buscar">Buscar orden</label>
            <input id="ordenes-buscar" name="ordenes_buscar" type="search" placeholder="Folio, equipo, sucursal o responsable" value="${esc(state.busquedaOrdenes)}" oninput="state.busquedaOrdenes=this.value; renderOrdenes()">
            <label for="ordenes-filtro">Estatus</label>
            <select id="ordenes-filtro" name="ordenes_filtro" onchange="state.filtroOrdenes=this.value; renderOrdenes()">
              <option value="abiertas" ${state.filtroOrdenes === "abiertas" ? "selected" : ""}>Abiertas</option>
              <option value="cerradas" ${state.filtroOrdenes === "cerradas" ? "selected" : ""}>Cerradas</option>
              <option value="todas" ${state.filtroOrdenes === "todas" ? "selected" : ""}>Todas</option>
            </select>
          </div>
          ${visibles.map((orden) => ordenCard(orden)).join("") || `<div class="empty">Sin órdenes con esos filtros.</div>`}
        `));
      }

      async function renderProveedores(error = "") {
        await Promise.all([ensureProveedores(), loadProveedorImportables()]);
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title screen-title-spaced">Proveedores</h1>
          <section class="card report-card">
            <div class="field">
              <label for="proveedor-nuevo">Nuevo proveedor / técnico</label>
              <input id="proveedor-nuevo" name="proveedor_nuevo" placeholder="Nombre del taller o técnico" value="${esc(state.proveedorNuevo)}" oninput="state.proveedorNuevo=this.value">
            </div>
            ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            <button class="primary-btn" onclick="guardarProveedorMovil()">Agregar proveedor</button>
          </section>
          ${state.proveedorImportables.length ? `
            <section class="card report-card">
              <p class="card-title">Importar del catálogo general</p>
              <p class="muted card-copy-muted">Solo aparecen proveedores que aún no están ligados a mantenimiento.</p>
              <div class="field">
                <label for="proveedor-importar">Proveedor</label>
                <select id="proveedor-importar" name="proveedor_importar">
                  <option value="">Selecciona</option>
                  ${state.proveedorImportables.map((proveedor) => `<option value="${proveedor.id}">${esc(proveedor.nombre)}</option>`).join("")}
                </select>
              </div>
              <button class="secondary-btn full-width" onclick="importarProveedorMovil()">Importar proveedor</button>
            </section>
          ` : ""}
          <p class="section-kicker">Activos</p>
          ${state.proveedores.map((proveedor) => `
            <article class="card report-card">
              <div class="card-head">
                <div>
                  <p class="card-title">${esc(proveedor.nombre)}</p>
                  <p class="muted">${esc(proveedor.especialidad || "Sin especialidad")}</p>
                </div>
                <span class="status-chip ${proveedor.activo ? "activo" : "cerrada"}">${proveedor.activo ? "Activo" : "Pausado"}</span>
              </div>
              <p class="muted card-copy-muted">${esc([proveedor.contacto, proveedor.telefono].filter(Boolean).join(" · ") || "Sin contacto")}</p>
              ${proveedor.notas ? `<p class="card-copy">${esc(proveedor.notas)}</p>` : ""}
              <div class="card-actions">
                <button onclick="renderProveedorForm(${proveedor.id})">Editar</button>
                <button onclick="pausarProveedorMovil(${proveedor.id})">Pausar</button>
              </div>
            </article>
          `).join("") || `<div class="empty">Sin proveedores registrados.</div>`}
        `));
      }

      async function guardarProveedorMovil() {
        const nombre = state.proveedorNuevo.trim();
        if (!nombre) return renderProveedores("Escribe el nombre del proveedor.");
        const res = await apiFetch("/proveedores/", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({nombre}),
        });
        if (!res.ok) return renderProveedores("No se pudo guardar el proveedor.");
        const proveedor = await res.json();
        state.proveedorNuevo = "";
        state.proveedores = [proveedor, ...state.proveedores.filter((item) => item.id !== proveedor.id)]
          .sort((a, b) => a.nombre.localeCompare(b.nombre, "es"));
        renderProveedores();
      }

      async function importarProveedorMovil() {
        const id = document.getElementById("proveedor-importar")?.value;
        if (!id) return renderProveedores("Selecciona el proveedor a importar.");
        const res = await apiFetch("/proveedores/importar/", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({proveedor_ids: [id]}),
        });
        if (!res.ok) return renderProveedores("No se pudo importar el proveedor.");
        state.proveedores = [];
        state.proveedorImportables = [];
        renderProveedores();
      }

        const proveedor = state.proveedores.find((item) => item.id === id) || {};
        render(shell(`

          <section class="card report-card">

          </section>
        `));
      }

      async function guardarProveedorDetalle(id) {
        const payload = {
          nombre: document.getElementById("prov-nombre")?.value,
          contacto: document.getElementById("prov-contacto")?.value,
          telefono: document.getElementById("prov-telefono")?.value,
          especialidad: document.getElementById("prov-especialidad")?.value,
          notas: document.getElementById("prov-notas")?.value,
          activo: document.getElementById("prov-activo")?.checked,
        };
        const res = await apiFetch(`/proveedores/${id}/`, {
          method: "PATCH",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload),

        if (!res.ok) return renderProveedorForm(id, "Revisa el nombre del proveedor.");
        state.proveedores = [];
        showScreen("proveedores");
      }

      async function pausarProveedorMovil(id) {
        if (!window.confirm("Pausar proveedor de mantenimiento?")) return;
        const proveedor = state.proveedores.find((item) => item.id === id);
        const res = await apiFetch(`/proveedores/${id}/`, {
          method: "PATCH",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({nombre: proveedor?.nombre || "", activo: false}),
        });
        if (res.ok) {
          state.proveedores = [];
          renderProveedores();
        }
      }

      async function renderPendientes() {
        await loadBandeja(true);
        const todos = state.bandeja.filter(itemAbierto);

        const set = new Set();
        state.activos.forEach((activo) => {

      let _searchTimer = null;

        state.busquedaEquipo = value;
        clearTimeout(_searchTimer);
        _searchTimer = setTimeout(() => renderBuscarEquipo(), 300);
      }

      async function renderBuscarEquipo() {
        await ensureActivos();
        const q = state.busquedaEquipo.toLowerCase().trim();
        const filtrados = state.activos.filter((activo) => {
          const matchesUbicacion = !state.sucursalFiltro || activo.ubicacion === state.sucursalFiltro;
          const text = `${activo.nombre} ${activo.codigo} ${activo.categoria || ""}`.toLowerCase();
          return matchesUbicacion && (!q || text.includes(q));
        });
        const LIMITE = 20;
        const visibles = q ? filtrados : filtrados.slice(0, LIMITE);
        const notaBuscar = !q && filtrados.length > LIMITE
          ? `<p class="muted search-note">Mostrando ${LIMITE} de ${filtrados.length}. Escribe para buscar.</p>`
          : "";
        const ubicaciones = ubicacionesDesdeActivos();
        render(shell(`

              <option value="">Todas las áreas</option>
              ${ubicaciones.map((u) => `<option value="${esc(u)}" ${state.sucursalFiltro === u ? "selected" : ""}>${esc(u)}</option>`).join("")}
            </select>
          </div>
          ${notaBuscar}
          ${visibles.map((activo) => `
            <article class="card report-card">
              <p class="card-title">${esc(activo.nombre)}</p>
              <p class="muted">${esc(activo.codigo)} · ${esc(activo.sucursal_nombre || "Sin sucursal")}</p>
              <p class="muted">${esc(activo.categoria || "Sin categoría")} · ${esc(activo.ubicacion || "Sin ubicación")}</p>
              <div class="card-actions">
                <button onclick="iniciarEquipoDesdeActivo(${activo.id})">Registrar mantenimiento</button>
                <button onclick="verOrdenesActivo(${activo.id})">Ver órdenes</button>

            </article>

              a.nombre.toLowerCase().includes(q) ||
              a.codigo.toLowerCase().includes(q) ||
              (a.categoria || "").toLowerCase().includes(q);
            return matchUbicacion && matchTexto;

      async function guardarPuntoMantenible() {
        const d = state.puntoDraft;
        if (!d.sucursal) return renderPuntoMantenible("Selecciona la sucursal.");
        if (!d.nombre.trim()) return renderPuntoMantenible("Escribe el nombre del punto mantenible.");
        const res = await apiFetch("/activos/rapido/", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            sucursal: d.sucursal,
            nombre: d.nombre.trim(),
            categoria: d.categoria,
            ubicacion: d.ubicacion.trim(),
            notas: d.notas.trim(),
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          return renderPuntoMantenible(Object.values(err).flat().join(" ") || "No se pudo registrar el punto mantenible.");
        }
        const activo = await res.json();
        state.activos = [activo, ...state.activos.filter((item) => item.id !== activo.id)];
        state.equipoDraft = emptyEquipoDraft();
        state.equipoDraft.activo = activo.id;
        state.equipoDraft.activoLabel = `${activo.nombre} (${activo.codigo})`;
        state.equipoDraft.descripcion = d.notas || "";
        state.equipoDraft.tipo = "CORRECTIVO";
        state.equipoDraft.step = 2;
        showScreen("equipo");

      function filtrarActivos(q, ubicacionFiltro = "") {
        const lista = document.getElementById("lista-activos");
        if (!lista) return;
        const value = q.toLowerCase();
        const filtrados = state.activos.filter((activo) => {
          const matchUbicacion = !ubicacionFiltro || activo.ubicacion === ubicacionFiltro;
          const matchTexto = !value ||
            activo.nombre.toLowerCase().includes(value) ||
            activo.codigo.toLowerCase().includes(value) ||
            (activo.ubicacion || "").toLowerCase().includes(value);
          return matchUbicacion && matchTexto;
        });
        lista.innerHTML = filtrados.map(activoCard).join("") || `<div class="empty">Sin resultados.</div>`;
      }

      function filtrarActivosEstado() {
        const d = state.equipoDraft;
        const lista = document.getElementById("lista-activos");
        if (!lista) return;
        const q = (d.busquedaTexto || "").toLowerCase().trim();
        const LIMITE = 20;
        const filtrados = state.activos.filter((a) => {
          const matchUbicacion = !d.ubicacionFiltro || a.ubicacion === d.ubicacionFiltro;
          const matchTexto = !q ||
            a.nombre.toLowerCase().includes(q) ||
            a.codigo.toLowerCase().includes(q) ||
            (a.categoria || "").toLowerCase().includes(q);
          return matchUbicacion && matchTexto;
        });
        const visibles = q ? filtrados : filtrados.slice(0, LIMITE);
        lista.innerHTML = visibles.map(activoCard).join("") || `<div class="empty">Sin resultados.</div>`;
      }

      function setFotoEquipo(input) {
        const file = input.files[0];
        if (!file) return;
        state.equipoDraft.foto = file;
        state.equipoDraft.fotoPreview = URL.createObjectURL(file);
        renderEquipoDraft();
      }

      function puedeRevisarEquipo() {
        const d = state.equipoDraft;
        return Boolean(d.tipo && d.descripcion.trim());
      }

      function syncEquipoReviewButton() {
        const button = document.getElementById("btn-equipo-revisar");
        if (button) button.disabled = !puedeRevisarEquipo();
      }

      function nextEquipoStep() {
        const d = state.equipoDraft;
        if (d.step === 1 && !d.activo) return;
        if (d.step === 2 && !d.tipo) return renderEquipoDraft("Selecciona el tipo de mantenimiento.");
        if (d.step === 2 && !d.descripcion.trim()) return renderEquipoDraft("La descripción es obligatoria.");
        d.step = Math.min(3, d.step + 1);
        renderEquipoDraft();
      }

      function prevEquipoStep() {
        state.equipoDraft.step = Math.max(1, state.equipoDraft.step - 1);
        renderEquipoDraft();
      }

      async function enviarEquipo() {
        const d = state.equipoDraft;
        const fd = new FormData();
        fd.append("activo_ref", d.activo);
        fd.append("tipo", d.tipo);
        fd.append("descripcion", d.descripcion.trim());
        if (d.proveedor) fd.append("proveedor_servicio", d.proveedor.trim());
        if (d.costoReal) fd.append("costo_real", d.costoReal);
        if (d.foto) fd.append("foto", d.foto);
        const res = await apiFetch("/ordenes/", {method: "POST", body: fd});
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          return renderEquipoDraft(Object.values(err).flat().join(" ") || "Error al guardar.");
        }
        const data = await res.json();
        render(shell(`
          <section class="confirm">
            <div class="confirm-mark">OK</div>
            <h1 class="screen-title">Guardado</h1>
            <p class="muted">Orden ${esc(data.folio || data.id)} registrada correctamente.</p>

              <button class="secondary-btn" onclick="showScreen('dashboard')">Volver al inicio</button>

          </section>

            <div class="actions">
              <button class="secondary-btn" onclick="showScreen('dashboard')">Cancelar</button>
              <button class="primary-btn" onclick="nextVehiculoStep()" ${d.unidad ? "" : "disabled"}>Siguiente</button>
            </div>
          `;
        } else if (d.step === 2) {
          await ensureProveedores();
          const tipoServicioSelect = d.modo === "servicio" ? `
            <div class="field">
              <label>Tipo de servicio</label>
              <select onchange="selectTipoServicio(this.value)">
                <option value="">Selecciona</option>
                ${state.tiposServicio.map((tipo) =>
                  `<option value="${tipo.id}" ${String(d.tipoServicio) === String(tipo.id) ? "selected" : ""}>${esc(tipo.nombre)}</option>`
                ).join("")}
              </select>
            </div>
            <div class="field">
              <label for="km-v">Kilometraje actual</label>
              <input id="km-v" type="number" min="0" placeholder="km" value="${esc(d.km)}" oninput="state.vehiculoDraft.km=this.value">
            </div>
            <div class="field">
              <label for="prox-fecha">Próxima fecha servicio</label>
              <input id="prox-fecha" type="date" value="${esc(d.proximaFecha)}" oninput="state.vehiculoDraft.proximaFecha=this.value">
            </div>
            <div class="field">
              <label for="prox-km">Próximos km para servicio</label>
              <input id="prox-km" type="number" min="0" placeholder="km" value="${esc(d.proximosKm)}" oninput="state.vehiculoDraft.proximosKm=this.value">
            </div>
          ` : d.modo === "reparacion" ? `
            <div class="field">
              <label for="falla-v">Descripción de la falla</label>
              <textarea id="falla-v" placeholder="Qué falló y cómo se detectó" oninput="state.vehiculoDraft.descripcionFalla=this.value; syncVehiculoReviewButton()">${esc(d.descripcionFalla)}</textarea>
            </div>
            <div class="field">
              <label for="rep-v">Descripción de la reparación</label>
              <textarea id="rep-v" placeholder="Qué se hizo para resolverlo" oninput="state.vehiculoDraft.descripcionReparacion=this.value">${esc(d.descripcionReparacion)}</textarea>
            </div>
          ` : "";
          body = `
            <h1 class="screen-title">Detalles</h1>
            ${progressDots(2)}
            <div class="field">
              <label>Vehículo</label>
              <p class="section-kicker section-kicker-tight">${esc(d.unidadLabel)}</p>
            </div>
            <div class="field">
              <label>Tipo de registro</label>
              <div class="tipo-grid">
                <button class="tipo-btn ${d.modo === "servicio" ? "selected" : ""}" onclick="state.vehiculoDraft.modo='servicio'; renderVehiculoDraft()">Servicio preventivo</button>
                <button class="tipo-btn ${d.modo === "reparacion" ? "selected" : ""}" onclick="state.vehiculoDraft.modo='reparacion'; renderVehiculoDraft()">Reparación correctiva</button>
              </div>
            </div>
            ${tipoServicioSelect}
            ${d.modo ? `
              <div class="field">
                <label for="prov-v">Proveedor / taller</label>
                <select id="prov-v" onchange="state.vehiculoDraft.proveedor=this.value">${providerOptions(d.proveedor)}</select>
              </div>
              <div class="field">
                <label for="costo-v">Costo (MXN)</label>
                <input id="costo-v" type="number" step="0.01" min="0" placeholder="0.00" value="${esc(d.costo)}" oninput="state.vehiculoDraft.costo=this.value">
              </div>
              <div class="field">
                <label>Foto opcional</label>
                <input id="foto-v" class="file-input" type="file" accept="image/*" capture="environment" onchange="setFotoVehiculo(this)">
                <label class="file-trigger ${d.foto ? "loaded" : ""}" for="foto-v">${d.foto ? "Foto cargada" : "Tomar foto / factura"}</label>
                ${d.fotoPreview ? `<img class="thumb" src="${d.fotoPreview}" alt="Vista previa">` : ""}
              </div>
            ` : ""}
            ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            <div class="actions">
              <button class="secondary-btn" onclick="prevVehiculoStep()">Atrás</button>
              <button id="btn-vehiculo-revisar" class="primary-btn" onclick="nextVehiculoStep()" ${puedeAvanzarVehiculo() ? "" : "disabled"}>Revisar</button>
            </div>
          `;
        } else {
          const esServicio = d.modo === "servicio";
          body = `
            <h1 class="screen-title">Confirmar</h1>
            ${progressDots(3)}
            <section class="card report-card">
              <div class="kv"><b>Vehículo</b><span>${esc(d.unidadLabel)}</span></div>
              <div class="kv"><b>Tipo</b><span>${esServicio ? "Servicio preventivo" : "Reparación correctiva"}</span></div>
              ${esServicio ? `<div class="kv"><b>Servicio</b><span>${esc(d.tipoServicioLabel)}</span></div>` : ""}
              ${!esServicio ? `<div class="kv"><b>Falla</b><span>${esc(d.descripcionFalla)}</span></div>` : ""}
              <div class="kv"><b>Proveedor</b><span>${esc(d.proveedor || "-")}</span></div>
              <div class="kv"><b>Costo</b><span>${d.costo ? "$" + Number(d.costo).toLocaleString("es-MX") : "-"}</span></div>
              ${d.km ? `<div class="kv"><b>Km</b><span>${esc(d.km)}</span></div>` : ""}
              <div class="kv"><b>Foto</b><span>${d.foto ? "Adjunta" : "Sin foto"}</span></div>
            </section>
            ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            <div class="actions">
              <button class="secondary-btn" onclick="prevVehiculoStep()">Atrás</button>
              <button class="primary-btn" onclick="enviarVehiculo()">Guardar</button>
            </div>
          `;
        }
        render(shell(body));
      }

      function seleccionarUnidad(id) {
        const unidad = state.unidades.find((item) => item.id === id);
        if (!unidad) return;
        state.vehiculoDraft.unidad = unidad.id;
        state.vehiculoDraft.unidadLabel = `${unidad.descripcion} (${unidad.codigo})`;
        renderVehiculoDraft();
      }

      function selectTipoServicio(value) {
        const tipo = state.tiposServicio.find((item) => String(item.id) === String(value));
        state.vehiculoDraft.tipoServicio = value || null;
        state.vehiculoDraft.tipoServicioLabel = tipo ? tipo.nombre : "";
        renderVehiculoDraft();
      }

      function setFotoVehiculo(input) {
        const file = input.files[0];
        if (!file) return;
        state.vehiculoDraft.foto = file;
        state.vehiculoDraft.fotoPreview = URL.createObjectURL(file);
        renderVehiculoDraft();
      }

      function puedeAvanzarVehiculo() {
        const d = state.vehiculoDraft;
        if (d.step === 1) return Boolean(d.unidad);
        if (!d.modo) return false;
        if (d.modo === "servicio") return Boolean(d.tipoServicio);
        if (d.modo === "reparacion") return Boolean(d.descripcionFalla.trim());
        return false;
      }

      function syncVehiculoReviewButton() {
        const button = document.getElementById("btn-vehiculo-revisar");
        if (button) button.disabled = !puedeAvanzarVehiculo();
      }

      function nextVehiculoStep() {
        if (!puedeAvanzarVehiculo()) {
          const msg = state.vehiculoDraft.modo === "servicio"
            ? "Selecciona el tipo de servicio."
            : "La descripción de la falla es obligatoria.";
          return renderVehiculoDraft(msg);
        }
        state.vehiculoDraft.step = Math.min(3, state.vehiculoDraft.step + 1);
        renderVehiculoDraft();
      }

      function prevVehiculoStep() {
        state.vehiculoDraft.step = Math.max(1, state.vehiculoDraft.step - 1);
        renderVehiculoDraft();
      }

      async function enviarVehiculo() {
        const d = state.vehiculoDraft;
        let res;
        if (d.modo === "servicio") {
          const fd = new FormData();
          fd.append("unidad", d.unidad);
          fd.append("tipo_servicio", d.tipoServicio);
          fd.append("fecha", new Date().toISOString().slice(0, 10));
          if (d.km) fd.append("km_servicio", d.km);
          if (d.proveedor) fd.append("proveedor", d.proveedor);
          if (d.costo) fd.append("costo", d.costo);
          if (d.proximaFecha) fd.append("proxima_fecha", d.proximaFecha);
          if (d.proximosKm) fd.append("proximos_km", d.proximosKm);
          if (d.foto) fd.append("archivo_factura", d.foto);
          res = await apiFetch("/servicios/", {method: "POST", body: fd});
        } else {
          const fd = new FormData();
          fd.append("unidad", d.unidad);
          fd.append("fecha_ingreso", new Date().toISOString().slice(0, 10));
          fd.append("descripcion_falla", d.descripcionFalla);
          if (d.descripcionReparacion) fd.append("descripcion_reparacion", d.descripcionReparacion);
          if (d.proveedor) fd.append("proveedor", d.proveedor);
          if (d.costo) fd.append("costo", d.costo);
          if (d.foto) fd.append("foto", d.foto);
          res = await apiFetch("/reparaciones/", {method: "POST", body: fd});
        }
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          return renderVehiculoDraft(Object.values(err).flat().join(" ") || "Error al guardar.");
        }
        render(shell(`
          <section class="confirm">
            <div class="confirm-mark">OK</div>
            <h1 class="screen-title">Guardado</h1>
            <p class="muted">${d.modo === "servicio" ? "Servicio" : "Reparación"} registrado correctamente.</p>
            <div class="confirm-actions">
              <button class="primary-btn" onclick="startVehiculo()">Registrar otro</button>
              <button class="secondary-btn" onclick="showScreen('dashboard')">Volver al inicio</button>
            </div>
          </section>
        `));
      }

      function openClosedHistory() {
        state.history.periodo = "30d";
        state.history.estado = "cerrado";
        state.history.page = 1;
        state.history.results = [];
        showScreen("historial");
      }

      function setHistoryFilter(name, value) {
        state.requestGeneration.history += 1;
        state.historyLoading = false;
        state.history[name] = value;
        state.history.page = 1;
        state.history.results = [];
        renderHistorial();
      }

      function loadMoreHistory(button) {
        if (state.historyLoading) return;
        button.disabled = true;
        button.textContent = "Cargando…";
        renderHistorial(true);
      }

      function historyCard(item) {
        return `<article class="card report-card compact-item no-thumb">
          <div><div class="card-head"><div><p class="card-title">${esc(item.titulo || "Movimiento")}</p><p class="muted">${esc(item.sucursal?.label || "Sin sucursal")} · ${esc(item.sujeto?.label || item.tipo)}</p></div><span class="status-chip">${esc(item.estado)}</span></div>
          <p class="muted card-copy-muted">${esc(item.descripcion || "Sin descripción")}</p>
          <div class="card-actions"><button data-maintenance-uid="${esc(item.parent_uid || item.uid)}">Ver detalle</button></div></div>
        </article>`;
      }

      async function renderHistorial(loadMore = false) {
        if (state.historyLoading) return;
        state.historyLoading = true;
        const generation = ++state.requestGeneration.history;
        await ensureSucursales();
        if (generation !== state.requestGeneration.history) { state.historyLoading = false; return; }
        const requestedPage = state.history.page;
        if (!loadMore) render(shell(`<button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button><h1 class="screen-title screen-title-spaced">Historial</h1><div class="skeleton" aria-label="Cargando historial"></div>`));
        const query = `periodo=${encodeURIComponent(state.history.periodo)}&tipo=${encodeURIComponent(state.history.tipo)}&estado=${encodeURIComponent(state.history.estado)}&sucursal=${encodeURIComponent(state.history.sucursal)}&page=${requestedPage}&page_size=25`;
        let res;
        try { res = await apiV2Fetch(`/historial/?${query}`); }
        catch (error) {
          if (generation !== state.requestGeneration.history) return;
          state.historyLoading = false;
          return render(shell(`<div class="error-state" role="alert"><h1>No pudimos cargar el historial</h1><button onclick="renderHistorial(${loadMore})">Reintentar</button></div>`));
        }
        if (generation !== state.requestGeneration.history) { state.historyLoading = false; return; }
        if (!res.ok) { state.historyLoading = false; return render(shell(`<button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button><div class="error-state" role="alert"><h1>No pudimos cargar el historial</h1><button onclick="renderHistorial(${loadMore})">Reintentar</button></div>`)); }
        const data = await res.json();
        state.history.results = loadMore ? [...state.history.results, ...(data.results || [])] : (data.results || []);
        state.history.hasNext = Boolean(data.pagination?.has_next);
        state.history.page = requestedPage + (state.history.hasNext ? 1 : 0);
        state.historyLoading = false;
        const branchOptions = state.sucursales.map(s => `<option value="${s.id}" ${String(s.id) === String(state.history.sucursal) ? "selected" : ""}>${esc(s.nombre)}</option>`).join("");
        return render(shell(`<button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button><h1 class="screen-title screen-title-spaced">Historial</h1>
          <div class="history-filters" aria-label="Filtros de historial">
            <label>Periodo<select onchange="setHistoryFilter('periodo',this.value)">${[["30d","30 días"],["semana","Semana"],["mes","Mes"],["90d","90 días"],["todo","Todo"]].map(([v,l])=>`<option value="${v}" ${state.history.periodo===v?"selected":""}>${l}</option>`).join("")}</select></label>
            <label>Tipo<select onchange="setHistoryFilter('tipo',this.value)">${[["todo","Todos"],["reporte","Reportes"],["orden","Órdenes"],["reparacion","Reparaciones"],["servicio_unidad","Servicios"],["sin_reporte","Directos"]].map(([v,l])=>`<option value="${v}" ${state.history.tipo===v?"selected":""}>${l}</option>`).join("")}</select></label>
            <label>Estado<select onchange="setHistoryFilter('estado',this.value)">${[["todo","Todos"],["abierto","Abierto"],["en_proceso","En proceso"],["cerrado","Cerrado"],["cancelado","Cancelado"]].map(([v,l])=>`<option value="${v}" ${state.history.estado===v?"selected":""}>${l}</option>`).join("")}</select></label>
            <label>Sucursal<select onchange="setHistoryFilter('sucursal',this.value)"><option value="">Todas</option>${branchOptions}</select></label>
          </div>${state.history.results.map(historyCard).join("") || `<div class="empty">No hay movimientos con estos filtros.</div>`}
          ${state.history.hasNext ? `<button class="secondary-btn" onclick="loadMoreHistory(this)" ${state.historyLoading ? "disabled" : ""}>${state.historyLoading ? "Cargando…" : "Cargar más"}</button>` : ""}`));
      }

      function detailRows(value, prefix = "") {
        return Object.entries(value || {}).filter(([,v]) => v !== null && v !== "" && !Array.isArray(v) && typeof v !== "object").map(([k,v]) => `<div class="detail-row"><strong>${esc((prefix + k).replaceAll("_", " "))}</strong><span>${esc(v)}</span></div>`).join("");
      }

      function evidenceGallery(items) {
        const evidence = (items || []).filter(Boolean);
        if (!evidence.length) return `<p class="muted">Sin evidencias disponibles.</p>`;
        const markup = evidence.map(item => {
          const key = `evidence-${Math.random().toString(36).slice(2)}`;
          const generation = state.evidenceGeneration;
          window.setTimeout(() => loadProtectedEvidence(key, item.url, item.nombre || "Evidencia de mantenimiento", generation), 160);
          return `<figure id="${key}" class="evidence-placeholder"><div class="skeleton" aria-label="Cargando evidencia"></div><figcaption>${esc(item.nombre || "Evidencia de mantenimiento")}</figcaption></figure>`;
        }).join("");
        return `<div class="gallery">${markup}</div>`;
      }

      async function evidenceBlob(url) {
        if (state.evidenceBlobCache.has(url)) {
          const cached = state.evidenceBlobCache.get(url);
          state.evidenceBlobCache.delete(url);
          state.evidenceBlobCache.set(url, cached);
          return cached;
        }
        const res = await apiV2Fetch(url);
        if (!res.ok) throw new Error("Evidencia no disponible");
        const blob = await res.blob();
        state.evidenceBlobCache.set(url, blob);
        while (state.evidenceBlobCache.size > 20) state.evidenceBlobCache.delete(state.evidenceBlobCache.keys().next().value);
        return blob;
      }

      async function loadProtectedEvidence(containerId, url, filename, generation) {
        let container = document.getElementById(containerId);
        if (!container) return;
        try {
          const blob = await evidenceBlob(url);
          container = document.getElementById(containerId);
          if (!container || generation !== state.evidenceGeneration) return;
          const objectUrl = URL.createObjectURL(blob);
          state.evidenceObjectUrls.add(objectUrl);
          const isPdf = blob.type === "application/pdf" || String(filename).toLowerCase().endsWith(".pdf");
          if (isPdf) {
            container.innerHTML = `<a href="${objectUrl}" target="_blank" rel="noopener" aria-label="Abrir documento ${esc(filename)}"><span aria-hidden="true">PDF</span> Abrir documento</a><figcaption>${esc(filename)}</figcaption>`;
          } else {
            container.innerHTML = `<button type="button" aria-label="Ampliar ${esc(filename)}"><img src="${objectUrl}" alt="${esc(filename)}" loading="lazy"></button><figcaption>${esc(filename)}</figcaption>`;
            container.querySelector("button").onclick = function () { openImageViewer(url, filename, this); };
          }
        } catch (error) {
          container = document.getElementById(containerId);
          if (!container || generation !== state.evidenceGeneration) return;
          container.innerHTML = `<div class="error-msg" role="status">Evidencia no disponible</div><figcaption>${esc(filename)}</figcaption>`;
        }
      }

      async function loadProtectedThumbnail(containerId, url, alt, generation) {
        let container = document.getElementById(containerId);
        if (!container) return;
        try {
          const blob = await evidenceBlob(url);
          container = document.getElementById(containerId);
          if (!container || generation !== state.evidenceGeneration) return;
          const objectUrl = URL.createObjectURL(blob);
          state.evidenceObjectUrls.add(objectUrl);
          const image = document.createElement("img");
          image.className = "compact-thumb";
          image.alt = alt;
          image.loading = "lazy";
          image.src = objectUrl;
          container.replaceWith(image);
        } catch (error) {
          container = document.getElementById(containerId);
          if (!container || generation !== state.evidenceGeneration) return;
          const card = container.closest(".compact-item");
          container.remove();
          card?.classList.add("no-thumb");
        }
      }

      function revokeEvidenceUrls() {
        state.evidenceGeneration += 1;
        state.evidenceObjectUrls.forEach(url => URL.revokeObjectURL(url));
        state.evidenceObjectUrls.clear();
      }

      function clearEvidenceCache() {
        revokeEvidenceUrls();
        state.evidenceBlobCache.clear();
      }

      async function openItemDetail(uid, trigger) {
        const [tipo, id] = String(uid).split(":");
        const generation = ++state.requestGeneration.detail;
        state.viewerReturnFocus = trigger || document.activeElement;
        state.detailReturn = {screen: trigger?.closest("#app")?.querySelector(".history-filters") ? "historial" : "pendientes", uid};
        render(shell(`<button class="secondary-btn" onclick="history.back();showScreen('pendientes')">Volver</button><div class="skeleton" aria-label="Cargando detalle"></div>`));
        let data = state.detailCache.get(uid);
        if (!data) {
          let res;
          try { res = await apiV2Fetch(`/items/${tipo}/${id}/`); }
          catch (error) { if (generation === state.requestGeneration.detail) render(shell(`<div class="error-state" role="alert"><h1>No se pudo abrir el detalle</h1><p>Revisa tu conexión e intenta nuevamente.</p><button onclick="showScreen('pendientes')">Volver</button></div>`)); return; }
          if (generation !== state.requestGeneration.detail) return;
          if (!res.ok) return render(shell(`<div class="error-state" role="alert"><h1>No se pudo abrir el detalle</h1><p>Puede que ya no tengas acceso o el registro no exista.</p><button onclick="showScreen('pendientes')">Volver</button></div>`));
          data = await res.json();
          state.detailCache.delete(uid); state.detailCache.set(uid, data);
          while (state.detailCache.size > 20) state.detailCache.delete(state.detailCache.keys().next().value);
        }
        const initial = data.reporte_inicial || data.detalle || {};
        const timeline = data.seguimiento || [];
        const initialEvidences = [initial.foto, initial.factura].filter(Boolean);
        render(shell(`<button class="secondary-btn" onclick="returnFromDetail()">Volver</button><h1 class="screen-title screen-title-spaced">${esc(initial.titulo || "Detalle de mantenimiento")}</h1>
          <section class="card report-card"><div class="detail-list">${detailRows(initial)}${detailRows(data.fechas,"fecha ")}${detailRows(data.responsables,"responsable ")}</div><p>${esc(initial.descripcion || "Sin descripción registrada.")}</p></section>
          <h2>Evidencias iniciales</h2>${evidenceGallery(initialEvidences)}<h2>Seguimiento</h2>${timeline.length ? `<ol class="timeline">${timeline.map(row=>`<li><strong>${esc(row.usuario?.nombre || "Sistema")}</strong><p class="muted">${esc(row.fecha || "Sin fecha")} · ${esc(row.estatus_nuevo || "Actualización")}</p><p>${esc(row.comentario || "Sin comentario")}</p>${evidenceGallery(row.evidencias)}</li>`).join("")}</ol>` : `<div class="empty">Aún no hay actualizaciones de seguimiento.</div>`}`));
      }

      async function returnFromDetail() {
        const target = state.detailReturn.screen || "pendientes";
        await showScreen(target);
        const uid = state.detailReturn.uid;
        if (!uid) return;
        document.querySelector(`[data-maintenance-uid="${CSS.escape(uid)}"]`)?.focus();
      }

      function invalidateDetail(uid) { if (uid) state.detailCache.delete(uid); }

      async function openImageViewer(url, alt, trigger) {
        closeImageViewer(false);
        const generation = state.evidenceGeneration;
        state.viewerReturnFocus = trigger;
        let viewerUrl;
        try { viewerUrl = URL.createObjectURL(await evidenceBlob(url)); }
        catch (error) { return; }
        if (generation !== state.evidenceGeneration) { URL.revokeObjectURL(viewerUrl); return; }
        state.evidenceObjectUrls.add(viewerUrl);
        const viewer = document.createElement("div"); viewer.className = "image-viewer"; viewer.id = "image-viewer"; viewer.setAttribute("role","dialog"); viewer.setAttribute("aria-modal","true"); viewer.setAttribute("aria-label", `Vista ampliada de ${alt}`);
        viewer.dataset.objectUrl = viewerUrl;
        viewer.innerHTML = `<button class="viewer-close" aria-label="Cerrar imagen" onclick="closeImageViewer()">×</button><img src="${viewerUrl}" alt="${esc(alt)}">`; document.body.appendChild(viewer); viewer.querySelector("button").focus();
      }
      function closeImageViewer(restoreFocus = true){ const viewer=document.getElementById("image-viewer"); const url=viewer?.dataset.objectUrl; viewer?.remove(); if(url){URL.revokeObjectURL(url);state.evidenceObjectUrls.delete(url);} if(restoreFocus) state.viewerReturnFocus?.focus?.(); }
      document.addEventListener("click", event => {
        const detailButton = event.target.closest("[data-maintenance-uid]");
        if (detailButton) openItemDetail(detailButton.dataset.maintenanceUid, detailButton);
      });
      document.addEventListener("keydown", event => {
        const viewer = document.getElementById("image-viewer");
        if (!viewer) return;
        if (event.key === "Escape") { event.preventDefault(); closeImageViewer(); return; }
        if (event.key !== "Tab") return;
        const focusable = [...viewer.querySelectorAll('button,[href],[tabindex]:not([tabindex="-1"])')].filter(node => !node.disabled);
        if (!focusable.length) return;
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
        else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
      });
      window.addEventListener("pagehide", clearEvidenceCache);

      async function boot() {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("/mantenimiento/sw.js?v=20260711-paridad-v1", { scope: "/mantenimiento/" }).catch(() => {});
        }

        try {
          if (await useDjangoSessionToken()) {
            await showScreen("dashboard");
            return;
          }
        } catch (error) {
          logout(false);
        }

        if (state.token) {
          try {
            await showScreen("dashboard");
            return;
          } catch (error) {
            logout(false);
          }
        }

        renderLogin();
      }

      boot();
    </script>
  </body>
</html>
