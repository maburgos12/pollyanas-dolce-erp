{% load static %}
<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#8B2252">
    <title>Pollyana's Mantenimiento</title>
    <link rel="manifest" href="{% static 'mantenimiento/manifest.json' %}">
    <link rel="icon" href="{% static 'favicon.ico' %}?v=20260525-logo-v1" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon-32x32.png' %}?v=20260525-logo-v1">
    <link rel="apple-touch-icon" href="{% static 'apple-touch-icon.png' %}?v=20260525-logo-v1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #f9f5f8;
        --surface: #ffffff;
        --border: #ede6f0;
        --wine: #8B2252;
        --gold: #C9A84C;
        --text: #1c1520;
        --text-muted: #6b5f70;
        --danger: #e64f64;
        --warning: #e6b84f;
        --success: #51b56f;
        --info: #4f8ee6;
      }
      * { box-sizing: border-box; }
      html, body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Nunito", sans-serif;
      }
      body {
        display: flex;
        justify-content: center;
        padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      }
      button, input, textarea, select { font: inherit; }
      button {
        min-height: 48px;
        border: 0;
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: .55;
      }
      #app {
        width: 100%;
        max-width: 430px;
        min-height: 100vh;
        padding: 18px 16px 74px;
        opacity: 1;
        transition: opacity .2s ease;
      }
      #app.is-changing { opacity: 0; }
      .brand-title {
        margin: 0;
        font-family: "Playfair Display", serif;
        font-size: 38px;
        line-height: 1;
      }
      .brand-subtitle {
        margin: 8px 0 0;
        color: var(--gold);
        font-weight: 800;
        text-transform: uppercase;
      }
      .login-wrap {
        display: flex;
        min-height: calc(100vh - 92px);
        flex-direction: column;
        justify-content: center;
      }
      .panel, .card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
      }
      .panel {
        margin-top: 30px;
        padding: 18px;
      }
      .field {
        display: grid;
        gap: 7px;
        margin-bottom: 14px;
      }
      label {
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 800;
      }
      input, textarea, select {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #f9f5f8;
        color: var(--text);
        outline: none;
        padding: 12px 13px;
      }
      textarea {
        min-height: 112px;
        resize: vertical;
      }
      input:focus, textarea:focus, select:focus { border-color: var(--gold); }
      .primary-btn {
        width: 100%;
        border-radius: 10px;
        background: var(--wine);
        color: white;
        font-weight: 800;
        padding: 14px;
      }
      .secondary-btn {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        color: var(--text);
        font-weight: 800;
        padding: 12px 14px;
      }
      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }
      .mini-brand {
        font-family: "Playfair Display", serif;
        font-size: 22px;
      }
      .hello {
        margin: 3px 0 0;
        color: var(--text-muted);
        font-size: 14px;
        font-weight: 700;
      }
      .logout {
        min-height: 40px;
        border-radius: 999px;
        background: rgba(139, 34, 82, .08);
        border: 1px solid var(--border);
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
        padding: 8px 12px;
      }
      .dash-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .dash-btn {
        min-height: 100px;
        border: 2px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        font-size: 15px;
        font-weight: 800;
        padding: 14px 10px;
      }
      .dash-btn:hover, .dash-btn:focus { border-color: var(--wine); }
      .card-list {
        display: grid;
        gap: 10px;
      }
      .select-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        font-weight: 800;
        padding: 14px;
        text-align: left;
      }
      .select-card:hover, .select-card.selected {
        border-color: var(--wine);
        background: rgba(139, 34, 82, .08);
      }
      .card-label {
        margin: 0 0 4px;
        font-size: 15px;
        font-weight: 900;
      }
      .card-sub {
        margin: 0;
        color: var(--text-muted);
        font-size: 12px;
      }
      .tipo-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 14px;
      }
      .tipo-btn {
        min-height: 70px;
        border: 2px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        font-weight: 800;
        padding: 12px;
      }
      .tipo-btn.selected {
        border-color: var(--gold);
        background: rgba(201, 168, 76, .14);
      }
      .progress {
        display: flex;
        gap: 9px;
        margin: 0 0 18px;
      }
      .dot {
        width: 34px;
        height: 7px;
        border-radius: 999px;
        background: var(--border);
      }
      .dot.active { background: var(--gold); }
      .screen-title {
        margin: 0 0 14px;
        font-family: "Playfair Display", serif;
        font-size: 28px;
        line-height: 1.08;
      }
      .file-input {
        width: 1px;
        height: 1px;
        opacity: 0;
        overflow: hidden;
        position: absolute;
        pointer-events: none;
      }
      .file-trigger {
        display: flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #f9f5f8;
        color: var(--text);
        font-weight: 900;
        padding: 12px 13px;
      }
      .file-trigger.loaded {
        border-color: var(--success);
        color: var(--success);
      }
      .thumb {
        width: 100%;
        max-height: 180px;
        object-fit: cover;
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-top: 8px;
      }
      .kv {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 8px;
        margin: 7px 0;
        font-size: 14px;
      }
      .kv b { color: var(--gold); }
      .report-card {
        margin-bottom: 10px;
        padding: 14px;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 16px;
      }
      .inline-note {
        border: 1px solid rgba(201, 168, 76, .35);
        border-radius: 10px;
        background: rgba(201, 168, 76, .11);
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
        margin: 12px 0;
        padding: 12px;
      }
      .confirm {
        margin-top: 28px;
        text-align: center;
      }
      .confirm-mark {
        font-size: 54px;
        margin-bottom: 8px;
      }
      .confirm-actions {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }
      .error-msg {
        margin: 10px 0 0;
        color: var(--danger);
        font-weight: 800;
      }
      .success-msg {
        margin: 10px 0 0;
        color: var(--success);
        font-weight: 800;
      }
      .muted {
        color: var(--text-muted);
        font-size: 13px;
      }
      .footer {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        max-width: 430px;
        margin: 0 auto;
        border-top: 1px solid var(--border);
        background: rgba(255, 255, 255, .96);
        color: var(--text-muted);
        text-align: center;
        font-size: 12px;
        padding: 13px 16px calc(13px + env(safe-area-inset-bottom));
      }
      .empty {
        border: 1px dashed var(--border);
        border-radius: 12px;
        color: var(--text-muted);
        padding: 22px;
        text-align: center;
      }
      .summary-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 0 0 14px;
      }
      .summary-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
        padding: 12px;
      }
      .summary-card strong {
        display: block;
        color: var(--gold);
        font-size: 22px;
        line-height: 1;
      }
      .summary-card span {
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 800;
      }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin: 0 0 14px;
      }
      .toolbar button {
        min-height: 42px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        color: var(--text);
        font-size: 12px;
        font-weight: 900;
        padding: 9px;
        box-shadow: 0 1px 3px rgba(0, 0, 0, .07), 0 1px 2px rgba(0, 0, 0, .04);
      }
      .toolbar button.active {
        border-color: var(--gold);
        color: #4f3416;
        background: rgba(201, 168, 76, .14);
      }
      .status-chip {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--text-muted);
        font-size: 11px;
        font-weight: 900;
        padding: 4px 8px;
      }
      .status-chip.critica,
      .status-chip.alta { color: var(--danger); border-color: rgba(230,79,100,.45); }
      .status-chip.proceso { color: var(--warning); border-color: rgba(230,184,79,.45); }
      .status-chip.cerrada { color: var(--success); border-color: rgba(81,181,111,.45); }
      .card-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .card-actions button {
        min-height: 38px;
        border-radius: 9px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        font-size: 12px;
        font-weight: 900;
        padding: 8px 10px;
        box-shadow: 0 1px 3px rgba(0, 0, 0, .07), 0 1px 2px rgba(0, 0, 0, .04);
      }
      .toolbar button:hover,
      .toolbar button:focus,
      .card-actions button:hover,
      .card-actions button:focus {
        border-color: var(--wine);
        background: rgba(139, 34, 82, .08);
        color: var(--text);
      }
      .search-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin-bottom: 12px;
      }
    </style>
    <link rel="stylesheet" href="{% static 'operacion/app_theme.css' %}">
  </head>
  <body>
    <div id="app"></div>
    <script>
      const API = "/api/mantenimiento";
      const AUTH_API = "/api/logistica";
      const app = document.getElementById("app");
      const state = {
        token: localStorage.getItem("pd_mantenimiento_access") || "",
        refreshToken: localStorage.getItem("pd_mantenimiento_refresh") || "",
        perfil: null,
        pantalla: "login",
        activos: [],
        sucursales: [],
        unidades: [],
        tiposServicio: [],
        ordenes: [],
        ordenActual: null,
        filtroOrdenes: "abiertas",
        busquedaEquipo: "",
        sucursalFiltro: "",
        equipoDraft: emptyEquipoDraft(),
        puntoDraft: emptyPuntoDraft(),
        vehiculoDraft: emptyVehiculoDraft(),
      };

      function emptyEquipoDraft() {
        return {
          step: 1,
          activo: null,
          activoLabel: "",
          tipo: "",
          descripcion: "",
          proveedor: "",
          costoReal: "",
          foto: null,
          fotoPreview: "",
        };
      }

      function emptyPuntoDraft() {
        return {
          sucursal: "",
          nombre: "",
          categoria: "Infraestructura",
          ubicacion: "",
          notas: "",
        };
      }

      function emptyVehiculoDraft() {
        return {
          step: 1,
          unidad: null,
          unidadLabel: "",
          modo: "",
          tipoServicio: null,
          tipoServicioLabel: "",
          descripcionFalla: "",
          descripcionReparacion: "",
          proveedor: "",
          costo: "",
          km: "",
          proximaFecha: "",
          proximosKm: "",
          foto: null,
          fotoPreview: "",
        };
      }

      function setTokens(data) {
        state.token = data.access;
        state.refreshToken = data.refresh;
        localStorage.setItem("pd_mantenimiento_access", data.access);
        localStorage.setItem("pd_mantenimiento_refresh", data.refresh);
      }

      async function useDjangoSessionToken() {
        const res = await fetch(`${API}/session-token/`, {
          headers: {"Accept": "application/json"}
        });
        if (!res.ok) return false;
        setTokens(await res.json());
        return true;
      }

      function logout(doRender = true) {
        state.token = "";
        state.refreshToken = "";
        state.perfil = null;
        localStorage.removeItem("pd_mantenimiento_access");
        localStorage.removeItem("pd_mantenimiento_refresh");
        if (doRender) window.location.href = "/logout/";
      }

      async function parseListResponse(res) {
        const data = await res.json();
        return data.results || data;
      }

      async function apiFetch(path, options = {}) {
        const headers = {...(options.headers || {})};
        if (state.token) headers.Authorization = `Bearer ${state.token}`;
        const res = await fetch(path.startsWith("http") ? path : `${API}${path}`, {...options, headers});
        if (res.status === 401 && state.refreshToken && !options._retry) {
          const refreshed = await fetch(`${AUTH_API}/auth/token/refresh/`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({refresh: state.refreshToken})
          });
          if (refreshed.ok) {
            const data = await refreshed.json();
            state.token = data.access;
            localStorage.setItem("pd_mantenimiento_access", data.access);
            return apiFetch(path, {...options, _retry: true});
          }
          logout(false);
          throw new Error("Sesion expirada");
        }
        return res;
      }

      function esc(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function render(html) {
        app.classList.add("is-changing");
        window.setTimeout(() => {
          app.innerHTML = html;
          app.classList.remove("is-changing");
        }, 120);
      }

      function appGlyph(name) {
        const icons = {
          equipo: `<svg viewBox="0 0 32 32"><path class="gold-fill" d="M10 21l3 3 9-9-3-3z"/><path class="stroke" d="M10 21l3 3 9-9-3-3-9 9Z"/><path class="gold-stroke" d="M20 7c1.6-.5 3.5-.2 4.8 1.1l-3.2 3.2 2.1 2.1 3.2-3.2c.8 2.5-.4 5.4-2.9 6.6"/><path class="stroke" d="M8 24l-2 2"/></svg>`,
          vehiculo: `<svg viewBox="0 0 32 32"><path class="soft" d="M8 14h16v8H8z"/><path class="stroke" d="M11 23h.1M22 23h.1M11 14l2-5h7l3 5"/><path class="gold-stroke" d="M23 7l2 2-5 5-2-2 5-5Z"/></svg>`,
          historial: `<svg viewBox="0 0 32 32"><path class="soft" d="M10 7h12v18H10z"/><path class="gold-stroke" d="M13 12h6M13 16h6M13 20h4"/><path class="stroke" d="M8 10h2M8 15h2M8 20h2"/></svg>`
        };
        return `<span class="app-glyph" aria-hidden="true">${icons[name] || icons.equipo}</span>`;
      }

      function shell(content) {
        const nombre = esc(state.perfil?.nombre || "");
        return `
          <div class="topbar">
            <div>
              <div class="mini-brand">Pollyana's</div>
              <p class="hello">Hola, ${nombre}</p>
            </div>
            <button class="logout" onclick="logout()">Salir</button>
          </div>
          ${content}
          <div class="footer">Pollyana's Dolce · Mantenimiento</div>
        `;
      }

      function progressDots(step, total = 3) {
        return `<div class="progress">${Array.from({length: total}, (_, index) =>
          `<span class="dot ${index + 1 === step ? "active" : ""}"></span>`
        ).join("")}</div>`;
      }

      async function showScreen(name) {
        state.pantalla = name;
        if (name === "login") return renderLogin();
        if (!state.perfil) await loadPerfil();
        if (name === "dashboard") return renderDashboard();
        if (name === "pendientes") return renderPendientes();
        if (name === "buscar") return renderBuscarEquipo();
        if (name === "seguimiento") return renderSeguimiento();
        if (name === "reportes") return renderReportes();
        if (name === "equipo") return renderEquipoDraft();
        if (name === "punto") return renderPuntoMantenible();
        if (name === "vehiculo") return renderVehiculoDraft();
        if (name === "historial") return renderHistorial();
      }

      function renderLogin(error = "") {
        render(`
          <main class="login-wrap">
            <section>
              <h1 class="brand-title">Pollyana's</h1>
              <p class="brand-subtitle">Mantenimiento</p>
            </section>
            <form class="panel" onsubmit="login(event)">
              <div class="field">
                <label for="username">Usuario</label>
                <input id="username" name="username" autocomplete="username" required>
              </div>
              <div class="field">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
              </div>
              <button class="primary-btn" type="submit">Entrar</button>
              ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            </form>
          </main>
        `);
      }

      async function login(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const res = await fetch(`${AUTH_API}/auth/token/`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({username: form.get("username"), password: form.get("password")})
        });
        if (!res.ok) return renderLogin("Usuario o contraseña incorrectos");
        setTokens(await res.json());
        await showScreen("dashboard");
      }

      async function loadPerfil() {
        const res = await apiFetch("/me/");
        if (res.ok) {
          state.perfil = await res.json();
          return;
        }
        throw new Error("No tienes permisos para usar Mantenimiento.");
      }

      async function loadOrdenes(force = false) {
        if (state.ordenes.length && !force) return state.ordenes;
        const res = await apiFetch("/ordenes/");
        state.ordenes = res.ok ? await parseListResponse(res) : [];
        return state.ordenes;
      }

      function ordenAbierta(orden) {
        return !["CERRADA", "CANCELADA"].includes(orden.estatus);
      }

      function metricasMantenimiento() {
        const ordenes = state.ordenes || [];
        return {
          abiertas: ordenes.filter(ordenAbierta).length,
          proceso: ordenes.filter((o) => o.estatus === "EN_PROCESO").length,
          criticas: ordenes.filter((o) => ordenAbierta(o) && ["CRITICA", "ALTA"].includes(o.prioridad)).length,
          cerradas: ordenes.filter((o) => o.estatus === "CERRADA").length,
        };
      }

      function statusClass(orden) {
        if (orden.estatus === "CERRADA") return "cerrada";
        if (orden.estatus === "EN_PROCESO") return "proceso";
        return String(orden.prioridad || "").toLowerCase();
      }

      function ordenCard(orden, {compact = false} = {}) {
        return `
          <article class="card report-card">
            <div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start">
              <div>
                <p style="margin:0;font-weight:900">${esc(orden.activo_nombre || "Activo sin nombre")}</p>
                <p class="muted">${esc(orden.activo_codigo || "")} · ${esc(orden.sucursal_nombre || "Sin sucursal")}</p>
              </div>
              <span class="status-chip ${statusClass(orden)}">${esc(orden.estatus_display || orden.estatus)}</span>
            </div>
            <p class="muted">${esc(orden.folio)} · ${esc(orden.tipo_display)} · ${esc(orden.prioridad_display)}</p>
            ${compact ? "" : `<p style="margin:8px 0 0">${esc(orden.descripcion || "Sin descripción")}</p>`}
            <div class="card-actions">
              <button onclick="abrirOrden(${orden.id})">Ver seguimiento</button>
              ${orden.estatus !== "EN_PROCESO" && ordenAbierta(orden) ? `<button onclick="actualizarOrdenRapida(${orden.id}, 'EN_PROCESO')">Iniciar</button>` : ""}
              ${orden.estatus !== "CERRADA" ? `<button onclick="actualizarOrdenRapida(${orden.id}, 'CERRADA')">Cerrar</button>` : ""}
            </div>
          </article>
        `;
      }

      async function renderDashboard() {
        await loadOrdenes(true);
        const m = metricasMantenimiento();
        render(shell(`
          <p style="margin:0 0 12px;color:var(--gold);font-weight:800;">Bandeja de mantenimiento</p>
          <div class="summary-grid">
            <div class="summary-card"><strong>${m.abiertas}</strong><span>Abiertas</span></div>
            <div class="summary-card"><strong>${m.proceso}</strong><span>En proceso</span></div>
            <div class="summary-card"><strong>${m.criticas}</strong><span>Críticas / altas</span></div>
            <div class="summary-card"><strong>${m.cerradas}</strong><span>Cerradas</span></div>
          </div>
          <div class="dash-grid">
            <button class="dash-btn" onclick="showScreen('pendientes')">${appGlyph("historial")}<span>Pendientes</span></button>
            <button class="dash-btn" onclick="showScreen('buscar')">${appGlyph("equipo")}<span>Buscar equipo</span></button>
            <button class="dash-btn" onclick="showScreen('seguimiento')">${appGlyph("historial")}<span>Seguimiento</span></button>
            <button class="dash-btn" onclick="showScreen('reportes')">${appGlyph("historial")}<span>Reportes</span></button>
          </div>
          <div style="margin-top:14px">
            <button class="secondary-btn" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px" onclick="startEquipo()">${appGlyph("equipo")}<span>Registrar mantenimiento de equipo</span></button>
          </div>
        `));
      }

      async function renderPendientes() {
        await loadOrdenes(true);
        const pendientes = state.ordenes.filter(ordenAbierta);
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title" style="margin-top:16px">Pendientes</h1>
          <div class="toolbar">
            <button class="${state.filtroOrdenes === "abiertas" ? "active" : ""}" onclick="state.filtroOrdenes='abiertas'; renderPendientes()">Abiertas</button>
            <button class="${state.filtroOrdenes === "criticas" ? "active" : ""}" onclick="state.filtroOrdenes='criticas'; renderPendientes()">Críticas / altas</button>
          </div>
          ${(state.filtroOrdenes === "criticas" ? pendientes.filter((o) => ["CRITICA", "ALTA"].includes(o.prioridad)) : pendientes)
            .map((orden) => ordenCard(orden)).join("") || `<div class="empty">Sin órdenes pendientes.</div>`}
        `));
      }

      function sucursalesDesdeActivos() {
        const map = new Map();
        state.activos.forEach((activo) => {
          if (activo.sucursal) map.set(String(activo.sucursal), activo.sucursal_nombre || "Sin nombre");
        });
        return Array.from(map.entries()).sort((a, b) => a[1].localeCompare(b[1], "es"));
      }

      function sucursalesDisponibles() {
        const map = new Map();
        state.sucursales.forEach((sucursal) => {
          map.set(String(sucursal.id), sucursal.nombre || sucursal.codigo || "Sin nombre");
        });
        sucursalesDesdeActivos().forEach(([id, nombre]) => map.set(String(id), nombre));
        return Array.from(map.entries()).sort((a, b) => a[1].localeCompare(b[1], "es"));
      }

      async function renderBuscarEquipo() {
        await ensureActivos();
        const q = state.busquedaEquipo.toLowerCase();
        const filtrados = state.activos.filter((activo) => {
          const matchesSucursal = !state.sucursalFiltro || String(activo.sucursal) === String(state.sucursalFiltro);
          const text = `${activo.nombre} ${activo.codigo} ${activo.categoria} ${activo.ubicacion} ${activo.sucursal_nombre}`.toLowerCase();
          return matchesSucursal && (!q || text.includes(q));
        });
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title" style="margin-top:16px">Buscar equipo</h1>
          <div class="search-row">
            <select onchange="state.sucursalFiltro=this.value; renderBuscarEquipo()">
              <option value="">Todas las sucursales</option>
              ${sucursalesDesdeActivos().map(([id, nombre]) => `<option value="${id}" ${String(state.sucursalFiltro) === String(id) ? "selected" : ""}>${esc(nombre)}</option>`).join("")}
            </select>
            <input type="search" placeholder="Nombre, código, categoría o ubicación" value="${esc(state.busquedaEquipo)}" oninput="state.busquedaEquipo=this.value; renderBuscarEquipo()">
          </div>
          ${filtrados.map((activo) => `
            <article class="card report-card">
              <p style="margin:0;font-weight:900">${esc(activo.nombre)}</p>
              <p class="muted">${esc(activo.codigo)} · ${esc(activo.sucursal_nombre || "Sin sucursal")}</p>
              <p class="muted">${esc(activo.categoria || "Sin categoría")} · ${esc(activo.ubicacion || "Sin ubicación")}</p>
              <div class="card-actions">
                <button onclick="iniciarEquipoDesdeActivo(${activo.id})">Registrar mantenimiento</button>
                <button onclick="verOrdenesActivo(${activo.id})">Ver órdenes</button>
              </div>
            </article>
          `).join("") || `<div class="empty">Sin equipos con esos filtros.</div>`}
          <div style="margin-top:14px">
            <button class="secondary-btn" style="width:100%" onclick="startPuntoMantenible()">Registrar punto mantenible</button>
          </div>
        `));
      }

      async function renderSeguimiento() {
        await loadOrdenes(true);
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title" style="margin-top:16px">Seguimiento</h1>
          ${state.ordenes.filter(ordenAbierta).map((orden) => ordenCard(orden)).join("") || `<div class="empty">Sin trabajos activos.</div>`}
        `));
      }

      async function renderReportes() {
        await loadOrdenes(true);
        await ensureActivos();
        const m = metricasMantenimiento();
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title" style="margin-top:16px">Reportes</h1>
          <div class="summary-grid">
            <div class="summary-card"><strong>${m.abiertas}</strong><span>Abiertas</span></div>
            <div class="summary-card"><strong>${m.criticas}</strong><span>Urgentes</span></div>
            <div class="summary-card"><strong>${m.cerradas}</strong><span>Cerradas</span></div>
            <div class="summary-card"><strong>${state.activos.length}</strong><span>Equipos</span></div>
          </div>
          <p style="color:var(--gold);font-weight:800;margin:14px 0 10px">Últimos movimientos</p>
          ${state.ordenes.slice(0, 8).map((orden) => ordenCard(orden, {compact: true})).join("") || `<div class="empty">Sin órdenes registradas.</div>`}
        `));
      }

      function startEquipo() {
        state.equipoDraft = emptyEquipoDraft();
        showScreen("equipo");
      }

      async function ensureActivos() {
        if (state.activos.length) return;
        const res = await apiFetch("/activos/");
        state.activos = res.ok ? await parseListResponse(res) : [];
      }

      async function ensureSucursales() {
        if (state.sucursales.length) return;
        const res = await apiFetch("/sucursales/");
        state.sucursales = res.ok ? await parseListResponse(res) : [];
      }

      function activoCard(activo) {
        const selected = state.equipoDraft.activo === activo.id ? "selected" : "";
        return `
          <button class="select-card ${selected}" onclick="seleccionarActivo(${activo.id})">
            <p class="card-label">${esc(activo.nombre)}</p>
            <p class="card-sub">${esc(activo.codigo)} · ${esc(activo.sucursal_nombre || activo.ubicacion || "Sin sucursal")}</p>
          </button>
        `;
      }

      async function renderEquipoDraft(error = "") {
        const d = state.equipoDraft;
        let body = "";
        if (d.step === 1) {
          await ensureActivos();
          const lista = state.activos.map(activoCard).join("") || `<div class="empty">No hay equipos registrados.</div>`;
          body = `
            <h1 class="screen-title">Seleccionar equipo</h1>
            ${progressDots(1)}
            <div class="field">
              <input type="search" placeholder="Buscar por nombre, código o sucursal" oninput="filtrarActivos(this.value)">
            </div>
            <div class="card-list" id="lista-activos">${lista}</div>
            <div class="inline-note">
              Si no existe el equipo, área o instalación en la base, registra primero un punto mantenible.
            </div>
            <button class="secondary-btn" style="width:100%" onclick="startPuntoMantenible()">No encuentro el equipo</button>
            <div class="actions">
              <button class="secondary-btn" onclick="showScreen('dashboard')">Cancelar</button>
              <button class="primary-btn" onclick="nextEquipoStep()" ${d.activo ? "" : "disabled"}>Siguiente</button>
            </div>
          `;
        } else if (d.step === 2) {
          body = `
            <h1 class="screen-title">Tipo de servicio</h1>
            ${progressDots(2)}
            <div class="field">
              <label>Equipo seleccionado</label>
              <p style="color:var(--gold);font-weight:800;margin:0">${esc(d.activoLabel)}</p>
            </div>
            <div class="field">
              <label>Tipo de mantenimiento</label>
              <div class="tipo-grid">
                <button class="tipo-btn ${d.tipo === "PREVENTIVO" ? "selected" : ""}" onclick="state.equipoDraft.tipo='PREVENTIVO'; renderEquipoDraft()">Preventivo</button>
                <button class="tipo-btn ${d.tipo === "CORRECTIVO" ? "selected" : ""}" onclick="state.equipoDraft.tipo='CORRECTIVO'; renderEquipoDraft()">Correctivo</button>
              </div>
            </div>
            <div class="field">
              <label for="desc-eq">Descripción / acción realizada</label>
              <textarea id="desc-eq" placeholder="Describe el trabajo realizado" oninput="state.equipoDraft.descripcion=this.value; syncEquipoReviewButton()">${esc(d.descripcion)}</textarea>
            </div>
            <div class="field">
              <label for="prov-eq">Proveedor</label>
              <input id="prov-eq" placeholder="Nombre del taller o técnico" value="${esc(d.proveedor)}" oninput="state.equipoDraft.proveedor=this.value">
            </div>
            <div class="field">
              <label for="costo-eq">Costo real (MXN)</label>
              <input id="costo-eq" type="number" step="0.01" min="0" placeholder="0.00" value="${esc(d.costoReal)}" oninput="state.equipoDraft.costoReal=this.value">
            </div>
            <div class="field">
              <label>Foto opcional</label>
              <input id="foto-eq" class="file-input" type="file" accept="image/*" capture="environment" onchange="setFotoEquipo(this)">
              <label class="file-trigger ${d.foto ? "loaded" : ""}" for="foto-eq">${d.foto ? "Foto cargada" : "Tomar foto"}</label>
              ${d.fotoPreview ? `<img class="thumb" src="${d.fotoPreview}" alt="Vista previa">` : ""}
            </div>
            ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            <div class="actions">
              <button class="secondary-btn" onclick="prevEquipoStep()">Atrás</button>
              <button id="btn-equipo-revisar" class="primary-btn" onclick="nextEquipoStep()" ${puedeRevisarEquipo() ? "" : "disabled"}>Revisar</button>
            </div>
          `;
        } else {
          body = `
            <h1 class="screen-title">Confirmar</h1>
            ${progressDots(3)}
            <section class="card report-card">
              <div class="kv"><b>Equipo</b><span>${esc(d.activoLabel)}</span></div>
              <div class="kv"><b>Tipo</b><span>${esc(d.tipo)}</span></div>
              <div class="kv"><b>Proveedor</b><span>${esc(d.proveedor || "-")}</span></div>
              <div class="kv"><b>Costo</b><span>${d.costoReal ? "$" + Number(d.costoReal).toLocaleString("es-MX") : "-"}</span></div>
              <div class="kv"><b>Descripción</b><span>${esc(d.descripcion)}</span></div>
              <div class="kv"><b>Foto</b><span>${d.foto ? "Adjunta" : "Sin foto"}</span></div>
            </section>
            ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            <div class="actions">
              <button class="secondary-btn" onclick="prevEquipoStep()">Atrás</button>
              <button class="primary-btn" onclick="enviarEquipo()">Guardar</button>
            </div>
          `;
        }
        render(shell(body));
      }

      async function startPuntoMantenible() {
        await Promise.all([ensureActivos(), ensureSucursales()]);
        state.puntoDraft = emptyPuntoDraft();
        if (state.sucursalFiltro) state.puntoDraft.sucursal = state.sucursalFiltro;
        showScreen("punto");
      }

      async function renderPuntoMantenible(error = "") {
        await Promise.all([ensureActivos(), ensureSucursales()]);
        const d = state.puntoDraft;
        const sucursales = sucursalesDisponibles();
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('equipo')">Volver</button>
          <h1 class="screen-title" style="margin-top:16px">Registrar punto mantenible</h1>
          <p class="muted" style="margin-top:0">Úsalo para reparaciones generales como fugas, contactos eléctricos, puertas, tarjas, paredes, drenajes o áreas de trabajo.</p>
          <section class="card report-card">
            <div class="field">
              <label>Sucursal</label>
              <select onchange="state.puntoDraft.sucursal=this.value">
                <option value="">Selecciona sucursal</option>
                ${sucursales.map(([id, nombre]) => `<option value="${id}" ${String(d.sucursal) === String(id) ? "selected" : ""}>${esc(nombre)}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label>Nombre del punto</label>
              <input value="${esc(d.nombre)}" placeholder="Ej. Instalación hidrosanitaria - Cocina" oninput="state.puntoDraft.nombre=this.value">
            </div>
            <div class="field">
              <label>Tipo</label>
              <select onchange="state.puntoDraft.categoria=this.value">
                ${["Infraestructura", "Plomería", "Electricidad", "Refrigeración", "Gas", "Mobiliario", "Otro"].map((item) =>
                  `<option value="${item}" ${d.categoria === item ? "selected" : ""}>${item}</option>`
                ).join("")}
              </select>
            </div>
            <div class="field">
              <label>Ubicación</label>
              <input value="${esc(d.ubicacion)}" placeholder="Ej. Cocina, barra, baño, almacén" oninput="state.puntoDraft.ubicacion=this.value">
            </div>
            <div class="field">
              <label>Detalle inicial</label>
              <textarea placeholder="Describe qué se detectó o qué se reparó" oninput="state.puntoDraft.notas=this.value">${esc(d.notas)}</textarea>
            </div>
            ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            <button class="primary-btn" onclick="guardarPuntoMantenible()">Guardar y continuar</button>
          </section>
        `));
      }

      async function guardarPuntoMantenible() {
        const d = state.puntoDraft;
        if (!d.sucursal) return renderPuntoMantenible("Selecciona la sucursal.");
        if (!d.nombre.trim()) return renderPuntoMantenible("Escribe el nombre del punto mantenible.");
        const res = await apiFetch("/activos/rapido/", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            sucursal: d.sucursal,
            nombre: d.nombre.trim(),
            categoria: d.categoria,
            ubicacion: d.ubicacion.trim(),
            notas: d.notas.trim(),
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          return renderPuntoMantenible(Object.values(err).flat().join(" ") || "No se pudo registrar el punto mantenible.");
        }
        const activo = await res.json();
        state.activos = [activo, ...state.activos.filter((item) => item.id !== activo.id)];
        state.equipoDraft = emptyEquipoDraft();
        state.equipoDraft.activo = activo.id;
        state.equipoDraft.activoLabel = `${activo.nombre} (${activo.codigo})`;
        state.equipoDraft.descripcion = d.notas || "";
        state.equipoDraft.tipo = "CORRECTIVO";
        state.equipoDraft.step = 2;
        showScreen("equipo");
      }

      function seleccionarActivo(id) {
        const activo = state.activos.find((item) => item.id === id);
        if (!activo) return;
        state.equipoDraft.activo = activo.id;
        state.equipoDraft.activoLabel = `${activo.nombre} (${activo.codigo})`;
        renderEquipoDraft();
      }

      function iniciarEquipoDesdeActivo(id) {
        const activo = state.activos.find((item) => item.id === id);
        if (!activo) return;
        state.equipoDraft = emptyEquipoDraft();
        state.equipoDraft.activo = activo.id;
        state.equipoDraft.activoLabel = `${activo.nombre} (${activo.codigo})`;
        state.equipoDraft.step = 2;
        showScreen("equipo");
      }

      async function verOrdenesActivo(id) {
        const res = await apiFetch(`/ordenes/?activo=${id}`);
        const ordenes = res.ok ? await parseListResponse(res) : [];
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('buscar')">Volver</button>
          <h1 class="screen-title" style="margin-top:16px">Órdenes del equipo</h1>
          ${ordenes.map((orden) => ordenCard(orden)).join("") || `<div class="empty">Este equipo no tiene órdenes registradas.</div>`}
        `));
      }

      async function abrirOrden(id) {
        const res = await apiFetch(`/ordenes/${id}/`);
        if (!res.ok) return renderSeguimiento();
        state.ordenActual = await res.json();
        renderOrdenDetalle();
      }

      function renderOrdenDetalle(error = "") {
        const orden = state.ordenActual;
        if (!orden) return showScreen("seguimiento");
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('seguimiento')">Volver</button>
          <h1 class="screen-title" style="margin-top:16px">${esc(orden.folio)}</h1>
          <section class="card report-card">
            <p style="margin:0;font-weight:900">${esc(orden.activo_nombre)}</p>
            <p class="muted">${esc(orden.activo_codigo)} · ${esc(orden.sucursal_nombre || "Sin sucursal")}</p>
            <div class="kv"><b>Estatus</b><span>${esc(orden.estatus_display)}</span></div>
            <div class="kv"><b>Prioridad</b><span>${esc(orden.prioridad_display)}</span></div>
            <div class="kv"><b>Responsable</b><span>${esc(orden.responsable || "-")}</span></div>
            <div class="kv"><b>Costo</b><span>${orden.costo_total ? "$" + Number(orden.costo_total).toLocaleString("es-MX") : "-"}</span></div>
            <p>${esc(orden.descripcion || "Sin descripción")}</p>
          </section>
          <section class="card report-card">
            <div class="field">
              <label>Estatus</label>
              <select id="seguimiento-estatus">
                <option value="PENDIENTE" ${orden.estatus === "PENDIENTE" ? "selected" : ""}>Pendiente</option>
                <option value="EN_PROCESO" ${orden.estatus === "EN_PROCESO" ? "selected" : ""}>En proceso</option>
                <option value="CERRADA" ${orden.estatus === "CERRADA" ? "selected" : ""}>Cerrada</option>
                <option value="CANCELADA" ${orden.estatus === "CANCELADA" ? "selected" : ""}>Cancelada</option>
              </select>
            </div>
            <div class="field">
              <label>Responsable</label>
              <input id="seguimiento-responsable" value="${esc(orden.responsable || "")}" placeholder="Técnico o proveedor">
            </div>
            <div class="field">
              <label>Comentario de seguimiento</label>
              <textarea id="seguimiento-comentario" placeholder="Qué se revisó, avance, pendiente o cierre"></textarea>
            </div>
            <div class="field">
              <label>Costo adicional</label>
              <input id="seguimiento-costo" type="number" step="0.01" min="0" placeholder="0.00">
            </div>
            ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            <button class="primary-btn" onclick="guardarSeguimientoOrden()">Guardar seguimiento</button>
          </section>
          <p style="color:var(--gold);font-weight:800;margin:14px 0 10px">Bitácora</p>
          ${(orden.bitacora || []).map((item) => `
            <article class="card report-card">
              <p style="margin:0;font-weight:900">${esc(item.accion)}</p>
              <p class="muted">${esc(item.fecha_display)} · ${esc(item.usuario_nombre || "")}</p>
              <p>${esc(item.comentario || "Sin comentario")}</p>
            </article>
          `).join("") || `<div class="empty">Sin seguimiento registrado.</div>`}
        `));
      }

      async function guardarSeguimientoOrden() {
        const orden = state.ordenActual;
        if (!orden) return;
        const payload = {
          estatus: document.getElementById("seguimiento-estatus")?.value,
          responsable: document.getElementById("seguimiento-responsable")?.value || "",
          comentario: document.getElementById("seguimiento-comentario")?.value || "",
        };
        const costo = document.getElementById("seguimiento-costo")?.value;
        if (costo) payload.costo_adicional = costo;
        const res = await apiFetch(`/ordenes/${orden.id}/`, {
          method: "PATCH",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          return renderOrdenDetalle(Object.values(err).flat().join(" ") || "No se pudo guardar el seguimiento.");
        }
        state.ordenActual = await res.json();
        state.ordenes = [];
        renderOrdenDetalle();
      }

      async function actualizarOrdenRapida(id, estatus) {
        const res = await apiFetch(`/ordenes/${id}/`, {
          method: "PATCH",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({estatus, comentario: estatus === "CERRADA" ? "Cierre rápido desde bandeja." : "Inicio desde bandeja."}),
        });
        if (res.ok) {
          state.ordenes = [];
          await showScreen(state.pantalla || "dashboard");
        }
      }

      function filtrarActivos(q) {
        const lista = document.getElementById("lista-activos");
        if (!lista) return;
        const value = q.toLowerCase();
        const filtrados = state.activos.filter((activo) =>
          activo.nombre.toLowerCase().includes(value) ||
          activo.codigo.toLowerCase().includes(value) ||
          (activo.sucursal_nombre || "").toLowerCase().includes(value) ||
          (activo.ubicacion || "").toLowerCase().includes(value)
        );
        lista.innerHTML = filtrados.map(activoCard).join("") || `<div class="empty">Sin resultados.</div>`;
      }

      function setFotoEquipo(input) {
        const file = input.files[0];
        if (!file) return;
        state.equipoDraft.foto = file;
        state.equipoDraft.fotoPreview = URL.createObjectURL(file);
        renderEquipoDraft();
      }

      function puedeRevisarEquipo() {
        const d = state.equipoDraft;
        return Boolean(d.tipo && d.descripcion.trim());
      }

      function syncEquipoReviewButton() {
        const button = document.getElementById("btn-equipo-revisar");
        if (button) button.disabled = !puedeRevisarEquipo();
      }

      function nextEquipoStep() {
        const d = state.equipoDraft;
        if (d.step === 1 && !d.activo) return;
        if (d.step === 2 && !d.tipo) return renderEquipoDraft("Selecciona el tipo de mantenimiento.");
        if (d.step === 2 && !d.descripcion.trim()) return renderEquipoDraft("La descripción es obligatoria.");
        d.step = Math.min(3, d.step + 1);
        renderEquipoDraft();
      }

      function prevEquipoStep() {
        state.equipoDraft.step = Math.max(1, state.equipoDraft.step - 1);
        renderEquipoDraft();
      }

      async function enviarEquipo() {
        const d = state.equipoDraft;
        const fd = new FormData();
        fd.append("activo_ref", d.activo);
        fd.append("tipo", d.tipo);
        fd.append("descripcion", d.descripcion.trim());
        if (d.proveedor) fd.append("proveedor_servicio", d.proveedor.trim());
        if (d.costoReal) fd.append("costo_real", d.costoReal);
        if (d.foto) fd.append("foto", d.foto);
        const res = await apiFetch("/ordenes/", {method: "POST", body: fd});
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          return renderEquipoDraft(Object.values(err).flat().join(" ") || "Error al guardar.");
        }
        const data = await res.json();
        render(shell(`
          <section class="confirm">
            <div class="confirm-mark">OK</div>
            <h1 class="screen-title">Guardado</h1>
            <p class="muted">Orden ${esc(data.folio || data.id)} registrada correctamente.</p>
            <div class="confirm-actions">
              <button class="primary-btn" onclick="startEquipo()">Registrar otro equipo</button>
              <button class="secondary-btn" onclick="showScreen('dashboard')">Volver al inicio</button>
            </div>
          </section>
        `));
      }

      function startVehiculo() {
        state.vehiculoDraft = emptyVehiculoDraft();
        showScreen("vehiculo");
      }

      async function ensureVehiculoCatalogos() {
        if (!state.unidades.length) {
          const res = await apiFetch("/unidades/");
          state.unidades = res.ok ? await parseListResponse(res) : [];
        }
        if (!state.tiposServicio.length) {
          const res = await apiFetch("/tipos-servicio/");
          state.tiposServicio = res.ok ? await parseListResponse(res) : [];
        }
      }

      function unidadCard(unidad) {
        const selected = state.vehiculoDraft.unidad === unidad.id ? "selected" : "";
        return `
          <button class="select-card ${selected}" onclick="seleccionarUnidad(${unidad.id})">
            <p class="card-label">${esc(unidad.descripcion)}</p>
            <p class="card-sub">${esc(unidad.codigo)} · ${esc(unidad.placa || "Sin placa")} · ${esc(unidad.sucursal_nombre || "")}</p>
          </button>
        `;
      }

      async function renderVehiculoDraft(error = "") {
        const d = state.vehiculoDraft;
        let body = "";
        if (d.step === 1) {
          await ensureVehiculoCatalogos();
          const lista = state.unidades.map(unidadCard).join("") || `<div class="empty">No hay unidades registradas.</div>`;
          body = `
            <h1 class="screen-title">Seleccionar vehículo</h1>
            ${progressDots(1)}
            <div class="card-list">${lista}</div>
            <div class="actions">
              <button class="secondary-btn" onclick="showScreen('dashboard')">Cancelar</button>
              <button class="primary-btn" onclick="nextVehiculoStep()" ${d.unidad ? "" : "disabled"}>Siguiente</button>
            </div>
          `;
        } else if (d.step === 2) {
          const tipoServicioSelect = d.modo === "servicio" ? `
            <div class="field">
              <label>Tipo de servicio</label>
              <select onchange="selectTipoServicio(this.value)">
                <option value="">Selecciona</option>
                ${state.tiposServicio.map((tipo) =>
                  `<option value="${tipo.id}" ${String(d.tipoServicio) === String(tipo.id) ? "selected" : ""}>${esc(tipo.nombre)}</option>`
                ).join("")}
              </select>
            </div>
            <div class="field">
              <label for="km-v">Kilometraje actual</label>
              <input id="km-v" type="number" min="0" placeholder="km" value="${esc(d.km)}" oninput="state.vehiculoDraft.km=this.value">
            </div>
            <div class="field">
              <label for="prox-fecha">Próxima fecha servicio</label>
              <input id="prox-fecha" type="date" value="${esc(d.proximaFecha)}" oninput="state.vehiculoDraft.proximaFecha=this.value">
            </div>
            <div class="field">
              <label for="prox-km">Próximos km para servicio</label>
              <input id="prox-km" type="number" min="0" placeholder="km" value="${esc(d.proximosKm)}" oninput="state.vehiculoDraft.proximosKm=this.value">
            </div>
          ` : d.modo === "reparacion" ? `
            <div class="field">
              <label for="falla-v">Descripción de la falla</label>
              <textarea id="falla-v" placeholder="Qué falló y cómo se detectó" oninput="state.vehiculoDraft.descripcionFalla=this.value; syncVehiculoReviewButton()">${esc(d.descripcionFalla)}</textarea>
            </div>
            <div class="field">
              <label for="rep-v">Descripción de la reparación</label>
              <textarea id="rep-v" placeholder="Qué se hizo para resolverlo" oninput="state.vehiculoDraft.descripcionReparacion=this.value">${esc(d.descripcionReparacion)}</textarea>
            </div>
          ` : "";
          body = `
            <h1 class="screen-title">Detalles</h1>
            ${progressDots(2)}
            <div class="field">
              <label>Vehículo</label>
              <p style="color:var(--gold);font-weight:800;margin:0">${esc(d.unidadLabel)}</p>
            </div>
            <div class="field">
              <label>Tipo de registro</label>
              <div class="tipo-grid">
                <button class="tipo-btn ${d.modo === "servicio" ? "selected" : ""}" onclick="state.vehiculoDraft.modo='servicio'; renderVehiculoDraft()">Servicio preventivo</button>
                <button class="tipo-btn ${d.modo === "reparacion" ? "selected" : ""}" onclick="state.vehiculoDraft.modo='reparacion'; renderVehiculoDraft()">Reparación correctiva</button>
              </div>
            </div>
            ${tipoServicioSelect}
            ${d.modo ? `
              <div class="field">
                <label for="prov-v">Proveedor / taller</label>
                <input id="prov-v" placeholder="Nombre del taller" value="${esc(d.proveedor)}" oninput="state.vehiculoDraft.proveedor=this.value">
              </div>
              <div class="field">
                <label for="costo-v">Costo (MXN)</label>
                <input id="costo-v" type="number" step="0.01" min="0" placeholder="0.00" value="${esc(d.costo)}" oninput="state.vehiculoDraft.costo=this.value">
              </div>
              <div class="field">
                <label>Foto opcional</label>
                <input id="foto-v" class="file-input" type="file" accept="image/*" capture="environment" onchange="setFotoVehiculo(this)">
                <label class="file-trigger ${d.foto ? "loaded" : ""}" for="foto-v">${d.foto ? "Foto cargada" : "Tomar foto / factura"}</label>
                ${d.fotoPreview ? `<img class="thumb" src="${d.fotoPreview}" alt="Vista previa">` : ""}
              </div>
            ` : ""}
            ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            <div class="actions">
              <button class="secondary-btn" onclick="prevVehiculoStep()">Atrás</button>
              <button id="btn-vehiculo-revisar" class="primary-btn" onclick="nextVehiculoStep()" ${puedeAvanzarVehiculo() ? "" : "disabled"}>Revisar</button>
            </div>
          `;
        } else {
          const esServicio = d.modo === "servicio";
          body = `
            <h1 class="screen-title">Confirmar</h1>
            ${progressDots(3)}
            <section class="card report-card">
              <div class="kv"><b>Vehículo</b><span>${esc(d.unidadLabel)}</span></div>
              <div class="kv"><b>Tipo</b><span>${esServicio ? "Servicio preventivo" : "Reparación correctiva"}</span></div>
              ${esServicio ? `<div class="kv"><b>Servicio</b><span>${esc(d.tipoServicioLabel)}</span></div>` : ""}
              ${!esServicio ? `<div class="kv"><b>Falla</b><span>${esc(d.descripcionFalla)}</span></div>` : ""}
              <div class="kv"><b>Proveedor</b><span>${esc(d.proveedor || "-")}</span></div>
              <div class="kv"><b>Costo</b><span>${d.costo ? "$" + Number(d.costo).toLocaleString("es-MX") : "-"}</span></div>
              ${d.km ? `<div class="kv"><b>Km</b><span>${esc(d.km)}</span></div>` : ""}
              <div class="kv"><b>Foto</b><span>${d.foto ? "Adjunta" : "Sin foto"}</span></div>
            </section>
            ${error ? `<p class="error-msg">${esc(error)}</p>` : ""}
            <div class="actions">
              <button class="secondary-btn" onclick="prevVehiculoStep()">Atrás</button>
              <button class="primary-btn" onclick="enviarVehiculo()">Guardar</button>
            </div>
          `;
        }
        render(shell(body));
      }

      function seleccionarUnidad(id) {
        const unidad = state.unidades.find((item) => item.id === id);
        if (!unidad) return;
        state.vehiculoDraft.unidad = unidad.id;
        state.vehiculoDraft.unidadLabel = `${unidad.descripcion} (${unidad.codigo})`;
        renderVehiculoDraft();
      }

      function selectTipoServicio(value) {
        const tipo = state.tiposServicio.find((item) => String(item.id) === String(value));
        state.vehiculoDraft.tipoServicio = value || null;
        state.vehiculoDraft.tipoServicioLabel = tipo ? tipo.nombre : "";
        renderVehiculoDraft();
      }

      function setFotoVehiculo(input) {
        const file = input.files[0];
        if (!file) return;
        state.vehiculoDraft.foto = file;
        state.vehiculoDraft.fotoPreview = URL.createObjectURL(file);
        renderVehiculoDraft();
      }

      function puedeAvanzarVehiculo() {
        const d = state.vehiculoDraft;
        if (d.step === 1) return Boolean(d.unidad);
        if (!d.modo) return false;
        if (d.modo === "servicio") return Boolean(d.tipoServicio);
        if (d.modo === "reparacion") return Boolean(d.descripcionFalla.trim());
        return false;
      }

      function syncVehiculoReviewButton() {
        const button = document.getElementById("btn-vehiculo-revisar");
        if (button) button.disabled = !puedeAvanzarVehiculo();
      }

      function nextVehiculoStep() {
        if (!puedeAvanzarVehiculo()) {
          const msg = state.vehiculoDraft.modo === "servicio"
            ? "Selecciona el tipo de servicio."
            : "La descripción de la falla es obligatoria.";
          return renderVehiculoDraft(msg);
        }
        state.vehiculoDraft.step = Math.min(3, state.vehiculoDraft.step + 1);
        renderVehiculoDraft();
      }

      function prevVehiculoStep() {
        state.vehiculoDraft.step = Math.max(1, state.vehiculoDraft.step - 1);
        renderVehiculoDraft();
      }

      async function enviarVehiculo() {
        const d = state.vehiculoDraft;
        let res;
        if (d.modo === "servicio") {
          const fd = new FormData();
          fd.append("unidad", d.unidad);
          fd.append("tipo_servicio", d.tipoServicio);
          fd.append("fecha", new Date().toISOString().slice(0, 10));
          if (d.km) fd.append("km_servicio", d.km);
          if (d.proveedor) fd.append("proveedor", d.proveedor);
          if (d.costo) fd.append("costo", d.costo);
          if (d.proximaFecha) fd.append("proxima_fecha", d.proximaFecha);
          if (d.proximosKm) fd.append("proximos_km", d.proximosKm);
          if (d.foto) fd.append("archivo_factura", d.foto);
          res = await apiFetch("/servicios/", {method: "POST", body: fd});
        } else {
          const fd = new FormData();
          fd.append("unidad", d.unidad);
          fd.append("fecha_ingreso", new Date().toISOString().slice(0, 10));
          fd.append("descripcion_falla", d.descripcionFalla);
          if (d.descripcionReparacion) fd.append("descripcion_reparacion", d.descripcionReparacion);
          if (d.proveedor) fd.append("proveedor", d.proveedor);
          if (d.costo) fd.append("costo", d.costo);
          if (d.foto) fd.append("foto", d.foto);
          res = await apiFetch("/reparaciones/", {method: "POST", body: fd});
        }
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          return renderVehiculoDraft(Object.values(err).flat().join(" ") || "Error al guardar.");
        }
        render(shell(`
          <section class="confirm">
            <div class="confirm-mark">OK</div>
            <h1 class="screen-title">Guardado</h1>
            <p class="muted">${d.modo === "servicio" ? "Servicio" : "Reparación"} registrado correctamente.</p>
            <div class="confirm-actions">
              <button class="primary-btn" onclick="startVehiculo()">Registrar otro</button>
              <button class="secondary-btn" onclick="showScreen('dashboard')">Volver al inicio</button>
            </div>
          </section>
        `));
      }

      async function renderHistorial() {
        const [resOrdenes, resRep, resSvc] = await Promise.all([
          apiFetch("/ordenes/"),
          apiFetch("/reparaciones/"),
          apiFetch("/servicios/"),
        ]);
        const ordenes = resOrdenes.ok ? await parseListResponse(resOrdenes) : [];
        const reparaciones = resRep.ok ? await parseListResponse(resRep) : [];
        const servicios = resSvc.ok ? await parseListResponse(resSvc) : [];
        const cardOrdenes = ordenes.slice(0, 5).map((orden) => `
          <article class="card report-card">
            <p style="margin:0;font-weight:900">${esc(orden.activo_nombre)}</p>
            <p class="muted">${esc(orden.tipo_display)} · ${esc(orden.estatus_display)}</p>
            ${orden.costo_total ? `<p class="muted">$${Number(orden.costo_total).toLocaleString("es-MX")}</p>` : ""}
          </article>
        `).join("") || `<div class="empty">Sin órdenes recientes.</div>`;
        const vehiculos = [
          ...reparaciones.slice(0, 3).map((item) => ({...item, kind: "Reparación"})),
          ...servicios.slice(0, 3).map((item) => ({...item, kind: item.tipo_nombre || "Servicio"})),
        ];
        const cardVehiculos = vehiculos.map((item) => `
          <article class="card report-card">
            <p style="margin:0;font-weight:900">${esc(item.unidad_descripcion)}</p>
            <p class="muted">${esc(item.kind)}</p>
            ${item.costo ? `<p class="muted">$${Number(item.costo).toLocaleString("es-MX")}</p>` : ""}
          </article>
        `).join("") || `<div class="empty">Sin registros de flota recientes.</div>`;
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title" style="margin-top:16px">Historial reciente</h1>
          <p style="color:var(--gold);font-weight:800;margin:0 0 10px">Equipos</p>
          ${cardOrdenes}
          <p style="color:var(--gold);font-weight:800;margin:14px 0 10px">Vehículos</p>
          ${cardVehiculos}
        `));
      }

      async function boot() {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("{% static 'mantenimiento/sw.js' %}").catch(() => {});
        }

        try {
          if (await useDjangoSessionToken()) {
            await showScreen("dashboard");
            return;
          }
        } catch (error) {
          logout(false);
        }

        if (state.token) {
          try {
            await showScreen("dashboard");
            return;
          } catch (error) {
            logout(false);
          }
        }

        renderLogin();
      }

      boot();
    </script>
  </body>
</html>
