<!--
  Componente: Empty State
  Parámetros:
    message — texto a mostrar (requerido)
    icon    — "check" | "search" | "box" | "alert" | "folder" | "clock" (opcional, default "folder")
    action_url   — URL para botón de acción (opcional)
    action_label — texto del botón (opcional, default "Agregar")
  Uso:
    include "components/empty_state.html" with message="No hay alertas activas" icon="check"
    include "components/empty_state.html" with message="Sin resultados" icon="search" action_url="/insumos/nuevo/" action_label="Nuevo insumo"
-->
<div class="empty-state">
    <div class="empty-state-icon">
        {% if icon == "check" %}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m9 12 2 2 4-4"/></svg>
        {% elif icon == "search" %}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        {% elif icon == "box" %}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3 8.5 4.7v8.6L12 21l-8.5-4.7V7.7L12 3Z"/><path d="m3.5 7.7 8.5 4.8 8.5-4.8M12 12.5V21"/></svg>
        {% elif icon == "alert" %}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><path d="M12 9v4M12 17h.01"/></svg>
        {% elif icon == "clock" %}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        {% else %}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7.5A2.5 2.5 0 0 1 5.5 5h4L11 7h7.5A2.5 2.5 0 0 1 21 9.5v8A2.5 2.5 0 0 1 18.5 20h-13A2.5 2.5 0 0 1 3 17.5v-10Z"/></svg>
        {% endif %}
    </div>
    <p class="empty-state-msg">{{ message }}</p>
    {% if action_url %}
    <a href="{{ action_url }}" class="btn btn-secondary btn-sm">{{ action_label|default:"Agregar" }}</a>
    {% endif %}
</div>
