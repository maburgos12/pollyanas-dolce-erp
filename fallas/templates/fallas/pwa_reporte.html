{% load static %}
<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#8B2252">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Reportar Falla - Pollyana's Dolce</title>
  <link rel="manifest" href="{% static 'fallas/manifest.json' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root { --wine:#8B2252; --gold:#C9A84C; --bg:#f6f1f4; --card:#fff; --text:#25141d; --muted:#70636a; --danger:#dc2626; --success:#16a34a; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:"Nunito", sans-serif; }
    header { position:sticky; top:0; z-index:2; background:var(--wine); color:#fff; padding:16px; box-shadow:0 2px 10px rgba(0,0,0,.18); }
    h1 { margin:0; font-family:"Playfair Display", serif; font-size:24px; letter-spacing:0; }
    main { width:100%; max-width:480px; margin:0 auto; padding:16px 16px 32px; }
    .card { background:var(--card); border:1px solid rgba(139,34,82,.12); border-radius:12px; padding:16px; margin-bottom:14px; box-shadow:0 2px 10px rgba(39,18,29,.06); }
    h2 { margin:0 0 12px; color:var(--wine); font-size:13px; text-transform:uppercase; letter-spacing:.04em; }
    label { display:block; margin:0 0 6px; color:var(--muted); font-size:14px; font-weight:800; }
    input, select, textarea { width:100%; min-height:48px; border:1px solid #ddd3d8; border-radius:10px; background:#fff; padding:11px 12px; color:var(--text); font:inherit; }
    textarea { min-height:112px; resize:vertical; }
    .field { margin-bottom:12px; }
    .priority-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .priority { min-height:48px; border:2px solid #ddd3d8; border-radius:10px; background:#fff; color:var(--text); font-weight:800; }
    .priority.is-active { border-color:var(--wine); color:var(--wine); background:#fbf3f7; }
    .photo-box { position:relative; display:grid; place-items:center; min-height:150px; border:2px dashed #cbbbc3; border-radius:12px; background:#fbf8fa; color:var(--muted); text-align:center; padding:20px; }
    .photo-box input { position:absolute; inset:0; opacity:0; cursor:pointer; }
    #preview { display:none; width:100%; max-height:260px; object-fit:cover; margin-top:12px; border-radius:10px; }
    .gps { display:inline-flex; align-items:center; min-height:32px; padding:5px 10px; border-radius:999px; background:#ecfdf3; color:#166534; font-size:13px; font-weight:700; }
    .gps.error { background:#fef2f2; color:#991b1b; }
    .submit { width:100%; min-height:54px; border:0; border-radius:12px; background:var(--wine); color:#fff; font:inherit; font-size:16px; font-weight:900; }
    .submit:disabled { background:#b8aeb3; }
    .toast { position:fixed; left:16px; right:16px; bottom:18px; z-index:4; display:none; padding:13px 16px; border-radius:12px; background:#25141d; color:#fff; font-weight:800; text-align:center; }
    .toast.show { display:block; }
    .toast.success { background:var(--success); }
    .toast.error { background:var(--danger); }
  </style>
</head>
<body>
  <header>
    <h1>Reportar Falla</h1>
    <div id="branch-label" style="font-size:13px; opacity:.85;">Pollyana's Dolce</div>
  </header>
  <main>
    <section class="card">
      <h2>Sucursal</h2>
      <div class="field">
        <label for="sucursal">Sucursal *</label>
        <select id="sucursal"><option value="">Cargando sucursales...</option></select>
      </div>
      <div id="gps" class="gps">Obteniendo ubicación GPS...</div>
    </section>
    <section class="card">
      <h2>Tipo de falla</h2>
      <div class="field">
        <label for="categoria">Categoría *</label>
        <select id="categoria"><option value="">Cargando categorías...</option></select>
      </div>
      <div class="field">
        <label for="titulo">Título *</label>
        <input id="titulo" maxlength="200" placeholder="Ej. Vitrina no enfría">
      </div>
      <div class="field">
        <label for="descripcion">Descripción *</label>
        <textarea id="descripcion" placeholder="Describe qué pasó, cuándo inició y cómo afecta la operación."></textarea>
      </div>
    </section>
    <section class="card">
      <h2>Prioridad</h2>
      <div class="priority-grid">
        <button type="button" class="priority" data-priority="baja">Baja</button>
        <button type="button" class="priority is-active" data-priority="media">Media</button>
        <button type="button" class="priority" data-priority="alta">Alta</button>
        <button type="button" class="priority" data-priority="critica">Crítica</button>
      </div>
    </section>
    <section class="card">
      <h2>Evidencia fotográfica</h2>
      <div class="photo-box">
        <div><strong>Toca para tomar foto</strong><br><span>o elige una imagen</span></div>
        <input id="foto" type="file" accept="image/*" capture="environment">
      </div>
      <img id="preview" alt="Vista previa">
    </section>
    <button id="enviar" class="submit" disabled>Enviar reporte</button>
  </main>
  <div id="toast" class="toast"></div>
  <script>
    const API = "/api/fallas";
    const token = localStorage.getItem("pd_logistica_access") || localStorage.getItem("fallas_jwt") || localStorage.getItem("access_token") || "";
    const csrf = "{{ csrf_token }}";
    let latitud = null;
    let longitud = null;
    let prioridad = "media";
    let foto = null;

    function authHeaders(json=false) {
      const headers = {"X-CSRFToken": csrf};
      if (token) headers.Authorization = `Bearer ${token}`;
      if (json) headers["Content-Type"] = "application/json";
      return headers;
    }
    function toast(message, type="") {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.className = `toast show ${type}`;
      setTimeout(() => el.classList.remove("show"), 3500);
    }
    async function loadSelect(url, id, label) {
      const res = await fetch(url, {headers: authHeaders()});
      const data = await res.json();
      const items = data.results || data;
      const sel = document.getElementById(id);
      sel.innerHTML = `<option value="">Selecciona ${label}...</option>`;
      items.forEach(item => sel.insertAdjacentHTML("beforeend", `<option value="${item.id}">${item.nombre}</option>`));
    }
    function validate() {
      const ok = document.getElementById("sucursal").value && document.getElementById("categoria").value &&
        document.getElementById("titulo").value.trim().length >= 5 &&
        document.getElementById("descripcion").value.trim().length >= 10 && foto;
      document.getElementById("enviar").disabled = !ok;
    }
    if ("geolocation" in navigator) {
      navigator.geolocation.getCurrentPosition(pos => {
        latitud = pos.coords.latitude;
        longitud = pos.coords.longitude;
        document.getElementById("gps").textContent = `GPS capturado (+/- ${Math.round(pos.coords.accuracy)}m)`;
      }, () => {
        const el = document.getElementById("gps");
        el.textContent = "GPS no disponible";
        el.classList.add("error");
      }, {timeout:10000, maximumAge:60000});
    }
    document.querySelectorAll(".priority").forEach(btn => btn.addEventListener("click", () => {
      document.querySelectorAll(".priority").forEach(item => item.classList.remove("is-active"));
      btn.classList.add("is-active");
      prioridad = btn.dataset.priority;
    }));
    document.getElementById("foto").addEventListener("change", event => {
      foto = event.target.files[0] || null;
      if (foto) {
        const preview = document.getElementById("preview");
        preview.src = URL.createObjectURL(foto);
        preview.style.display = "block";
      }
      validate();
    });
    ["sucursal", "categoria", "titulo", "descripcion"].forEach(id => {
      document.getElementById(id).addEventListener("input", validate);
      document.getElementById(id).addEventListener("change", validate);
    });
    document.getElementById("enviar").addEventListener("click", async () => {
      const fd = new FormData();
      fd.append("sucursal", document.getElementById("sucursal").value);
      fd.append("categoria", document.getElementById("categoria").value);
      fd.append("titulo", document.getElementById("titulo").value.trim());
      fd.append("descripcion", document.getElementById("descripcion").value.trim());
      fd.append("prioridad", prioridad);
      fd.append("foto_evidencia", foto);
      if (latitud !== null) fd.append("latitud", latitud);
      if (longitud !== null) fd.append("longitud", longitud);
      const res = await fetch(`${API}/reportes/`, {method:"POST", headers:authHeaders(), body:fd});
      if (res.ok) {
        const data = await res.json();
        toast(`Reporte #${data.id} enviado correctamente`, "success");
        document.getElementById("titulo").value = "";
        document.getElementById("descripcion").value = "";
        document.getElementById("preview").style.display = "none";
        document.getElementById("foto").value = "";
        foto = null;
        validate();
      } else {
        const error = await res.json();
        toast(Object.values(error).flat().join(" ") || "No se pudo enviar el reporte.", "error");
      }
    });
    loadSelect(`${API}/sucursales/`, "sucursal", "tu sucursal").catch(() => toast("No se pudieron cargar sucursales.", "error"));
    loadSelect(`${API}/categorias/`, "categoria", "una categoría").catch(() => toast("No se pudieron cargar categorías.", "error"));
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("{% static 'fallas/sw.js' %}").catch(() => {});
  </script>
</body>
</html>
