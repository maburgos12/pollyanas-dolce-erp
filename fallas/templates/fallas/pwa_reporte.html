{% load static %}
<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#8B2252">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pollyana's Fallas</title>
    <link rel="manifest" href="{% static 'fallas/manifest.json' %}">
    <link rel="icon" href="{% static 'fallas/icons/icon-192.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/template_modules/fallas-templates-fallas-pwa-reporte.css?v=20260614-ui100-v1">
    <link rel="stylesheet" href="/static/css/pollyana_generated_utilities.css?v=20260614-ui100-v1">
    <link rel="stylesheet" href="{% static 'operacion/app_theme.css' %}?v=20260526-word-guard-v1">
  </head>
  <body>
    <div id="app"></div>
    <script src="{% static 'js/pollyana_ops_ui.js' %}?v=20260614-ui100-v1" defer></script>
    <script>
      const API = "/api/fallas";
      const AUTH_API = "/api/logistica";
      const PHOTO_MAX_AGE_MS = 5 * 60 * 1000;
      const PHOTO_CAPTURE_SESSION_MS = 10 * 60 * 1000;
      const app = document.getElementById("app");
      const state = {
        token: localStorage.getItem("pd_logistica_access") || "",
        refreshToken: localStorage.getItem("pd_logistica_refresh") || "",
        perfil: null,
        pantallaActual: "login",
        sucursales: [],
        categorias: [],
        activos: [],
        misReportes: [],
        draft: emptyDraft()
      };

      const prioridades = [
        {label: "Baja", value: "baja"},
        {label: "Media", value: "media"},
        {label: "Alta", value: "alta"},
        {label: "Critica", value: "critica"}
      ];

      const AREAS = [
        {label: "Ventas", value: "ventas"},
        {label: "Produccion", value: "produccion"},
        {label: "General", value: "general"}
      ];

      function emptyDraft() {
        return {
          step: 1,
          sucursal: "",
          categoria: "",
          area: "general",
          activo: "",
          prioridad: "media",
          titulo: "",
          descripcion: "",
          foto: null,
          fotoPreview: "",
          fotoError: "",
          latitud: "",
          longitud: "",
          geoStatus: "idle",
          editMode: false,
          reporteId: null,
          fotoActual: ""
        };
      }

      function esc(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function fmt(value) {
        if (!value) return "-";
        return new Intl.DateTimeFormat("es-MX", {dateStyle: "medium", timeStyle: "short"}).format(new Date(value));
      }

      function defaultArea() {
        const grupos = (state.perfil?.groups || []).map((g) => String(g).toLowerCase());
        if (grupos.includes("produccion")) return "produccion";
        if (grupos.includes("ventas")) return "ventas";
        return "general";
      }

      function apiErrorMessage(error, fallback) {
        if (!error) return fallback;
        if (error.mensaje) return error.mensaje;
        if (error.detail) return error.detail;
        if (Array.isArray(error.non_field_errors) && error.non_field_errors.length) return error.non_field_errors[0];
        const firstKey = Object.keys(error || {})[0];
        if (!firstKey) return fallback;
        const value = error[firstKey];
        if (Array.isArray(value)) return `${firstKey}: ${value[0]}`;
        if (typeof value === "string") return `${firstKey}: ${value}`;
        return fallback;
      }

      async function apiFetch(path, options = {}) {
        const headers = {...(options.headers || {})};
        if (state.token) headers.Authorization = `Bearer ${state.token}`;
        const response = await fetch(`${API}${path}`, {...options, headers});
        if (response.status === 401) {
          if (state.refreshToken && !options._retry) {
            const refreshed = await fetch(`${AUTH_API}/auth/token/refresh/`, {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({refresh: state.refreshToken})
            });
            if (refreshed.ok) {
              const data = await refreshed.json();
              state.token = data.access;
              localStorage.setItem("pd_logistica_access", data.access);
              return apiFetch(path, {...options, _retry: true});
            }
          }
          logout(false);
          throw new Error("Sesion expirada");
        }
        return response;
      }

      function setTokens(data) {
        state.token = data.access;
        state.refreshToken = data.refresh;
        localStorage.setItem("pd_logistica_access", data.access);
        localStorage.setItem("pd_logistica_refresh", data.refresh);
      }

      function logout(render = true) {
        state.token = "";
        state.refreshToken = "";
        state.perfil = null;
        localStorage.removeItem("pd_logistica_access");
        localStorage.removeItem("pd_logistica_refresh");
        if (render) window.location.href = "/logout/";
      }

      function render(html) {
        app.classList.add("is-changing");
        window.setTimeout(() => {
          app.innerHTML = html;
          app.classList.remove("is-changing");
        }, 120);
      }

      function appGlyph(name) {
        const icons = {
          falla: `<svg viewBox="0 0 32 32"><path class="soft" d="M16 5 27 25H5L16 5Z"/><path class="gold-stroke" d="M16 12v6"/><path class="stroke" d="M16 23h.1"/></svg>`,
          historial: `<svg viewBox="0 0 32 32"><path class="soft" d="M10 7h12v18H10z"/><path class="gold-stroke" d="M13 12h6M13 16h6M13 20h4"/><path class="stroke" d="M8 10h2M8 15h2M8 20h2"/></svg>`
        };
        return `<span class="app-glyph" aria-hidden="true">${icons[name] || icons.falla}</span>`;
      }

      function shell(content) {
        const nombre = esc(state.perfil?.nombre || "Sucursal");
        return `
          <div class="topbar">
            <div>
              <div class="mini-brand">Pollyana's</div>
              <p class="hello">Hola, ${nombre}</p>
            </div>
            <button class="logout" onclick="logout()">Salir</button>
          </div>
          ${content}
          <div class="footer">Pollyana's Dolce © 2026</div>
        `;
      }

      async function showScreen(nombre) {
        state.pantallaActual = nombre;
        if (nombre === "login") return renderLogin();
        if (!state.perfil) await loadPerfil();
        if (nombre === "dashboard") return renderDashboard();
        if (nombre === "nuevo_reporte") return renderNuevoReporte();
        if (nombre === "mis_reportes") return renderMisReportes();
      }

      function renderLogin(error = "") {
        render(`
          <main class="login-wrap">
            <section>
              <h1 class="brand-title">Pollyana's</h1>
              <p class="brand-subtitle">Fallas</p>
            </section>
            <form class="panel" onsubmit="login(event)">
              <div class="field">
                <label for="username">Usuario</label>
                <input id="username" name="username" autocomplete="username" required>
              </div>
              <div class="field">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
              </div>
              <button class="primary-btn" type="submit">Entrar</button>
              ${error ? `<p class="error">${esc(error)}</p>` : ""}
            </form>
          </main>
        `);
      }

      async function login(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const response = await fetch(`${AUTH_API}/auth/token/`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({username: form.get("username"), password: form.get("password")})
        });
        if (!response.ok) return renderLogin("Usuario o contraseña incorrectos");
        setTokens(await response.json());
        await showScreen("dashboard");
      }

      async function loadPerfil() {
        const response = await apiFetch("/me/");
        state.perfil = response.ok ? await response.json() : {nombre: "Sucursal"};
      }

      async function loadSucursales() {
        const response = await apiFetch("/sucursales/");
        const data = response.ok ? await response.json() : [];
        state.sucursales = data.results || data;
        return state.sucursales;
      }

      async function loadCategorias() {
        const response = await apiFetch("/categorias/");
        const data = response.ok ? await response.json() : [];
        state.categorias = data.results || data;
        return state.categorias;
      }

      async function loadActivos(sucursalId) {
        if (!sucursalId) {
          state.activos = [];
          return state.activos;
        }
        const response = await apiFetch(`/activos/?sucursal=${encodeURIComponent(sucursalId)}`);
        const data = response.ok ? await response.json() : [];
        state.activos = data.results || data;
        return state.activos;
      }

      async function loadMisReportes() {
        const response = await apiFetch("/reportes/");
        const data = response.ok ? await response.json() : [];
        state.misReportes = data.results || data;
        return state.misReportes;
      }

      async function renderDashboard() {
        await loadMisReportes();
        const abiertos = state.misReportes.filter((r) => !["cerrado", "cancelado"].includes(r.estatus)).length;
        render(shell(`
          <p class="unit-line">Reporta fallas de sucursal con foto y ubicación.</p>
          <div class="dash-grid">
            <button class="dash-btn" onclick="startNuevoReporte()">${appGlyph("falla")}<span>Reportar falla</span></button>
            <button class="dash-btn" onclick="showScreen('mis_reportes')">${appGlyph("historial")}<span>Reportes</span>${abiertos ? `<span class="badge">${abiertos}</span>` : ""}</button>
          </div>
        `));
      }

      function startNuevoReporte() {
        state.draft = emptyDraft();
        state.draft.area = defaultArea();
        showScreen("nuevo_reporte");
      }

      async function startEditarReporte(id) {
        const response = await apiFetch(`/reportes/${encodeURIComponent(id)}/`);
        if (!response.ok) return renderMisReportes("No se pudo abrir el reporte para edición.");
        const reporte = await response.json();
        if (!reporte.puede_editar) return renderMisReportes("Este reporte ya está en seguimiento y no se puede editar.");
        state.draft = {
          ...emptyDraft(),
          step: 1,
          editMode: true,
          reporteId: reporte.id,
          sucursal: reporte.sucursal || "",
          categoria: reporte.categoria || "",
          area: reporte.area || "general",
          activo: reporte.activo_relacionado || "",
          prioridad: reporte.prioridad || "media",
          titulo: reporte.titulo || "",
          descripcion: reporte.descripcion || "",
          latitud: reporte.latitud || "",
          longitud: reporte.longitud || "",
          geoStatus: reporte.latitud ? "ready" : "idle",
          fotoActual: reporte.foto_evidencia || ""
        };
        await loadSucursales();
        await loadCategorias();
        if (state.draft.sucursal) await loadActivos(state.draft.sucursal);
        showScreen("nuevo_reporte");
      }

      function progressDots(step) {
        return `<div class="progress">${[1, 2, 3].map((n) => `<span class="dot ${step === n ? "active" : ""}"></span>`).join("")}</div>`;
      }

      function getSucursalLabel(id) {
        const item = state.sucursales.find((s) => String(s.id) === String(id));
        return item ? item.nombre : "-";
      }

      function getCategoriaLabel(id) {
        const item = state.categorias.find((c) => String(c.id) === String(id));
        return item ? item.nombre : "-";
      }

      function getAreaLabel(value) {
        const item = AREAS.find((a) => a.value === value);
        return item ? item.label : "-";
      }

      function getActivoLabel(id) {
        const item = state.activos.find((a) => String(a.id) === String(id));
        return item ? item.display : "-";
      }

      async function selectSucursal(value) {
        state.draft.sucursal = value;
        state.draft.activo = "";
        await loadActivos(value);
        renderNuevoReporte();
      }

      function selectPrioridad(value) {
        state.draft.prioridad = value;
        renderNuevoReporte();
      }

      function selectArea(value) {
        state.draft.area = value;
        renderNuevoReporte();
      }

      function nextReporteStep() {
        const d = state.draft;
        if (d.step === 1 && (!d.sucursal || !d.categoria || !d.area || !d.prioridad)) return;
        if (d.step === 2 && (!d.titulo.trim() || !d.descripcion.trim())) {
          return renderNuevoReporte("Captura titulo y descripcion.");
        }
        if (d.step === 2 && !d.editMode && !isGeoReady(d)) return renderNuevoReporte("Se requiere ubicación para continuar.");
        if (d.step === 2 && !d.editMode && !d.foto) return renderNuevoReporte("La foto debe tomarse en este momento.");
        d.step = Math.min(3, d.step + 1);
        renderNuevoReporte();
      }

      function prevReporteStep() {
        state.draft.step = Math.max(1, state.draft.step - 1);
        renderNuevoReporte();
      }

      async function renderNuevoReporte(error = "") {
        const d = state.draft;
        let body = "";
        if (d.step === 1) {
          if (!state.sucursales.length) await loadSucursales();
          if (!state.categorias.length) await loadCategorias();
          if (d.sucursal && !state.activos.length) await loadActivos(d.sucursal);
          body = `
            <h1 class="screen-title">${d.editMode ? `Editar reporte #${esc(d.reporteId)}` : "Nuevo reporte"}</h1>
            ${progressDots(1)}
            <div class="field">
              <label for="sucursal">Sucursal</label>
              <select id="sucursal" onchange="selectSucursal(this.value)">
                <option value="">Selecciona sucursal</option>
                ${state.sucursales.map((s) => `<option value="${s.id}" ${String(d.sucursal) === String(s.id) ? "selected" : ""}>${esc(s.nombre)}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label for="activo">Equipo o activo relacionado</label>
              <select id="activo" onchange="state.draft.activo = this.value">
                <option value="">Sin equipo específico</option>
                ${state.activos.map((a) => `<option value="${a.id}" ${String(d.activo) === String(a.id) ? "selected" : ""}>${esc(a.display)}</option>`).join("")}
              </select>
              ${d.sucursal && !state.activos.length ? `<p class="muted">No hay activos cargados para esta sucursal.</p>` : ""}
            </div>
            <div class="field">
              <label for="categoria">Categoria</label>
              <select id="categoria" onchange="state.draft.categoria = this.value; renderNuevoReporte()">
                <option value="">Selecciona categoria</option>
                ${state.categorias.map((c) => `<option value="${c.id}" ${String(d.categoria) === String(c.id) ? "selected" : ""}>${esc(c.nombre)}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label>Area</label>
              <div class="severity-row">
                ${AREAS.map((a) => `
                  <button class="severity-card tone-${a.value} ${d.area === a.value ? "selected" : ""}" onclick="selectArea('${a.value}')">
                    ${esc(a.label)}
                  </button>
                `).join("")}
              </div>
            </div>
            <div class="severity-row">
              ${prioridades.map((p) => `
                <button class="severity-card tone-${p.value} ${d.prioridad === p.value ? "selected" : ""}" onclick="selectPrioridad('${p.value}')">
                  ${esc(p.label)}
                </button>
              `).join("")}
            </div>
            <div class="actions">
              <button class="secondary-btn" onclick="${d.editMode ? "showScreen('mis_reportes')" : "showScreen('dashboard')"}">Cancelar</button>
              <button class="primary-btn" onclick="nextReporteStep()" ${d.sucursal && d.categoria && d.area && d.prioridad ? "" : "disabled"}>Siguiente</button>
            </div>
          `;
        } else if (d.step === 2) {
          const ubicacionLista = isGeoReady(d);
          body = `
            <div class="${ubicacionLista ? "" : "gps-locked"}">
              <h1 class="screen-title">Detalles</h1>
              ${progressDots(2)}
              <div class="field">
                <label for="titulo">Titulo</label>
                <input id="titulo" maxlength="200" value="${esc(d.titulo)}" oninput="state.draft.titulo = this.value">
              </div>
              <div class="field">
                <label for="descripcion">Descripcion</label>
                <textarea id="descripcion" oninput="state.draft.descripcion = this.value">${esc(d.descripcion)}</textarea>
              </div>
              <div class="field">
                <label for="foto">Foto</label>
                ${fotoInput("foto", Boolean(d.foto), "setFotoReporte(this)")}
                ${d.fotoPreview ? `<img class="thumb" src="${d.fotoPreview}" alt="Vista previa">` : ""}
                ${d.editMode && d.fotoActual && !d.fotoPreview ? `<p class="muted">Si no tomas otra foto, se conserva la evidencia actual.</p>` : ""}
                ${d.fotoError ? `<p class="error">${esc(d.fotoError)}</p>` : ""}
              </div>
              <p class="gps-registered">Ubicacion registrada</p>
              ${error ? `<p class="error">${esc(error)}</p>` : ""}
              <div class="actions">
                <button class="secondary-btn" onclick="prevReporteStep()">Atrás</button>
                <button class="primary-btn" onclick="nextReporteStep()" ${(d.editMode || ubicacionLista) && (d.editMode || d.foto) ? "" : "disabled"}>Siguiente</button>
              </div>
            </div>
            ${geoOverlay(d)}
          `;
        } else {
          body = `
            <h1 class="screen-title">Confirmar</h1>
            ${progressDots(3)}
            <section class="card report-card">
              <div class="kv"><b>Sucursal</b><span>${esc(getSucursalLabel(d.sucursal))}</span></div>
              <div class="kv"><b>Equipo</b><span>${esc(getActivoLabel(d.activo))}</span></div>
              <div class="kv"><b>Categoria</b><span>${esc(getCategoriaLabel(d.categoria))}</span></div>
              <div class="kv"><b>Area</b><span>${esc(getAreaLabel(d.area))}</span></div>
              <div class="kv"><b>Prioridad</b><span>${esc(d.prioridad)}</span></div>
              <div class="kv"><b>Ubicacion</b><span>${d.latitud ? "Registrada" : "-"}</span></div>
              <div class="kv"><b>Titulo</b><span>${esc(d.titulo)}</span></div>
              <div class="kv"><b>Descripcion</b><span>${esc(d.descripcion)}</span></div>
            </section>
            ${error ? `<p class="error">${esc(error)}</p>` : ""}
            <div class="actions">
              <button class="secondary-btn" onclick="prevReporteStep()">Atrás</button>
              <button class="primary-btn" onclick="enviarReporte()" ${(d.editMode || isGeoReady(d)) && (d.editMode || d.foto) ? "" : "disabled"}>${d.editMode ? "Guardar cambios" : "Enviar reporte"}</button>
            </div>
          `;
        }
        render(shell(body));
      }

      function marcarInicioCapturaFoto(input) {
        input.dataset.captureStartedAt = String(Date.now());
      }

      function isRecentCameraPhoto(input, file) {
        const now = Date.now();
        const modified = Number(file.lastModified || 0);
        const captureStartedAt = Number(input.dataset.captureStartedAt || 0);
        const modifiedLooksValid = modified > 0 && modified <= now + 60000;
        const modifiedIsFresh = modifiedLooksValid && now - modified <= PHOTO_MAX_AGE_MS;
        const selectedDuringCameraSession = captureStartedAt > 0 && now - captureStartedAt <= PHOTO_CAPTURE_SESSION_MS;
        return modifiedIsFresh || selectedDuringCameraSession;
      }

      function fotoInput(id, loaded, onChange) {
        return `
          <div class="file-picker">
            <input id="${id}" class="file-input" type="file" accept="image/*" capture="environment" onclick="marcarInicioCapturaFoto(this)" onpointerdown="marcarInicioCapturaFoto(this)" onchange="${onChange}">
            <label class="file-trigger ${loaded ? "loaded" : ""}" for="${id}">${loaded ? "Imagen cargada" : "Tomar foto"}</label>
          </div>
        `;
      }

      function setFotoReporte(input) {
        const file = input.files[0] || null;
        if (!file) {
          state.draft.foto = null;
          state.draft.fotoPreview = "";
          state.draft.fotoError = "";
          return renderNuevoReporte();
        }
        if (!isRecentCameraPhoto(input, file)) {
          state.draft.foto = null;
          state.draft.fotoPreview = "";
          state.draft.fotoError = "La foto debe tomarse en este momento. No se permiten imagenes de la galeria.";
          input.value = "";
          return renderNuevoReporte();
        }
        state.draft.foto = file;
        state.draft.fotoPreview = URL.createObjectURL(file);
        state.draft.fotoError = "";
        renderNuevoReporte();
      }

      function isGeoReady(d) {
        return d.geoStatus === "ready" && Boolean(d.latitud);
      }

      function geoOverlay(d) {
        if (isGeoReady(d)) return "";
        const denied = d.geoStatus === "denied";
        const loading = d.geoStatus === "loading";
        const unavailable = d.geoStatus === "unavailable";
        const message = denied
          ? "Bloqueaste el acceso a tu ubicación.\n1. Toca el icono de candado en tu navegador\n2. Activa el permiso de ubicación\n3. Recarga la página"
          : unavailable
            ? "No pudimos obtener tu ubicación. Verifica que el GPS esté activado e intenta de nuevo."
            : "Esta acción requiere tu ubicación.\nPresiona Permitir cuando el navegador lo solicite.";
        return `
          <div class="gps-overlay" role="dialog" aria-modal="true">
            <section class="gps-card">
              <div class="gps-icon">GPS</div>
              <h2 class="gps-title">Ubicacion requerida</h2>
              <p class="gps-message">${esc(message)}</p>
              <button class="primary-btn" onclick="requestGeo()" ${loading ? "disabled" : ""}>
                ${loading ? "Obteniendo ubicación..." : denied || unavailable ? "Reintentar" : "Activar ubicación"}
              </button>
            </section>
          </div>
        `;
      }

      function requestGeo() {
        if (!navigator.geolocation) {
          state.draft.geoStatus = "unavailable";
          renderNuevoReporte();
          return;
        }
        state.draft.geoStatus = "loading";
        renderNuevoReporte();
        navigator.geolocation.getCurrentPosition((position) => {
          state.draft.latitud = position.coords.latitude.toFixed(6);
          state.draft.longitud = position.coords.longitude.toFixed(6);
          state.draft.geoStatus = "ready";
          renderNuevoReporte();
        }, (error) => {
          state.draft.latitud = "";
          state.draft.longitud = "";
          state.draft.geoStatus = error.code === 1 ? "denied" : "unavailable";
          renderNuevoReporte();
        }, {enableHighAccuracy: true, timeout: 10000, maximumAge: 0});
      }

      async function enviarReporte() {
        const d = state.draft;
        if (!d.editMode && (!isGeoReady(d) || !d.foto)) return renderNuevoReporte("Se requiere ubicación y foto tomada en este momento.");
        const form = new FormData();
        form.append("sucursal", d.sucursal);
        form.append("categoria", d.categoria);
        form.append("area", d.area);
        if (d.activo) form.append("activo_relacionado", d.activo);
        form.append("titulo", d.titulo.trim());
        form.append("descripcion", d.descripcion.trim());
        form.append("prioridad", d.prioridad);
        if (d.foto) form.append("foto_evidencia", d.foto);
        if (d.latitud) form.append("latitud", d.latitud);
        if (d.longitud) form.append("longitud", d.longitud);
        const path = d.editMode ? `/reportes/${encodeURIComponent(d.reporteId)}/` : "/reportes/";
        const response = await apiFetch(path, {method: d.editMode ? "PATCH" : "POST", body: form});
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          return renderNuevoReporte(apiErrorMessage(error, d.editMode ? "No se pudo guardar el reporte." : "No se pudo enviar el reporte."));
        }
        const data = await response.json();
        render(shell(`
          <section class="confirm">
            <div class="confirm-mark">OK</div>
            <h1 class="screen-title">${d.editMode ? "Reporte actualizado" : "Reporte enviado"}</h1>
            <p class="muted">Folio #${esc(data.id || d.reporteId)} ${d.editMode ? "actualizado correctamente." : "registrado. Compras recibira notificacion y dara seguimiento."}</p>
            <div class="confirm-actions">
              <button class="primary-btn" onclick="startNuevoReporte()">Reportar otra falla</button>
              <button class="secondary-btn" onclick="showScreen('mis_reportes')">Ver mis reportes</button>
            </div>
          </section>
        `));
      }

      async function renderMisReportes(error = "") {
        await loadMisReportes();
        const cards = state.misReportes.length
          ? state.misReportes.map((r) => {
              const desc = (r.descripcion || "").length > 80 ? `${r.descripcion.slice(0, 80)}...` : r.descripcion || "";
              return `
                <article class="card report-card" onclick="this.classList.toggle('expanded')">
                  <div class="report-head">
                    <div>
                      <p class="report-title">${esc(r.titulo)}</p>
                      <p class="muted">${esc(r.sucursal_nombre)} · ${fmt(r.fecha_reporte)}</p>
                    </div>
                    <span class="status ${esc(r.estatus)}">${esc(r.estatus_display || r.estatus)}</span>
                  </div>
                  <p class="muted pd-u-b1ecc496e0">${esc(desc)}</p>
                  <div class="detail">
                    <div class="kv"><b>Categoria</b><span>${esc(r.categoria_nombre)}</span></div>
                    <div class="kv"><b>Area</b><span>${esc(r.area_display || r.area || "-")}</span></div>
                    <div class="kv"><b>Prioridad</b><span>${esc(r.prioridad_display || r.prioridad)}</span></div>
                    <div class="kv"><b>GPS</b><span>${r.latitud ? "Registrado" : "-"}</span></div>
                  </div>
                  ${r.puede_editar ? `
                    <div class="inline-actions">
                      <button class="edit-btn" onclick="event.stopPropagation(); startEditarReporte(${Number(r.id)})">Editar</button>
                      <button class="secondary-btn" onclick="event.stopPropagation(); showScreen('dashboard')">Inicio</button>
                    </div>
                  ` : ""}
                </article>
              `;
            }).join("")
          : `<div class="empty">Todavia no hay reportes registrados.</div>`;
        render(shell(`
          <button class="secondary-btn" onclick="showScreen('dashboard')">Volver</button>
          <h1 class="screen-title pd-u-8a359a76eb">Reportes</h1>
          ${error ? `<p class="error">${esc(error)}</p>` : ""}
          ${cards}
        `));
      }

      async function boot() {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("{% static 'fallas/sw.js' %}?v=20260614-ui100-v6").catch(() => {});
        }
        if (state.token) {
          try {
            await showScreen("dashboard");
          } catch (error) {
            logout(false);
            renderLogin();
          }
        } else {
          renderLogin();
        }
      }

      boot();
    </script>
  </body>
</html>
