{% for producto in productos %}
<option data-id="{{ producto.id }}" value="{{ producto.nombre }}{% if producto.codigo_point %} · Point {{ producto.codigo_point }}{% endif %}{% if producto.familia %} · {{ producto.familia }}{% endif %}{% if producto.categoria %} · {{ producto.categoria }}{% endif %}"></option>
{% empty %}
<option value="">Sin productos coincidentes</option>
{% endfor %}
